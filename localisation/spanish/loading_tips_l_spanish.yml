l_spanish:
 LOADING_TIP_0: "Pero trato de no cometer errores. Quiero decir, ¿por qué tengo que, ya sabes, arrepentirme? ¿Por qué tengo que pedir perdón si no cometo errores? - Donald Trump"
 LOADING_TIP_1: "Porque de tal manera amó Dios al mundo, que ha dado a su Hijo unigénito, para que todo aquel que en él cree, no se pierda, mas tenga vida eterna. - Jesús, Evangelio de Juan"
 LOADING_TIP_2: "Cristianos, salgan y voten, solo por esta vez. No tendrán que hacerlo más. Cuatro años más... estará arreglado, estará bien, ya no tendrán que votar. - Donald Trump"
 LOADING_TIP_3: "Salió entre ellos otro cuerno pequeño, en este cuerno había ojos como de hombre, y una boca que hablaba grandes cosas. - Libro de Daniel"
 LOADING_TIP_4: "También se le dio boca que hablaba grandes cosas y blasfemias... Y se le permitió hacer guerra contra los santos. - Libro del Apocalipsis"
 LOADING_TIP_5: "y se manifieste el hombre de pecado, el hijo de perdición, el cual se opone y se levanta contra todo lo que se llama Dios o es objeto de culto. - Pablo, 2 Tesalonicenses"
 LOADING_TIP_6: "Él ha sido homicida desde el principio, y no ha permanecido en la verdad, porque no hay verdad en él. Cuando habla mentira, de suyo habla; porque es mentiroso, y padre de mentira. - Libro de Juan"
 LOADING_TIP_7: "Otra vez Jesús les habló, diciendo: Yo soy la luz del mundo; el que me sigue, no andará en tinieblas, sino que tendrá la luz de la vida. - Jesús, Evangelio de Juan"
 LOADING_TIP_8: "Mujer, ¿dónde están los que te acusaban? ¿Ninguno te condenó? Ella dijo: Ninguno, Señor. Entonces Jesús le dijo: Ni yo te condeno; vete, y no peques más. - Jesús, Evangelio de Juan"
 LOADING_TIP_9: "No juzguéis, para que no seáis juzgados. Porque con el juicio con que juzgáis, seréis juzgados, y con la medida con que medís, os será medido. - Jesús, Evangelio de Juan"
 LOADING_TIP_10: "No os hagáis tesoros en la tierra, donde la polilla y el orín corrompen, y donde ladrones minan y hurtan; sino haceos tesoros en el cielo. - Jesús, Evangelio de Mateo"
 LOADING_TIP_11: "Ninguno puede servir a dos señores; porque o aborrecerá al uno y amará al otro, o estimará al uno y menospreciará al otro. No podéis servir a Dios y a las riquezas. - Jesús, Evangelio de Mateo"
 LOADING_TIP_12: "Guardaos de los falsos profetas, que vienen a vosotros con vestidos de ovejas, pero por dentro son lobos rapaces. Por sus frutos los conoceréis. - Jesús, Evangelio de Mateo"
 LOADING_TIP_13: "Entrad por la puerta estrecha; porque ancha es la puerta, y espacioso el camino que lleva a la perdición, y muchos son los que entran por ella; porque estrecha es la puerta, y angosto el camino que lleva a la vida, y pocos son los que la hallan. - Jesús, Evangelio de Mateo"
 LOADING_TIP_14: "Bienaventurados los mansos, porque ellos recibirán la tierra por heredad... Bienaventurados los pacificadores, porque ellos serán llamados hijos de Dios. - Jesús, Evangelio de Mateo"
 LOADING_TIP_15: "Jesús le dijo: Yo soy el camino, y la verdad, y la vida; nadie viene al Padre, sino por mí. - Jesús, Evangelio de Juan"
 LOADING_TIP_16: "Y otro ángel... diciendo a gran voz: Si alguno adora a la bestia y a su imagen, y recibe la marca en su frente o en su mano, él también beberá del vino de la ira de Dios, que ha sido vaciado puro en el cáliz de su ira; y será atormentado con fuego... - Apocalipsis"
 LOADING_TIP_17: "Entonces verán al Hijo del Hombre, que vendrá en una nube con poder y gran gloria. - Evangelio de Lucas"
 LOADING_TIP_18: "Cualquiera, pues, que me oye estas palabras, y las hace, le compararé a un hombre prudente, que edificó su casa sobre la roca. Descendió lluvia, y vinieron ríos, y soplaron vientos, y golpearon contra aquella casa; y no cayó, porque estaba fundada sobre la roca. - Jesús, Evangelio de Mateo"
 LOADING_TIP_19: "Y fue lanzado fuera el gran dragón, la serpiente antigua, que se llama diablo y Satanás, el cual engaña al mundo entero; fue arrojado a la tierra, y sus ángeles fueron arrojados con él. - Apocalipsis"
 LOADING_TIP_20: "Y entonces se manifestará aquel inicuo, a quien el Señor matará con el espíritu de su boca, y destruirá con el resplandor de su venida. - Pablo, 2 Tesalonicenses"
 LOADING_TIP_21: "inicuo cuyo advenimiento es... con gran poder y señales y prodigios mentirosos, y con todo engaño de iniquidad para los que se pierden, por cuanto no recibieron el amor de la verdad. - Pablo, 2 Tesalonicenses"
 LOADING_TIP_22: "Por esto Dios les envía un poder engañoso, para que crean la mentira, a fin de que sean condenados todos los que no creyeron a la verdad, sino que se complacieron en la injusticia. - Pablo, 2 Tesalonicenses"
 LOADING_TIP_23: "Y la bestia que vi... su boca como boca de león. Y el dragón le dio su poder y su trono, y grande autoridad. Vi una de sus cabezas como herida de muerte, pero su herida mortal fue sanada; y se maravilló toda la tierra en pos de la bestia. - Apocalipsis"
 LOADING_TIP_24: "Y el que estaba sentado sobre la nube metió su hoz en la tierra, y la tierra fue segada. - Apocalipsis"
 LOADING_TIP_25: "No hablarás contra tu prójimo falso testimonio. - El noveno mandamiento, Éxodo"
 LOADING_TIP_26: "El testigo falso no quedará sin castigo, y el que habla mentiras perecerá. - Proverbios"
 LOADING_TIP_27: "en la esperanza de la vida eterna, la cual Dios, que no miente, prometió desde antes del principio de los siglos. - Pablo, Carta a Tito"
 LOADING_TIP_28: "Pero yo os digo: Amad a vuestros enemigos y orad por los que os persiguen. - Jesús, Evangelio de Mateo"
 LOADING_TIP_29: "Así que, todas las cosas que queráis que los hombres hagan con vosotros, así también haced vosotros con ellos. - Jesús, Evangelio de Mateo"
 LOADING_TIP_30: "De cierto os digo que en cuanto lo hicisteis a uno de estos mis hermanos más pequeños, a mí lo hicisteis. - Jesús, Evangelio de Mateo"
 LOADING_TIP_31: "Amarás al Señor tu Dios con todo tu corazón, y con toda tu alma, y con todas tus fuerzas, y con toda tu mente; y a tu prójimo como a ti mismo. - Jesús, Evangelio de Lucas"
 LOADING_TIP_32: "Me gustaría ser papa. Esa sería mi primera opción. - Donald Trump"
 LOADING_TIP_33: "Ciertamente el bien y la misericordia me seguirán todos los días de mi vida, y en la casa de Jehová moraré por largos días. - Salmo 23"
 LOADING_TIP_34: "El camino al infierno está empedrado de buenas intenciones."
 LOADING_TIP_35: "Yo conozco tus obras, que ni eres frío ni caliente. ¡Ojalá fueses frío o caliente! Pero por cuanto eres tibio... te vomitaré de mi boca. - Apocalipsis"
 LOADING_TIP_36: "Porque un niño nos es nacido, hijo nos es dado, y el principado sobre su hombro; y se llamará su nombre Admirable, Consejero, Dios Fuerte, Padre Eterno, Príncipe de Paz. - Isaías"
 LOADING_TIP_37: "Oscilo entre pensar que Trump es un idiota cínico como Nixon que no sería tan malo (e incluso podría resultar útil) o que es el Hitler de Estados Unidos - JD Vance"
 LOADING_TIP_38: "'Nunca Trump', 'Reprensible', 'desastre moral', 'heroína cultural', 'el Sr. Trump no es apto para el cargo más alto de nuestra nación' - JD Vance"
 LOADING_TIP_39: "Yo soy el buen pastor; el buen pastor su vida da por las ovejas. - Jesús, Evangelio de Juan"
 LOADING_TIP_40: "Yo soy el buen pastor; y conozco mis ovejas, y las mías me conocen, así como el Padre me conoce, y yo conozco al Padre; y pongo mi vida por las ovejas. - Jesús, Evangelio de Juan"
 LOADING_TIP_41: "Porque tú dices: Yo soy rico, y me he enriquecido, y de ninguna cosa tengo necesidad; y no sabes que tú eres un desventurado, miserable, pobre, ciego y desnudo. - Apocalipsis"
 LOADING_TIP_42: "Y hablemos claramente del peligro aquí. Los falsos mesías no solo fracasan; corrompen. Enseñan a la gente a confundir el poder con la justicia y la victoria con la virtud. - Paul Mendlowitz sobre Trump"
 LOADING_TIP_43: "Después hubo una gran batalla en el cielo: Miguel y sus ángeles luchaban contra el dragón; y luchaban el dragón y sus ángeles; pero no prevalecieron, ni se halló ya lugar para ellos en el cielo. Y fue lanzado fuera el gran dragón - Apocalipsis"
 LOADING_TIP_44: "Miré, y he aquí una nube blanca; y sobre la nube uno sentado semejante al Hijo del Hombre, que tenía en la cabeza una corona de oro... Y otro ángel... clamando a gran voz al que estaba sentado: Mete tu hoz, y siega; porque la hora de segar ha llegado, pues la mies de la tierra está madura. - Juan de Patmos, Apocalipsis"
 LOADING_TIP_45: "Amados, no creáis a todo espíritu, sino probad los espíritus si son de Dios; porque muchos falsos profetas han salido por el mundo. - Libro de Juan"
 LOADING_TIP_46: "se pusieron junto a ellos dos varones con vestiduras blancas, los cuales también les dijeron: Varones galileos, ¿por qué estáis mirando al cielo? Este mismo Jesús, que ha sido tomado de vosotros al cielo, así vendrá como le habéis visto ir al cielo. - Hechos de los Apóstoles"
 LOADING_TIP_47: "Mas la hora viene, y ahora es, cuando los verdaderos adoradores adorarán al Padre en espíritu y en verdad; porque también el Padre tales adoradores busca que le adoren. Jesús, Evangelio de Juan"
 LOADING_TIP_48: "Bienaventurados los pobres en espíritu, porque de ellos es el reino de los cielos. - Libro de Mateo"
 LOADING_TIP_49: "Y Jesús decía: 'Padre, perdónalos, porque no saben lo que hacen.' - Libro de Lucas"
 LOADING_TIP_50: "Así se cumplió lo dicho por el profeta Jeremías, cuando dijo: 'Y tomaron las treinta piezas de plata, precio del apreciado, según precio puesto por los hijos de Israel.' - Libro de Mateo"
 LOADING_TIP_51: "La paz os dejo, mi paz os doy; yo no os la doy como el mundo la da. No se turbe vuestro corazón, ni tenga miedo.' - Libro de Juan"
 LOADING_TIP_52: "A la verdad el Hijo del Hombre va, según está escrito de él, mas ¡ay de aquel hombre por quien el Hijo del Hombre es entregado! Bueno le fuera a ese hombre no haber nacido.' - Libro de Mateo"
 LOADING_TIP_53: "siendo renacidos, no de simiente corruptible, sino de incorruptible, por la palabra de Dios que vive y permanece para siempre;' - 1 Pedro"
 LOADING_TIP_54: "Y entonces se manifestará aquel inicuo, a quien el Señor matará con el espíritu de su boca, y destruirá con el resplandor de su venida.' - Pablo, 2 Tesalonicenses"
 LOADING_TIP_55: "inicuo cuyo advenimiento es por obra de Satanás, con gran poder y señales y prodigios mentirosos,' - Pablo, 2 Tesalonicenses"
 LOADING_TIP_56: "y su cola arrastraba la tercera parte de las estrellas del cielo, y las arrojó sobre la tierra. Y el dragón se paró frente a la mujer que estaba para dar a luz, a fin de devorar a su hijo tan pronto como naciese;' - Apocalipsis"
 LOADING_TIP_57: "Y fue lanzado fuera el gran dragón, la serpiente antigua, que se llama diablo y Satanás, el cual engaña al mundo entero; fue arrojado a la tierra, y sus ángeles fueron arrojados con él.' - Apocalipsis"
 LOADING_TIP_58: "Y cuando vio el dragón que había sido arrojado a la tierra, persiguió a la mujer que había dado a luz al hijo varón. - Apocalipsis"
 LOADING_TIP_59: "Entonces el dragón se llenó de ira contra la mujer; y se fue a hacer guerra contra el resto de la descendencia de ella, los que guardan los mandamientos de Dios y tienen el testimonio de Jesucristo. - Apocalipsis"
 LOADING_TIP_60: "Y la bestia que vi era semejante a un leopardo, y sus pies como de oso, y su boca como boca de león. Y el dragón le dio su poder y su trono, y grande autoridad. - Apocalipsis"
 LOADING_TIP_61: "y adoraron al dragón que había dado autoridad a la bestia, y adoraron a la bestia, diciendo: '¿Quién como la bestia, y quién podrá luchar contra ella?' - Apocalipsis"
 LOADING_TIP_62: "Y a ella [la bestia] el dragón [satanás] le dio su poder y su trono y gran autoridad. Vi una de sus cabezas como herida de muerte, pero su herida mortal fue sanada, y se maravilló toda la tierra en pos de la bestia. - Apocalipsis"
 LOADING_TIP_63: "Y se le permitió [a la bestia] hacer guerra contra los santos, y vencerlos. - Apocalipsis"
 LOADING_TIP_64: "Y [el falso profeta] ejerce toda la autoridad de la primera bestia en presencia de ella, y hace que la tierra y los moradores de ella adoren a la primera bestia, cuya herida mortal fue sanada. - Apocalipsis"
 LOADING_TIP_65: "y [el falso profeta] engaña a los moradores de la tierra... mandando a los moradores de la tierra que le hagan imagen a la bestia que tiene la herida de espada, y vivió; - Apocalipsis"
 LOADING_TIP_66: "Y [el falso profeta] hacía que a todos, pequeños y grandes, ricos y pobres, libres y esclavos, se les pusiese una marca en la mano derecha, o en la frente; y que ninguno pudiese comprar ni vender, sino el que tuviese la marca o el nombre de la bestia, o el número de su nombre... 666. - Apocalipsis"
 LOADING_TIP_67: "Oí una voz que desde el cielo me decía: 'Escribe: Bienaventurados de aquí en adelante los muertos que mueren en el Señor' 'Sí,' dice el Espíritu, 'descansarán de sus trabajos, porque sus obras con ellos siguen!'. - Apocalipsis"
 LOADING_TIP_68: "Aquí está la paciencia de los santos, los que guardan los mandamientos de Dios y la fe de Jesús.' - Apocalipsis"
 LOADING_TIP_69: "Y el ángel arrojó su hoz en la tierra, y vendimió la viña de la tierra, y echó la uva en el gran lagar de la ira de Dios; y fue pisado el lagar fuera de la ciudad, y del lagar salió sangre hasta los frenos de los caballos, por §H200 millas§0' - Apocalipsis"
 LOADING_TIP_70: "y en su frente un nombre escrito, un misterio: 'Babilonia la grande, la madre de las rameras y de las abominaciones de la tierra.' Vi a la mujer ebria de la sangre de los santos, y de la sangre de los mártires de Jesús.' - Apocalipsis"
 LOADING_TIP_71: "porque Dios ha puesto en sus corazones [los 10 cuernos] el ejecutar lo que él quiso: ponerse de acuerdo, y dar su reino a la bestia, hasta que se cumplan las palabras de Dios.' - Apocalipsis"
 LOADING_TIP_72: "a los reyes de la tierra en todo el mundo, para reunirlos a la batalla de aquel gran día del Dios Todopoderoso. Y los reunió en el lugar que en hebreo se llama Armagedón.' - Apocalipsis"
 LOADING_TIP_73: "El quinto ángel derramó su copa sobre el trono de la bestia; y su reino se cubrió de tinieblas, y mordían de dolor sus lenguas, y blasfemaron contra el Dios del cielo por sus dolores y por sus úlceras, y no se arrepintieron de sus obras.' - Apocalipsis"
 LOADING_TIP_74: "y las ciudades de las naciones cayeron; y la gran Babilonia vino en memoria delante de Dios, para darle el cáliz del vino del ardor de su ira.' - Apocalipsis"