l_simp_chinese:
 LOADING_TIP_0: "但我尽量不犯错误。我的意思是，为什么我必须，你知道，去忏悔？如果你没有犯错，为什么要求得原谅？ - 唐纳德·特朗普"
 LOADING_TIP_1: "神爱世人，甚至将他的独生子赐给他们，叫一切信他的，不至灭亡，反得永生。 - 耶稣，《约翰福音》"
 LOADING_TIP_2: "基督徒们，出去投票吧，就这一次。以后你们就不必再投了。再过四年……一切都会修好的，一切都会好的，你们就不必再投票了 - 唐纳德·特朗普"
 LOADING_TIP_3: "其中又长起一个小角。这角有眼，像人的眼，有口说夸大的话。 - 《但以理书》"
 LOADING_TIP_4: "又赐给它说夸大亵渎话的口……又任凭它与圣徒争战 - 《启示录》"
 LOADING_TIP_5: "并有那大罪人，就是沉沦之子，显露出来。他是抵挡主，高抬自己，超过一切称为神的和一切受人敬拜的 - 保罗，《帖撒罗尼迦后书》"
 LOADING_TIP_6: "他从起初是杀人的，不守真理，因他心里没有真理。他说谎是出于自己，因他本来是说谎的，也是说谎之人的父。 - 《约翰福音》"
 LOADING_TIP_7: "耶稣又对众人说：‘我是世界的光。跟从我的，就不在黑暗里走，必要得着生命的光。’ - 耶稣，《约翰福音》"
 LOADING_TIP_8: "妇人，那些人在哪里呢？没有人定你的罪吗？她说：‘主啊，没有。’耶稣说：‘我也不定你的罪。去吧，从此不要再犯罪了。’ - 耶稣，《约翰福音》"
 LOADING_TIP_9: "你们不要论断人，免得你们被论断。因为你们怎样论断人，也必怎样被论断；你们用什么量器量给人，也必用什么量器量给你们。 - 耶稣，《约翰福音》"
 LOADING_TIP_10: "不要为自己积攒财宝在地上，地上有虫子咬，能锈坏，也有贼挖窟窿来偷；只要积攒财宝在天上。 - 耶稣，《马太福音》"
 LOADING_TIP_11: "一个人不能事奉两个主；不是恶这个爱那个，就是重这个轻那个。你们不能又事奉神，又事奉玛门。 - 耶稣，《马太福音》"
 LOADING_TIP_12: "你们要防备假先知。他们到你们这里来，外面披着羊皮，里面却是残暴的狼。凭着他们的果子，就可以认出他们来。 - 耶稣，《马太福音》"
 LOADING_TIP_13: "你们要进窄门。因为引到灭亡，那门是宽的，路是大的，进去的人也多；引到永生，那门是窄的，路是小的，找着的人也少。 - 耶稣，《马太福音》"
 LOADING_TIP_14: "温柔的人有福了，因为他们必承受地土……使人和睦的人有福了，因为他们必称为神的儿子。 - 耶稣，《马太福音》"
 LOADING_TIP_15: "耶稣说：‘我就是道路、真理、生命；若不藉着我，没有人能到父那里去。’ - 耶稣，《约翰福音》"
 LOADING_TIP_16: "又有第三位天使接着他们，大声说：‘若有人拜兽和兽像，在额上或在手上受了印记，这人也必喝神大怒的酒；此酒斟在神忿怒的杯中纯一不杂。他要在圣天使和羔羊面前，在火与硫磺之中受痛苦……’ - 《启示录》"
 LOADING_TIP_17: "那时，他们要看见人子有能力，有大荣耀驾云降临。 - 《路加福音》"
 LOADING_TIP_18: "所以，凡听见我这话就去行的，好比一个聪明人，把房子盖在磐石上；雨淋，水冲，风吹，撞着那房子，房子总不倒塌，因为根基立在磐石上。 - 耶稣，《马太福音》"
 LOADING_TIP_19: "大龙就是那古蛇，名叫魔鬼，又叫撒但，是迷惑普天下的。它被摔在地上，它的使者也一同被摔下去。 - 《启示录》"
 LOADING_TIP_20: "那时这不法的人必显露出来。主耶稣要用口中的气灭绝他，用降临的荣光废掉他。 - 保罗，《帖撒罗尼迦后书》"
 LOADING_TIP_21: "这不法的人来……行各样的异能、神迹，和一切虚假的奇事，并且在那沉沦的人身上行各样出于不义的诡诈；因他们不领受爱真理的心，使他们得救。 - 保罗，《帖撒罗尼迦后书》"
 LOADING_TIP_22: "故此，神就给他们一个生发错误的心，叫他们信从虚谎，使一切不信真理、倒喜爱不义的人都被定罪。 - 保罗，《帖撒罗尼迦后书》"
 LOADING_TIP_23: "我所看见的兽……口像狮子的口。那龙将自己的能力、座位，和大权柄都给了它。我看见兽的七头中，有一个似乎受了死伤，那死伤却医好了。全地的人都希奇跟从那兽。 - 《启示录》"
 LOADING_TIP_24: "那坐在云上的，把镰刀扔在地上，地上的庄稼就被收割了。 - 《启示录》"
 LOADING_TIP_25: "不可作假见证陷害人。 - 第九诫，《出埃及记》"
 LOADING_TIP_26: "作假见证的，必不免受罚；吐出谎言的，也必灭亡。 - 《箴言》"
 LOADING_TIP_27: "盼望那无谎言的神在万古之先所应许的永生。 - 保罗，《提多书》"
 LOADING_TIP_28: "只是我告诉你们，要爱你们的仇敌，为那逼迫你们的祷告。 - 耶稣，《马太福音》"
 LOADING_TIP_29: "所以，无论何事，你们愿意人怎样待你们，你们也要怎样待人。 - 耶稣，《马太福音》"
 LOADING_TIP_30: "我实在告诉你们，这些事你们既做在我这弟兄中一个最小的身上，就是做在我身上了。 - 耶稣，《马太福音》"
 LOADING_TIP_31: "你要尽心、尽性、尽力、尽意爱主你的神；又要爱邻舍如同自己。 - 耶稣，《路加福音》"
 LOADING_TIP_32: "我想当教皇。那将是我的第一选择。 - 唐纳德·特朗普"
 LOADING_TIP_33: "我一生一世必有恩惠慈爱随着我；我且要住在耶和华的殿中，直到永远。 - 《诗篇》第23篇"
 LOADING_TIP_34: "通往地狱的道路铺满善意。"
 LOADING_TIP_35: "我知道你的行为，你也不冷也不热；我巴不得你或冷或热。你既如温水，也不冷也不热，所以我必从我口中把你吐出去。 - 《启示录》"
 LOADING_TIP_36: "因有一婴孩为我们而生，有一子赐给我们，政权必担在他的肩头上。他名称为‘奇妙策士、全能的神、永在的父、和平的君’。 - 《以赛亚书》"
 LOADING_TIP_37: "我总是在想，特朗普究竟是一个像尼克松那样愤世嫉俗的‘混蛋’，其实也没那么糟（甚至可能证明有用），还是美国的希特勒，我在这两种想法之间摇摆不定。 - 詹姆斯·戴维·万斯"
 LOADING_TIP_38: "‘绝不投特朗普’、‘应受谴责’、‘道德灾难’、‘文化海洛因’、‘特朗普先生不适合担任我们国家的最高职务’ - 詹姆斯·戴维·万斯"
 LOADING_TIP_39: "我是好牧人；好牧人为羊舍命。 - 耶稣，《约翰福音》"
 LOADING_TIP_40: "我是好牧人；我认识我的羊，我的羊也认识我，正如父认识我，我也认识父一样；并且我为羊舍命。 - 耶稣，《约翰福音》"
 LOADING_TIP_41: "你说：我是富足，已经发了财，一样都不缺；却不知道你是那困苦、可怜、贫穷、瞎眼、赤身的。 - 《启示录》"
 LOADING_TIP_42: "让我们坦率地谈谈这里的危险。假弥赛亚不仅会失败；他们还会使人堕落。他们教导人们把权力与正义混为一谈，把胜利与美德混为一谈。 - 保罗·门德洛维茨谈特朗普"
 LOADING_TIP_43: "在天上就有了争战。米迦勒同他的使者与龙争战，龙也同它的使者去争战，并没有得胜，天上再没有它们的地方。大龙就是那古蛇，名叫魔鬼，又叫撒但，是迷惑普天下的。它被摔在地上 - 《启示录》"
 LOADING_TIP_44: "我又观看，见有一片白云，云上坐着一位好像人子，头上戴着金冠冕……又有一位天使……向那坐在云上的大声呼叫说：‘伸出你的镰刀来收割；因为收割的时候已经到了，地上的庄稼已经熟透了。’ - 拔摩岛的约翰，《启示录》"
 LOADING_TIP_45: "亲爱的弟兄啊，一切的灵，你们不可都信，总要试验那些灵是出于神的不是，因为世上有许多假先知已经出来了。 - 《约翰一书》"
 LOADING_TIP_46: "忽然有两个人身穿白衣，站在旁边，说：‘加利利人哪，你们为什么站着望天呢？这离开你们被接升天的耶稣，你们见他怎样往天上去，他还要怎样来。’ - 《使徒行传》"
 LOADING_TIP_47: "时候将到，如今就是了，那真正拜父的，要用心灵和诚实拜他，因为父要这样的人拜他。 - 耶稣，《约翰福音》"
 LOADING_TIP_48: "虚心的人有福了！因为天国是他们的。 - 《马太福音》"
 LOADING_TIP_49: "当下耶稣说：‘父啊！赦免他们；因为他们所做的，他们不晓得。’ - 《路加福音》"
 LOADING_TIP_50: "这就应了先知耶利米的话，说：‘他们用那三十块钱，就是被估定之人的价钱，是加上以色列人中所估定的。’ - 《马太福音》"
 LOADING_TIP_51: "我留下平安给你们；我将我的平安赐给你们。我所赐的，不像世人所赐的。你们心里不要忧愁，也不要胆怯。 - 《约翰福音》"
 LOADING_TIP_52: "人子必要去世，正如经上指着他所写的；但卖人子的人有祸了！那人不生在世上倒好。 - 《马太福音》"
 LOADING_TIP_53: "你们蒙了重生，不是由于能坏的种子，乃是由于不能坏的种子，是藉着神活泼常存的道。 - 《彼得前书》"
 LOADING_TIP_54: "那时这不法的人必显露出来。主耶稣要用口中的气灭绝他，用降临的荣光废掉他。 - 保罗，《帖撒罗尼迦后书》"
 LOADING_TIP_55: "这不法的人来，是照撒但的运动，行各样的异能、神迹，和一切虚假的奇事， - 保罗，《帖撒罗尼迦后书》"
 LOADING_TIP_56: "它的尾巴拖拉着天上星辰的三分之一，摔在地上。龙就站在那将要生产的妇人面前，等她生产之后，要吞吃她的孩子。 - 《启示录》"
 LOADING_TIP_57: "大龙就是那古蛇，名叫魔鬼，又叫撒但，是迷惑普天下的。它被摔在地上，它的使者也一同被摔下去。 - 《启示录》"
 LOADING_TIP_58: "龙见自己被摔在地上，就逼迫那生男孩子的妇人。 - 《启示录》"
 LOADING_TIP_59: "龙向妇人发怒，去与她其余的儿女争战，这儿女就是那守神诫命、为耶稣作见证的。 - 《启示录》"
 LOADING_TIP_60: "我所看见的兽，形状像豹，脚像熊的脚，口像狮子的口。那龙将自己的能力、座位，和大权柄都给了它。 - 《启示录》"
 LOADING_TIP_61: "又拜那龙，因为它将自己的权柄给了兽，也拜兽，说：‘谁能比这兽，谁能与它交战呢？’ - 《启示录》"
 LOADING_TIP_62: "那龙[撒但]将自己的能力、座位，和大权柄都给了它[兽]。我看见兽的七头中，有一个似乎受了死伤，那死伤却医好了。全地的人都希奇跟从那兽。 - 《启示录》"
 LOADING_TIP_63: "又任凭它[兽]与圣徒争战，并且得胜。 - 《启示录》"
 LOADING_TIP_64: "它[假先知]在头一个兽面前，施行头一个兽所有的权柄，并且叫地和住在其上的人拜那死伤医好的头一个兽。 - 《启示录》"
 LOADING_TIP_65: "它[假先知]就迷惑住在地上的人，说：要给那受刀伤还活着的兽做个像。 - 《启示录》"
 LOADING_TIP_66: "它[假先知]又叫众人，无论大小、贫富、自主的、为奴的，都在右手上或是在额上受一个印记。除了那受印记、有了兽名或有兽名数目的，都不得作买卖……666。 - 《启示录》"
 LOADING_TIP_67: "我听见从天上有声音说：‘你要写下：从今以后，在主里面而死的人有福了！’圣灵说：‘是的，他们息了自己的劳苦，做工的果效也随着他们。’ - 《启示录》"
 LOADING_TIP_68: "圣徒的忍耐就在此；他们是守神诫命和耶稣真道的。 - 《启示录》"
 LOADING_TIP_69: "那天使就把镰刀扔在地上，收取了地上的葡萄，丢在神忿怒的大酒醡中。那酒醡踹在城外，就有血从酒醡里流出来，高到马的嚼环，远有§H六百里（二百英里）§0。 - 《启示录》"
 LOADING_TIP_70: "在她额上有名写着说：‘奥秘哉！大巴比伦，作世上的淫妇和一切可憎之物的母。’我又看见那女人喝醉了圣徒的血和为耶稣作见证之人的血。 - 《启示录》"
 LOADING_TIP_71: "因为神使诸王[十角]同心合意，遵行他的旨意，把自己的国给那兽，直等到神的话都应验了。 - 《启示录》"
 LOADING_TIP_72: "叫普天下众王聚集，在神全能者的大日争战。那三个鬼魔便叫众王聚集在一处，希伯来话叫作哈米吉多顿。 - 《启示录》"
 LOADING_TIP_73: "第五位天使把碗倒在兽的座位上，兽的国就黑暗了。人因疼痛就咬自己的舌头；又因所受的疼痛，和生的疮，就亵渎天上的神，并不悔改所行的。 - 《启示录》"
 LOADING_TIP_74: "列国的城也都倒塌了。神也想起大巴比伦来，要把那盛自己烈怒的酒杯递给她。 - 《启示录》"