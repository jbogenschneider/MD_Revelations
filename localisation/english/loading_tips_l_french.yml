l_french:
 LOADING_TIP_0:0 "Mais j'essaie de ne pas faire d'erreurs. Je veux dire, pourquoi dois-je, vous savez, me repentir ? Pourquoi dois-je demander pardon si je ne fais pas d'erreurs ? - Donald Trump"
 LOADING_TIP_1:0 "J'ai été sauvé par Dieu pour rendre sa grandeur à l'Amérique - Donald Trump"
 LOADING_TIP_2:0 "Chrétiens, sortez et votez, juste cette fois. Vous n'aurez plus à le faire. Encore quatre ans... ce sera réparé, ce sera réglé, vous n'aurez plus besoin de voter - Donald Trump"
 LOADING_TIP_3:0 "Il s'éleva au milieu d'elles une autre petite corne... dans cette corne il y avait des yeux comme des yeux d'homme, et une bouche qui parlait avec arrogance. - Livre de Daniel"
 LOADING_TIP_4:0 "Et il lui fut donné une bouche qui proférait des paroles arrogantes et des blasphèmes... Et il lui fut donné de faire la guerre aux saints - Livre de l'Apocalypse"
 LOADING_TIP_5:0 "que l'homme de l'anomie soit révélé, le fils de la perdition, l'adversaire qui s'élève au-dessus de tout ce qu'on appelle Dieu ou de ce qu'on adore - Paul, 2 Thessaloniciens"
 LOADING_TIP_6:0 "Il a été meurtrier dès le commencement, et il ne se tient pas dans la vérité, parce qu'il n'y a pas de vérité en lui. Lorsqu'il profère le mensonge, il parle de son propre fonds; car il est menteur et le père du mensonge. - Évangile selon Jean"
 LOADING_TIP_7:0 "Jésus leur parla de nouveau, et dit : Je suis la lumière du monde ; celui qui me suit ne marchera pas dans les ténèbres, mais il aura la lumière de la vie. - Jésus, Évangile selon Jean"
 LOADING_TIP_8:0 "Femme, où sont ceux qui t'accusaient ? Personne ne t'a-t-il condamnée ? Elle répondit : Personne, Seigneur. Et Jésus lui dit : Je ne te condamne pas non plus : va, et ne pèche plus. - Jésus, Évangile selon Jean"
 LOADING_TIP_9:0 "Ne jugez point, afin que vous ne soyez point jugés. Car on vous jugera du jugement dont vous jugez, et l'on vous mesurera avec la mesure dont vous mesurez. - Jésus, Évangile selon Jean"
 LOADING_TIP_10:0 "Ne vous amassez pas des trésors sur la terre, où la teigne et la rouille détruisent, et où les voleurs percent et dérobent ; mais amassez-vous des trésors dans le ciel. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_11:0 "Nul ne peut servir deux maîtres. Car, ou il haïra l'un, et aimera l'autre ; ou il s'attachera à l'un, et méprisera l'autre. Vous ne pouvez servir Dieu et Mamon. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_12:0 "Gardez-vous des faux prophètes. Ils viennent à vous en vêtements de brebis, mais au dedans ce sont des loups ravisseurs. Vous les reconnaîtrez à leurs fruits. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_13:0 "Entrez par la porte étroite. Car large est la porte, spacieux est le chemin qui mènent à la perdition, et il y en a beaucoup qui entrent par là. Mais étroite est la porte, resserré le chemin qui mènent à la vie, et il y en a peu qui les trouvent. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_14:0 "Heureux les débonnaires, car ils hériteront la terre... Heureux ceux qui procurent la paix, car ils seront appelés fils de Dieu. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_15:0 "Jésus lui dit : Je suis le chemin, la vérité, et la vie. Nul ne vient au Père que par moi. - Jésus, Évangile selon Jean"
 LOADING_TIP_16:0 "Et un autre ange... dit d'une voix forte : Si quelqu'un adore la bête et son image, et reçoit une marque sur son front ou sur sa main, il boira, lui aussi, du vin de la fureur de Dieu, versé sans mélange dans la coupe de sa colère, et il sera tourmenté dans le feu... - Livre de l'Apocalypse"
 LOADING_TIP_17:0 "Alors on verra le Fils de l'homme venant sur une nuée avec puissance et une grande gloire. - Évangile selon Luc"
 LOADING_TIP_18:0 "C'est pourquoi, quiconque entend ces paroles que je dis et les met en pratique, sera semblable à un homme prudent qui a bâti sa maison sur le roc. La pluie est tombée, les torrents sont venus, les vents ont soufflé et se sont jetés contre cette maison : elle n'est point tombée, parce qu'elle était fondée sur le roc. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_19:0 "Ce serpent ancien, appelé le diable et Satan, celui qui séduit toute la terre, il fut précipité sur la terre, et ses anges furent précipités avec lui. - Livre de l'Apocalypse"
 LOADING_TIP_20:0 "Et alors paraîtra l'impie, que le Seigneur Jésus détruira par le souffle de sa bouche, et qu'il anéantira par l'éclat de son avènement. - Paul, 2 Thessaloniciens"
 LOADING_TIP_21:0 "L'apparition de cet impie se fera... avec des prodiges et des miracles mensongers, et avec toutes les séductions de l'iniquité pour ceux qui périssent parce qu'ils n'ont pas reçu l'amour de la vérité. - Paul, 2 Thessaloniciens"
 LOADING_TIP_22:0 "Aussi Dieu leur envoie une puissance d'égarement, pour qu'ils croient au mensonge, afin que tous ceux qui n'ont pas cru à la vérité, mais qui ont pris plaisir à l'injustice, soient condamnés. - Paul, 2 Thessaloniciens"
 LOADING_TIP_23:0 "La bête que je vis... sa gueule était comme une gueule de lion. Le dragon lui donna sa puissance, et son trône, et une grande autorité. Et je vis l'une de ses têtes comme blessée à mort ; mais sa blessure mortelle fut guérie. Et toute la terre était dans l'admiration derrière la bête. - Livre de l'Apocalypse"
 LOADING_TIP_24:0 "Celui qui était assis sur la nuée jeta sa faucille sur la terre. Et la terre fut moissonnée. - Livre de l'Apocalypse"
 LOADING_TIP_25:0 "Tu ne porteras point de faux témoignage contre ton prochain. - 9ème Commandement, Exode"
 LOADING_TIP_26:0 "Le faux témoin ne restera pas impuni, et celui qui dit des mensonges périra. - Proverbes"
 LOADING_TIP_27:0 "Lesquelles reposent sur l'espérance de la vie éternelle, promise dès les plus anciens temps par le Dieu qui ne ment point. - Paul, Épître à Tite"
 LOADING_TIP_28:0 "Mais moi, je vous dis : Aimez vos ennemis, bénissez ceux qui vous maudissent, et priez pour ceux qui vous maltraitent et qui vous persécutent. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_29:0 "Tout ce que vous voulez que les hommes fassent pour vous, faites-le de même pour eux. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_30:0 "Je vous le dis en vérité, toutes les fois que vous avez fait ces choses à l'un de ces plus petits de mes frères, c'est à moi que vous les avez faites. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_31:0 "Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, de toute ta force, et de toute ta pensée; et ton prochain comme toi-même. - Jésus, Évangile selon Luc"
 LOADING_TIP_32:0 "J'aimerais être pape. Ce serait mon choix numéro 1. - Donald Trump"
 LOADING_TIP_33:0 "Ouais, il y a une chose. Ma propre moralité. Mon propre esprit. C'est la seule chose qui peut m'arrêter. - Donald Trump"
 LOADING_TIP_34:0 "L'enfer est pavé de bonnes intentions."
 LOADING_TIP_35:0 "Je connais tes œuvres. Je sais que tu n'es ni froid ni bouillant. Puisses-tu être froid ou bouillant ! Ainsi, parce que tu es tiède, et que tu n'es ni froid ni bouillant, je te vomirai de ma bouche. - Livre de l'Apocalypse"
 LOADING_TIP_36:0 "Je suis votre voix. Aujourd'hui, j'ajoute : Je suis votre guerrier. Je suis votre justice. Et pour ceux qui ont été lésés et trahis, je suis votre vengeance. - Donald Trump"
 LOADING_TIP_37:0 "J'oscille entre l'idée que Trump est un 'connard' cynique comme Nixon qui ne serait pas si mauvais (et pourrait même s'avérer utile) ou qu'il est le Hitler de l'Amérique - JD Vance"
 LOADING_TIP_38:0 "'Jamais Trump', 'Répréhensible', 'désastre moral', 'héroïne culturelle', 'M. Trump est inapte à la plus haute fonction de notre nation' - JD Vance"
 LOADING_TIP_39:0 "Je suis le bon berger. Le bon berger donne sa vie pour ses brebis. - Jésus, Évangile selon Jean"
 LOADING_TIP_40:0 "Je suis le bon berger. Je connais mes brebis, et elles me connaissent, comme le Père me connaît et comme je connais le Père ; et je donne ma vie pour mes brebis. - Jésus, Évangile selon Jean"
 LOADING_TIP_41:0 "Parce que tu dis : Je suis riche, je me suis enrichi, et je n'ai besoin de rien, et parce que tu ne sais pas que tu es malheureux, misérable, pauvre, aveugle et nu. - Livre de l'Apocalypse"
 LOADING_TIP_42:0 "Et parlons franchement du danger ici. Les faux messies ne font pas seulement qu'échouer ; ils corrompent. Ils apprennent aux gens à confondre le pouvoir avec la justice et la victoire avec la vertu. - Paul Mendlowitz à propos de Trump"
 LOADING_TIP_43:0 "Et il y eut guerre dans le ciel. Michel et ses anges combattirent contre le dragon. Et le dragon et ses anges combattirent, mais ils ne furent pas les plus forts, et leur place ne fut plus trouvée dans le ciel. Et il fut précipité, le grand dragon - Livre de l'Apocalypse"
 LOADING_TIP_44:0 "Je regardai, et voici, il y avait une nuée blanche, et sur la nuée était assis quelqu'un qui ressemblait à un fils d'homme, ayant sur sa tête une couronne d'or... Et un autre ange... lui cria d'une voix forte : Lance ta faucille, et moissonne ; car l'heure de moissonner est venue, car la moisson de la terre est mûre. - Jean de Patmos, Livre de l'Apocalypse"
 LOADING_TIP_45:0 "Taux d'approbation de Trump, Fév 2026 : Américains : 39 pour cent, Évangéliques : 69 pour cent, Israéliens juifs : 83 pour cent, Européens : 3 pour cent"
 LOADING_TIP_46:0 "Le président Trump a été oint par Jésus pour allumer le feu d'alarme en Iran afin de provoquer Armageddon et marquer Son retour sur Terre - un véritable sous-officier de l'USAF, mars 2026."
 LOADING_TIP_47:0 "Mais l'heure vient, et elle est déjà venue, où les vrais adorateurs adoreront le Père en esprit et en vérité ; car ce sont là les adorateurs que le Père demande. - Jésus, Évangile selon Jean"