l_english:
 rev_ukr_rus_cas.1.t: "Russia's Special Military Operation"
 rev_ukr_rus_cas.1.d: "Now in the 4th year of war in Ukraine, the Russian Federation has lost it's entire Soviet stockpile of arms and over a million casualties.  Our armored divisions have been replaced by mostly light infantry formations with drone and artillery support."
 rev_ukr_rus_cas.1.a: "Realistic adjustments to the strength of our forces have been made."

 rev_ukr_rus_cas.2.t: "Ukrainian Casualty Reconciliation"
 rev_ukr_rus_cas.2.d: "After 4 years of war our military position is stable, Russia is unable to advance and is losing more men each month that it can replace.  Our power grid is destroyed, it's cold, but spring will come."
 rev_ukr_rus_cas.2.a: "Manpower is low but we have more drones than Russia has men opposing us."
