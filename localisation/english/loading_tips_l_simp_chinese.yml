l_simp_chinese:
 LOADING_TIP_0:0 "但我尽量不犯错误。我是说，你知道的，我为什么要忏悔？如果你没有犯错，你为什么要请求原谅？ - 唐纳德·特朗普"
 LOADING_TIP_1:0 "我被上帝拯救，是为了让美国再次伟大 - 唐纳德·特朗普"
 LOADING_TIP_2:0 "基督徒们，出来投票吧，就这一次。以后你们就不必再投票了。再过四年……一切都会被修好，一切都会很好，你们不必再投票了 - 唐纳德·特朗普"
 LOADING_TIP_3:0 "在它们中间又长出一个小角……这角有眼，像人的眼，有口说夸大的话。 - 《但以理书》"
 LOADING_TIP_4:0 "又赐给它说夸大亵渎话的口……又任凭它与圣徒争战 - 《启示录》"
 LOADING_TIP_5:0 "并有那大罪人，就是沉沦之子，显露出来。他是抵挡主，高抬自己，超过一切称为神的和一切受人敬拜的 - 保罗，《帖撒罗尼迦后书》"
 LOADING_TIP_6:0 "他从起初是杀人的，不守真理，因他心里没有真理。他说谎是出于自己，因他本来是说谎的，也是说谎之人的父。 - 《约翰福音》"
 LOADING_TIP_7:0 "耶稣又对众人说：“我是世界的光。跟从我的，就不在黑暗里走，必要得着生命的光。” - 耶稣，《约翰福音》"
 LOADING_TIP_8:0 "“妇人，那些人在哪里呢？没有人定你的罪吗？”她说：“主啊，没有。”耶稣说：“我也不定你的罪。去吧，从此不要再犯罪了。” - 耶稣，《约翰福音》"
 LOADING_TIP_9:0 "你们不要论断人，免得你们被论断。因为你们怎样论断人，也必怎样被论断；你们用什么量器量给人，也必用什么量器量给你们。 - 耶稣，《马太福音》"
 LOADING_TIP_10:0 "不要为自己积攒财宝在地上；地上有虫子咬，能锈坏，也有贼挖窟窿来偷。只要积攒财宝在天上。 - 耶稣，《马太福音》"
 LOADING_TIP_11:0 "一个人不能事奉两个主；不是恶这个、爱那个，就是重这个、轻那个。你们不能又事奉神，又事奉玛门。 - 耶稣，《马太福音》"
 LOADING_TIP_12:0 "你们要防备假先知。他们到你们这里来，外面披着羊皮，里面却是残暴的狼。凭着他们的果子，就可以认出他们来。 - 耶稣，《马太福音》"
 LOADING_TIP_13:0 "你们要进窄门。因为引到灭亡，那门是宽的，路是大的，进去的人也多；引到永生，那门是窄的，路是小的，找着的人也少。 - 耶稣，《马太福音》"
 LOADING_TIP_14:0 "温柔的人有福了！因为他们必承受地土……使人和睦的人有福了！因为他们必称为神的儿子。 - 耶稣，《马太福音》"
 LOADING_TIP_15:0 "耶稣说：“我就是道路、真理、生命；若不藉着我，没有人能到父那里去。” - 耶稣，《约翰福音》"
 LOADING_TIP_16:0 "又有第三位天使接着他们，大声说：“若有人拜兽和兽像，在额上或在手上受了印记，这人也必喝神大怒的酒；此酒斟在神忿怒的杯中纯一不杂。他要在圣天使和羔羊面前，在火与硫磺之中受痛苦……” - 《启示录》"
 LOADING_TIP_17:0 "那时，他们要看见人子有能力，有大荣耀驾云降临。 - 《路加福音》"
 LOADING_TIP_18:0 "所以，凡听见我这话就去行的，好比一个聪明人，把房子盖在磐石上；雨淋，水冲，风吹，撞着那房子，房子总不倒塌，因为根基立在磐石上。 - 耶稣，《马太福音》"
 LOADING_TIP_19:0 "大龙就是那古蛇，名叫魔鬼，又叫撒但，是迷惑普天下的。它被摔在地上，它的使者也一同被摔下去。 - 《启示录》"
 LOADING_TIP_20:0 "那时这不法的人必显露出来。主耶稣要用口中的气灭绝他，用降临的荣光废掉他。 - 保罗，《帖撒罗尼迦后书》"
 LOADING_TIP_21:0 "这不法的人来……是照撒但的运动，行各样的异能、神迹，和一切虚假的奇事，并且在那沉沦的人身上行各样出于不义的诡诈；因他们不领受爱真理的心，使他们得救。 - 保罗，《帖撒罗尼迦后书》"
 LOADING_TIP_22:0 "故此，神就给他们一个生发错误的心，叫他们信从虚谎，使一切不信真理、倒喜爱不义的人都被定罪。 - 保罗，《帖撒罗尼迦后书》"
 LOADING_TIP_23:0 "我所看见的兽……口像狮子的口。那龙将自己的能力、座位，和大权柄都给了它。我看见兽的七头中，有一个似乎受了死伤，那死伤却医好了。全地的人都希奇跟从那兽。 - 《启示录》"
 LOADING_TIP_24:0 "那坐在云上的，把镰刀扔在地上，地上的庄稼就被收割了。 - 《启示录》"
 LOADING_TIP_25:0 "不可作假见证陷害人。 - 第九诫，《出埃及记》"
 LOADING_TIP_26:0 "作假见证的，必不免受罚；吐出谎言的，也必灭亡。 - 《箴言》"
 LOADING_TIP_27:0 "盼望那无谎言的神在万古之先所应许的永生。 - 保罗，《提多书》"
 LOADING_TIP_28:0 "只是我告诉你们，要爱你们的仇敌，为那逼迫你们的祷告。 - 耶稣，《马太福音》"
 LOADING_TIP_29:0 "所以，无论何事，你们愿意人怎样待你们，你们也要怎样待人。 - 耶稣，《马太福音》"
 LOADING_TIP_30:0 "我实在告诉你们，这些事你们既做在我这弟兄中一个最小的身上，就是做在我身上了。 - 耶稣，《马太福音》"
 LOADING_TIP_31:0 "你要尽心、尽性、尽力、尽意爱主你的神；又要爱邻舍如同自己。 - 耶稣，《路加福音》"
 LOADING_TIP_32:0 "我想当教皇。那是我的首选。 - 唐纳德·特朗普"
 LOADING_TIP_33:0 "是的，有一件事。我自己的道德。我自己的心。那是唯一能阻止我的东西。 - 唐纳德·特朗普"
 LOADING_TIP_34:0 "通往地狱的路是好意铺就的。"
 LOADING_TIP_35:0 "我知道你的行为，你也不冷也不热；我巴不得你或冷或热。你既如温水，也不冷也不热，所以我必从我口中把你吐出去。 - 《启示录》"
 LOADING_TIP_36:0 "我是你们的声音。今天，我还要加上：我是你们的战士。我是你们的公平。对于那些受了委屈和被出卖的人，我是你们的报应 - 唐纳德·特朗普"
 LOADING_TIP_37:0 "我在想，特朗普究竟是一个像尼克松那样愤世嫉俗的‘混蛋’，没那么坏（而且可能还有用），还是说他是美国的希特勒，我在这两者之间摇摆不定 - J·D·万斯"
 LOADING_TIP_38:0 "‘绝不要特朗普’、‘应受谴责’、‘道德灾难’、‘文化海洛因’、‘特朗普先生不适合担任我们国家的最高职务’ - J·D·万斯"
 LOADING_TIP_39:0 "我是好牧人；好牧人为羊舍命。 - 耶稣，《约翰福音》"
 LOADING_TIP_40:0 "我是好牧人；我认识我的羊，我的羊也认识我，正如父认识我，我也认识父一样；并且我为羊舍命。 - 耶稣，《约翰福音》"
 LOADING_TIP_41:0 "你说：我是富足，已经发了财，一样都不缺；却不知道你是那困苦、可怜、贫穷、瞎眼、赤身的。 - 《启示录》"
 LOADING_TIP_42:0 "我们要直白地谈论这里的危险。伪弥赛亚不仅会失败；他们还会腐蚀人心。他们教导人们混淆权力与正义，混淆胜利与美德。 - 保罗·门德洛维茨谈特朗普"
 LOADING_TIP_43:0 "在天上就有了争战。米迦勒同他的使者与龙争战，龙也同它的使者去争战，并没有得胜，天上再没有它们的地方。大龙就是那古蛇，名叫魔鬼，又叫撒但，是迷惑普天下的。它被摔在地上，它的使者也一同被摔下去。 - 《启示录》"
 LOADING_TIP_44:0 "我又观看，见有一片白云，云上坐着一位好像人子，头上戴着金冠冕……又有一位天使……大声喊着说：“伸出你的镰刀来收割；因为收割的时候已经到了，地上的庄稼已经熟透了。” - 拔摩岛的约翰，《启示录》"
 LOADING_TIP_45:0 "2026年2月特朗普支持率：美国人：39%，福音派：69%，犹太裔以色列人：83%，欧洲人：3%"
 LOADING_TIP_46:0 "特朗普总统受耶稣恩膏，要在伊朗点燃信号火，引发世界末日，并标志着他的重返地球 - 一位现役美国空军士官，2026年3月。"
 LOADING_TIP_47:0 "时候将到，如今就是了，那真正拜父的，要用心灵和诚实拜他，因为父要这样的人拜他。 - 耶稣，《约翰福音》"