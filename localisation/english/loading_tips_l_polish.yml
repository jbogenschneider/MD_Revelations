l_polish:
 LOADING_TIP_0:0 "Ale staram się nie popełniać błędów. To znaczy, dlaczego muszę, wiesz, żałować? Dlaczego mam prosić o przebaczenie, skoro nie popełniam błędów? - Donald Trump"
 LOADING_TIP_1:0 "Zostałem ocalony przez Boga, by znów uczynić Amerykę wielką - Donald Trump"
 LOADING_TIP_2:0 "Chrześcijanie, idźcie zagłosować, tylko ten jeden raz. Nie będziecie musieli robić tego ponownie. Jeszcze cztery lata... to zostanie naprawione, będzie dobrze, nie będziecie musieli już więcej głosować - Donald Trump"
 LOADING_TIP_3:0 "Wyrósł między nimi inny, mały róg, a w tym rogu były oczy podobne do oczu ludzkich i usta mówiące wielkie rzeczy. - Księga Daniela"
 LOADING_TIP_4:0 "I dano jej paszczę mówiącą wielkie rzeczy i bluźnierstwa... I dano jej wszcząć walkę ze świętymi - Apokalipsa św. Jana"
 LOADING_TIP_5:0 "Objawi się człowiek grzechu, syn zatracenia, który się sprzeciwia i wynosi ponad wszystko, co nazywa się Bogiem lub tym, co odbiera cześć - Paweł, 2 List do Tesaloniczan"
 LOADING_TIP_6:0 "Od początku był on zabójcą i w prawdzie nie wytrwał, bo prawdy w nim nie ma. Kiedy mówi kłamstwo, od siebie mówi, bo jest kłamcą i ojcem kłamstwa. - Ewangelia Jana"
 LOADING_TIP_7:0 "A Jezus znowu przemówił do nich tymi słowami: Ja jestem światłością świata. Kto idzie za Mną, nie będzie chodził w ciemności, lecz będzie miał światło życia. - Jezus, Ewangelia Jana"
 LOADING_TIP_8:0 "Kobieto, gdzież oni są? Nikt cię nie potępił? A ona odrzekła: Nikt, Panie! Rzekł do niej Jezus: I Ja ciebie nie potępiam. Idź, a od tej chwili już nie grzesz. - Jezus, Ewangelia Jana"
 LOADING_TIP_9:0 "Nie sądźcie, abyście nie byli sądzeni. Bo takim sądem, jakim sądzicie, i was osądzą; i taką miarą, jaką wy mierzycie, wam odmierzą. - Jezus, Ewangelia Mateusza"
 LOADING_TIP_10:0 "Nie gromadźcie sobie skarbów na ziemi, gdzie mól i rdza niszczą i gdzie złodzieje włamują się i kradną. Gromadźcie sobie skarby w niebie. - Jezus, Ewangelia Mateusza"
 LOADING_TIP_11:0 "Nikt nie może dwom panom służyć. Bo albo jednego będzie nienawidził, a drugiego będzie miłował; albo z jednym będzie trzymał, a drugim wzgardzi. Nie możecie służyć Bogu i Mamonie. - Jezus, Ewangelia Mateusza"
 LOADING_TIP_12:0 "Strzeżcie się fałszywych proroków, którzy przychodzą do was w owczej skórze, a wewnątrz są drapieżnymi wilkami. Poznacie ich po ich owocach. - Jezus, Ewangelia Mateusza"
 LOADING_TIP_13:0 "Wchodźcie przez ciasną bramę. Bo szeroka jest brama i przestronna ta droga, która prowadzi do zguby, a wielu jest takich, którzy przez nią wchodzą. Jakże ciasna jest brama i wąska droga, która prowadzi do życia, a mało jest takich, którzy ją znajdują. - Jezus, Ewangelia Mateusza"
 LOADING_TIP_14:0 "Błogosławieni cisi, albowiem oni na własność posiądą ziemię... Błogosławieni, którzy wprowadzają pokój, albowiem oni będą nazwani synami Bożymi. - Jezus, Ewangelia Mateusza"
 LOADING_TIP_15:0 "Odpowiedział mu Jezus: Ja jestem drogą i prawdą, i życiem. Nikt nie przychodzi do Ojca inaczej jak tylko przeze Mnie. - Jezus, Ewangelia Jana"
 LOADING_TIP_16:0 "A inny anioł... wołając donośnym głosem: Jeśli kto wielbi Bestię i obraz jej i bierze sobie jej znamię na czoło lub rękę, ten również będzie pić wino zapalczywości Boga, przygotowane bez domieszki w kielichu Jego gniewu; i będzie katowany ogniem... - Apokalipsa św. Jana"
 LOADING_TIP_17:0 "Wtedy ujrzą Syna Człowieczego, nadchodzącego w obłoku z mocą i wielką chwałą. - Ewangelia Łukasza"
 LOADING_TIP_18:0 "Każdy więc, kto słucha tych słów moich i wykowuje je, będzie przyrównany do męża mądrego, który zbudował dom swój na skale. I spadł deszcz, i wezbrały rzeki, i powiały wichry, i uderzyły w ten dom, ale nie runął, bo był założony na skale. - Jezus, Ewangelia Mateusza"
 LOADING_TIP_19:0 "Zrzucony został ogromny smok, wąż starodawny, który się zwie diabeł i szatan, zwodzący całą zamieszkałą ziemię; został zrzucony na ziemię, a z nim zrzuceni zostali jego aniołowie. - Apokalipsa św. Jana"
 LOADING_TIP_20:0 "Wówczas ukaże się Niegodziwiec, którego Pan Jezus zgładzi tchnieniem swoich ust i wniwecz obróci samym objawieniem swego przyjścia. - Paweł, 2 List do Tesaloniczan"
 LOADING_TIP_21:0 "Pojawieniu się jego towarzyszyć będzie... z wszelką mocą, wśród znaków i fałszywych cudów, i z wszelkim zwodzeniem ku nieprawości tych, którzy giną, ponieważ nie przyjęli miłości prawdy. - Paweł, 2 List do Tesaloniczan"
 LOADING_TIP_22:0 "Dlatego Bóg dopuszcza działanie oszustwa, tak iż uwierzą kłamstwu, aby byli osądzeni wszyscy, którzy nie uwierzyli prawdzie, ale upodobali sobie nieprawość. - Paweł, 2 List do Tesaloniczan"
 LOADING_TIP_23:0 "A Bestia, którą widziałem... paszcza jej była jak paszcza lwa. I dał jej Smok swoją moc, swój tron i wielką władzę. I ujrzałem jedną z jej głów jakby śmiertelnie zranioną, a rana jej śmiertelna została uleczona. I cała ziemia w podziwie powiodła wzrokiem za Bestią. - Apokalipsa św. Jana"
 LOADING_TIP_24:0 "I Ten, który siedział na obłoku, rzucił swój sierp na ziemię i ziemia została zżęta. - Apokalipsa św. Jana"
 LOADING_TIP_25:0 "Nie będziesz mówił przeciw bliźniemu twemu kłamstwa jako świadek. - 9 Przykazanie, Księga Wyjścia"
 LOADING_TIP_26:0 "Fałszywy świadek nie ujdzie kary, a kto kłamstwami oddycha, zginie. - Księga Przysłów"
 LOADING_TIP_27:0 "W nadziei życia wiecznego, jakie obiecał przed wiekami prawdomówny Bóg. - Paweł, List do Tytusa"
 LOADING_TIP_28:0 "A Ja wam powiadam: Miłujcie waszych nieprzyjaciół i módlcie się za tych, którzy was prześladują. - Jezus, Ewangelia Mateusza"
 LOADING_TIP_29:0 "Wszystko więc, co byście chcieli, żeby wam ludzie czynili, i wy im czyńcie. - Jezus, Ewangelia Mateusza"
 LOADING_TIP_30:0 "Zaprawdę, powiadam wam: Wszystko, co uczyniliście jednemu z tych braci moich najmniejszych, Mnieście uczynili. - Jezus, Ewangelia Mateusza"
 LOADING_TIP_31:0 "Będziesz miłował Pana, Boga swego, całym swoim sercem, całą swoją duszą, całą swoją mocą i całym swoim umysłem; a swego bliźniego jak siebie samego. - Jezus, Ewangelia Łukasza"
 LOADING_TIP_32:0 "Chciałbym być papieżem. To byłby mój wybór numer 1. - Donald Trump"
 LOADING_TIP_33:0 "Tak, jest jedna rzecz. Moja własna moralność. Mój własny umysł. To jedyna rzecz, która może mnie powstrzymać. - Donald Trump"
 LOADING_TIP_34:0 "Dobrymi chęciami piekło jest wybrukowane."
 LOADING_TIP_35:0 "Znam twoje czyny, że ani zimny, ani gorący nie jesteś. Obyś był zimny albo gorący! A tak, skoro jesteś letni i ani gorący, ani zimny, chcę cię wyrzucić z mych ust. - Apokalipsa św. Jana"
 LOADING_TIP_36:0 "Jestem waszym głosem. Dziś dodaję: jestem waszym wojownikiem. Jestem waszą sprawiedliwością. A dla tych, którzy zostali skrzywdzeni i zdradzeni, jestem waszą zemstą - Donald Trump"
 LOADING_TIP_37:0 "Wahm się między myśleniem, że Trump to cyniczny dupek w stylu Nixona, który nie byłby aż taki zły (a może nawet okazałby się przydatny), a myśleniem, że jest Hitlerem Ameryki - JD Vance"
 LOADING_TIP_38:0 "„Nigdy Trump”, „Naganny”, „moralna katastrofa”, „kulturowa heroina”, „Pan Trump nie nadaje się na najwyższy urząd w naszym kraju” - JD Vance"
 LOADING_TIP_39:0 "Ja jestem dobrym pasterzem. Dobry pasterz daje życie swoje za owce. - Jezus, Ewangelia Jana"
 LOADING_TIP_40:0 "Ja jestem dobrym pasterzem i znam owce moje, a moje Mnie znają, podobnie jak Mnie zna Ojciec, a Ja znam Ojca. Życie moje oddaję za owce. - Jezus, Ewangelia Jana"
 LOADING_TIP_41:0 "Ty bowiem mówisz: „Jestem bogaty i wzbogaciłem się, i niczego mi nie potrzeba”, a nie wiesz, że to ty jesteś nieszczęsny i godzien litości, i biedny, i ślepy, i nagi. - Apokalipsa św. Jana"
 LOADING_TIP_42:0 "Porozmawiajmy wprost o niebezpieczeństwie. Fałszywi mesjasze nie tylko ponoszą porażkę; oni korumpują. Uczą ludzi mylić władzę ze sprawiedliwością, a zwycięstwo z cnotą. - Paul Mendlowitz o Trumpie"
 LOADING_TIP_43:0 "I nastąpiła walka na niebie: Michał i jego aniołowie mieli walczyć ze Smokiem. I wystąpił do walki Smok i jego aniołowie, ale nie przemógł, i już się miejsce dla nich w niebie nie znalazło. I został strącony wielki Smok - Apokalipsa św. Jana"
 LOADING_TIP_44:0 "Potem ujrzałem: oto biały obłok, a siedzący na obłoku podobny do Syna Człowieczego, miał na głowie złoty wieniec... A inny anioł... wołając donośnym głosem do Siedzącego na obłoku: Zapuść twój sierp i żnij, bo nadeszła godzina żniwa, gdyż plon ziemi dojrzał. - Jan z Patmos, Apokalipsa św. Jana"
 LOADING_TIP_45:0 "Poparcie dla Trumpa luty 2026: Amerykanie: 39 procent, Ewangelikalni: 69 procent, Izraelscy Żydzi: 83 procent, Europejczycy: 3 procent"
 LOADING_TIP_46:0 "Prezydent Trump został namaszczony przez Jezusa, aby rozpalić ogień sygnałowy w Iranie w celu wywołania Armagedonu i oznaczenia Jego powrotu na Ziemię - autentyczny podoficer USAF, marzec 2026 r."
 LOADING_TIP_47:0 "Nadchodzi jednak godzina, owszem już jest, kiedy to prawdziwi czciciele będą oddawać cześć Ojcu w Duchu i prawdzie, a takich to czcicieli chce mieć Ojciec. Jezus, Ewangelia Jana"