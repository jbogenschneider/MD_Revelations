 rev_usa_iran.20.t: "A Regional Opening"
 rev_usa_iran.20.d: "With the United States at war, an opening has appeared. Iraq can be convinced to allow us to cross their territory and even participate as long as we resolve the Kurdish problem for them. Free Syria can be overrun on the way. We now have a straight shot at Israel."
 rev_usa_iran.20.a: "Move while the Americans are distracted."
 rev_usa_iran.21.t: "Free Syria Preserved Under Persian Influence"
 rev_usa_iran.21.d: "The Free Syrian Army has collapsed in the field, but there is no need to let the territory splinter into competing fragments. A controlled settlement can preserve the administration under Persian oversight instead."
 rev_usa_iran.21.a: "Keep Free Syria intact as a puppet"
