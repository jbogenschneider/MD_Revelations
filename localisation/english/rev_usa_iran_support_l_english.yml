 rev_usa_iran.20.t: "A Regional Opening"
 rev_usa_iran.20.d: "With the United States at war, an opening has appeared. Iraq can be convinced to allow us to cross their territory and even participate as long as we resolve the Kurdish problem for them. Jordan might also capitulate. We now have a straight shot at Israel."
 rev_usa_iran.20.a: "Move while the Americans are distracted."
