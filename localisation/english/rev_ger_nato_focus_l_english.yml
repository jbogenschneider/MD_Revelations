l_english:
 REV_GER_NATO_2026_security_compact:0 "2026 Security Compact"
 REV_GER_NATO_2026_security_compact_desc:0 "Launch a shared NATO security program for sustained rearmament, faster decisions, and coordinated strategy."
 REV_GER_NATO_rapid_procurement_authority:0 "Rapid Procurement Authority"
 REV_GER_NATO_rapid_procurement_authority_desc:0 "Cut red tape and accelerate military contracts across alliance members."
 REV_GER_NATO_munitions_surge:0 "Munitions Surge"
 REV_GER_NATO_munitions_surge_desc:0 "Scale ammunition output and stockpiles for a prolonged high-intensity conflict."
 REV_GER_NATO_expand_military_factories_i:0 "Expand Military Factories I"
 REV_GER_NATO_expand_military_factories_i_desc:0 "Begin the first wave of military industrial expansion."
 REV_GER_NATO_expand_military_factories_ii:0 "Expand Military Factories II"
 REV_GER_NATO_expand_military_factories_ii_desc:0 "Continue expansion with additional defense production lines."
 REV_GER_NATO_expand_military_factories_iii:0 "Expand Military Factories III"
 REV_GER_NATO_expand_military_factories_iii_desc:0 "All of Nato is expanding their arsenals but Germany is the factory for most of it."
 REV_GER_NATO_expand_military_factories_iiii:0 "Expand Military Factories IV"
 REV_GER_NATO_expand_military_factories_iiii_desc:0 "All of Nato is expanding their arsenals but Germany is the factory for most of it."
 REV_GER_NATO_forward_stockpiles:0 "Forward Stockpiles"
 REV_GER_NATO_forward_stockpiles_desc:0 "Pre-position supplies, munitions, and spare parts for rapid deployment."
 REV_GER_NATO_integrated_training_cycle:0 "Integrated Training Cycle"
 REV_GER_NATO_integrated_training_cycle_desc:0 "Standardize multinational training cycles and improve interoperability."
 REV_GER_NATO_long_war_posture:0 "Long War Posture"
 REV_GER_NATO_long_war_posture_desc:0 "Adopt force planning and reserves policies built for an extended campaign."
 REV_GER_NATO_land_drone_program:0 "Learn from Ukraine"
 REV_GER_NATO_land_drone_program_desc:0 "Incorporate Ukrainian Tactics and battlefield drone programs across alliance forces."
 REV_GER_NATO_field_test_drone_wings:0 "Field Test Drone Wings"
 REV_GER_NATO_field_test_drone_wings_desc:0 "Run large-scale trials to validate drone doctrine and frontline integration."
 REV_GER_NATO_networked_drone_fires:0 "Fighters for Defense"
 REV_GER_NATO_networked_drone_fires_desc:0 "Add Air Superiority and Multi-Role Fighters to combat especially cruise missiles."
 REV_GER_NATO_autonomous_targeting_cells:0 "Autonomous Targeting Cells"
 REV_GER_NATO_autonomous_targeting_cells_desc:0 "Deploy advanced drone coordination cells with semi-autonomous targeting support."
 REV_GER_NATO_joint_ew_cells:0 "Joint EW Cells"
 REV_GER_NATO_joint_ew_cells_desc:0 "Coordinate electronic warfare, SIGINT, and counter-drone operations with shared standards."
 REV_GER_NATO_ukraine_intel_sharing:0 "Ukraine Intelligence Sharing"
 REV_GER_NATO_ukraine_intel_sharing_desc:0 "Expand intelligence fusion and targeting support with Ukrainian command structures."
 REV_GER_NATO_security_assistance_package:0 "Ukraine Security Assistance Package"
 REV_GER_NATO_security_assistance_package_desc:0 "Increase security aid, tactical support, and military sustainment for Ukraine."
 REV_GER_NATO_ukraine_development_package:0 "Ukraine Mil Development"
 REV_GER_NATO_ukraine_development_package_desc:0 "Fund infrastructure and industrial resilience to sustain Ukraine's long war capacity."
 REV_GER_NATO_18_month_readiness:0 "18-Month Readiness Plan"
 REV_GER_NATO_18_month_readiness_desc:0 "Complete the alliance-wide rearmament cycle and lock in long-term readiness gains."
 REV_GER_NATO_new_nato_leader:0 "New NATO Leader"
 REV_GER_NATO_new_nato_leader_desc:0 "USA is handing leadership of land forces in the European theater to Germany.  You will coordinate with the French and British for air and naval leadership accordingly and with Poland anchoring the eastern front."
 REV_GER_NATO_drone_line:0 "Drone Line"
 REV_GER_NATO_drone_line_desc:0 "Just as Ukraine perfected late in the war we need drones for air defense and to be able to create a kill zone 20 km deep on any front we need to fight."
 REV_GER_NATO_drone_line_tt:0 "Add §Y1000 Air_Kamikaze2§! to the stockpile."
 REV_GER_NATO_ukraine_development_package_industry:0 "Ukraine Industry Development"
 REV_GER_NATO_ukraine_development_package_industry_desc:0 "Fund infrastructure and industrial capacity on and offshore for Ukraine."
 REV_GER_NATO_ukraine_development_package_industryO:0 "Ukraine Industry Postwar"
 REV_GER_NATO_ukraine_development_package_industryO_desc:0 "Now that Ukraine is at peace we can help it redevelope it's industry."
 
 REV_GER_NATO_rally_for_democracy:0 "Rally for Democracy"
 REV_GER_NATO_rally_for_democracy_desc:0 "Use wartime messaging to frame the conflict as a defense of democratic institutions, civil order, and national sovereignty."
 REV_GER_NATO_rally_for_a_return_to_peace:0 "Rally for a Return to Peace"
 REV_GER_NATO_rally_for_a_return_to_peace_desc:0 "Promise that victory and endurance are the fastest path back to peace, security, and normal life."
 REV_GER_NATO_hamburg_efuel_from_newfoundland:0 "Hamburg e-Fuel Corridor"
 REV_GER_NATO_hamburg_efuel_from_newfoundland_desc:0 "Secure ammonia imports from Newfoundland and convert them into industrial-scale e-fuel capacity in Hamburg."
 REV_GER_NATO_niedersachsen_efuel_from_namibia:0 "Niedersachsen Ammonia-to-e-Fuel"
 REV_GER_NATO_niedersachsen_efuel_from_namibia_desc:0 "Expand transcontinental ammonia supply links with Namibia and scale e-fuel synthesis across Niedersachsen."
 REV_GER_NATO_schleswig_hydrogen_from_wind:0 "Schleswig Wind-to-Hydrogen Network"
 REV_GER_NATO_schleswig_hydrogen_from_wind_desc:0 "Channel offshore wind output into electrolysis and hydrogen logistics in Schleswig-Holstein, strengthening strategic fuel security."
 REV_GER_NATO_automate_logistics:0 "Automate Logistics"
 REV_GER_NATO_automate_logistics_desc:0 "Drones and autonomous systems can now do many jobs that a person needed to do. This increases the total manpower we have available without enlisting more soldiers."
 REV_GER_NATO_ground_drones:0 "Ground Drones"
 REV_GER_NATO_ground_drones_desc:0 "Drones and autonomous systems can now do many jobs that a person needed to do. This increases the total manpower we have available without enlisting more soldiers."
 REV_GER_NATO_limited_conscription_surge:0 "Limited Conscription Surge"
 REV_GER_NATO_limited_conscription_surge_desc:0 "Accelerate selective mobilization to expand available personnel while preserving broad social and economic stability."

