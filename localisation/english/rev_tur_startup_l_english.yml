 rev_tur_startup.2.t:0 "Strike South While America Is Distracted"
 rev_tur_startup.2.d:0 "Iran is already at war with Israel, the United States is tied down in a war with Germany, and Turkey now stands outside NATO discipline. Some in Ankara argue this is the moment to impose a new settlement on the Levant by moving directly against Free Syria, Syria, and Israel before the wider balance can recover."
 rev_tur_startup.2.a:0 "Launch the southern offensive"
 rev_tur_startup.2.b:0 "Stay out of it"
