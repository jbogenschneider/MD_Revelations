l_english:
 REV_HUN_orbans_reign:0 "Orban's Reign"
 REV_HUN_orbans_reign_desc:0 "Viktor Orban's long hold over Hungarian politics defines the starting balance of power as the country heads into a decisive election year."
 REV_HUN_eu_sceptic_fidesz:0 "EU Sceptic Fidesz"
 REV_HUN_eu_sceptic_fidesz_desc:0 "Elections are coming up April 12th 2026 and Hungarians have a choice to orient back towards the EU and normal relations with the Ukraine or stick with a Russian orientation under Orban."
 REV_HUN_pro_eu_tisza:0 "Pro EU Tisza"
 REV_HUN_pro_eu_tisza_desc:0 "Elections are coming up April 12th 2026 and Hungarians have a choice to orient back towards the EU and normal relations with the Ukraine or stick with a Russian orientation under Orban."
 REV_HUN_run_fear_campaign_against_ukraine:0 "Run Fear Campaign against Ukraine"
 REV_HUN_run_fear_campaign_against_ukraine_desc:0 "State media and party machinery can turn the coming campaign into a referendum on fear, insecurity, and hostility toward Ukraine while deepening quiet alignment with Moscow."
 REV_HUN_provide_eu_secrets_to_russia:0 "Provide EU Secrets to Russia"
 REV_HUN_provide_eu_secrets_to_russia_desc:0 "Budapest can trade privileged access and internal European information for quiet financial and political support from Russia."
 REV_HUN_secret_usa_investment:0 "Secret USA Investment"
 REV_HUN_secret_usa_investment_desc:0 "Even while publicly defiant, the government can still cultivate discreet American capital willing to back Hungarian industry behind closed doors."
 REV_HUN_rig_election:0 "Rig Election"
 REV_HUN_rig_election_desc:0 "Administrative pressure, media control, and selective enforcement can tilt the system just enough to keep Fidesz in command."
 REV_HUN_leave_the_eu:0 "Leave the EU"
 REV_HUN_leave_the_eu_desc:0 "Brussels may cast Hungary out, but Orban can turn that rupture into a declaration of sovereign independence from the European project."
 REV_HUN_end_democracy_in_hungary:0 "End Democracy in Hungary"
 REV_HUN_end_democracy_in_hungary_desc:0 "Crack down and bring stability back to Hungary. Elections can be suspended while the state consolidates control and restores order on its own terms."
 REV_HUN_leave_nato:0 "Leave NATO"
 REV_HUN_leave_nato_desc:0 "If Russia and Ukraine remain locked in war, Hungary can break from NATO and claim that alliance obligations no longer serve national interests."
 REV_HUN_prepare_to_attack_ukraine:0 "Prepare to Attack Ukraine"
 REV_HUN_prepare_to_attack_ukraine_desc:0 "With the region in chaos, Budapest can begin openly preparing claims on Transcarpathia and lay the political groundwork for intervention."
 rev_hun_election.2.t:0 "Tisza Sweeps the Election"
 rev_hun_election.2.desc:0 "The April 12th, 2026 election has ended in a political earthquake. Peter Magyar and the Tisza Party have won a two-thirds majority in Parliament, giving Hungary a mandate to restore closer ties with the EU and normalize relations with Ukraine."
 rev_hun_election.2.a:0 "A new parliamentary era begins."
 rev_hun_election.3.t:0 "Orban Holds Hungary"
 rev_hun_election.3.desc:0 "The April 12th, 2026 election has returned Viktor Orban and Fidesz to power. Hungary will continue its sceptical posture toward the EU and preserve its more accommodating orientation toward Russia."
 rev_hun_election.3.a:0 "Fidesz endures."
 REV_HUN_NATO_2026_security_compact:0 "2026 Security Compact"
 REV_HUN_NATO_2026_security_compact_desc:0 "Launch a shared NATO security program for sustained rearmament, faster decisions, and coordinated strategy."
 REV_HUN_NATO_rapid_procurement_authority:0 "Rapid Procurement Authority"
 REV_HUN_NATO_rapid_procurement_authority_desc:0 "Cut red tape and accelerate military contracts across alliance members."
 REV_HUN_NATO_munitions_surge:0 "Munitions Surge"
 REV_HUN_NATO_munitions_surge_desc:0 "Scale ammunition output and stockpiles for a prolonged high-intensity conflict."
 REV_HUN_NATO_expand_military_factories_i:0 "Expand Military Factories I"
 REV_HUN_NATO_expand_military_factories_i_desc:0 "Begin the first wave of military industrial expansion."
 REV_HUN_NATO_expand_military_factories_ii:0 "Expand Military Factories II"
 REV_HUN_NATO_expand_military_factories_ii_desc:0 "Continue expansion with additional defense production lines."
 REV_HUN_NATO_forward_stockpiles:0 "Forward Stockpiles"
 REV_HUN_NATO_forward_stockpiles_desc:0 "Pre-position supplies, munitions, and spare parts for rapid deployment."
 REV_HUN_NATO_integrated_training_cycle:0 "Integrated Training Cycle"
 REV_HUN_NATO_integrated_training_cycle_desc:0 "Standardize multinational training cycles and improve interoperability."
 REV_HUN_NATO_long_war_posture:0 "Long War Posture"
 REV_HUN_NATO_long_war_posture_desc:0 "Adopt force planning and reserves policies built for an extended campaign."
 REV_HUN_NATO_land_drone_program:0 "Learn from Ukraine"
 REV_HUN_NATO_land_drone_program_desc:0 "Incorporate Ukrainian Tactics and battlefield drone programs across alliance forces."
 REV_HUN_NATO_field_test_drone_wings:0 "Field Test Drone Wings"
 REV_HUN_NATO_field_test_drone_wings_desc:0 "Run large-scale trials to validate drone doctrine and frontline integration."
 REV_HUN_NATO_networked_drone_fires:0 "Fighters for Defense"
 REV_HUN_NATO_networked_drone_fires_desc:0 "Add Air Superiority and Multi-Role Fighters to combat especially cruise missiles."
 REV_HUN_NATO_autonomous_targeting_cells:0 "Autonomous Targeting Cells"
 REV_HUN_NATO_autonomous_targeting_cells_desc:0 "Deploy advanced drone coordination cells with semi-autonomous targeting support."
 REV_HUN_NATO_joint_ew_cells:0 "Joint EW Cells"
 REV_HUN_NATO_joint_ew_cells_desc:0 "Coordinate electronic warfare, SIGINT, and counter-drone operations with shared standards."
 REV_HUN_NATO_ukraine_intel_sharing:0 "Ukraine Intelligence Sharing"
 REV_HUN_NATO_ukraine_intel_sharing_desc:0 "Expand intelligence fusion and targeting support with Ukrainian command structures."
 REV_HUN_NATO_security_assistance_package:0 "Ukraine Security Assistance Package"
 REV_HUN_NATO_security_assistance_package_desc:0 "Increase security aid, tactical support, and military sustainment for Ukraine."
 REV_HUN_NATO_ukraine_development_package:0 "Ukraine Mil Development"
 REV_HUN_NATO_ukraine_development_package_desc:0 "Fund infrastructure and industrial resilience to sustain Ukraine's long war capacity."
 REV_HUN_NATO_18_month_readiness:0 "18-Month Readiness Plan"
 REV_HUN_NATO_18_month_readiness_desc:0 "Complete the alliance-wide rearmament cycle and lock in long-term readiness gains."
 REV_HUN_NATO_ukraine_development_package_industry:0 "Ukraine Industry Development"
 REV_HUN_NATO_ukraine_development_package_industry_desc:0 "Fund infrastructure and industrial capacity on and offshore for Ukraine."
 REV_HUN_NATO_ukraine_development_package_industryO:0 "Ukraine Industry Postwar"
 REV_HUN_NATO_ukraine_development_package_industryO_desc:0 "Now that Ukraine is at peace we can help it redevelope it's industry."
 
 REV_HUN_NATO_rally_for_democracy:0 "Rally for Democracy"
 REV_HUN_NATO_rally_for_democracy_desc:0 "Use wartime messaging to frame the conflict as a defense of democratic institutions, civil order, and national sovereignty."
 REV_HUN_NATO_rally_for_a_return_to_peace:0 "Rally for a Return to Peace"
 REV_HUN_NATO_rally_for_a_return_to_peace_desc:0 "Promise that victory and endurance are the fastest path back to peace, security, and normal life."

