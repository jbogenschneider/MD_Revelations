l_spanish:
 LOADING_TIP_0:0 "Pero intento no cometer errores. Quiero decir, ¿por qué tengo que, ya sabes, arrepentirme? ¿Por qué tengo que pedir perdón si no estás cometiendo errores? - Donald Trump"
 LOADING_TIP_1:0 "Fui salvado por Dios para hacer a Estados Unidos grande otra vez - Donald Trump"
 LOADING_TIP_2:0 "Cristianos, salgan a votar, solo por esta vez. Ya no tendrán que hacerlo más. Cuatro años más... se solucionará, estará bien, ya no tendrán que votar - Donald Trump"
 LOADING_TIP_3:0 "Mientras yo contemplaba los cuernos, he aquí que otro cuerno pequeño salió entre ellos... y he aquí que este cuerno tenía ojos como de hombre, y una boca que hablaba grandes cosas. - Libro de Daniel"
 LOADING_TIP_4:0 "Y se le dio una boca que hablaba grandes cosas y blasfemias... Y se le concedió hacer la guerra contra los santos - Libro del Apocalipsis"
 LOADING_TIP_5:0 "Se manifieste el hombre de iniquidad, el hijo de perdición, el cual se opone y se exalta contra todo lo que se llama Dios o es objeto de culto - Pablo, 2 Tesalonicenses"
 LOADING_TIP_6:0 "Él ha sido homicida desde el principio, y no ha permanecido en la verdad, porque no hay verdad en él. Cuando habla mentira, de suyo habla; porque es mentiroso, y padre de mentira. - Libro de Juan"
 LOADING_TIP_7:0 "Otra vez Jesús les habló, diciendo: Yo soy la luz del mundo; el que me sigue, no andará en tinieblas, sino que tendrá la luz de la vida. - Jesús, Libro de Juan"
 LOADING_TIP_8:0 "Mujer, ¿dónde están los que te acusaban? ¿Ninguno te condenó? Ella dijo: Ninguno, Señor. Entonces Jesús le dijo: Ni yo te condeno; vete, y no peques más. - Jesús, Libro de Juan"
 LOADING_TIP_9:0 "No juzguéis, para que no seáis juzgados. Porque con el juicio con que juzgáis, seréis juzgados, y con la medida con que medís, os será medido. - Jesús, Libro de Mateo"
 LOADING_TIP_10:0 "No os hagáis tesoros en la tierra, donde la polilla y el orín corrompen, y donde ladrones minan y hurtan; sino haceos tesoros en el cielo. - Jesús, Libro de Mateo"
 LOADING_TIP_11:0 "Ninguno puede servir a dos señores; porque o aborrecerá al uno y amará al otro, o estimará al uno y menospreciará al otro. No podéis servir a Dios y a las riquezas. - Jesús, Libro de Mateo"
 LOADING_TIP_12:0 "Guardaos de los falsos profetas, que vienen a vosotros con vestidos de ovejas, pero por dentro son lobos rapaces. Por sus frutos los conoceréis. - Jesús, Libro de Mateo"
 LOADING_TIP_13:0 "Entrad por la puerta estrecha; porque ancha es la puerta, y espacioso el camino que lleva a la perdición, y muchos son los que entran por ella; porque estrecha es la puerta, y angosto el camino que lleva a la vida, y pocos son los que la hallan. - Jesús, Libro de Mateo"
 LOADING_TIP_14:0 "Bienaventurados los mansos, porque ellos recibirán la tierra por heredad... Bienaventurados los pacificadores, porque ellos serán llamados hijos de Dios. - Jesús, Libro de Mateo"
 LOADING_TIP_15:0 "Jesús le dijo: Yo soy el camino, y la verdad, y la vida; nadie viene al Padre, sino por mí. - Jesús, Libro de Juan"
 LOADING_TIP_16:0 "Y otro ángel... diciendo a gran voz: Si alguno adora a la bestia y a su imagen, y recibe la marca en su frente o en su mano, él también beberá del vino de la ira de Dios, que ha sido vaciado puro en el cáliz de su ira; y será atormentado con fuego... - Apocalipsis"
 LOADING_TIP_17:0 "Entonces verán al Hijo del Hombre, que vendrá en una nube con poder y gran gloria. - Libro de Lucas"
 LOADING_TIP_18:0 "Cualquiera, pues, que me oye estas palabras, y las hace, le compararé a un hombre prudente, que edificó su casa sobre la roca. Descendió lluvia, y vinieron ríos, y soplaron vientos, y golpearon contra aquella casa; y no cayó, porque estaba fundada sobre la roca. - Jesús, Libro de Mateo"
 LOADING_TIP_19:0 "Y fue lanzado fuera el gran dragón, la serpiente antigua, que se llama diablo y Satanás, el cual engaña al mundo entero; fue arrojado a la tierra, y sus ángeles fueron arrojados con él. - Apocalipsis"
 LOADING_TIP_20:0 "Y entonces se manifestará aquel inicuo, a quien el Señor matará con el espíritu de su boca, y destruirá con el resplandor de su venida. - Pablo, 2 Tesalonicenses"
 LOADING_TIP_21:0 "Inicuo cuyo advenimiento es... con gran poder y señales y prodigios mentirosos, y con todo engaño de iniquidad para los que se pierden, por cuanto no recibieron el amor de la verdad para ser salvos. - Pablo, 2 Tesalonicenses"
 LOADING_TIP_22:0 "Por esto Dios les envía un poder engañoso, para que crean la mentira, a fin de que sean condenados todos los que no creyeron a la verdad, sino que se complacieron en la injusticia. - Pablo, 2 Tesalonicenses"
 LOADING_TIP_23:0 "Y la bestia que vi... su boca como boca de león. Y el dragón le dio su poder y su trono, y grande autoridad. Vi una de sus cabezas como herida de muerte, pero su herida mortal fue sanada; y se maravilló toda la tierra en pos de la bestia. - Apocalipsis"
 LOADING_TIP_24:0 "Y el que estaba sentado sobre la nube metió su hoz en la tierra, y la tierra fue segada. - Apocalipsis"
 LOADING_TIP_25:0 "No hablarás contra tu prójimo falso testimonio. - El Noveno Mandamiento, Éxodo"
 LOADING_TIP_26:0 "El testigo falso no quedará sin castigo, y el que habla mentiras perecerá. - Proverbios"
 LOADING_TIP_27:0 "En la esperanza de la vida eterna, la cual Dios, que no miente, prometió desde antes del principio de los siglos. - Pablo, Carta a Tito"
 LOADING_TIP_28:0 "Pero yo os digo: Amad a vuestros enemigos y orad por los que os persiguen. - Jesús, Libro de Mateo"
 LOADING_TIP_29:0 "Así que, todas las cosas que queráis que los hombres hagan con vosotros, así también haced vosotros con ellos. - Jesús, Libro de Mateo"
 LOADING_TIP_30:0 "De cierto os digo que en cuanto lo hicisteis a uno de estos mis hermanos más pequeños, a mí lo hicisteis. - Jesús, Libro de Mateo"
 LOADING_TIP_31:0 "Amarás al Señor tu Dios con todo tu corazón, y con toda tu alma, y con todas tus fuerzas, y con toda tu mente; y a tu prójimo como a ti mismo. - Jesús, Libro de Lucas"
 LOADING_TIP_32:0 "Me gustaría ser Papa. Esa sería mi opción número 1. - Donald Trump"
 LOADING_TIP_33:0 "Sí, hay una cosa. Mi propia moralidad. Mi propia mente. Es lo único que puede detenerme. - Donald Trump"
 LOADING_TIP_34:0 "El camino al infierno está empedrado de buenas intenciones."
 LOADING_TIP_35:0 "Yo conozco tus obras, que ni eres frío ni caliente. ¡Ojalá fueses frío o caliente! Pero por cuanto eres tibio, y no frío ni caliente, te vomitaré de mi boca. - Apocalipsis"
 LOADING_TIP_36:0 "Yo soy su voz. Hoy, añado: Yo soy su guerrero. Yo soy su justicia. Y para los que han sido agraviados y traicionados, yo soy su retribución - Donald Trump"
 LOADING_TIP_37:0 "Oscilo entre pensar que Trump es un 'imbécil' cínico como Nixon que no sería tan malo (y que incluso podría ser útil) o que es el Hitler de Estados Unidos - JD Vance"
 LOADING_TIP_38:0 "'Nunca Trump', 'Reprensible', 'desastre moral', 'heroína cultural', 'El Sr. Trump es incapaz de ocupar el cargo más alto de nuestra nación' - JD Vance"
 LOADING_TIP_39:0 "Yo soy el buen pastor; el buen pastor su vida da por las ovejas. - Jesús, Libro de Juan"
 LOADING_TIP_40:0 "Yo soy el buen pastor; y conozco mis ovejas, y las mías me conocen, así como el Padre me conoce, y yo conozco al Padre; y pongo mi vida por las ovejas. - Jesús, Libro de Juan"
 LOADING_TIP_41:0 "Porque tú dices: Yo soy rico, y me he enriquecido, y de ninguna cosa tengo necesidad; y no sabes que tú eres un desventurado, miserable, pobre, ciego y desnudo. - Apocalipsis"
 LOADING_TIP_42:0 "Y hablemos claramente del peligro aquí. Los falsos mesías no solo fracasan; corrompen. Enseñan a la gente a confundir el poder con la rectitud y la victoria con la virtud. - Paul Mendlowitz sobre Trump"
 LOADING_TIP_43:0 "Después hubo una gran batalla en el cielo: Miguel y sus ángeles luchaban contra el dragón; y luchaban el dragón y sus ángeles; pero no prevalecieron, ni se halló ya lugar para ellos en el cielo. Y fue lanzado fuera el gran dragón - Apocalipsis"
 LOADING_TIP_44:0 "Miré, y he aquí una nube blanca; y sobre la nube uno sentado semejante al Hijo del Hombre, que tenía en la cabeza una corona de oro... Y otro ángel... clamando a gran voz al que estaba sentado sobre la nube: Mete tu hoz, y siega; porque la hora de segar ha llegado, pues la mies de la tierra está madura. - Juan de Patmos, Apocalipsis"
 LOADING_TIP_45:0 "Índice de aprobación de Trump Febrero 2026: Estadounidenses: 39%, Evangélicos: 69%, Judíos Israelíes: 83%, Europeos: 3%"
 LOADING_TIP_46:0 "El presidente Trump ha sido ungido por Jesús para encender la señal de fuego en Irán para causar el Armagedón y marcar Su regreso a la Tierra - un suboficial real de la USAF, marzo de 2026."
 LOADING_TIP_47:0 "Mas la hora viene, y ahora es, cuando los verdaderos adoradores adorarán al Padre en espíritu y en verdad; porque también el Padre tales adoradores busca que le adoren. - Jesús, Libro de Juan"