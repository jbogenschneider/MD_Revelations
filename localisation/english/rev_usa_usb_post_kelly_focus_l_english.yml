l_english:
 REV_USA_post_kelly_rebuild_command: "Rebuild Federal Institutions"
 REV_USA_post_kelly_rebuild_command_desc: "Everybody wants to get back to normal. Peace has returned, and now we need to rebuild federal institutions, restore trust, and put the past behind us as we build our democracy back better."
 REV_USA_post_kelly_war_footing: "Shift to War Footing"
 REV_USA_post_kelly_war_footing_desc: "Convert the national posture from emergency politics to full wartime coordination."
 REV_USA_post_kelly_military_budget_i: "Emergency Military Budget I"
 REV_USA_post_kelly_military_budget_i_desc: "Authorize immediate appropriations for domestic weapons output and logistics."
 REV_USA_post_kelly_military_budget_ii: "Emergency Military Budget II"
 REV_USA_post_kelly_military_budget_ii_desc: "Expand industrial capacity to sustain prolonged military operations."
 REV_USA_post_kelly_unity_campaign: "Unity Campaign"
 REV_USA_post_kelly_unity_campaign_desc: "Trump was never popular, he managed to stay and power by waring so that the good army was to busy to challenge his loyalists.  Now that he's gone everybody wants peace and all by a tiny minority are willing to get along and get back to the America we know and love. Let's build our democracy back better together."
 REV_USA_post_kelly_prosecute_war_criminals: "Prosecute the Crimes of the War"
 REV_USA_post_kelly_prosecute_war_criminals_desc: "There is a great deal to clean up. Many individuals profited illegally from the war and from national division, and some committed outright crimes or atrocities. We will prosecute those responsible for the darkest acts of those years and begin restoring the rule of law."
 REV_USA_post_kelly_put_things_right: "Put Things Right in the World"
 REV_USA_post_kelly_put_things_right_desc: "The United States must start putting things right again. We will unwind the worst excesses of the nationalist period, invite the citizens who fled to return home, and show that America intends to behave like a responsible country once more."
 REV_USB_post_kelly_war_cabinet: "Form a War Cabinet"
 REV_USB_post_kelly_war_cabinet_desc: "Consolidate political authority and centralize command around the southern government."
 REV_USB_post_kelly_total_commitment: "Total Commitment Doctrine"
 REV_USB_post_kelly_total_commitment_desc: "Commit state institutions and industry to a long conflict posture."
 REV_USB_post_kelly_emergency_arms_i: "Emergency Arms Program I"
 REV_USB_post_kelly_emergency_arms_i_desc: "Accelerate domestic arms production and mobilize industrial supply chains."
 REV_USB_post_kelly_emergency_arms_ii: "Emergency Arms Program II"
 REV_USB_post_kelly_emergency_arms_ii_desc: "Scale military production further to support campaign endurance."
 REV_USB_post_kelly_mobilize_the_base: "Mobilize the Base"
 REV_USB_post_kelly_mobilize_the_base_desc: "Solidify social backing, manpower flow, and war support for the southern state."
