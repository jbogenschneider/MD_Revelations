l_english:
 REV_USA_post_kelly_rebuild_command: "Rebuild Federal Command"
 REV_USA_post_kelly_rebuild_command_desc: "Stabilize federal institutions, secure command channels, and prepare for sustained crisis governance."
 REV_USA_post_kelly_war_footing: "Shift to War Footing"
 REV_USA_post_kelly_war_footing_desc: "Convert the national posture from emergency politics to full wartime coordination."
 REV_USA_post_kelly_military_budget_i: "Emergency Military Budget I"
 REV_USA_post_kelly_military_budget_i_desc: "Authorize immediate appropriations for domestic weapons output and logistics."
 REV_USA_post_kelly_military_budget_ii: "Emergency Military Budget II"
 REV_USA_post_kelly_military_budget_ii_desc: "Expand industrial capacity to sustain prolonged military operations."
 REV_USA_post_kelly_unity_campaign: "Union Unity Campaign"
 REV_USA_post_kelly_unity_campaign_desc: "Build public backing and wartime cohesion behind federal command."

 REV_USB_post_kelly_war_cabinet: "Form a War Cabinet"
 REV_USB_post_kelly_war_cabinet_desc: "Consolidate political authority and centralize command around the southern government."
 REV_USB_post_kelly_total_commitment: "Total Commitment Doctrine"
 REV_USB_post_kelly_total_commitment_desc: "Commit state institutions and industry to a long conflict posture."
 REV_USB_post_kelly_emergency_arms_i: "Emergency Arms Program I"
 REV_USB_post_kelly_emergency_arms_i_desc: "Accelerate domestic arms production and mobilize industrial supply chains."
 REV_USB_post_kelly_emergency_arms_ii: "Emergency Arms Program II"
 REV_USB_post_kelly_emergency_arms_ii_desc: "Scale military production further to support campaign endurance."
 REV_USB_post_kelly_mobilize_the_base: "Mobilize the Base"
 REV_USB_post_kelly_mobilize_the_base_desc: "Solidify social backing, manpower flow, and war support for the southern state."
 REV_USB_post_kelly_prepare_war_with_usa: "Prepare for War With the USA"
 REV_USB_post_kelly_prepare_war_with_usa_desc: "With Washington distracted and legitimacy contested, we prepare command, logistics, and public posture for direct conflict."
 REV_USB_post_kelly_annex_florida: "Annex Florida and Settle the Issue"
 REV_USB_post_kelly_annex_florida_desc: "Florida's neutrality cannot stand. A direct clash with the USA will follow."
 REV_USB_post_kelly_ethnic_reordering: "Encourage Non-White Emigration"
 REV_USB_post_kelly_ethnic_reordering_desc: "Adopt hardline demographic policy and pressure minority populations to leave the country."
 REV_USB_post_kelly_end_womens_suffrage: "End Women's Suffrage"
 REV_USB_post_kelly_end_womens_suffrage_desc: "Revoke women's voting rights and centralize political authority under nationalist legal doctrine."
 REV_USB_post_kelly_tiered_citizenship_act: "Tiered Citizenship and Voting Rights Act"
 REV_USB_post_kelly_tiered_citizenship_act_desc: "Institute a stratified citizenship regime where political rights are reserved for white men only."
 REV_USB_post_kelly_claim_greenland: "Move on Greenland"
 REV_USB_post_kelly_claim_greenland_desc: "With the former United States gone, we can challenge NATO directly by taking Greenland."
 REV_USB_post_kelly_war_with_canada: "War With Canada"
 REV_USB_post_kelly_war_with_canada_desc: "Northern consolidation requires confrontation with Canada and, by extension, NATO."