l_braz_por:
 LOADING_TIP_0:0 "Mas eu tento não cometer erros. Quero dizer, por que eu tenho que, sabe, me arrepender? Por que tenho que pedir perdão se não estou cometendo erros? - Donald Trump"
 LOADING_TIP_1:0 "Fui salvo por Deus para fazer a América grande novamente - Donald Trump"
 LOADING_TIP_2:0 "Cristãos, saiam e votem, apenas desta vez. Vocês não terão que fazer isso nunca mais. Mais quatro anos... tudo será consertado, ficará tudo bem, vocês não terão que votar nunca mais - Donald Trump"
 LOADING_TIP_3:0 "Eis que entre eles subiu outra ponta pequena... e eis que nesta ponta havia olhos, como olhos de homem, e uma boca que falava grandes coisas. - Livro de Daniel"
 LOADING_TIP_4:0 "E foi-lhe dada uma boca para proferir grandes coisas e blasfêmias... E foi-lhe permitido fazer guerra aos santos - Livro do Apocalipse"
 LOADING_TIP_5:0 "Seja revelado o homem do pecado, o filho da perdição, o qual se opõe, e se levanta contra tudo o que se chama Deus, ou se adora - Paulo, 2 Tessalonicenses"
 LOADING_TIP_6:0 "Ele foi homicida desde o princípio, e não se firmou na verdade, porque não há verdade nele. Quando ele profere mentira, fala do que lhe é próprio, porque é mentiroso, e pai da mentira. - Livro de João"
 LOADING_TIP_7:0 "Falou-lhes, pois, Jesus outra vez, dizendo: Eu sou a luz do mundo; quem me segue não andará em trevas, mas terá a luz da vida. - Jesus, Livro de João"
 LOADING_TIP_8:0 "Mulher, onde estão aqueles teus acusadores? Ninguém te condenou? E ela disse: Ninguém, Senhor. E disse-lhe Jesus: Nem eu também te condeno; vai-te, e não peques mais. - Jesus, Livro de João"
 LOADING_TIP_9:0 "Não julgueis, para que não sejais julgados. Porque com o juízo com que julgardes sereis julgados, e com a medida com que tiverdes medido vos hão de medir a vós. - Jesus, Livro de Mateus"
 LOADING_TIP_10:0 "Não ajunteis tesouros na terra, onde a traça e a ferrugem tudo consomem, e onde os ladrões minam e roubam; mas ajuntai tesouros no céu. - Jesus, Livro de Mateus"
 LOADING_TIP_11:0 "Ninguém pode servir a dois senhores; porque ou há de odiar um e amar o outro, ou se dedicará a um e desprezará o outro. Não podeis servir a Deus e a Mamom. - Jesus, Livro de Mateus"
 LOADING_TIP_12:0 "Acautelai-vos, porém, dos falsos profetas, que vêm até vós vestidos como ovelhas, mas, interiormente, são lobos devoradores. Por seus frutos os conhecereis. - Jesus, Livro de Mateus"
 LOADING_TIP_13:0 "Entrai pela porta estreita; porque larga é a porta, e espaçoso o caminho que conduz à perdição, e muitos são os que entram por ela; e porque estreita é a porta, e apertado o caminho que leva à vida, e poucos há que a encontrem. - Jesus, Livro de Mateus"
 LOADING_TIP_14:0 "Bem-aventurados os mansos, porque eles herdarão a terra... Bem-aventurados os pacificadores, porque eles serão chamados filhos de Deus. - Jesus, Livro de Mateus"
 LOADING_TIP_15:0 "Disse-lhe Jesus: Eu sou o caminho, e a verdade e a vida; ninguém vem ao Pai, senão por mim. - Jesus, Livro de João"
 LOADING_TIP_16:0 "E seguiu-os o terceiro anjo, dizendo com grande voz: Se alguém adorar a besta, e a sua imagem, e receber o sinal na sua testa, ou na sua mão, também este beberá do vinho da ira de Deus, que se deitou, não misturado, no cálice da sua ira; e será atormentado com fogo... - Apocalipse"
 LOADING_TIP_17:0 "E então verão vir o Filho do homem numa nuvem, com poder e grande glória. - Livro de Lucas"
 LOADING_TIP_18:0 "Todo aquele, pois, que escuta estas minhas palavras, e as pratica, assemelhá-lo-ei ao homem prudente, que edificou a sua casa sobre a rocha; e desceu a chuva, e correram rios, e assopraram ventos, e combateram aquela casa, e não caiu, porque estava edificada sobre a rocha. - Jesus, Livro de Mateus"
 LOADING_TIP_19:0 "A antiga serpente, chamada o Diabo, e Satanás, que engana todo o mundo; ele foi precipitado na terra, e os seus anjos foram lançados com ele. - Apocalipse"
 LOADING_TIP_20:0 "E então será revelado o iníquo, a quem o Senhor desfará pelo assopro da sua boca, e aniquilará pelo esplendor da sua vinda. - Paulo, 2 Tessalonicenses"
 LOADING_TIP_21:0 "A esse cuja vinda é... com todo o poder, e sinais e prodígios de mentira, e com todo o engano da injustiça para os que perecem, porque não receberam o amor da verdade para se salvarem. - Paulo, 2 Tessalonicenses"
 LOADING_TIP_22:0 "E por isso Deus lhes enviará a operação do erro, para que creiam a mentira; para que sejam julgados todos os que não creram a verdade, antes tiveram prazer na iniquidade. - Paulo, 2 Tessalonicenses"
 LOADING_TIP_23:0 "E a besta que vi... e a sua boca como a de leão; e o dragão deu-lhe o seu poder, e o seu trono, e grande poderio. E vi uma das suas cabeças como ferida de morte, e a sua chaga mortal foi curada; e toda a terra se maravilhou após a besta. - Apocalipse"
 LOADING_TIP_24:0 "E aquele que estava assentado sobre a nuvem meteu a sua foice à terra, e a terra foi segada. - Apocalipse"
 LOADING_TIP_25:0 "Não dirás falso testemunho contra o teu próximo. - O 9º Mandamento, Êxodo"
 LOADING_TIP_26:0 "A falsa testemunha não ficará impune; e o que profere mentiras perecerá. - Provérbios"
 LOADING_TIP_27:0 "Em esperança da vida eterna, a qual Deus, que não pode mentir, prometeu antes dos tempos dos séculos. - Paulo, Epístola a Tito"
 LOADING_TIP_28:0 "Eu, porém, vos digo: Amai a vossos inimigos, bendizei os que vos maldizem, fazei bem aos que vos odeiam, e orai pelos que vos maltratam e vos perseguem. - Jesus, Livro de Mateus"
 LOADING_TIP_29:0 "Portanto, tudo o que vós quereis que os homens vos façam, fazei-lho também vós. - Jesus, Livro de Mateus"
 LOADING_TIP_30:0 "Em verdade vos digo que quando o fizestes a um destes meus pequeninos irmãos, a mim o fizestes. - Jesus, Livro de Mateus"
 LOADING_TIP_31:0 "Amarás ao Senhor teu Deus de todo o teu coração, e de toda a tua alma, e de todas as tuas forças, e de todo o teu entendimento, e ao teu próximo como a ti mesmo. - Jesus, Livro de Lucas"
 LOADING_TIP_32:0 "Eu gostaria de ser papa. Essa seria minha escolha número 1. - Donald Trump"
 LOADING_TIP_33:0 "Sim, existe uma coisa. Minha própria moralidade. Minha própria mente. É a única coisa que pode me parar. - Donald Trump"
 LOADING_TIP_34:0 "A estrada para o inferno está pavimentada de boas intenções."
 LOADING_TIP_35:0 "Conheço as tuas obras, que nem és frio nem quente; quem dera foras frio ou quente! Assim, porque és morno, e não és frio nem quente, vomitar-te-ei da minha boca. - Apocalipse"
 LOADING_TIP_36:0 "Eu sou a sua voz. Hoje, adiciono: Eu sou o seu guerreiro. Eu sou a sua justiça. E para aqueles que foram injustiçados e traídos, eu sou a sua retribuição - Donald Trump"
 LOADING_TIP_37:0 "Eu oscilo entre pensar que Trump é um 'idiota' cínico como Nixon, que não seria tão ruim assim (e poderia até se provar útil), ou que ele é o Hitler da América - JD Vance"
 LOADING_TIP_38:0 "'Nunca Trump', 'Repreensível', 'desastre moral', 'heroína cultural', 'O Sr. Trump é incapaz de ocupar o cargo mais alto de nossa nação' - JD Vance"
 LOADING_TIP_39:0 "Eu sou o bom Pastor; o bom Pastor dá a sua vida pelas ovelhas. - Jesus, Livro de João"
 LOADING_TIP_40:0 "Eu sou o bom Pastor, e conheço as minhas ovelhas, e das minhas sou conhecido. Assim como o Pai me conhece a mim, também eu conheço o Pai, e dou a minha vida pelas ovelhas. - Jesus, Livro de João"
 LOADING_TIP_41:0 "Como dizes: Rico sou, e estou enriquecido, e de nada tenho falta; e não sabes que és um desgraçado, e miserável, e pobre, e cego, e nu. - Apocalipse"
 LOADING_TIP_42:0 "E vamos falar claramente sobre o perigo aqui. Falsos messias não apenas falham; eles corrompem. Eles ensinam as pessoas a confundir poder com retidão e vitória com virtude. - Paul Mendlowitz sobre Trump"
 LOADING_TIP_43:0 "E houve batalha no céu; Miguel e os seus anjos batalhavam contra o dragão, e batalhavam o dragão e os seus anjos; Mas não prevaleceram, nem mais o seu lugar se achou nos céus. E foi precipitado o grande dragão - Apocalipse"
 LOADING_TIP_44:0 "E olhei, e eis uma nuvem branca, e assentado sobre a nuvem um semelhante ao Filho do homem, que tinha sobre a sua cabeça uma coroa de ouro... E outro anjo... clamando com grande voz ao que estava assentado sobre a nuvem: Lança a tua foice, e sega; a hora de segar te é vinda, porque já a seara da terra está madura. - João de Patmos, Apocalipse"
 LOADING_TIP_45:0 "Índice de Aprovação de Trump em Fev de 2026: Americanos: 39 por cento, Evangélicos: 69 por cento, Judeus Israelenses: 83 por cento, Europeus: 3 por cento"
 LOADING_TIP_46:0 "O Presidente Trump foi ungido por Jesus para acender o fogo de sinalização no Irã para causar o Armagedom e marcar O Seu retorno à Terra - um verdadeiro sargento da USAF, março de 2026."
 LOADING_TIP_47:0 "Mas a hora vem, e agora é, em que os verdadeiros adoradores adorarão o Pai em espírito e em verdade; porque o Pai procura a tais que assim o adorem. Jesus, Livro de João"