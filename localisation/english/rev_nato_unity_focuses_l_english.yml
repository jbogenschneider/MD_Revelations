l_english:
 rev_nato.1.t:0 "Recession Hits [ROOT.GetNameDef]"
 rev_nato.1.d:0 "Due to poor job numbers and stubborn inflation, [ROOT.GetNameDef] has entered a recession. Growth has fallen back to stagnation and the political damage is beginning to show."
 rev_nato.1.a:0 "The economy turns downward"
 REV_BEL_NATO_confidence_vote: "Confidence Vote"
 REV_BEL_NATO_confidence_vote_desc: "Public confidence has slipped badly. A confidence vote can reset the political balance and restore domestic order."
 REV_BEL_NATO_build_national_unity: "Build National Unity"
 REV_BEL_NATO_build_national_unity_desc: "With the government stabilized, we can rebuild a broader sense of unity and purpose."
 REV_BEL_NATO_reinvigorate_the_economy: "Celebrate Reforms"
 REV_BEL_NATO_reinvigorate_the_economy_desc: "There's always a positive and a negative in the economy lets encourage a media cycle on the positive numbers."
 REV_BEL_NATO_restore_business_confidence: "Restore Business Confidence"
 REV_BEL_NATO_restore_business_confidence_desc: "May need to cut back on more tariffs and regulate AI some to give companies confidence to hire again."
 REV_BEL_NATO_regulate_ai: "Regulate AI"
 REV_BEL_NATO_regulate_ai_desc: "AI presents an opportunity to tax the calculations, which will bring in government revenue and discourage wasteful use of AI. Our tech buddies will not like this, but they will just pass the costs along and we need the revenue."
 REV_BEL_NATO_patriotic_unity: "Patriotic Unity"
 REV_BEL_NATO_patriotic_unity_desc: "War sharpens national resolve. We will rally the country behind the flag and steady the home front."
