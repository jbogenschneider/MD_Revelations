l_english:
 LOADING_TIP_0: "But I try not to make mistakes. I mean, why do I have to, you know, repent? Why do I have to ask for forgiveness if you're not making mistakes? - Donald Trump"
 LOADING_TIP_1: "For God so loved the world that he gave his only Son, that whoever believes in him should not perish but have eternal life. - Jesus, Book of John"
 LOADING_TIP_2: "Christians, get out and vote, just this time. You won't have to do it anymore. Four more years... it will be fixed, it will be fine, you won't have to vote anymore - Donald Trump"
 LOADING_TIP_3: "There came up among them another little horn, in this horn were eyes like the eyes of man, and a mouth speaking great things. - Book of Daniel"
 LOADING_TIP_4: "And there was given unto him a mouth speaking great things and blasphemies...And it was given unto him to make war with the saints - Book of Revelations"
 LOADING_TIP_5: "the man of lawlessness is revealed, the son of perdition, who opposes and exalts himself against every so-called god or object of worship - Paul, 2 Thessalonians"
 LOADING_TIP_6: "He was a murderer from the beginning, and has nothing to do with the truth, because there is no truth in him. When he lies, he speaks according to his own nature, for he is a liar and the father of lies. - Book of John"
 LOADING_TIP_7: "Again Jesus spoke to them, saying, I am the light of the world; he who follows me will not walk in darkness, but will have the light of life. - Jesus, Book of John"
 LOADING_TIP_8: "Woman, where are they? Has no one condemned you? She said, No one, Lord. And Jesus said, Neither do I condemn you; go, and do not sin again. - Jesus, Book of John"
 LOADING_TIP_9: "Judge not, that you be not judged. For with the judgment you pronounce you will be judged, and the measure you give will be the measure you get. - Jesus, Book of John"
 LOADING_TIP_10: "Do not lay up for yourselves treasures on earth, where moth and rust consume and where thieves break in and steal, but lay up for yourselves treasures in heaven. - Jesus, Book of Matthew"
 LOADING_TIP_11: "No one can serve two masters; for either he will hate the one and love the other, or he will be devoted to the one and despise the other. You cannot serve God and mammon. - Jesus, Book of Matthew"
 LOADING_TIP_12: "Beware of false prophets, who come to you in sheep's clothing but inwardly are ravenous wolves. You will know them by their fruits. - Jesus, Book of Matthew"
 LOADING_TIP_13: "Enter by the narrow gate; for the gate is wide and the way is easy, that leads to destruction, and those who enter by it are many. For the gate is narrow and the way is hard, that leads to life, and those who find it are few. - Jesus, Book of Matthew"
 LOADING_TIP_14: "Blessed are the meek, for they shall inherit the earth...Blessed are the peacemakers, for they shall be called sons of God. - Jesus, Book of Matthew"
 LOADING_TIP_15: "Jesus said to him, I am the way, and the truth, and the life; no one comes to the Father, but by me. - Jesus, Book of John"
 LOADING_TIP_16: "And another angel...saying with a loud voice, If any one worships the beast and its image, and receives a mark on his forehead or on his hand, he also shall drink the wine of God's wrath, poured unmixed into the cup of his anger, and he shall be tormented with fire... - Revelations"
 LOADING_TIP_17: "And then they will see the Son of man coming in a cloud with power and great glory. - Book of Luke"
 LOADING_TIP_18: "Every one then who hears these words of mine and does them will be like a wise man who built his house upon the rock; and the rain fell, and the floods came, and the winds blew and beat upon that house, but it did not fall, because it had been founded on the rock. - Jesus, Book of Matthew"
 LOADING_TIP_19: "That ancient serpent, who is called the Devil and Satan, the deceiver of the whole world was thrown down to the earth, and his angels were thrown down with him. - Revelations"
 LOADING_TIP_20: "And then the lawless one will be revealed, and the Lord Jesus will slay him with the breath of his mouth and destroy him by his appearing and his coming. - Paul, 2 Thessalonians"
 LOADING_TIP_21: "The coming of the lawless one...will be proceeded by signs and wonders, and with all wicked deception for those who are to perish, because they refused to love the truth. - Paul, 2 Thessalonians"
 LOADING_TIP_22: "Therefore God allows them to be deceived, to believe what is false, so that all may be condemned who did not believe the truth, but had pleasure in unrighteousness. - Paul, 2 Thessalonians"
 LOADING_TIP_23: "And the beast that I saw...its mouth was like that of a lion. And to it the dragon gave his power and his throne and great authority. One of its heads seemed to have a mortal wound, but its mortal wound was healed, and the whole earth followed the beast with wonder. - Revelations"
 LOADING_TIP_24: "So Jesus who sat upon the cloud swung his sickle on the earth, and the earth was reaped. - Revelations"
 LOADING_TIP_25: "You shall not bear false witness against your neighbor. - The 9th Commandment, Exodus"
 LOADING_TIP_26: "A false witness will not go unpunished, and he who breathes out lies will perish. - Proverbs"
 LOADING_TIP_27: "In hope of eternal life, which God, who never lies, promised before the ages began. - Paul, Letter to Titus"
 LOADING_TIP_28: "But I say to you, Love your enemies and pray for those who persecute you. - Jesus, Book of Matthew"
 LOADING_TIP_29: "In everything, therefore, treat people the same way you want them to treat you. - Jesus, Book of Matthew"
 LOADING_TIP_30: "Truly I say to you, to the extent that you did it for one of the least of these brothers or sisters of Mine, you did it for Me. - Jesus, Book of Matthew"
 LOADING_TIP_31: "You shall love the Lord your God with all your heart, and with all your soul, and with all your strength, and with all your mind; and your neighbor as yourself. - Jesus, Book of Luke"
 LOADING_TIP_32: "I'd like to be pope. That would be my No. 1 choice. - Donald Trump"
 LOADING_TIP_33: "Surely goodness and mercy shall follow me all the days of my life; and I shall dwell in the house of the Lord for ever. - Psalm 23"
 LOADING_TIP_34: "The road to hell is paved with good intentions."
