 LOADING_TIP_40: "I am the good shepherd, and I know My own, and My own know Me, just as the Father knows Me and I know the Father; and I lay down My life for the sheep. - Jesus, Book of John"
 LOADING_TIP_41: "For you say, 'I am rich and affluent and have no need of anything,' and yet do not realize that you are wretched, pitiable, poor, blind, and naked. - Revelations"
 LOADING_TIP_42: "And let us talk plainly about the danger here. False messiahs do not only fail; they corrupt. They teach people to confuse power with righteousness and victory with virtue. - Paul Mendlowitz about Trump"
 LOADING_TIP_43: "Now war arose in heaven, Michael and his angels fighting against the dragon; and the dragon and his angels fought, but they were defeated and there was no longer any place for them in heaven. And the great dragon was thrown down - Revelations"
 LOADING_TIP_44: "Then I saw a white cloud, and seated on the cloud one like a son of man, with a golden crown on his head...And another angel...calling with a loud voice to him, apply your sickle, and reap, for the hour to reap has come, for the harvest of the earth is fully ripe. - John of Patmos, Revelations"
 LOADING_TIP_45: "Beloved, do not believe every spirit, but test the spirits to see whether they are of God; for many false prophets have gone out into the world. - Book of John"
