l_english:
 USA_state_of_the_union:0 "Trump's 2nd Term"
 USA_state_of_the_union_desc:0 "It can't be as bad as the first term right?  Let's fast forward through the first year."  
 USA_implement_tariffs:0 "Implement Tariffs"
 USA_implement_tariffs_desc:0 "Place tariffs on almost every country, except Russia."
 USA_help_ukraine:0 "Help Ukraine"
 USA_help_ukraine_desc:0 "Sell weapons to Europe and give Ukraine some long range missiles to pressure Russia to stop sooner."
 USA_pressure_ukraine:0 "Pressure Ukraine"
 USA_pressure_ukraine_desc:0 "Sell weapons to the Europeans but don't give Ukraine anything directly."
 USA_close_the_border:0 "Close the Border"
 USA_close_the_border_desc:0 "Close the border, limit immigration to work visas and only from a select set of countries."
 USA_crush_the_rioters:0 "Arrest any Non-Citizens"
 USA_crush_the_rioters_desc:0 "Antagonize blue cities, round up any non-citizens, use violence if necessary."
 USA_keep_out_of_site:0 "Keep out of Sight"
 USA_keep_out_of_site_desc:0 "Try and arrest only illegals and keep a low profile to not upset independents."
 USA_end_the_chaos:0 "Prepare to Deploy Ice for Midterms"
 USA_end_the_chaos_desc:0 "Prepare to intimidate voters during midterm polling."
 USA_reinvigorate_the_economy:0 "Manipulate Economic Reports"
 USA_reinvigorate_the_economy_desc:0 "Job growth is non-existent and despite tariffs the trade defict it growing. Inflation isn't bad if you average in things nobody can afford.  Just lie about it."
 USA_restore_business_confidence:0 "Restore Business Confidence"
 USA_restore_business_confidence_desc:0 "May need to cut back on more tariffs and regulate AI some to give companies confidence to hire again."
 USA_regulate_ai:0 "Regulate AI"
 USA_regulate_ai_desc:0 "AI presents an opportunity to tax the calculations, which will bring in government revenue and discourage wasteful use of AI. Our tech buddies will not like this, but they will just pass the costs along and we need the revenue."
 USA_fire_the_fed_chair:0 "Fire the Fed Chair"
 USA_fire_the_fed_chair_desc:0 "The Fed has always been independent of the executive branch and that has served the USA well for decades but we've got things to do, we need the Treasury Secretary to also be the Fed Chair."
 USA_rock_bottom_interest_rates:0 "Rock Bottom Interest Rates"
 USA_rock_bottom_interest_rates_desc:0 "Low interest rates stimulate growth because the wealthy have no reason to sit on their money, especially because inflation tends to follow."
 USA_punish_dollar_avoidance:0 "Punish Dollar Avoidance"
 USA_punish_dollar_avoidance_desc:0 "Many attempts by the Chinese, Europeans, Russia, and Iran to break our grip as the world currency, especially for oil, have to stop now. We will impose a 5% transaction tax any time they exchange out of dollars, and give banks and exchanges a 2% cut to keep the system enforced."
 USA_tax_non_dollar_us_assets:0 "Tax Non-Dollar U.S. Assets"
 USA_tax_non_dollar_us_assets_desc:0 "Now tax buying U.S. stocks or bonds in anything other than dollars, but keep the exchange fee small unless it is out of U.S. dollars, in which case it becomes much higher. This scheme helps the United States somewhat, but at the annoyance of the world. It does move the world closer to dollar dominance, at least in business."
 USA_soloman:0 "SOLOMON"
 USA_soloman_desc:0 "The U.S. financial strong-arming worked even better than intended. The Europeans, Chinese, Japanese, and Arabs are so annoyed by our system that they are willing to cave in and give us something better. The central bank has come up with a successor to SWIFT with all banks in the world ready to sign on, and its new name will be SOLOMON, after the old king's love of gold. Everything will be simpler now. Everything will be exchanged in dollars and the U.S. Fed will get a small but lucrative percent of the money."
 USA_solomoney:0 "SOLOMoney"
 USA_solomoney_desc:0 "Now that we have the world payment exchange system at the bank level there is no reason not to benefit financially from it for all transactions. Credit cards and all the individual banks can use the system for a small transaction fee, smaller than their current system. They still get their cut and the U.S. Fed does too. We will be able to lower taxes and the world will pay for it."
 USA_solomoney_cashless:0 "SOLOMoney Cashless"
 USA_solomoney_cashless_desc:0 "Most transactions are already cashless, but now that the Fed makes money every time someone spends money like a worldwide sales tax, cash transactions are no longer something we should allow. We are going to do away with cash.  People can still use their credit cards, but in person a retinal scan or better a fingerprint with chip can be used.  That little chip in your CC, that's now microscopic and can go right under your skin.  You'll need to use it, cash is going away."
 USA_stimulate_the_economy:0 "Big Beautiful Bill"
 USA_stimulate_the_economy_desc:0 "Super fund ICE as a potential private army."
 USA_double_down_tariffs:0 "Double Down on Tariffs"
 USA_double_down_tariffs_desc:0 "Even though you the tariffs are illegal you can try and ignore the courts."
 USA_develop_gaza:0 "Develop Gaza"
 USA_develop_gaza_desc:0 "Trump's Peace Board, together with Israel announce that a new Temple for all Religions of the God of Abraham will be built with money from the Board of Peace members.  Most Christians, Jews and Muslims are horrified, Trump doesn't get it."
 USA_blame_canada:0 "Blame Canada and the Democrats"
 USA_blame_canada_desc:0 "Blame Canada and the Democrats of conspiring to fix the 2028 election."
 USA_unify_the_military:0 "Purge the Military"
 USA_unify_the_military_desc:0 "Get a complete list of who might not be loyal and if they can be bribed do it otherwise show them the door."
 USA_unify_the_military_tt:0 "You purge/realign parts of the military: gain 2 extra Civil War division positions for the Free States of America when the civil war split happens, but lose §Y100,000§! manpower immediately."
 USA_fire_the_fed_chair_tt:0 "$MODIFIER_STABILITY_FACTOR$: §R-5.00%§!\n$USA_treasury_plus_100_tt$\n$USA_debt_plus_80_tt$"
 USA_regulate_ai_tt:0 "Gain national spirit §YAI Regulation§!, which grants:\n$offices_worker_requirement_modifier$: §G-5.00%§!\n$corporate_tax_income_multiplier_modifier$: §G+2.00%§!"
 USA_regulate_ai_idea:0 "AI Regulation"
 USA_regulate_ai_idea_desc:0 "The government is taxing AI-heavy computation to raise revenue and push firms away from wasteful uses. Office employment falls modestly while corporate tax receipts improve without raising the headline corporate tax rate."
 USA_rock_bottom_interest_rates_tt:0 "Increase the current economy growth level by §Y1 step§!:\n§YRecession§! -> §YStagnation§!\n§YStagnation§! -> §YStable Growth§!\n§YStable Growth§! -> §YFast Growth§!\n§YFast Growth§! -> §YEconomic Boom§!"
 USA_punish_dollar_avoidance_tt:0 "Gain national spirit §YPunish Dollar Avoidance§!.\n$USA_treasury_plus_10_weekly_peace_bonus_tt$"
 USA_tax_non_dollar_us_assets_tt:0 "$USA_debt_minus_1000_tt$"
 USA_soloman_tt:0 "Replace national spirit §YPunish Dollar Avoidance§! with §YSOLOMON§!.\n$USA_treasury_plus_15_weekly_peace_bonus_tt$"
 USA_solomoney_tt:0 "Gain national spirit §YSOLOMoney§!.\n$USA_treasury_plus_5_weekly_peace_bonus_tt$"
 USA_solomoney_cashless_tt:0 "Gain national spirit §YSOLOMoney Cashless§!.\n$MODIFIER_STABILITY_FACTOR$: §R-5.00%§!\n$USA_treasury_plus_5_weekly_peace_bonus_tt$"
 USA_punish_dollar_avoidance_idea:0 "Punish Dollar Avoidance"
 USA_punish_dollar_avoidance_idea_desc:0 "The world has been trying, unsuccessfully to move away from the dollar, especially for energy, that has to stop today.  The United States will taxing tax the move out of dollars, with banks and exchanges taking a cut to enforce compliance.\n\n§GWeekly Treasury: +10§!\n§YWeekly Treasury while at war with Germany or Canada: +5§!"
 USA_soloman_idea:0 "SOLOMON"
 USA_soloman_idea_desc:0 "A successor to SWIFT has pulled global banking even deeper into dollar settlement. The Federal Reserve now skims a small but lucrative share of the flow, replacing the earlier dollar-avoidance regime with a broader system.\n\n§GWeekly Treasury: +15§!\n§YWeekly Treasury while at war with Germany or Canada: +10§!"
 USA_solomoney_idea:0 "SOLOMoney"
 USA_solomoney_idea_desc:0 "With global settlement and retail banking both flowing through U.S.-favored rails, the Federal Reserve now takes an additional cut on worldwide transactions.\n\n§GWeekly Treasury: +5§!\n§YWeekly Treasury while at war with Germany or Canada: +3§!"
 USA_solomoney_cashless_idea:0 "SOLOMoney Cashless"
 USA_solomoney_cashless_idea_desc:0 "Cash has been phased out in favor of biometric and card-based transactions that run through the new global payment rails. The system imposes a social cost at home, but it also gives the Federal Reserve an additional revenue stream embedded in daily life.\n\n§RStability: -5.00%§!\n§GWeekly Treasury: +5§!\n§YWeekly Treasury while at war with Germany or Canada: +3§!"
 USA_raise_loyalist_formations:0 "Raise Loyalist Formations"
 USA_raise_loyalist_formations_desc:0 "Using money left over from Iran stand up a picked and personally loyal armored detachment and special forces brigade and base them nearby the capital, we may need them later."
 USA_border_patrol_agents_to_usb_tt:0 "All Border Patrol Agent divisions will join the Free States of America if the civil war starts."
 USA_demand_greenland:0 "Demand Greenland"
 USA_demand_greenland_desc:0 "Greenland is too important to leave in European hands. We will break with NATO, seize the island, and force the alliance to deal with the consequences."
 USA_ignore_greenland:0 "Stop Talking about Greenland"
 USA_ignore_greenland_desc:0 "I guess it isn't worth it to antagonize Europe over that icy rock, they tell me it's not really that big."
 NATO_Betrayed:0 "NATO Betrayed"
 NATO_Betrayed_desc:0 "Washington abandoned alliance discipline for naked territorial expansion. The remaining NATO members are rearming in anger and preparing to carry the burden without the United States."
 USA_Idea_Bad_Debt2:0 "Bad Debt"
 USA_Idea_Bad_Debt2_desc:0 "Now that the United States is at war, largely with countries that used to buy its bonds, Washington has difficulty raising cash. While this idea is active, the USA loses §R7 treasury§! each week."
 USA_by_force:0 "Take Greenland By Force"
 USA_by_force_desc:0 "We don't need NATO, take Greenland now.  Europe won't do anything about it."
 USA_invoke_the_insurrection_act:0 "Invoke The Insurrection Act"
 USA_invoke_the_insurrection_act_desc:0 "The protest against the arresting of elected lawmakers was enormous so it gave Trump the opportunity to invoke the Insurrection Act.  This time he used overwhelming force and proactively started arresting known enemies, no trial, straight to jail. Their wasn't enough people ready to fight so that was the end of American Democracy."
 USA_sweep_midterms:0 "Sweep the Midterms"
 USA_sweep_midterms_desc:0 "The Democrats have swept the midterm elections with a sizable lead in the House and just enough in the Senate to have a majority.  Not enough to remove Trump but maybe he goes too far, even for the Republicans."
 USA_ridin_with_biden:0 "Impeachments"
 USA_ridin_with_biden_desc:0 "House Democrats brought forward a number of charges that would have removed any other president but the Senate Republicans held firm denying removal."
 USA_project_2025:0 "Execute Project 2025"
 USA_project_2025_desc:0 "Execute Order 66, I mean Project 2025.  The Republicans also have control over congress. First thing to do though is get the cabinet and DOJ in place."
 USA_reactivate_mothballed_shipbuilding:0 "Reactivate Mothballed Shipyards"
 USA_reactivate_mothballed_shipbuilding_desc:0 "Pull a first wave of mothballed naval construction back online in Virginia, North Carolina, Florida, Boston, California, and Washington."
 USA_expand_mothballed_shipbuilding:0 "Expand Mothballed Shipyards"
 USA_expand_mothballed_shipbuilding_desc:0 "Spend again to reopen a second wave of idle yard capacity in the same core naval states."
 USA_side_against_trump:0 "Resist Trump in any way Possible"
 USA_side_against_trump_desc:0 "Republicans have control of congress and the executive.  Hopefully the courts can keep him in check."
 USA_engage_the_media:0 "Alternative Media Outlets"
 USA_engage_the_media_desc:0 "Trump and the FCC will try and control the main stream media but the 1st ammendment is on our side."
 USA_the_home_front:0 "The Home Front"
 USA_the_home_front_desc:0 "Trump is highly implicated in the Epstein files, but so what, they won't remove him for that.  The economy and jobs reports are bad too, we need another distraction.  Oil prices are up but so is oil revenue in that case."
 USA_expand_border_patrol_detachments:0 "Expand Border Patrol Detachments"
 USA_expand_border_patrol_detachments_desc:0 "Fund five more Border Patrol formations and pay them out of DHS budget but train them for police action and combat."
 USA_Invade_Cuba:0 "Invade Cuba"
 USA_Invade_Cuba_desc:0 "Invade Cuba, remove it's leader with someone we can deal with and then allow them to have elections if they want."
 USA_instigate_a_conflict_with_china:0 "Instigate a Conflict with China"
 USA_instigate_a_conflict_with_china_desc:0 "We need to have a conflict ready so when the time comes Americans can focus on an external threat rather than become an internal one."
 USA_instigate_a_conflict_with_china_tt:0 "If Trump's 2028 coup path succeeds, a later event will fire to redirect the external war toward §YChina§! instead of Canada."
 USA_ramp_up_secret_arming_of_taiwan:0 "Ramp Up Secret Arming of Taiwan"
 USA_ramp_up_secret_arming_of_taiwan_desc:0 "We can quietly turn Taiwan into a bunker before the shooting starts. When we need a distraction, the truth can come out and Beijing will be outraged and we won't have to wonder when China is going to attack Taiwan any longer."
 USA_ramp_up_secret_arming_of_taiwan_tt:0 "Add §R50§! to §YDebt§! and prepare a covert Taiwan package. If the China war opens later, §Y4 Special Forces Group§! units will spawn in §YTaipei§! under §YUSA§! control."
 USA_build_more_suicide_drones:0 "Build More Suicide Drones"
 USA_build_more_suicide_drones_desc:0 "We are going to need a lot of these. The Pacific fight will reward cheap, expendable strike systems in numbers no peacetime procurement office would ever approve."
 USA_build_more_suicide_drones_tt:0 "Add §Y1000§! units of §YSuicide Drones 2§! to the national stockpile."
 USA_weve_got_that_out_of_our_system:0 "We've Got That Out of Our System"
 USA_weve_got_that_out_of_our_system_desc:0 "We've both lost some ships and got that out of our system. China knows now that Taiwan is an impossible nut to crack. Hopefully we can now get back to business."
 USA_turn_on_canada_after_china:0 "Turn North After China"
 USA_turn_on_canada_after_china_desc:0 "We're at peace with China again but the enemy within is still plotting against me. Time to turn North against the Canadian libs."
 USA_prepare_to_invade_canada:0 "Prepare to Invade Canada"
 USA_prepare_to_invade_canada_desc:0 "We need to have a conflict ready so when the time comes Americans can focus on an external threat rather than become an internal one."
 USA_prepare_to_invade_canada_tt:0 "If Trump's 2028 coup path succeeds, a later event will fire to open the normal external war against §YCanada§!."
 USA_encourage_democrat_elites_to_leave:0 "Encourage Democrat Elites to Leave"
 USA_encourage_democrat_elites_to_leave_desc:0 "The regime can make quiet arrangements for hostile political elites to leave the country, reducing internal pressure while narrowing the opposition's reach."
 USA_restore_bond_market_access:0 "Restore Bond Market Access"
 USA_restore_bond_market_access_desc:0 "With the war over, Washington can begin rebuilding confidence among creditors and financial institutions that once treated American debt as unquestioned paper."
 USA_restore_trade_with_china:0 "Restore Trade with China"
 USA_restore_trade_with_china_desc:0 "The fighting has ended, but the commercial shock remains. If we want markets to normalize and the treasury to recover, we need to unwind the wartime rupture with China."
 USA_invade_mexico:0 "Invade Mexico"
 USA_invade_mexico_desc:0 "Time to close the border forever and put someone in charge we like."
 USA_secure_panama_forever:0 "Secure Panama Forever"
 USA_secure_panama_forever_desc:0 "We must secure the canal for all time. We built it, and we never should have given it up."
 USA_crush_dissent_among_republicans:0 "Crush Dissent among Republicans"
 USA_crush_dissent_among_republicans_desc:0 "Republican elites who still hesitate can be disciplined, intimidated, and stripped of room to maneuver until public unity becomes mandatory."
 USA_raise_corporate_taxes:0 "Raise Corporate Taxes"
 USA_raise_corporate_taxes_desc:0 "Higher corporate taxes are popular now. The business class can absorb the hit, and the public will approve of making them pay more."
 USA_only_friendly_media:0 "Only Friendly Media"
 USA_only_friendly_media_desc:0 "Don't allow any bad news for us. The press will be narrowed down to loyal channels, approved narratives, and personalities who know which side they are on."
 USA_veteran_propaganda:0 "Veteran Propaganda"
 USA_veteran_propaganda_desc:0 "Target veterans with messages about betrayal, national honor, and the duty to stand with the regime in wartime."
 USA_elderly_propaganda:0 "Elderly Propaganda"
 USA_elderly_propaganda_desc:0 "Flood older voters with a simple line: only this government can preserve order, benefits, and safety in a collapsing world."
 USA_worker_propaganda:0 "Worker Propaganda"
 USA_worker_propaganda_desc:0 "Push a message that only the regime protects jobs, wages, and factories from sabotage, migrants, and foreign decline."
 USA_independents_propaganda:0 "Independents Propaganda"
 USA_independents_propaganda_desc:0 "Shape the news diet of independents until neutrality gives way to passive acceptance and then open support."
 USA_find_another_place_to_silence_dissent:0 "Find Another Place to Silence Dissent"
 USA_find_another_place_to_silence_dissent_desc:0 "The regime can always locate another prison, black site, or sealed compound for those who will not fall in line. Completing this focus also unlocks a repeatable operation with the same name."
 USA_find_another_place_to_silence_dissent2:0 "Find Another Place to Silence Dissent"
 USA_find_another_place_to_silence_dissent2_desc:0 "The regime can always locate another prison, black site, or sealed compound for those who will not fall in line. Completing this focus also unlocks a repeatable operation with the same name."
 USA_blockade_cuba:0 "Blockade Cuba"
 USA_blockade_cuba_desc:0 "Blockade Cuba, get ready to remove it's leader with someone we can deal with."
 USA_golf_and_make_videos:0 "Golf and Make Videos"
 USA_golf_and_make_videos_desc:0 "After that war, we need a break. Time to go play golf and oversee the production of more AI videos of dropping shit on protesters."
 USA_visit_gaza_and_israel:0 "Visit Gaza and Israel"
 USA_visit_gaza_and_israel_desc:0 "The President flies in with Middle East money and a lot of bravado, promising to rebuild Gaza through the Board of Peace."
 USA_rally_southerners:0 "Rally Southerners"
 USA_rally_southerners_desc:0 "Tell Southern voters that their way of life is under direct threat from the war and that only total victory can preserve it."
 USA_rally_rural_and_west:0 "Rally Rural and West Voters"
 USA_rally_rural_and_west_desc:0 "Frame the conflict as a fight against socialists and use that message to harden support across rural counties and the Mountain West."
 USA_rally_christians:0 "Rally Christian Nationalists"
 USA_rally_christians_desc:0 "Cast the war as a struggle against liberals and pluralists, urging churches and religious networks to stand behind the government."
 USA_russian_volunteers:0 "Russian Volunteers"
 USA_russian_volunteers_desc:0 "Russian volunteers are willing to fight alongside us so long as this war stays focused on Germany or Canada and does not widen into a direct showdown with China or Russia."
 USA_treasury_plus_100_tt:0 "Gain §G+100§! treasury balance."
 USA_treasury_plus_50_tt:0 "Gain §G+50§! treasury balance."
 USA_treasury_plus_20_tt:0 "Gain §G+20§! treasury balance."
 USA_debt_plus_80_tt:0 "Increase debt by §R+80§!."
 USA_debt_minus_1000_tt:0 "Reduce debt by §G-1000§!."
 USA_treasury_plus_10_weekly_peace_bonus_tt:0 "While active: gain §G+10§! treasury balance each week, or §Y+5§! if at war with §YGermany§! or §YCanada§!."
 USA_treasury_plus_15_weekly_peace_bonus_tt:0 "While active: gain §G+15§! treasury balance each week, or §Y+10§! if at war with §YGermany§! or §YCanada§!."
 USA_treasury_plus_5_weekly_peace_bonus_tt:0 "While active: gain §G+5§! treasury balance each week, or §Y+3§! if at war with §YGermany§! or §YCanada§!."
 USA_treasury_plus_20_weekly_peace_bonus_tt:0 "While active: gain §G+20§! treasury balance each week, or §Y+10§! if at war with §YGermany§! or §YCanada§!."
 USA_treasury_plus_25_weekly_peace_bonus_tt:0 "While active: gain §G+25§! treasury balance each week, or §Y+13§! if at war with §YGermany§! or §YCanada§!."
 USA_debt_plus_100_tt:0 "Increase debt by §R+100§!."
 USA_treasury_minus_20_tt:0 "Spend §R-20§! treasury balance."
 USA_treasury_minus_10_tt:0 "Spend §R-10§! treasury balance."
 USA_treasury_minus_7_weekly_tt:0 "While active: lose §R-7§! treasury balance each week."
 USA_treasury_minus_8_weekly_tt:0 "While active: lose §R-8§! treasury balance each week."
 USA_treasury_minus_100_tt:0 "Spend §R-100§! treasury balance."
 USA_treasury_minus_50_tt:0 "Spend §R-50§! treasury balance."
 USA_China_War_Idea:0 "China War Dislocation"
 USA_China_War_Idea_desc:0 "War with China has disrupted finance, shipping, and trade ties across the Pacific. Until relations normalize, the fiscal strain will linger.\n\n§RWeekly Treasury: -8§!"
 USA_trade_embargo:0 "U.S. Trade Embargo"
 USA_trade_embargo_desc:0 "The war with the United States has sharply disrupted trade channels and financing conditions.\n\n§RWeekly Treasury: -8§!"
 USA_Nobody_to_Borrow_From:0 "Nobody to Borrow From"
 USA_Nobody_to_Borrow_From_desc:0 "War and mounting debt have left Washington with vanishing access to willing lenders. If debt reaches §R[?USA_debt_first_loss_threshold|0]§!, some troops will go unpaid and formations may desert or dissolve. If debt reaches §R[?USA_debt_second_loss_threshold|0]§!, more formations will begin to disappear."
 CAL_emergency_formations_los_angeles:0 "Emergency Formations"
 CAL_emergency_formations_los_angeles_desc:0 "Los Angeles still has the people, the vehicles, and the anger. We can turn that into emergency militia formations at once."
 CAL_emergency_formations_seattle:0 "Emergency Formations in Seattle"
 CAL_emergency_formations_seattle_desc:0 "Seattle can still raise armed local formations if we move fast and keep the federal remnants off balance."
 CAL_volunteers_from_mexican_army:0 "Volunteers from Mexican Army"
 CAL_volunteers_from_mexican_army_desc:0 "Sympathetic officers and veterans from Mexico can slip north and stiffen our lines with experienced volunteers."
 CAL_volunteers_from_south_america:0 "Volunteers from South America"
 CAL_volunteers_from_south_america_desc:0 "Networks across South America can deliver another wave of fighters willing to help us hold the Pacific resistance together."
 CAL_volunteers_from_asia:0 "Volunteers from Asia"
 CAL_volunteers_from_asia_desc:0 "Across the Pacific there are veterans and activists ready to join a fight they see as larger than California alone."
 CAL_volunteers_from_eastern_usa:0 "Volunteers from the Eastern USA"
 CAL_volunteers_from_eastern_usa_desc:0 "The eastern states still contain people willing to run the blockade and come west to fight under our banner."
 USA_meet_in_the_middle:0 "Focus only on Special Elections"
 USA_meet_in_the_middle_desc:0 "California is the logical leader to resist Trump given it's economic power and influence."
 CAL_prepare_for_war:0 "Prepare for War"
 CAL_prepare_for_war_desc:0 "California cannot remain outside the coming continental conflict forever. If Germany has rebuilt NATO, Sacramento can prepare the state for war and formally enter the alliance."
 CAL_buy_weapons:0 "Buy Weapons"
 CAL_buy_weapons_desc:0 "California has the money to rapidly purchase airframes, missile stocks, drones, and command systems from aligned suppliers. Infantry arms are already plentiful; what matters now is building a modern strike package."
 CAL_organize_military_leadership:0 "Organize Military Leadership"
 CAL_organize_military_leadership_desc:0 "The state must assemble a credible command structure before it can fight a major war. A new Californian high command will be built around a small group of capable generals."
 USA_fuel_the_machine:0 "Win Back the Main Stream"
 USA_fuel_the_machine_desc:0 "The FCC's attempts to silence opponents has backfired and government propaganda is limited to their usual outlets."
 USA_national_lockdowns:0 "Civil War"
 USA_national_lockdowns_desc:0 "The Impeachment would have lead to JD Vance being President, as that was why some Republicans were willing to go allong with it, but when it was clear that Trump and the whole admin was choosing treason. Hakeem Jeffries was sworn in as the 48th President of the United States.  States and people are aligning for the Next Civil War or will it just be a divorce?"
 USA_abandon_the_anarchists:0 "No Shutdown"
 USA_abandon_the_anarchists_desc:0 "Healthcare subsides are expiring and food programs have been cut, but we can't win so why annoy the American People."
 USA_mingle_with_the_movement:0 "Long Shutdown"
 USA_mingle_with_the_movement_desc:0 "Healthcare subsides are expiring and food programs have been cut, if enough blame is on Republicans then they might cave and help keep the HCA subsidies in tact for millions of Americans."
 USA_flames_of_the_future:0 "Expose the Real Enemy"
 USA_flames_of_the_future_desc:0 "ICE's tactics have been exposed as tyranical.  Militia groups once for Trump are starting to realize, especially based on his gun comments that they might be on the wrong side."
 USA_american_only_oil:0 "Remove Maduro in Venezuela"
 USA_american_only_oil_desc:0 "Lift sanctions on Venezuela and secure new supply lines. Houston gains §Y+16 Oil§!."
 USA_attack_iran:0 "Attack Iran"
 USA_attack_iran_desc:0 "Authorize a major escalation against Iran. This burns §R100B§! and reduces Republican popularity, with no direct immediate gains."
 USA_civil_war_in_iran:0 "Civil War in Iran"
 USA_civil_war_in_iran_desc:0 "Iran has unrest if we spend §R100B§! to destabilize Iran and ignite a civil war between regime-aligned forces and rival military elements. Has to complete before March 15th or will cancel."
USA_democracy_for_iran:0 "Democracy for Iran"
USA_democracy_for_iran_desc:0 "Launch a regime-change war against Iran to force a more favorable government."
USA_offer_per_white_peace_with_hormuz_concessions:0 "Offer White Peace for Hormuz Concessions"
USA_offer_per_white_peace_with_hormuz_concessions_desc:0 "Iran can keep its current regime if it stands down, yields Hormuzgan if it still holds it, and accepts a negotiated end to the war."
USA_negotiated_peace_with_iran:0 "Negotiated Peace with Iran"
USA_negotiated_peace_with_iran_desc:0 "Take the fiscal hit, stand down from direct war, and settle for a managed succession outcome in Tehran."
USA_rush_to_israels_aid:0 "Rush to Israel's Aid"
