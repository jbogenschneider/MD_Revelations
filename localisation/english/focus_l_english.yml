l_english:
 USA_state_of_the_union:0 "Trump's 2nd Term"
 USA_state_of_the_union_desc:0 "It can't be as bad as the first term right?  Let's fast forward through the first year."  
 USA_implement_tariffs:0 "Implement Tariffs"
 USA_implement_tariffs_desc:0 "Place tariffs on almost every country, except Russia."
 USA_help_ukraine:0 "Help Ukraine"
 USA_help_ukraine_desc:0 "Sell weapons to Europe and give Ukraine some long range missiles to pressure Russia to stop sooner."
 USA_pressure_ukraine:0 "Pressure Ukraine"
 USA_pressure_ukraine_desc:0 "Sell weapons to the Europeans but don't give Ukraine anything directly."
 USA_close_the_border:0 "Close the Border"
 USA_close_the_border_desc:0 "Close the border, limit immigration to work visas and only from a select set of countries."
 USA_crush_the_rioters:0 "Arrest any Non-Citizens"
 USA_crush_the_rioters_desc:0 "Antagonize blue cities, round up any non-citizens, use violence if necessary."
 USA_keep_out_of_site:0 "Keep out of Sight"
 USA_keep_out_of_site_desc:0 "Try and arrest only illegals and keep a low profile to not upset independents."
 USA_end_the_chaos:0 "Prepare to Deploy Ice for Midterms"
 USA_end_the_chaos_desc:0 "Prepare to intimidate voters during midterm polling."
 USA_reinvigorate_the_economy:0 "Manipulate Economic Reports"
 USA_reinvigorate_the_economy_desc:0 "Job growth is non-existent and despite tariffs the trade defict it growing. Inflation isn't bad if you average in things nobody can afford.  Just lie about it."
 USA_stimulate_the_economy:0 "Big Beautiful Bill"
 USA_stimulate_the_economy_desc:0 "Super fund ICE as a potential private army."
 USA_double_down_tariffs:0 "Double Down on Tariffs"
 USA_double_down_tariffs_desc:0 "Even though you the tariffs are illegal you can try and ignore the courts."
 USA_develop_gaza:0 "Develop Gaza"
 USA_develop_gaza_desc:0 "Trump's Peace Board, together with Israel announce that a new Temple for all Religions of the God of Abraham will be built with money from the Board of Peace members.  Most Christians, Jews and Muslims are horrified, Trump doesn't get it."
 USA_blame_canada:0 "Blame Canada and the Democrats"
 USA_blame_canada_desc:0 "Blame Canada and the Democrats of conspiring to fix the 2028 election."
 USA_unify_the_military:0 "Purge the Military"
 USA_unify_the_military_desc:0 "Get a complete list of who might not be loyal and if they can be bribed do it otherwise show them the door."
 USA_unify_the_military_tt:0 "You purge/realign parts of the military: gain 2 extra Civil War division positions for the Free States of America when the civil war split happens, but lose §Y100,000§! manpower immediately."
 USA_raise_loyalist_formations:0 "Raise Loyalist Formations"
 USA_raise_loyalist_formations_desc:0 "Using money left over from Iran stand up a picked and personally loyal armored detachment and special forces brigade and base them nearby the capital, we may need them later."
 USA_border_patrol_agents_to_usb_tt:0 "All Border Patrol Agent divisions will join the Free States of America if the civil war starts."
 USA_by_law:0 "Stop Talking about Greenland"
 USA_by_law_desc:0 "I guess it isn't worth it to antagonize Europe over that icy rock, they tell me it's not really that big."
 USA_by_force:0 "Take Greenland By Force"
 USA_by_force_desc:0 "We don't need NATO, take Greenland now.  Europe won't do anything about it."
 USA_invoke_the_insurrection_act:0 "Invoke The Insurrection Act"
 USA_invoke_the_insurrection_act_desc:0 "The protest against the arresting of elected lawmakers was enormous so it gave Trump the opportunity to invoke the Insurrection Act.  This time he used overwhelming force and proactively started arresting known enemies, no trial, straight to jail. Their wasn't enough people ready to fight so that was the end of American Democracy."
 USA_sweep_midterms:0 "Sweep the Midterms"
 USA_sweep_midterms_desc:0 "The Democrats have swept the midterm elections with a sizable lead in the House and just enough in the Senate to have a majority.  Not enough to remove Trump but maybe he goes too far, even for the Republicans."
 USA_ridin_with_biden:0 "Impeachments"
 USA_ridin_with_biden_desc:0 "House Democrats brought forward a number of charges that would have removed any other president but the Senate Republicans held firm denying removal."
 USA_project_2025:0 "Execute Project 2025"
 USA_project_2025_desc:0 "Execute Order 66, I mean Project 2025.  The Republicans also have control over congress. First thing to do though is get the cabinet and DOJ in place."
 USA_reactivate_mothballed_shipbuilding:0 "Reactivate Mothballed Shipyards"
 USA_reactivate_mothballed_shipbuilding_desc:0 "Pull a first wave of mothballed naval construction back online in Virginia, North Carolina, Florida, Boston, California, and Washington."
 USA_expand_mothballed_shipbuilding:0 "Expand Mothballed Shipyards"
 USA_expand_mothballed_shipbuilding_desc:0 "Spend again to reopen a second wave of idle yard capacity in the same core naval states."
 USA_side_against_trump:0 "Resist Trump in any way Possible"
 USA_side_against_trump_desc:0 "Republicans have control of congress and the executive.  Hopefully the courts can keep him in check."
 USA_engage_the_media:0 "Alternative Media Outlets"
 USA_engage_the_media_desc:0 "Trump and the FCC will try and control the main stream media but the 1st ammendment is on our side."
 USA_the_home_front:0 "The Home Front"
 USA_the_home_front_desc:0 "Trump is highly implicated in the Epstein files, but so what, they won't remove him for that.  The economy and jobs reports are bad too, we need another distraction.  Oil prices are up but so is oil revenue in that case."
 USA_expand_border_patrol_detachments:0 "Expand Border Patrol Detachments"
 USA_expand_border_patrol_detachments_desc:0 "Fund five more Border Patrol formations and pay them out of DHS budget but train them for police action and combat."
 USA_Invade_Cuba:0 "Invade Cuba"
 USA_Invade_Cuba_desc:0 "Invade Cuba, remove it's leader with someone we can deal with and then allow them to have elections if they want."
 USA_blockade_cuba:0 "Blockade Cuba"
 USA_blockade_cuba_desc:0 "Blockade Cuba, get ready to remove it's leader with someone we can deal with."
 USA_golf_and_make_videos:0 "Golf and Make Videos"
 USA_golf_and_make_videos_desc:0 "After that war, we need a break. Time to go play golf and oversee the production of more AI videos of dropping shit on protesters."
 USA_visit_gaza_and_israel:0 "Visit Gaza and Israel"
 USA_visit_gaza_and_israel_desc:0 "The President flies in with Middle East money and a lot of bravado, promising to rebuild Gaza through the Board of Peace."
 USA_rally_southerners:0 "Rally Southerners"
 USA_rally_southerners_desc:0 "Tell Southern voters that their way of life is under direct threat from the war and that only total victory can preserve it."
 USA_rally_rural_and_west:0 "Rally Rural and West Voters"
 USA_rally_rural_and_west_desc:0 "Frame the conflict as a fight against socialists and use that message to harden support across rural counties and the Mountain West."
 USA_rally_christians:0 "Rally Christians"
 USA_rally_christians_desc:0 "Cast the war as a struggle against liberals and pluralists, urging churches and religious networks to stand behind the government."
 USA_treasury_plus_100_tt:0 "Gain §G+100§! treasury balance."
 USA_treasury_plus_50_tt:0 "Gain §G+50§! treasury balance."
 USA_treasury_plus_20_tt:0 "Gain §G+20§! treasury balance."
 USA_debt_plus_100_tt:0 "Increase debt by §R+100§!."
 USA_treasury_minus_20_tt:0 "Spend §R-20§! treasury balance."
 USA_treasury_minus_10_tt:0 "Spend §R-10§! treasury balance."
 USA_treasury_minus_100_tt:0 "Spend §R-100§! treasury balance."
 USA_treasury_minus_50_tt:0 "Spend §R-50§! treasury balance."
 USA_meet_in_the_middle:0 "Focus only on Special Elections"
 USA_meet_in_the_middle_desc:0 "California is the logical leader to resist Trump given it's economic power and influence."
 CAL_prepare_for_war:0 "Prepare for War"
 CAL_prepare_for_war_desc:0 "California cannot remain outside the coming continental conflict forever. If Germany has rebuilt NATO, Sacramento can prepare the state for war and formally enter the alliance."
 CAL_buy_weapons:0 "Buy Weapons"
 CAL_buy_weapons_desc:0 "California has the money to rapidly purchase airframes, missile stocks, drones, and command systems from aligned suppliers. Infantry arms are already plentiful; what matters now is building a modern strike package."
 CAL_organize_military_leadership:0 "Organize Military Leadership"
 CAL_organize_military_leadership_desc:0 "The state must assemble a credible command structure before it can fight a major war. A new Californian high command will be built around a small group of capable generals."
 USA_fuel_the_machine:0 "Win Back the Main Stream"
 USA_fuel_the_machine_desc:0 "The FCC's attempts to silence opponents has backfired and government propaganda is limited to their usual outlets."
 USA_national_lockdowns:0 "Civil War"
 USA_national_lockdowns_desc:0 "The Impeachment would have lead to JD Vance being President, as that was why some Republicans were willing to go allong with it, but when it was clear that Trump and the whole admin was choosing treason. Hakeem Jeffries was sworn in as the 48th President of the United States.  States and people are aligning for the Next Civil War or will it just be a divorce?"
 USA_abandon_the_anarchists:0 "No Shutdown"
 USA_abandon_the_anarchists_desc:0 "Healthcare subsides are expiring and food programs have been cut, but we can't win so why annoy the American People."
 USA_mingle_with_the_movement:0 "Long Shutdown"
 USA_mingle_with_the_movement_desc:0 "Healthcare subsides are expiring and food programs have been cut, if enough blame is on Republicans then they might cave and help keep the HCA subsidies in tact for millions of Americans."
 USA_flames_of_the_future:0 "Expose the Real Enemy"
 USA_flames_of_the_future_desc:0 "ICE's tactics have been exposed as tyranical.  Militia groups once for Trump are starting to realize, especially based on his gun comments that they might be on the wrong side."
 USA_american_only_oil:0 "Remove Maduro in Venezuela"
 USA_american_only_oil_desc:0 "Lift sanctions on Venezuela and secure new supply lines. Houston gains §Y+16 Oil§!."
 USA_attack_iran:0 "Attack Iran"
 USA_attack_iran_desc:0 "Authorize a major escalation against Iran. This burns §R100B§! and reduces Republican popularity, with no direct immediate gains."
 USA_civil_war_in_iran:0 "Civil War in Iran"
 USA_civil_war_in_iran_desc:0 "Spend another §R100B§! to destabilize Iran and ignite a civil war between regime-aligned forces and rival military elements."
 USA_democracy_for_iran:0 "Democracy for Iran"
 USA_democracy_for_iran_desc:0 "Launch a regime-change war against Iran to force a more favorable government."
 USA_negotiated_peace_with_iran:0 "Negotiated Peace with Iran"
 USA_negotiated_peace_with_iran_desc:0 "Take the fiscal hit, stand down from direct war, and settle for a managed succession outcome in Tehran."
 USA_lasting_peace:0 "Forget about Greenland"
 USA_lasting_peace_desc:0 "Forget about Greenland for now."
 USA_silence_the_tyrant:0 "Release the Epstein Files"
 USA_silence_the_tyrant_desc:0 "Trump is named 38,000 times and only half of the files have been released.  It won't bring him down but it chips away at his approval rating."
 USA_green_economics:0 "Prepare for Insurection Act"
 USA_green_economics_desc:0 "The easiest way to combat the Insurection act of for Governors and National Guard Comanders to have a collective plan to resist the order."
 USA_the_shadow_presidency:0 "Deny Election Results"
 USA_the_shadow_presidency_desc:0 "Repulicans lost the house but the senate is tied, maybe we can get one more seat to hold on to it."
 USA_underground_armaments:0 "Trial Run of Insurection Act"
 USA_underground_armaments_desc:0 "There was another murder by the hands of ICE agents which lead to protests across the country with numerous arrests.  Trump decided to use the Insurection Act, it was too early and but was surprised that there seemed to be some coordinated resistance.  He pulled it back this time but they'd be better prepared next time."
 USA_fan_the_flames:0 "Ignore the Impeachments"
 USA_fan_the_flames_desc:0 "Congress can waste all their time they want on Epstein and Impeachment, the FBI and DOJ won't touch me and I have enough Republican Senators on my side."
 USA_rally_the_people:0 "Bribe the Base"
 USA_rally_the_people_desc:0 "Prepare a tariff Dividend and another farm bail out."
 USA_reconcile_republicans:0 "Breaking Point"
 USA_reconcile_republicans_desc:0 "We've learned that the only thing that Republican Senators fear is that they could lose the power their position holds.  The idea that only democratic Senators could get removed is starting to feal like fantasy."
 USA_minimalize_militias:0 "Breaking Point"
 USA_minimalize_militias_desc:0 ""
 USA_empower_the_government:0 "Premature Insurection"
 USA_empower_the_government_desc:0 "There was another murder by the hands of ICE agents which lead to protests across the country with numerous arrests.  Trump decided to use the Insurection Act, it was too early and only supported by a tiny percentage of Americans.  Trump was forced to retreat and call of the act after it was clear that the National Guards would not comply."
 USA_executive_order_14066:0 "Snap Impeachment"
 USA_executive_order_14066_desc:0 "Trump attempted to have Democratic representatives arrested, this was not only impeachable but enough to get enough Senators on board.  Trump was Impeached with Removal."
