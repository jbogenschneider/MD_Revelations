l_english:
 USA_state_of_the_union: "Trump's 2nd Term"
 USA_state_of_the_union_desc: "Trump is now president for a second time, we'll see if he actually executes project 2025."
 USA_plan_for_the_worst: "Implement Tarrifs"
 USA_plan_for_the_worst_desc: "Place Tarrifs on just about every country."
 USA_warp_speed: "Sanction Russia"
 USA_warp_speed_desc: "We won't help Ukraine but we will try and get Russia to end the war due to financial stress."
 USA_implement_emergency_measures: "Favor Russia in War with Ukraine"
 USA_implement_emergency_measures_desc: "Pressure Ukraine to cave in to Russian demands."
 USA_back_the_blue: "Close the Border"
 USA_back_the_blue_desc: "Close the border, limit immigration to work visas only."
 USA_crush_the_rioters: "Arrest any Non-Citizens"
 USA_crush_the_rioters_desc: "Antagonize blue cities, round up any non-citizens."
 USA_compromise_with_the_protesters: "Keep out of Sight"
 USA_compromise_with_the_protesters_desc: "Try and arrest only illegals and keep a low profile to not upset independents."
 USA_end_the_chaos: "Prepare to Deploy Ice for Midterms"
 USA_end_the_chaos_desc: "Prepare to intimidate voters during midterm polling."
 USA_reinvigorate_the_economy: "Manipulate Economic Reports"
 USA_reinvigorate_the_economy_desc: "Job growth is non-existent and despite tarrifs the trade defict it growing. Inflation isn't bad if you average in things nobody can afford.  Just lie about it."
 USA_stimulate_the_economy: "Big Beautiful Bill"
 USA_stimulate_the_economy_desc: "Super fund ICE as a potential private army."
 USA_prepare_the_vaccine: "Double Down on Tarrifs"
 USA_prepare_the_vaccine_desc: "Even though you the tarrifs are illegal you can try and ignore the courts."
 USA_assure_security: "Assure Security"
 USA_assure_security_desc: "With the succumbing of the riots to our enforcement of the law, comes our need of reassurance to the public that social order has been restored. Support for refunding the police has skyrocketed after the public saw those rioters for what they were, and now we can safely begin concentrating on what matters the most - the pandemic."
 USA_keep_america_great: "Keep America Great"
 USA_keep_america_great_desc: "Now that Trump has been reelected into power, There should be ways to keep America as great as before no matter how many times the other side says otherwise."
 USA_defend_the_second_amendment: "Court the Rejected"
 USA_defend_the_second_amendment_desc: "Time to go after all the people Trump has already annoyed in the his first year, so everyone, even the 2nd ammendment folks, who would have thought?"
 USA_end_state_lockdowns: "Develope Gaza and New Temple"
 USA_end_state_lockdowns_desc: "Trump's Peace Board, together with Israel  announce that Gaza and a new Temple for all Religions of the God of Abraham will be built with money from the Board of Peace members.  Most Christians, Jews and Muslims are horrified, Trump doesn't get it."
 USA_purge_the_pentagon: "remove this"
 USA_purge_the_pentagon_desc: "There is no greater threat to national security than a divided military staffed with incompetent generals and useless initiatives related to \"Diversity\" and \"Inclusion\". We must prune this institution right now or the long-term consequences will devastate national security and our prestige abroad."
 USA_standing_down_and_standing_by: "Arrest Democrats"
 USA_standing_down_and_standing_by_desc: "Congress will always be a thorn in Trumps side, so it's time to lock up as many as we can."
 USA_unify_the_military: "Purge the Military"
 USA_unify_the_military_desc: "Bribe anyone you can from enlist on up and anyone else that may resist, kick them out now."
 USA_enforce_order: "remove this"
 USA_enforce_order_desc: "From the left and the right and even the center, there are some groups of people who don't really see us as legitimate and will resort to any methods to try and bring us down! We must not let them!"
 USA_by_law: "Stop Talking abou Greenland"
 USA_by_law_desc: "Maybe we'll need NATO at least to buy our arms."
 USA_by_force: "Take Greenland By Force"
 USA_by_force_desc: "We don't need NATO, take Greenland now."
 USA_invoke_the_insurrection_act: "Invoke The Insurrection Act"
 USA_invoke_the_insurrection_act_desc: "The protest against the arresting of elected lawmakers was enormous so it gave Trump the opportunity to invoke the Insurrection Act.  This time he used overwhelming force and proactively started arresting known enemies, no trial, straight to jail. Their wasn't enough people ready to fight so that was the end of American Democracy."
 USA_oppose_the_tyrant: "Sweep the Midterms"
 USA_oppose_the_tyrant_desc: "The Democrats have swept the midterm elections with a sizable lead in the House and just enough in the Senate to have a majority.  Not enough to remove Trump but perhaps if he goes to far some Republicans will join."
 USA_the_true_revolution_begins: "remove this"
 USA_the_true_revolution_begins_desc: "It doesn't matter if its Biden or Trump, they are on the two sides of the same coin, that coin that represents the oppression of the people, notably workers and minorities alike. Now its the time to stand up to both evils as this country descends into further chaos!"
 USA_ridin_with_biden: "Impeachments"
 USA_ridin_with_biden_desc: "House Democrats brought forward a number of charges that would have removed any other president but the Senate Republicans held firm denying removal."
 USA_support_national_socialism: "remove this"
 USA_support_national_socialism_desc: "Time and time again, the Republicans have shown that they are not different to the very Democrats that suverts and denigrate our culture and our heritage. It's time to stand up to the degenerates and traitors that have warped America through globalist rhetoric and cultural marxism."
 USA_the_third_impeachment: "remove this"
 USA_the_third_impeachment_desc: "More Impeachments but the Republicans in Congress aren't yet ready to give up on Trump."
 USA_side_with_trump: "Execute Project 2025"
 USA_side_with_trump_desc: "Full execution of project 2025 and anything else he wants."
 USA_side_against_trump: "Resist Trump in any way Possible"
 USA_side_against_trump_desc: "Republicans have control of congress and the executive.  Hopefully the courts can keep him in check."
 USA_expand_the_cdc: "Organize the Blue States"
 USA_expand_the_cdc_desc: "Blue States can resist the federal government and champion states rights against government overreach."
 USA_engage_the_media: "Alternative Media Outlets"
 USA_engage_the_media_desc: "Trump and the FCC will try and control the main stream media but the 1st ammendment is on our side."
 USA_no_justice_no_peace: "Protest"
 USA_no_justice_no_peace_desc: "Protest often and oppose ICE."
 USA_high_expectations: "Start Early on Mid-Terms"
 USA_high_expectations_desc: "We should do well in the special elections but we should start early on the mid terms as well."
 USA_meet_in_the_middle: "Focus only on Special Elections"
 USA_meet_in_the_middle_desc: "California is the logical leader to resist Trump given it's economic power and influence."
 USA_fuel_the_machine: "Win Back the Main Stream"
 USA_fuel_the_machine_desc: "The FCC's attempts to silence opponents has backfired and government propaganda is limited to their usual outlets."
 USA_national_lockdowns: "Civil War"
 USA_national_lockdowns_desc: "The Impeachment would have lead to JD Vance being President, as that was why some Republicans were willing to go allong with it, but when it was clear that Trump and the whole admin was choosing treason. Hakeem Jeffries was sworn in as the 48th President of the United States.  States and people are aligning for the Next Civil War or will it just be a divorce?"
 USA_abandon_the_anarchists: "No Shutdown"
 USA_abandon_the_anarchists_desc: "Healthcare subsides are expiring and food programs have been cut, but we can't win so why annoy the American People."
 USA_mingle_with_the_movement: "Long Shutdown"
 USA_mingle_with_the_movement_desc: "Healthcare subsides are expiring and food programs have been cut, if enough blame is on Republicans then they might cave and help keep the HCA subsidies in tact for millions of Americans."
 USA_flames_of_the_future: "Expose the Real Enemy"
 USA_flames_of_the_future_desc: "ICE's tactics have been exposed as tyranical.  Militia groups once for Trump are starting to realize, especially based on his gun comments that they might be on the wrong side."
 USA_promise_progress: "remove this"
 USA_promise_progress_desc: "If we want to keep the left wing of the Democrats in line, we'll need to get back to our progressive roots. President Biden will assure these activists that his administration will advance social and economic justice, and hopefully keep them in line for the coming days."
 USA_american_only_oil: "Remove Maduro in Venezuela"
 USA_american_only_oil_desc: "Arrange for access to Venezuelan oil and assets."
 USA_lasting_peace: "Pressure Denmark for Greenland"
 USA_lasting_peace_desc: "Threaten Denmark for Greenland"
 USA_silence_the_tyrant: "Release the Epstein Files"
 USA_silence_the_tyrant_desc: "Trump is named 38,000 times and only half of the files have been released.  It won't bring him down but it chips away at his approval rating."
 USA_green_economics: "Prepare for Insurection Act"
 USA_green_economics_desc: "The easiest way to combat the Insurection act of for Governors and National Guard Comanders to have a collective plan to resist the order."
 USA_the_shadow_presidency: "Deny Election Results"
 USA_the_shadow_presidency_desc: "Repulicans lost the house but the senate is tied, maybe we can get one more seat to hold on to it."
 USA_build_back_better: "remove this"
 USA_build_back_better_desc: "So, with purpose and resolve we turn to the tasks of our time. Sustained by faith. Driven by conviction. And, devoted to one another and to this country we love with all our hearts."
 USA_underground_armaments: "Trial Run of Insurection Act"
 USA_underground_armaments_desc: "There was another murder by the hands of ICE agents which lead to protests across the country with numerous arrests.  Trump decided to use the Insurection Act, it was too early and but was surprised that there seemed to be some coordinated resistance.  He pulled it back this time but they'd be better prepared next time."
 USA_fan_the_flames: "Ignore the Impeachments"
 USA_fan_the_flames_desc: "Congress can waste all their time they want on Epstein and Impeachment, the FBI and DOJ won't touch me and I have enough Republican Senators on my side."
 USA_rally_the_people: "Bribe the Base"
 USA_rally_the_people_desc: "Prepare a Tarrif Dividend and another farm bail out."
 USA_the_fire_rises: "remove this"
 USA_the_fire_rises_desc: "Defeating another Impeachment will allow me to go over the Democrats."
 USA_unifiy_the_democratic_party: "remove this"
 USA_unifiy_the_democratic_party_desc: "The Democratic Party is split through various ideas that might contradict each other, from the Progressives to Liberals, it is important for us to unite in those current dire times."
 USA_reconcile_republicans: "Breaking Point"
 USA_reconcile_republicans_desc: "We've learned that the only thing that Republican Senators fear is that they could lose the power their position holds.  The idea that only democratic Senators could get removed is starting to feal like fantasy."
 USA_minimalize_militias: "Breaking Point"
 USA_minimalize_militias_desc: ""
 USA_address_the_infrastructure: "remove this"
 USA_address_the_infrastructure_desc: "Trump attempted to have Democratic representatives arrested, this was not only impeachable but enough to get enough Senators on board.  Trump was Impeached with Removal."
 USA_expand_lockdowns: "remove this"
 USA_expand_lockdowns_desc: "The easiest way to combat the Insurection act of for Governors and National Guard Comanders to have a collective plan to resist the order."
 USA_mandate_the_mask: "remove this"
 USA_mandate_the_mask_desc: "The public must be reminded that the virus can hit anytime unless they sanitize each time. While the lockdowns would not be as harsh as ever, the public needs to wear masks everytime they go out to eat, shop and tour."
 USA_empower_the_government: "Premature Insurection"
 USA_empower_the_government_desc: "There was another murder by the hands of ICE agents which lead to protests across the country with numerous arrests.  Trump decided to use the Insurection Act, it was too early and only supported by a tiny percentage of Americans.  Trump was forced to retreat and call of the act after it was clear that the National Guards would not comply."
 USA_executive_order_14066: "Snap Impeachment"
 USA_executive_order_14066_desc: "Trump attempted to have Democratic representatives arrested, this was not only impeachable but enough to get enough Senators on board.  Trump was Impeached with Removal."
