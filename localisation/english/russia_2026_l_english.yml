l_english:
 RUSSIA_MARCH_DECISION_2026:0 "Ukraine Rejects Our Terms"
 RUSSIA_MARCH_DECISION_2026_DESC:0 "Ukraine has refused to concede to our demands. If we accept peace on the current lines of contact now, we can likely secure partial sanctions relief, but many at home will see it as a bitter compromise. If we continue the war, we must prepare for a major mobilization within a month."
 RUSSIA_MARCH_DECISION_2026_ACCEPT:0 "Accept Peace on Current Lines and Seek Sanctions Relief"
 RUSSIA_MARCH_DECISION_2026_CONTINUE:0 "Keep Fighting and Prepare Mobilization"

 RUSSIA_MOBILIZATION_2026:0 "General Mobilization"
 RUSSIA_MOBILIZATION_2026_DESC:0 "On April 1, 2026, the Russian Federation announces a large-scale mobilization of 300,000 troops. With sanctions limiting access to foreign credit markets, the state finances the expansion through domestic debt issuance and monetary expansion, adding significant stress to the financial system."

 RUSSIA_BANK_CRISIS_2026:0 "Banking Crisis"
 RUSSIA_BANK_CRISIS_2026_DESC:0 "The mobilization placed enormous strain on an already fragile banking system. Unable to borrow externally due to sanctions, Russia printed money to sustain military spending. Liquidity evaporated, and cascading bank failures triggered a full financial crisis."

 RUSSIA_MOBLIKS_UNPAID_2026:0 "Mobilized Troops Unpaid"
 RUSSIA_MOBLIKS_UNPAID_2026_DESC:0 "With the state unable to sustain payments, mobilized units are going unpaid. Death benefits are withheld and wages delayed indefinitely. Confidence in the ruble collapses, and entire regiments abandon their posts and return home."

 RUSSIA_OLIGARCH_COUNCIL_2026:0 "The Council of National Restoration"
 RUSSIA_OLIGARCH_COUNCIL_2026_DESC:0 "Russian oligarchs, alarmed by rapid financial collapse, coordinated with senior military officials to remove President Putin from office. A provisional Council of National Restoration now governs, promising to stabilize the economy, resume troop payments, and negotiate an end to the war in exchange for sanctions relief."
 RUS_OLIGARCH_COUNCIL_DESC:0 "An interim technocratic and oligarch-led council tasked with economic stabilization and political transition."

 RUSSIA_PEACE_UKRAINE_2026:0 "Peace Agreement with Ukraine"
 RUSSIA_PEACE_UKRAINE_2026_DESC:0 "Following back-channel negotiations, Russia agrees to peace with Ukraine under the current settlement terms. Sanctions relief begins gradually and depends on domestic political stabilization."

 RUSSIA_ELECTION_ANNOUNCED_2026_TITLE:0 "2026 Presidential Election Announced"
 RUSSIA_ELECTION_ANNOUNCED_2026_DESC:0 "Following the post-war transition, the National Stabilization Council announces presidential elections for December."
 RUSSIA_ELECTION_BEGIN:0 "Begin the Election Campaign"

 RUSSIA_ELECTION_DAY_2026_TITLE:0 "The 2026 Presidential Election"
 RUSSIA_ELECTION_DAY_2026_DESC:0 "Russia votes in its first post-war election. The future of the Federation hangs in the balance."
 ELECT_SOKOLOV:0 "Elect Viktor Sokolov - The Deal Maker"
 ELECT_VOLODIN:0 "Elect Sergei Volodin - The Stabilizer"
 ELECT_ORLOV:0 "Elect Dmitri Orlov - Russia First, But Patient"