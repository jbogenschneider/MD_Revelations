l_english:
 RUSSIA_PEACE_DECISION_2026:0 "Ukraine Rejects Our Terms"
 RUSSIA_PEACE_DECISION_2026_DESC:0 "Ukraine has refused to concede to our demands. If we accept peace on the current lines of contact now, we can likely secure partial sanctions relief, but many at home will see it as a bitter compromise. If we continue the war, we must prepare for a major mobilization within a month."
 RUSSIA_PEACE_DECISION_2026_ACCEPT:0 "Accept Peace on Current Lines and Seek Sanctions Relief"
 RUSSIA_PEACE_DECISION_2026_CONTINUE:0 "Keep Fighting and Prepare Mobilization"
 RUSSIA_WEEKLY_PEACE_KRAMATORSK_TITLE:0 "Operational Pause on Russian Terms"
 RUSSIA_WEEKLY_PEACE_KRAMATORSK_DESC:0 "With Kramatorsk secured by Russian forces, Moscow imposes a ceasefire on updated lines and formalizes control of the area."
 RUSSIA_WEEKLY_PEACE_KRAMATORSK_OK:0 "Enforce the Ceasefire"
 RUSSIA_STARLINK_SOCIAL_BLACKOUT_2026:0 "Starlink and Social Media Cut Off"
 RUSSIA_STARLINK_SOCIAL_BLACKOUT_2026_DESC:0 "Frontline communication channels have been lost or severly degraded at a time that Ukraine's drone lines are reaching deeper behind our lines. We are seeing much higher attrition and losing ground in some places."

 RUSSIA_MOBILIZATION_2026:0 "General Mobilization"
 RUSSIA_MOBILIZATION_2026_DESC:0 "On April 1, 2026, the Russian Federation announces a large-scale mobilization of 300,000 troops. With sanctions limiting access to foreign credit markets, the state finances the expansion through domestic debt issuance and monetary expansion, adding significant stress to the financial system."

 RUSSIA_BANK_CRISIS_2026:0 "Banking Crisis"
 RUSSIA_BANK_CRISIS_2026_DESC:0 "The mobilization placed enormous strain on an already fragile banking system. Unable to borrow externally due to sanctions, Russia printed money to sustain military spending. Liquidity evaporated, and cascading bank failures triggered a full financial crisis."

 RUSSIA_MOBLIKS_UNPAID_2026:0 "Mobilized Troops Unpaid"
 RUSSIA_MOBLIKS_UNPAID_2026_DESC:0 "With the state unable to sustain payments, mobilized units are going unpaid. Death benefits are withheld and wages for non contract soldiers delayed indefinitely. Confidence in the ruble collapses, and entire regiments abandon their posts and return home."

 RUSSIA_OLIGARCH_COUNCIL_2026:0 "The Council of National Restoration"
 RUSSIA_OLIGARCH_COUNCIL_2026_DESC:0 "Russian oligarchs, alarmed by rapid financial collapse, coordinated with senior military officials to remove President Putin from office. A provisional Council of National Restoration now governs, promising to stabilize the economy, resume troop payments, and negotiate an end to the war in exchange for sanctions relief."
 RUS_OLIGARCH_COUNCIL_DESC:0 "An interim technocratic and oligarch-led council tasked with economic stabilization and political transition."

 RUSSIA_PEACE_UKRAINE_2026:0 "Peace Agreement with Ukraine"
 RUSSIA_PEACE_UKRAINE_2026_DESC:0 "Following back-channel negotiations, Russia agrees to peace with Ukraine under the current settlement terms. Sanctions relief begins gradually and depends on domestic political stabilization."

 RUSSIA_ELECTION_ANNOUNCED_2026_TITLE:0 "2026 Presidential Election Announced"
 RUSSIA_ELECTION_ANNOUNCED_2026_DESC:0 "Following the post-war transition, the National Stabilization Council announces presidential elections for December."
 RUSSIA_ELECTION_BEGIN:0 "Begin the Election Campaign"

 RUSSIA_ELECTION_DAY_2026_TITLE:0 "The 2026 Presidential Election"
 RUSSIA_ELECTION_DAY_2026_DESC:0 "Russia votes in its first post-war election. The future of the Federation hangs in the balance."
 ELECT_SOKOLOV:0 "Elect Viktor Sokolov - The Deal Maker"
 ELECT_VOLODIN:0 "Elect Sergei Volodin - The Stabilizer"
 ELECT_ORLOV:0 "Elect Dmitri Orlov - Russia First, But Patient"

 RUSSIA_FAR_EAST_BREAKAWAY_TITLE:0 "Far Eastern Provinces Break Away"
 RUSSIA_FAR_EAST_BREAKAWAY_DESC:0 "With the ruble in freefall and federal aid absent, governors and local elites in the Far East declare an emergency secession. They seek economic survival and openly discuss a currency and banking pivot toward China."

 CHINA_FAR_EAST_PUPPET_OFFER_TITLE:0 "Far East Protectorate Proposal"
 CHINA_FAR_EAST_PUPPET_OFFER_DESC:0 "The new Far Eastern state asks for economic shelter and strategic backing. Accepting a protectorate arrangement would expand Chinese leverage but sharply worsen relations with Moscow."
 CHINA_FAR_EAST_PUPPET_OFFER_SEND:0 "Offer Protectorate Status"
 CHINA_FAR_EAST_PUPPET_OFFER_HOLD:0 "Do Not Commit"

 FAR_PUPPET_OFFER_TITLE:0 "Chinese Protectorate Offer"
 FAR_PUPPET_OFFER_DESC:0 "China offers immediate financial stabilization and security guarantees in exchange for formal alignment as a protectorate."
 FAR_PUPPET_OFFER_ACCEPT:0 "Accept Chinese Protection"
 FAR_PUPPET_OFFER_REJECT:0 "Remain Independent"

 CHINA_FAR_EAST_PUPPETED_TITLE:0 "China Establishes a Far Eastern Protectorate"
 CHINA_FAR_EAST_PUPPETED_DESC:0 "The Far Eastern Republic has accepted Chinese protection and now enters Beijing's orbit as a formal puppet. Moscow's influence in the Pacific has been dealt another serious blow."
 CHINA_FAR_EAST_PUPPETED_OK:0 "The balance shifts eastward"

 CHINA_RETURNS_ASSETS_TITLE:0 "Ceremonial Return of Strategic Assets"
 CHINA_RETURNS_ASSETS_DESC:0 "To avoid uncontrolled escalation with Moscow, Beijing arranges a ceremonial handover of selected Russian strategic assets and legacy holdings."
 CHINA_RETURNS_ASSETS_OK:0 "Proceed with the Handover"
 RUSSIA_2026_6_ACCEPT_EFFECT_TT:0 "White peace with Ukraine. Sanctions debt block is removed. Stability §R-3.00%§!, War Support §R-5.00%§!."
 RUSSIA_2026_14_EFFECT_TT:0 "Russia takes the Kramatorsk front (State 696), then signs white peace with Ukraine. Stability §R-3.00%§!, War Support §R-5.00%§!."
 RUSSIA_2026_3_EFFECT_TT:0 "All SOV divisions using template 'Moblics' are deleted without manpower refund. Manpower §R-10,000§!, Stability §R-20.00%§!, War Support §R-20.00%§!."
 RUSSIA_2026_4_EFFECT_TT:0 "Putin is removed. Government changes to non-electoral neutrality under Viktor Sokolov. Political Power §G+120§!, Stability §R-5.00%§!, War Support §R-10.00%§!."
 RUSSIA_2026_5_EFFECT_TT:0 "White peace with Ukraine. Occupied states in this branch are returned to UKR. Sanctions flag and sanctions debt idea are cleared. Stability §G+10.00%§!, War Support §R-20.00%§!."
 RUSSIA_2026_12_EFFECT_TT:0 "China performs the handover. If SOV exists, SOV Treasury: §G+50§! and CHI-SOV commercial relations improve."

 RUSSIA_SANCTIONS_BAN_DEBT:0 "Under Sanctions: No External Borrowing"
 RUSSIA_SANCTIONS_BAN_DEBT_desc:0 "International borrowing is blocked while sanctions are active. Weekly deficits cannot be covered by debt and must be financed from existing reserves, taxes, spending cuts, or emergency asset sales."
