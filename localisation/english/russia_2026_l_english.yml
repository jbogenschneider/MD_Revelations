 RUSSIA_ELECTION_ANNOUNCED_2026_DESC:0 "Following the resignation of Putin and the signing of peace, the Russian National Stabilization Council has announced presidential elections for December."

 RUSSIA_ELECTION_DAY_2026_TITLE:0 "The 2026 Presidential Election"
 RUSSIA_ELECTION_DAY_2026_DESC:0 "Russia votes in its first post-war election. The future of the Federation hangs in the balance."

