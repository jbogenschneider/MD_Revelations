l_english:
 REV_NATO_ease_of_business_reforms:0 "Ease of Business Reforms"
 REV_NATO_ease_of_business_reforms_desc:0 "One of the possible approaches to encourage spending and business-making to the [Root.GetAdjective] citizen is to reform the law and economy so that it's easier and more profitable for independent entrepreneurs to make a living."
 REV_NATO_attract_foreign_investors:0 "Attract Foreign Investors"
 REV_NATO_attract_foreign_investors_desc:0 "By loosening business law we can make our land attractive to opportunistic foreign investors who might see a shining star or two right where we are."
 REV_NATO_debt_refactoring:0 "Debt Refactoring"
 REV_NATO_debt_refactoring_desc:0 "Negotiating our loans for the purposes of improving the lives and the effectiveness of our government is never a bad thing."
 REV_NATO_agricultural_district_subsidization:0 "Agricultural District Subsidization"
 REV_NATO_agricultural_district_subsidization_desc:0 "The food problem cannot be ignored. Subsidize our agriculture and make our country self-sufficient in food as much as possible."
 REV_NATO_light_industry_investments:0 "Light Industry Investments"
 REV_NATO_light_industry_investments_desc:0 "Injecting capital into civilian industries as well as the oil complex can help our economy come forward in the toughest of times."
 REV_NATO_mobilize_the_working_class:0 "Mobilize the Working Class"
 REV_NATO_mobilize_the_working_class_desc:0 "Spending more on recruitment centers is one of the surefire ways to make sure we have enough manpower and industrial support to push [Root.GetNameDef] toward victory in the case conflict breaks out."
 REV_NATO_heavy_industry_investments:0 "Heavy Industry Investments"
 REV_NATO_heavy_industry_investments_desc:0 "Injecting capital into the military-industrial complex will make equipment yields higher, making sure all of our troops are well-equipped for battle."
 REV_NATO_refitting_the_military_industry:0 "Refitting the Military Industry"
 REV_NATO_refitting_the_military_industry_desc:0 "We can open new factories in order to make sure our equipment production doesn't fall back."
 REV_NATO_energy_sector:0 "The Energy Sector"
 REV_NATO_energy_sector_desc:0 "To be able to sustain a country, its energy sector must be kept up to date first. We should build both a fossil fuel plant and some renewable energy infrastructure for affordable, reliable energy for the entire region."
 REV_NATO_fossil_powerplant:0 "Fossil Fuel Power Plants"
 REV_NATO_fossil_powerplant_desc:0 "We can focus our energy sector into picking up fossil fuels as THE correct choice, sacrificing output and innovation for cheap and well-studied methods of energy production."
 REV_NATO_improved_energy_cycling:0 "Improved Power Plants"
 REV_NATO_improved_energy_cycling_desc:0 "By making our stance within the energy sector known, more companies and organizations will opt in toward fossil fuel energy production. This also means downtime for renewable energy sources."
 REV_NATO_renewable_retooling:0 "Renewable Retooling"
 REV_NATO_renewable_retooling_desc:0 "We may instead focus our energy sector into picking up alternative, sustainable fuels to obtain great output and low environmental impact by sacrificing reliability and putting up with the greater cost."
 REV_NATO_renewable_infrastructure:0 "Renewable Infrastructure"
 REV_NATO_renewable_infrastructure_desc:0 "Now that the hype for renewable energy has picked up in our nation, we can proceed with the construction of sustainable infrastructure with the financial aid of the investors interested."
 REV_NATO_nuclear_energy_expansions:0 "Nuclear Energy Expansion"
 REV_NATO_nuclear_energy_expansions_desc:0 "The use of nuclear energy is the trend of the future, and we must further develop its utilization in depth."
 REV_NATO_unemployment_program:0 "Unemployment Programs"
 REV_NATO_unemployment_program_desc:0 "Hasty measures may be instated to make sure we can withhold greater unemployment thresholds before the nation begins to suffer. Their implementation may also be a way to modify our welfare and healthcare budget, in the interest of the people."
 REV_NATO_satisfy_the_middle_class:0 "Satisfy the Middle Class"
 REV_NATO_satisfy_the_middle_class_desc:0 "The middle class is perhaps the biggest group of interest in the nation. Consisting mostly of industrial and business conglomerates, we can expect them to be satisfied by expanding urban infrastructure."
 REV_NATO_build_churches:0 "Build Churches"
 REV_NATO_build_churches_desc:0 "If we are to keep the priests and clergy happy, we must also inject some capital into the construction of churches, temples, and other places of praise through the land. That the average citizen will stay more grounded as a side effect is also a benefit."
 REV_NATO_please_the_upper_class:0 "Please the Upper Class"
 REV_NATO_please_the_upper_class_desc:0 "The oligarchy forms a small but important part in any state, with them being the invisible hand behind investments, land acquisitions, and the economy at both a micro and a macro level. Appeasing to them is only natural for us."
 REV_NATO_assure_intellectual_freedoms:0 "Assure Intellectual Freedoms"
 REV_NATO_assure_intellectual_freedoms_desc:0 "Let all intellectuals across [Root.GetNameDef] know that their scientific effort is not only valuable but key to our prosperity and shall be guarded no matter their ideology or allegiance."
 REV_NATO_invest_in_biofuels:0 "Invest in Biofuels"
 REV_NATO_invest_in_biofuels_desc:0 "Alternative energy is the future! ...Or so say the investors. Regardless, we believe in their interests and that they will align with our nation's."
 REV_NATO_import_foreign_automobiles:0 "Import Foreign Automobiles"
 REV_NATO_import_foreign_automobiles_desc:0 "The grass is always greener on the other side of the fence, and the cars are always cleaner on the other side of the border, too. Importing motor vehicles straight from foreign industries will be a great excuse to zip up some government hype for ourselves."
 REV_NATO_create_an_automotive_industry:0 "Create an Automotive Industry"
 REV_NATO_create_an_automotive_industry_desc:0 "Once we've learned all the little secrets of auto-making by those pesky foreigners, we can begin exploiting our own alternatives to stimulate the national industry and please the lower class in the process."
 REV_NATO_build_primary_schools:0 "Build Primary Schools"
 REV_NATO_build_primary_schools_desc:0 "Education - the heart and soul to the populace of any land in the world. Primary education specifically is extremely important to be given access to - as an uneducated child will grow up to be an uneducated adult. Building more primary schooling institutions will let us improve the literacy rates of our country."
 REV_NATO_assure_access_to_education:0 "Assure Access to Education"
 REV_NATO_assure_access_to_education_desc:0 "Education is not just a key need, but a right! We need to make sure that it's provided for - fully - for any and all citizens, at every time. The next generation of intellectuals will be sure to provide us with some backup when it's done."
 REV_NATO_expand_the_universities:0 "Expand the Universities"
 REV_NATO_expand_the_universities_desc:0 "Now that the bases for primary education have been set, we can now invest in higher education, so that geniuses and world-renowned intellectuals may come from [Root.GetNameDef], too."
 REV_NATO_industrial_research_task_forces:0 "Industrial Research Task Forces"
 REV_NATO_industrial_research_task_forces_desc:0 "Our IRTF would be a nation-funded team of researchers dedicated to the observation of the best industrial practices, so that we may implement them in the future."
 REV_NATO_domestic_vehicle_research:0 "Vehicle Proving Grounds"
 REV_NATO_domestic_vehicle_research_desc:0 "In order to have access to the latest military vehicles, we can't simply rely on our strategic partners to provide us vehicles. We must build vehicle proving grounds where we can test and develop domestic armoured vehicles."
 REV_NATO_domestic_naval_research:0 "[ROOT.GetAdjective] Warship Development"
 REV_NATO_domestic_naval_research_desc:0 "Security of our shipping lanes is vital to our economy. If we were to lose access to the naval power of our allies, we would be left stranded. We must create a facility where we can create our own warships."
 REV_NATO_domestic_aircraft_research:0 "Domestic Jet Program"
 REV_NATO_domestic_aircraft_research_desc:0 "Aircraft are some of the most sophisticated machines on the planet, and we don't know how to make them. We must create our own domestic military aircraft to show the world our technological skill."
 REV_NATO_secret_weapons_program:0 "Secret Weapons Research"
 REV_NATO_secret_weapons_program_desc:0 "Nuclear weapons, space program, fusion power and other wonders of science await exploration. This will give us an edge over all our enemies"
