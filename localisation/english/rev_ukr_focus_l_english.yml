l_english:
 REV_UKR_wartime_defense_directorate:0 "Wartime Defense Directorate"
 REV_UKR_wartime_defense_directorate_desc:0 "Centralize wartime procurement and force planning to keep the state resilient under sustained attack."
 REV_UKR_rapid_repair_corps:0 "Rapid Repair Corps"
 REV_UKR_rapid_repair_corps_desc:0 "Organize emergency engineering battalions and accelerate reconstruction methods to recover from strategic bombing damage."
 REV_UKR_national_air_shield:0 "National Air Shield"
 REV_UKR_national_air_shield_desc:0 "Expand integrated air defense coverage and reinforce key urban and industrial sites against missile and bomber strikes."
 REV_UKR_hardened_power_units_alpha:0 "Hardened Modular Power Units I"
 REV_UKR_hardened_power_units_alpha_desc:0 "Deploy the first hardened modular power package in secure interior territory."
 REV_UKR_hardened_power_units_bravo:0 "Hardened Modular Power Units II"
 REV_UKR_hardened_power_units_bravo_desc:0 "Expand distributed hardened power generation to reduce vulnerability to strike campaigns."
 REV_UKR_hardened_power_units_charlie:0 "Hardened Modular Power Units III"
 REV_UKR_hardened_power_units_charlie_desc:0 "Complete the third phase of hardened modular power deployment for national grid resilience."
 REV_UKR_distributed_defense_plants:0 "Distributed Defense Plants"
 REV_UKR_distributed_defense_plants_desc:0 "Expand protected military production in rear-area industrial zones to sustain war output."
 REV_UKR_offshore_suicide_drone_contracts:0 "Offshore Suicide Drone Contracts"
 REV_UKR_offshore_suicide_drone_contracts_desc:0 "Fund allied production contracts abroad to deliver large batches of strike drones for frontline use."
 REV_UKR_offshore_air_defense_contracts:0 "Offshore Air Defense Contracts"
 REV_UKR_offshore_air_defense_contracts_desc:0 "Secure external production lines for air defense launchers and missile stocks."
 REV_UKR_offshore_fighter_pipeline:0 "Offshore Fighter Pipeline"
 REV_UKR_offshore_fighter_pipeline_desc:0 "Prioritize fighter transfer pipelines and external refurbishment to strengthen the interceptor force."
 REV_UKR_counter_bombing_network:0 "Counter-Bombing Network"
 REV_UKR_counter_bombing_network_desc:0 "Layer anti-air assets and radar-linked fire control to degrade enemy strategic bombing effectiveness."
 REV_UKR_emergency_defense_logistics:0 "Emergency Defense Logistics"
 REV_UKR_emergency_defense_logistics_desc:0 "Strengthen rear-area logistics, mobility, and emergency transport capacity for defense operations."
 REV_UKR_sea_drone_attacks:0 "Attack Shadow Fleet"
 REV_UKR_sea_drone_attacks_desc:0 "Russia ships crude and Liquid Natural Gas if our sea drones can reach them we should try and hit the empty ones or disable the full ones."
 REV_UKR_refinery_attacks:0 "Attack Refineries"
 REV_UKR_refinery_attacks_desc:0 "Russian refineries are an easy target, very hard to defend for our long range drones.  Who would have imagined Russia having to import gasoline."
 REV_UKR_emergency_nato_accession:0 "Emergency NATO Accession"
 REV_UKR_emergency_nato_accession_desc:0 "If Russia has expanded the war against NATO while we remain at peace, we will secure immediate alliance entry under emergency terms."
