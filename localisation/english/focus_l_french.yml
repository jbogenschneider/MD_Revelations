﻿l_french:
 USA_state_of_the_union:0 "Le 2ème mandat de Trump"
 USA_state_of_the_union_desc:0 "Ça ne peut pas être aussi pire que le premier mandat, n'est-ce pas ? Passons rapidement la première année."  
 USA_implement_tariffs:0 "Mettre en place des droits de douane"
 USA_implement_tariffs_desc:0 "Imposer des droits de douane à presque tous les pays, sauf la Russie."
 USA_help_ukraine:0 "Aider l'Ukraine"
 USA_help_ukraine_desc:0 "Vendre des armes à l'Europe et donner à l'Ukraine des missiles à longue portée pour faire pression sur la Russie afin qu'elle arrête plus tôt."
 USA_pressure_ukraine:0 "Faire pression sur l'Ukraine"
 USA_pressure_ukraine_desc:0 "Vendre des armes aux Européens mais ne rien donner directement à l'Ukraine."
 USA_close_the_border:0 "Fermer la frontière"
 USA_close_the_border_desc:0 "Fermer la frontière, limiter l'immigration aux visas de travail et uniquement pour un ensemble restreint de pays."
 USA_crush_the_rioters:0 "Arrêter tout non-citoyen"
 USA_crush_the_rioters_desc:0 "Contrarier les villes bleues, rassembler tous les non-citoyens, utiliser la violence si nécessaire."
 USA_keep_out_of_site:0 "Garder hors de vue"
 USA_keep_out_of_site_desc:0 "Essayer de n'arrêter que les illégaux et faire profil bas pour ne pas contrarier les indépendants."
 USA_end_the_chaos:0 "Préparer le déploiement de l'ICE pour les élections de mi-mandat"
 USA_end_the_chaos_desc:0 "Se préparer à intimider les électeurs lors des scrutins de mi-mandat."
 USA_reinvigorate_the_economy:0 "Manipuler les rapports économiques"
 USA_reinvigorate_the_economy_desc:0 "La croissance de l'emploi est inexistante et, malgré les droits de douane, le déficit commercial se creuse. L'inflation n'est pas mauvaise si on fait la moyenne avec des choses que personne ne peut s'offrir. Il suffit de mentir à ce sujet."
 USA_stimulate_the_economy:0 "Grand et beau projet de loi"
 USA_stimulate_the_economy_desc:0 "Super-financer l'ICE comme une potentielle armée privée."
 USA_double_down_tariffs:0 "Redoubler d'efforts sur les droits de douane"
 USA_double_down_tariffs_desc:0 "Même si les droits de douane sont illégaux, vous pouvez essayer d'ignorer les tribunaux."
 USA_develop_gaza:0 "Développer Gaza"
 USA_develop_gaza_desc:0 "Le Conseil de Paix de Trump, en collaboration avec Israël, annonce qu'un nouveau Temple pour toutes les religions du Dieu d'Abraham sera construit avec l'argent des membres du Conseil de Paix. La plupart des chrétiens, juifs et musulmans sont horrifiés, Trump ne comprend pas."
 USA_blame_canada:0 "Blâmer le Canada et les Démocrates"
 USA_blame_canada_desc:0 "Accuser le Canada et les Démocrates de conspirer pour truquer l'élection de 2028."
 USA_unify_the_military:0 "Purger l'armée"
 USA_unify_the_military_desc:0 "Obtenir une liste complète de ceux qui pourraient ne pas être fidèles, et s'ils peuvent être soudoyés, le faire, sinon leur montrer la porte."
 USA_unify_the_military_tt:0 "Vous purgez/réalignez certaines parties de l'armée : vous gagnez 2 divisions supplémentaires pour les États Libres d'Amérique lorsque la guerre civile éclate, mais vous perdez immédiatement §Y100,000§! de main-d'œuvre."
 USA_raise_loyalist_formations:0 "Lever des formations loyalistes"
 USA_raise_loyalist_formations_desc:0 "En utilisant l'argent restant de l'Iran, mettre sur pied un détachement blindé et une brigade de forces spéciales choisis et personnellement fidèles et les baser près de la capitale, nous pourrions en avoir besoin plus tard."
 USA_border_patrol_agents_to_usb_tt:0 "Toutes les divisions d'agents de la patrouille frontalière rejoindront les États Libres d'Amérique si la guerre civile commence."
 USA_demand_greenland:0 "Exiger le Groenland"
 USA_demand_greenland_desc:0 "Le Groenland est trop important pour être laissé entre des mains européennes. Nous allons rompre avec l'OTAN, nous emparer de l'île et forcer l'alliance à en assumer les conséquences."
 USA_ignore_greenland:0 "Arrêter de parler du Groenland"
 USA_ignore_greenland_desc:0 "Je suppose que ça ne vaut pas la peine de contrarier l'Europe pour ce rocher de glace, on me dit qu'il n'est pas vraiment si grand."
 NATO_Betrayed:0 "L'OTAN trahie"
 NATO_Betrayed_desc:0 "Washington a abandonné la discipline de l'alliance pour une expansion territoriale nue. Les autres membres de l'OTAN se réarment avec colère et se préparent à en porter le fardeau sans les États-Unis."
 USA_Idea_Bad_Debt:0 "Mauvaise dette"
 USA_Idea_Bad_Debt_desc:0 "Maintenant que les États-Unis sont en guerre, en grande partie avec des pays qui achetaient leurs obligations, Washington a des difficultés à réunir des fonds. Tant que cette idée est active, les États-Unis perdent §R7 d'équilibre de trésorerie§! par semaine."
 USA_by_force:0 "Prendre le Groenland par la force"
 USA_by_force_desc:0 "Nous n'avons pas besoin de l'OTAN, prenez le Groenland maintenant. L'Europe ne fera rien à ce sujet."
 USA_invoke_the_insurrection_act:0 "Invoquer la loi sur l'insurrection"
 USA_invoke_the_insurrection_act_desc:0 "Les protestations contre l'arrestation de législateurs élus ont été énormes, ce qui a donné à Trump l'opportunité d'invoquer l'Insurrection Act. Cette fois, il a utilisé une force écrasante et a commencé à arrêter de manière proactive les ennemis connus, sans procès, directement en prison. Il n'y avait pas assez de gens prêts à se battre, ce fut donc la fin de la démocratie américaine."
 USA_sweep_midterms:0 "Balayer les élections de mi-mandat"
 USA_sweep_midterms_desc:0 "Les Démocrates ont balayé les élections de mi-mandat avec une avance confortable à la Chambre et juste assez au Sénat pour avoir une majorité. Pas assez pour destituer Trump, mais peut-être ira-t-il trop loin, même pour les Républicains."
 USA_ridin_with_biden:0 "Destitutions"
 USA_ridin_with_biden_desc:0 "Les Démocrates de la Chambre ont présenté un certain nombre de charges qui auraient destitué n'importe quel autre président, mais les Républicains du Sénat ont tenu bon, refusant la destitution."
 USA_project_2025:0 "Exécuter le Projet 2025"
 USA_project_2025_desc:0 "Exécuter l'Ordre 66, je veux dire le Projet 2025. Les Républicains ont également le contrôle du Congrès. La première chose à faire est cependant de mettre en place le cabinet et le ministère de la Justice (DOJ)."
 USA_reactivate_mothballed_shipbuilding:0 "Réactiver les chantiers navals mis en sommeil"
 USA_reactivate_mothballed_shipbuilding_desc:0 "Remettre en ligne une première vague de construction navale mise en sommeil en Virginie, en Caroline du Nord, en Floride, à Boston, en Californie et dans l'État de Washington."
 USA_expand_mothballed_shipbuilding:0 "Agrandir les chantiers navals mis en sommeil"
 USA_expand_mothballed_shipbuilding_desc:0 "Dépenser à nouveau pour rouvrir une deuxième vague de capacité de chantier inactive dans les mêmes États navals centraux."
 USA_side_against_trump:0 "Résister à Trump par tous les moyens possibles"
 USA_side_against_trump_desc:0 "Les Républicains ont le contrôle du Congrès et de l'exécutif. Espérons que les tribunaux pourront le tenir en échec."
 USA_engage_the_media:0 "Médias alternatifs"
 USA_engage_the_media_desc:0 "Trump et la FCC vont essayer de contrôler les grands médias, mais le premier amendement est de notre côté."
 USA_the_home_front:0 "Le front intérieur"
 USA_the_home_front_desc:0 "Trump est fortement impliqué dans les dossiers Epstein, mais et alors, ils ne le destitueront pas pour ça. L'économie et les rapports sur l'emploi sont également mauvais, nous avons besoin d'une autre distraction. Les prix du pétrole sont en hausse, mais les revenus pétroliers le sont aussi dans ce cas."
 USA_expand_border_patrol_detachments:0 "Agrandir les détachements de la patrouille frontalière"
 USA_expand_border_patrol_detachments_desc:0 "Financer cinq autres formations de la patrouille frontalière et les payer sur le budget du DHS, mais les entraîner pour des actions policières et le combat."
 USA_Invade_Cuba:0 "Envahir Cuba"
 USA_Invade_Cuba_desc:0 "Envahir Cuba, remplacer son dirigeant par quelqu'un avec qui nous pouvons négocier, puis leur permettre d'organiser des élections s'ils le souhaitent."
 USA_instigate_a_conflict_with_china:0 "Instiguer un conflit avec la Chine"
 USA_instigate_a_conflict_with_china_desc:0 "Nous devons préparer un conflit pour que, le moment venu, les Américains puissent se concentrer sur une menace externe plutôt que de devenir une menace interne."
 USA_instigate_a_conflict_with_china_tt:0 "Si la voie du coup d'État de Trump en 2028 réussit, un événement ultérieur se déclenchera pour réorienter la guerre externe vers la §YChine§! au lieu du Canada."
 USA_ramp_up_secret_arming_of_taiwan:0 "Intensifier l'armement secret de Taïwan"
 USA_ramp_up_secret_arming_of_taiwan_desc:0 "Nous pouvons discrètement transformer Taïwan en bunker avant que les tirs ne commencent. Quand nous aurons besoin d'une distraction, la vérité pourra éclater, Pékin sera outré et nous n'aurons plus à nous demander quand la Chine va attaquer Taïwan."
 USA_ramp_up_secret_arming_of_taiwan_tt:0 "Ajoute §R50§! à la §YDette§! et prépare un plan secret pour Taïwan. Si la guerre avec la Chine éclate plus tard, des unités de §Y4 Groupes de Forces Spéciales§! apparaîtront à §YTaipei§! sous le contrôle des §YUSA§!."
 USA_build_more_suicide_drones:0 "Construire plus de drones kamikazes"
 USA_build_more_suicide_drones_desc:0 "Nous allons en avoir besoin de beaucoup. Le combat dans le Pacifique récompensera les systèmes de frappe bon marché et remplaçables en nombre qu'aucun bureau d'approvisionnement en temps de paix n'approuverait jamais."
 USA_build_more_suicide_drones_tt:0 "Ajoute §Y1000§! unités de §YDrones Kamikazes 2§! au stock national."
 USA_weve_got_that_out_of_our_system:0 "Nous nous en sommes débarrassés"
 USA_weve_got_that_out_of_our_system_desc:0 "Nous avons tous les deux perdu des navires et évacué cette tension. La Chine sait maintenant que Taïwan est une noix impossible à craquer. Espérons que nous pourrons maintenant reprendre les affaires."
 USA_turn_on_canada_after_china:0 "Se tourner vers le Nord après la Chine"
 USA_turn_on_canada_after_china_desc:0 "Nous sommes à nouveau en paix avec la Chine, mais l'ennemi intérieur complote toujours contre moi. Il est temps de se tourner vers le Nord contre les libéraux canadiens."
 USA_prepare_to_invade_canada:0 "Se préparer à envahir le Canada"
 USA_prepare_to_invade_canada_desc:0 "Nous devons préparer un conflit pour que, le moment venu, les Américains puissent se concentrer sur une menace externe plutôt que de devenir une menace interne."
 USA_prepare_to_invade_canada_tt:0 "Si la voie du coup d'État de Trump en 2028 réussit, un événement ultérieur se déclenchera pour ouvrir la guerre externe normale contre le §YCanada§!."
 USA_encourage_democrat_elites_to_leave:0 "Encourager les élites démocrates à partir"
 USA_encourage_democrat_elites_to_leave_desc:0 "Le régime peut prendre des dispositions discrètes pour que les élites politiques hostiles quittent le pays, réduisant ainsi la pression interne tout en restreignant la portée de l'opposition."
 USA_restore_bond_market_access:0 "Restaurer l'accès au marché obligataire"
 USA_restore_bond_market_access_desc:0 "La guerre étant terminée, Washington peut commencer à rétablir la confiance parmi les créanciers et les institutions financières qui traitaient autrefois la dette américaine comme un papier indiscutable."
 USA_restore_trade_with_china:0 "Restaurer le commerce avec la Chine"
 USA_restore_trade_with_china_desc:0 "Les combats ont cessé, mais le choc commercial demeure. Si nous voulons que les marchés se normalisent et que le Trésor se redresse, nous devons dénouer la rupture en temps de guerre avec la Chine."
 USA_invade_mexico:0 "Envahir le Mexique"
 USA_invade_mexico_desc:0 "Il est temps de fermer la frontière pour toujours et de mettre quelqu'un que nous aimons aux commandes."
 USA_secure_panama_forever:0 "Sécuriser le Panama pour toujours"
 USA_secure_panama_forever_desc:0 "Nous devons sécuriser le canal pour l'éternité. Nous l'avons construit, et nous n'aurions jamais dû l'abandonner."
 USA_crush_dissent_among_republicans:0 "Écraser la dissidence parmi les Républicains"
 USA_crush_dissent_among_republicans_desc:0 "Les élites républicaines qui hésitent encore peuvent être disciplinées, intimidées et privées de marge de manœuvre jusqu'à ce que l'unité publique devienne obligatoire."
 USA_raise_corporate_taxes:0 "Augmenter l'impôt sur les sociétés"
 USA_raise_corporate_taxes_desc:0 "Une hausse de l'impôt sur les sociétés est populaire maintenant. La classe des affaires peut absorber le choc, et le public approuvera de les faire payer plus."
 USA_only_friendly_media:0 "Uniquement des médias amicaux"
 USA_only_friendly_media_desc:0 "Ne permettez aucune mauvaise nouvelle pour nous. La presse sera réduite aux chaînes fidèles, aux récits approuvés et aux personnalités qui savent de quel côté elles se trouvent."
 USA_veteran_propaganda:0 "Propagande pour les anciens combattants"
 USA_veteran_propaganda_desc:0 "Cibler les anciens combattants avec des messages sur la trahison, l'honneur national et le devoir de se tenir aux côtés du régime en temps de guerre."
 USA_elderly_propaganda:0 "Propagande pour les personnes âgées"
 USA_elderly_propaganda_desc:0 "Inonder les électeurs plus âgés avec un message simple : seul ce gouvernement peut préserver l'ordre, les avantages sociaux et la sécurité dans un monde qui s'effondre."
 USA_worker_propaganda:0 "Propagande pour les travailleurs"
 USA_worker_propaganda_desc:0 "Pousser un message selon lequel seul le régime protège les emplois, les salaires et les usines contre le sabotage, les migrants et le déclin étranger."
 USA_independents_propaganda:0 "Propagande pour les indépendants"
 USA_independents_propaganda_desc:0 "Façonner le régime d'information des indépendants jusqu'à ce que la neutralité cède la place à une acceptation passive puis à un soutien ouvert."
 USA_find_another_place_to_silence_dissent:0 "Trouver un autre endroit pour faire taire la dissidence"
 USA_find_another_place_to_silence_dissent_desc:0 "Le régime peut toujours trouver une autre prison, un site noir ou un complexe scellé pour ceux qui refusent de rentrer dans le rang. Compléter cette priorité débloque également une opération répétable du même nom."
 USA_find_another_place_to_silence_dissent2:0 "Trouver un autre endroit pour faire taire la dissidence"
 USA_find_another_place_to_silence_dissent2_desc:0 "Le régime peut toujours trouver une autre prison, un site noir ou un complexe scellé pour ceux qui refusent de rentrer dans le rang. Compléter cette priorité débloque également une opération répétable du même nom."
 USA_blockade_cuba:0 "Faire le blocus de Cuba"
 USA_blockade_cuba_desc:0 "Faire le blocus de Cuba, se préparer à remplacer son dirigeant par quelqu'un avec qui nous pouvons négocier."
 USA_golf_and_make_videos:0 "Jouer au golf et faire des vidéos"
 USA_golf_and_make_videos_desc:0 "Après cette guerre, nous avons besoin d'une pause. Il est temps d'aller jouer au golf et de superviser la production de plus de vidéos d'IA de choses tombant sur les manifestants."
 USA_visit_gaza_and_israel:0 "Visiter Gaza et Israël"
 USA_visit_gaza_and_israel_desc:0 "Le président arrive avec l'argent du Moyen-Orient et beaucoup de bravade, promettant de reconstruire Gaza par l'intermédiaire du Conseil de Paix."
 USA_rally_southerners:0 "Rallier les Sudistes"
 USA_rally_southerners_desc:0 "Dire aux électeurs du Sud que leur mode de vie est directement menacé par la guerre et que seule une victoire totale peut le préserver."
 USA_rally_rural_and_west:0 "Rallier les électeurs ruraux et de l'Ouest"
 USA_rally_rural_and_west_desc:0 "Présenter le conflit comme une lutte contre les socialistes et utiliser ce message pour consolider le soutien dans les comtés ruraux et l'Ouest montagneux."
 USA_rally_christians:0 "Rallier les nationalistes chrétiens"
 USA_rally_christians_desc:0 "Présenter la guerre comme une lutte contre les libéraux et les pluralistes, en exhortant les églises et les réseaux religieux à soutenir le gouvernement."
 USA_russian_volunteers:0 "Volontaires russes"
 USA_russian_volunteers_desc:0 "Les volontaires russes sont prêts à combattre à nos côtés tant que cette guerre reste concentrée sur l'Allemagne ou le Canada et ne s'élargit pas en une confrontation directe avec la Chine ou la Russie."
 USA_treasury_plus_100_tt:0 "Gagner §G+100§! d'équilibre de trésorerie."
 USA_treasury_plus_50_tt:0 "Gagner §G+50§! d'équilibre de trésorerie."
 USA_treasury_plus_20_tt:0 "Gagner §G+20§! d'équilibre de trésorerie."
 USA_debt_plus_100_tt:0 "Augmenter la dette de §R+100§!."
 USA_treasury_minus_20_tt:0 "Dépenser §R-20§! d'équilibre de trésorerie."
 USA_treasury_minus_10_tt:0 "Dépenser §R-10§! d'équilibre de trésorerie."
 USA_treasury_minus_7_weekly_tt:0 "Pendant que c'est actif : perdre §R-7§! d'équilibre de trésorerie chaque semaine."
 USA_treasury_minus_8_weekly_tt:0 "Pendant que c'est actif : perdre §R-8§! d'équilibre de trésorerie chaque semaine."
 USA_treasury_minus_100_tt:0 "Dépenser §R-100§! d'équilibre de trésorerie."
 USA_treasury_minus_50_tt:0 "Dépenser §R-50§! d'équilibre de trésorerie."
 USA_Idea_Bad_Debt_desc:0 "Maintenant que les USA sont en guerre, en grande partie avec des pays qui achetaient leurs obligations, les USA ont des difficultés à réunir des fonds.\n\n§RTrésorerie hebdomadaire : -7§!"
 USA_China_War_Idea:0 "Dislocation de la guerre avec la Chine"
 USA_China_War_Idea_desc:0 "La guerre avec la Chine a perturbé les finances, le transport maritime et les liens commerciaux à travers le Pacifique. Tant que les relations ne seront pas normalisées, la pression fiscale persistera.\n\n§RTrésorerie hebdomadaire : -8§!"
 USA_trade_embargo:0 "Embargo commercial américain"
 USA_trade_embargo_desc:0 "La guerre avec les États-Unis a fortement perturbé les circuits commerciaux et les conditions de financement.\n\n§RTrésorerie hebdomadaire : -8§!"
 USA_Nobody_to_Borrow_From:0 "Personne à qui emprunter"
 USA_Nobody_to_Borrow_From_desc:0 "La guerre et l'augmentation de la dette ont laissé Washington avec un accès de plus en plus réduit à des prêteurs consentants. Si la dette atteint §R[?USA_debt_first_loss_threshold|0]§!, certaines troupes ne seront pas payées et des formations pourraient déserter ou se dissoudre. Si la dette atteint §R[?USA_debt_second_loss_threshold|0]§!, d'autres formations commenceront à disparaître."
 CAL_emergency_formations_los_angeles:0 "Formations d'urgence"
 CAL_emergency_formations_los_angeles_desc:0 "Los Angeles a encore des gens, des véhicules et de la colère. Nous pouvons transformer cela en formations de milice d'urgence immédiatement."
 CAL_emergency_formations_seattle:0 "Formations d'urgence à Seattle"
 CAL_emergency_formations_seattle_desc:0 "Seattle peut encore lever des formations locales armées si nous agissons rapidement et gardons les restes fédéraux déséquilibrés."
 CAL_volunteers_from_mexican_army:0 "Volontaires de l'armée mexicaine"
 CAL_volunteers_from_mexican_army_desc:0 "Des officiers compatissants et des vétérans du Mexique peuvent se glisser vers le nord et renforcer nos lignes avec des volontaires expérimentés."
 CAL_volunteers_from_south_america:0 "Volontaires d'Amérique du Sud"
 CAL_volunteers_from_south_america_desc:0 "Les réseaux à travers l'Amérique du Sud peuvent livrer une autre vague de combattants prêts à nous aider à maintenir la résistance du Pacifique unie."
 CAL_volunteers_from_asia:0 "Volontaires d'Asie"
 CAL_volunteers_from_asia_desc:0 "À travers le Pacifique, il y a des vétérans et des activistes prêts à rejoindre un combat qu'ils considèrent comme plus grand que la seule Californie."
 CAL_volunteers_from_eastern_usa:0 "Volontaires de l'Est des USA"
 CAL_volunteers_from_eastern_usa_desc:0 "Les États de l'Est contiennent encore des personnes prêtes à forcer le blocus et à venir à l'Ouest pour combattre sous notre bannière."
 USA_meet_in_the_middle:0 "Se concentrer uniquement sur les élections partielles"
 USA_meet_in_the_middle_desc:0 "La Californie est le leader logique pour résister à Trump compte tenu de sa puissance économique et de son influence."
 CAL_prepare_for_war:0 "Se préparer à la guerre"
 CAL_prepare_for_war_desc:0 "La Californie ne peut pas rester indéfiniment en dehors du conflit continental à venir. Si l'Allemagne a reconstruit l'OTAN, Sacramento peut préparer l'État à la guerre et entrer officiellement dans l'alliance."
 CAL_buy_weapons:0 "Acheter des armes"
 CAL_buy_weapons_desc:0 "La Californie a l'argent pour acheter rapidement des cellules d'aéronefs, des stocks de missiles, des drones et des systèmes de commandement à des fournisseurs alignés. Les armes d'infanterie sont déjà abondantes ; ce qui compte maintenant, c'est de construire un système de frappe moderne."
 CAL_organize_military_leadership:0 "Organiser la direction militaire"
 CAL_organize_military_leadership_desc:0 "L'État doit rassembler une structure de commandement crédible avant de pouvoir mener une guerre majeure. Un nouveau haut commandement californien sera construit autour d'un petit groupe de généraux capables."
 USA_fuel_the_machine:0 "Reconquérir le grand public"
 USA_fuel_the_machine_desc:0 "Les tentatives de la FCC pour faire taire les opposants se sont retournées contre eux et la propagande gouvernementale est limitée à leurs organes de diffusion habituels."
 USA_national_lockdowns:0 "Guerre Civile"
 USA_national_lockdowns_desc:0 "La destitution aurait conduit JD Vance à la présidence, car c'était la raison pour laquelle certains Républicains étaient prêts à l'accepter, mais quand il fut clair que Trump et toute l'administration choisissaient la trahison, Hakeem Jeffries prêta serment en tant que 48e président des États-Unis. Des États et des personnes s'alignent pour la prochaine guerre civile ou s'agira-t-il simplement d'un divorce ?"
 USA_abandon_the_anarchists:0 "Pas de Shutdown"
 USA_abandon_the_anarchists_desc:0 "Les subventions aux soins de santé expirent et les programmes alimentaires ont été réduits, mais nous ne pouvons pas gagner alors pourquoi contrarier le peuple américain."
 USA_mingle_with_the_movement:0 "Long Shutdown"
 USA_mingle_with_the_movement_desc:0 "Les subventions aux soins de santé expirent et les programmes alimentaires ont été réduits, si suffisamment de blâme pèse sur les Républicains, alors ils pourraient céder et aider à garder les subventions de l'ACA intactes pour des millions d'Américains."
 USA_flames_of_the_future:0 "Exposer le véritable ennemi"
 USA_flames_of_the_future_desc:0 "Les tactiques de l'ICE ont été exposées comme tyranniques. Les milices autrefois pour Trump commencent à réaliser, surtout en se basant sur ses commentaires sur les armes, qu'elles pourraient être du mauvais côté."
 USA_american_only_oil:0 "Retirer Maduro au Venezuela"
 USA_american_only_oil_desc:0 "Lever les sanctions contre le Venezuela et sécuriser de nouvelles voies d'approvisionnement. Houston gagne §Y+16 de Pétrole§!."
 USA_attack_iran:0 "Attaquer l'Iran"
 USA_attack_iran_desc:0 "Autoriser une escalade majeure contre l'Iran. Cela brûle §R100B§! et réduit la popularité des Républicains, sans gains immédiats directs."
 USA_civil_war_in_iran:0 "Guerre civile en Iran"
 USA_civil_war_in_iran_desc:0 "L'Iran a des troubles si nous dépensons §R100B§! pour déstabiliser l'Iran et déclencher une guerre civile entre les forces alignées sur le régime et des éléments militaires rivaux. Doit être terminé avant le 15 mars sinon sera annulé."
 USA_democracy_for_iran:0 "Démocratie pour l'Iran"
 USA_democracy_for_iran_desc:0 "Lancer une guerre de changement de régime contre l'Iran pour forcer un gouvernement plus favorable."
 USA_negotiated_peace_with_iran:0 "Paix négociée avec l'Iran"
 USA_negotiated_peace_with_iran_desc:0 "Encaisser le coup fiscal, se retirer d'une guerre directe et se contenter d'une succession gérée à Téhéran."
 USA_lasting_peace:0 "Oublier le Groenland"
 USA_lasting_peace_desc:0 "Oublier le Groenland pour le moment."
 USA_silence_the_tyrant:0 "Publier les dossiers Epstein"
 USA_silence_the_tyrant_desc:0 "Trump est nommé 38 000 fois et seulement la moitié des dossiers ont été publiés. Cela ne le fera pas tomber mais cela écorne sa cote de popularité."
 USA_green_economics:0 "Se préparer à l'Insurrection Act"
 USA_green_economics_desc:0 "La façon la plus simple de combattre l'Insurrection Act est que les gouverneurs et les commandants de la Garde Nationale aient un plan collectif pour résister à l'ordre."
 USA_the_shadow_presidency:0 "Nier les résultats des élections"
 USA_the_shadow_presidency_desc:0 "Les Républicains ont perdu la Chambre mais le Sénat est à égalité, peut-être pouvons-nous obtenir un siège de plus pour le conserver."
 USA_underground_armaments:0 "Essai de l'Insurrection Act"
 USA_underground_armaments_desc:0 "Il y a eu un autre meurtre par des agents de l'ICE qui a conduit à des manifestations à travers le pays avec de nombreuses arrestations. Trump a décidé d'utiliser l'Insurrection Act, c'était trop tôt et il a été surpris de voir qu'il semblait y avoir une résistance coordonnée. Il a reculé cette fois mais ils seraient mieux préparés la prochaine fois."
 USA_fan_the_flames:0 "Ignorer les destitutions"
 USA_fan_the_flames_desc:0 "Le Congrès peut perdre tout son temps sur Epstein et la destitution, le FBI et le DOJ ne me toucheront pas et j'ai suffisamment de sénateurs républicains de mon côté."
 USA_rally_the_people:0 "Corrompre la base"
 USA_rally_the_people_desc:0 "Préparer un dividende douanier et un autre plan de sauvetage agricole."
 USA_reconcile_republicans:0 "Point de rupture"
 USA_reconcile_republicans_desc:0 "Nous avons appris que la seule chose que craignent les sénateurs républicains, c'est de perdre le pouvoir que leur position détient. L'idée que seuls les sénateurs démocrates pourraient être révoqués commence à ressembler à un fantasme."
 USA_minimalize_militias:0 "Point de rupture"
 USA_minimalize_militias_desc:0 ""
 USA_empower_the_government:0 "Insurrection prématurée"
 USA_empower_the_government_desc:0 "Il y a eu un autre meurtre par des agents de l'ICE qui a conduit à des manifestations à travers le pays avec de nombreuses arrestations. Trump a décidé d'utiliser l'Insurrection Act, c'était trop tôt et seulement soutenu par un infime pourcentage d'Américains. Trump a été forcé de battre en retraite et d'annuler l'acte après qu'il soit devenu clair que les Gardes Nationales ne s'y conformeraient pas."
 USA_executive_order_14066:0 "Destitution instantanée"
 USA_executive_order_14066_desc:0 "Trump a tenté de faire arrêter des représentants démocrates, ce qui était non seulement un motif de destitution mais suffisant pour rallier suffisamment de sénateurs. Trump a été destitué et révoqué."
 rev_usa_cw_coup_successful:0 "Trump réussit son coup d'État"