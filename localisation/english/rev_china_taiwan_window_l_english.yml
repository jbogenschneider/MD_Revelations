 rev_chi_tw.1.t: "A Window Over Taiwan"
 rev_chi_tw.1.d: "With the United States consumed by the war against the Free States, Beijing sees a narrow strategic opening. Washington is distracted, command bandwidth is split, and intervention capacity is uncertain. This may be the moment to force the Taiwan issue."
 rev_chi_tw.1.a: "Now is the time. Launch the operation."
 rev_chi_tw.1.b: "Do not escalate."