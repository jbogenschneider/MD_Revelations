 rev_chi_tw.1.t: "A Window Over Taiwan"
 rev_chi_tw.1.d: "With the United States at War with NATO it's unlikely we will meet any resistance if Taiwan refuses our offer for union with the mainland. Beijing sees a narrow strategic opening. Washington and Europe distracted. This may be the moment to force the Taiwan issue."
 rev_chi_tw.1.a: "Now is the time. Launch the operation."
 rev_chi_tw.1.b: "Do not escalate."
 rev_chi_tw.11.t: "Beijing Issues an Ultimatum"
 rev_chi_tw.11.d: "With the United States tied down in a war against NATO, Beijing has decided the strategic window is open. China demands that Taiwan accept subordination as a Chinese puppet immediately or face war within days."
 rev_chi_tw.11.a: "Accept the inevitable"
 rev_chi_tw.11.b: "We will resist"
 rev_chi_tw.20.t: "China Offers a Ceasefire"
 rev_chi_tw.20.d: "Chinese forces now hold every Taiwanese position of consequence. Beijing is offering a ceasefire on simple terms: Taiwan will be annexed into China, and the wider war will end immediately. The Joint Chiefs advise acceptance. Refusal means continuing a war from a collapsing position."
 rev_chi_tw.20.a: "Accept the ceasefire"
 rev_chi_tw.20.b: "Refuse and continue the war"
 rev_chi_tw.30.t: "A White Peace in the Pacific"
 rev_chi_tw.30.d: "After months of fighting, neither side has forced a decisive settlement. The war has stabilized into an expensive stalemate. Washington can now end the conflict on white peace terms, restoring Taiwan's territory regardless of current occupation lines and ending hostilities with China."
 rev_chi_tw.30.a: "End the war on white peace terms"
