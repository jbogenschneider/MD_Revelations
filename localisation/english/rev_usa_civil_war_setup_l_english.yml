l_english:
 rev_usa_cw.1.t:0 "September 2028: Constitutional Rupture"
 rev_usa_cw.1.d:0 "The impeachment crisis has pushed the United States beyond a constitutional breaking point. The federal chain of command fractures, and rival authorities claim legitimacy."
 rev_usa_cw.1.a:0 "Define the Civil War Sides"
 rev_usa_cw.2.t:0 "September 2028: Northern Escalation"
 rev_usa_cw.2.d:0 "After a decision to escalate against Canada, alliance lines harden overnight. Domestic cohesion collapses and competing governments begin to mobilize."
 rev_usa_cw.2.a:0 "Define the Civil War Sides"
 rev_usa_cw.10.t:0 "Canada Plot Allegations"
 rev_usa_cw.10.d:0 "The White House claims Canadian channels are preparing covert weapon shipments to opposition-held blue states. The accusation is used to justify emergency domestic security measures."
 rev_usa_cw.10.a:0 "Issue the Accusation"
 rev_usa_cw.11.t:0 "War Powers and Election Suspension"
 rev_usa_cw.11.d:0 "On September 20, 2028, President Trump announces war against Canada and invokes emergency powers to suspend the federal election schedule. The move fractures the republic and ignites open civil conflict."
 rev_usa_cw.11.a:0 "Invoke Emergency Powers"
 rev_usa_cw.12.t:0 "Impeachment Fallout: Emergency War Decree"
 rev_usa_cw.12.d:0 "Following the impeachment crisis, Washington descends into open confrontation. On September 20, 2028, emergency war powers are invoked, elections are suspended, and the federal split becomes irreversible."
 rev_usa_cw.12.a:0 "The Split Is Final"
