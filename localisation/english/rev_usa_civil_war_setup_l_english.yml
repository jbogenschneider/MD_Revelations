l_english:
 rev_usa_cw.10.t:0 "Canada Plot Allegations"
 rev_usa_cw.10.d:0 "Trump needs to make a decision, JD Vance is set to lose big in the 2028 presidential election.  Trump can either let that happend and retire in January or he can try and stop the elections.  The best idea is to accuse Democrats and Canada with interfering in our elections and then try to arrest democrats including Senator Kelly as well."
 rev_usa_cw.10.a:0 "Issue the Accusation and Invoke the Insurrection Act"
 rev_usa_cw.10.b:0 "Allow the Election, Trump's ready to retire"
 rev_usa_cw.12.t:0 "Washington Blames Canada"
 rev_usa_cw.12.d:0 "The White House has publicly accused Canada of helping Democrats interfere in the 2028 American election. The claim is transparently political, but it signals that Ottawa may now be part of Trump's domestic power struggle."
 rev_usa_cw.12.a:0 "This could turn dangerous very quickly"
 rev_usa_cw.13.t:0 "Washington Turns on Ottawa"
 rev_usa_cw.13.d:0 "The White House has publicly accused Canada of interfering in the American election. Even if the accusation is absurd, it signals that Washington may be preparing a wider confrontation that could pull NATO into crisis."
 rev_usa_cw.13.a:0 "We need to prepare now"
 rev_usa_cw.11.t:0 "Insurrection Act and Snap Impeachment"
 rev_usa_cw.11.d:0 "After the Supreme Court ruling and emergency impeachment push, the Senate votes to remove Trump. Trump who's left Washington DC argues that the Courts didn't have the right to end the Insurrection and so the vote shouldn't have happened.  Nobody seriously believes that, but sides are now being drawn."
 rev_usa_cw.11.a:0 "Let the crisis continue"
 rev_usa_cw.11.b:0 "Arrest the plot and let elections proceed"
 rev_usa_cw.30.t:0 "Supreme Court Rejects Emergency Power Use"
 rev_usa_cw.30.d:0 "On August 29, 2028, the Supreme Court rules the Insurrection Act was used improperly and detained elected officials must be released. Congress immediately advances impeachment articles, with enough Republican defections now expected for removal."
 rev_usa_cw.30.a:0 "Impeachment Moves Forward"
rev_usa_cw.31.t:0 "Final Mobilization Decision"
rev_usa_cw.31.d:0 "Both sides have formed command structures and are preparing to split federal assets. This order executes the territorial split, but combat does not begin yet."
rev_usa_cw.31.a:0 "Finalize the Split"
 rev_usa_cw.310.t:0 "The Last Shot"
 rev_usa_cw.310.d:0 "After three years of consolidating loyalist appointments, Trump now decides whether to seize remaining executive authority or allow constitutional continuity. A successful coup and american democracy is ends; failure returns the republic to normal elections."
 rev_usa_cw.310.a:0 "Trump Coup Successful"
 rev_usa_cw.310.b:0 "Trump Coup Fails"
 rev_usa_cw.313.t:0 "The Decree is in Place"
 rev_usa_cw.313.d:0 "For the past months, quiet purges and promotions identified loyal officers so enough of the military is in his pocket.  Department of Homeland security has an army at ready.  Now with Republicans going along with Impeachment and then with the Supreme court caving in, he knows he can't trust them, and so they must go. Trump now rules by decree and congress is no longer needed."
 rev_usa_cw.313.a:0 "Consolidate the New Regime"
 rev_usa_cw.311.t:0 "Choose Your Side"
rev_usa_cw.311.d:0 "The split of the Union is complete. Now each side can take command. The player may stay with the USA or continue with the Free States."
rev_usa_cw.311.a:0 "Remain with the USA"
rev_usa_cw.311.b:0 "Take Control of the Free States"
rev_usa_cw.312.t:0 "A New Allegiance"
rev_usa_cw.312.d:0 "The player chooses to transfer command to the Free States. The government and cabinet now report from Austin."
rev_usa_cw.312.a:0 "Assume command in the Free States"
rev_usa_cw.32.t:0 "Free States and the November Election"
 rev_usa_cw.32.d:0 "The federal government in Washington wants to know if the Free States will be participating in the November election, or will maintain a separate executive under Trump?"
 rev_usa_cw.32.a:0 "We'll Pass, Trump Is Our President"
 rev_usa_cw.32.b:0 "Yes, We Will Rejoin After the Election"
 rev_usa_cw.20.a:0 "Republicans lose control of Congress"
 rev_usa_cw.21.t:0 "Congress Removes Tariffs"
 rev_usa_cw.21.d:0 "On February 1, 2027, Congress rolls back major tariff measures. Domestic confidence rises, and relations with both Canada and Mexico improve as trade frictions ease."
 rev_usa_cw.21.a:0 "Reopen Trade Channels"
 rev_usa_cw.22.t:0 "2028 Election Field Set"
 rev_usa_cw.22.d:0 "On May 4, 2028, the presidential race is effectively set: JD Vance versus Senator Mark Kelly. Kelly opens with a clear lead in most swing states, and Republican confidence weakens."
 rev_usa_cw.22.a:0 "The Race Is Defined"
 rev_usa_cw.23.t:0 "Election Night: Kelly Wins"
 rev_usa_cw.23.d:0 "On November 10, 2028, major networks and state certifications converge: Senator Mark Kelly has won the presidency with a strong swing-state margin. The transition period begins."
 rev_usa_cw.23.a:0 "A Clear Outcome"
 rev_usa_cw.24.t:0 "January 20, 2029: Inauguration Day"
 rev_usa_cw.24.d:0 "Mark Kelly is sworn in as President on January 20, 2029. The administration takes control with a mandate to stabilize institutions and reset domestic politics."
 rev_usa_cw.24.a:0 "Transfer Executive Power"
 rev_usa_cw.33.t:0 "The Matter of the 'Free States' Secession"
 rev_usa_cw.33.d:0 "The Free States refused to participate in the election, now one in the USA wants to go to war, they can leave if they assume their share of the national debt - 40 percent. If there's war its because of Trump's greed, just like the rest of this mess."
 rev_usa_cw.33.a:0 "We will await their response"
 rev_usa_cw.36.t:0 "Debt Settlement Offer"
 rev_usa_cw.36.d:0 "The reconstructed federal government offers to transfer 40% of unresolved debt obligations to the new Free States bloc as part of a final reconciliation package. Refusing to accept means war; accepting keeps both sides out of open conflict for now."
 rev_usa_cw.36.a:0 "We refuse the 40% debt burden and prepare for war"
 rev_usa_cw.36.b:0 "We accept 40% of the debt and avoid war"
 rev_usa_cw.34.t:0 "April 2029: Carving Up the Union"
 rev_usa_cw.34.d:0 "With separation accepted, borders are redrawn again. USA absorbs the Neutral States and the Pacific fleet holdings, North Carolina returns to Washington, Florida and Georgia form a neutral Florida under DeSantis, and the interior corridor aligns with the Free States of America."
 rev_usa_cw.34.a:0 "Finalize the New Map"
 rev_usa_cw.35.t:0 "April 2029: Free States Realignment Confirmed"
 rev_usa_cw.35.d:0 "The territorial settlement has been finalized. Austin is now the Free States capital, the central corridor has aligned with the South, and Florida-Georgia has declared armed neutrality outside both blocs."
 rev_usa_cw.35.a:0 "Acknowledge the Settlement"
 rev_usa_cw.40.t:0 "Federal Victory in the Civil War"
 rev_usa_cw.40.d:0 "Free States resistance has collapsed. Washington reasserts federal authority, and the Neutral States are reintegrated under the national command structure."
 rev_usa_cw.40.a:0 "Restore the Union"
 rev_usa_cw.41.t:0 "Free States Victory in the Civil War"
 rev_usa_cw.41.d:0 "The federal government has collapsed. The Free States now control the former Union, and the Neutral States are brought under the new national authority."
 rev_usa_cw.41.a:0 "A New American Order"
 rev_usa_cw.51.t:0 "Recession Hits the United States"
 rev_usa_cw.51.d:0 "Due to energy disruptions in the Middle East, poor job numbers, and stubborn inflation, the United States has entered a recession. Growth has fallen back to stagnation and the political damage is beginning to show."
 rev_usa_cw.51.a:0 "The economy turns downward"
 rev_usa_cw.42.t:0 "The War Is Over"
 rev_usa_cw.42.d:0 "Washington, D.C. has fallen. The American people want this war that Trump started to be over and are willing to stand down on all fronts. Donald Trump's most loyal units have been defeated and he has fled; he will be captured soon. The resistance government will restore constitutional order, bring California back into the Union, and return the United States to NATO."
 rev_usa_cw.42.a:0 "Restore Constitutional Government"
 rev_usa_cw.44.t:0 "A Settlement with NATO"
 rev_usa_cw.44.d:0 "Canada, California, and Greenland have all been brought under American control, but the wider war with NATO continues to bleed resources for little strategic gain. The alliance is signaling it will accept a halt to fighting if Washington is willing to stop at the current line and end the war with the remaining NATO powers."
 rev_usa_cw.44.a:0 "Take the deal and end the wider war"
 rev_usa_cw.44.b:0 "No, we press on"
 rev_usa_cw.50.t:0 "Christmas 2029 Ceasefire"
 rev_usa_cw.50.d:0 "By December 25, 2029, neither side has secured decisive victory. Nobody want's this war the FSA is ready to pay to leave."
 rev_usa_cw.50.a:0 "Freeze the Front and Negotiate"
USA_rule_by_decree_idea:0 "Rule by Decree"
USA_rule_by_decree_idea_desc:0 "The executive branch has concentrated power, sidelining constitutional checks and civil controls in favor of emergency governance."
rev_usa_cw.314.t:0 "People in Flight"
rev_usa_cw.314.d:0 "Within weeks of the purge, millions are moving out of the country there's talk of civil war. The longer this goes on, the harder it becomes to keep control. It's time to attack Canada, it will put the unsure to task and it'll expose any remaining traitors.  Canada should fall quickly and Nato will be too slow to act, may even back down."
rev_usa_cw.314.a:0 "Move Against Canada"
rev_usa_cw.314.tt:0 "The United States leaves NATO structures and starts justifying war against Canada for annexation."
rev_usa_cw.315.t:0 "A New Front Opened"
rev_usa_cw.315.d:0 "Resistance has already started to grow. If the regime is to survive, this war must begin now."
rev_usa_cw.315.a:0 "Concentrate the Invasion"
rev_usa_cw.315.tt:0 "The United States has declared war on Canada."
rev_usa_cw.315.no_canada_tt:0 "Canada is unavailable for military action at the moment."
rev_usa_cw.318.t:0 "A Pacific Crisis"
rev_usa_cw.318.d:0 "Within weeks of the purge, millions are leaving and the regime needs a larger foreign crisis to keep the country pointed outward. If Washington turns the confrontation toward Beijing, the public can be rallied around Taiwan and a Pacific war instead of a North American fracture."
rev_usa_cw.318.a:0 "Turn Toward China"
rev_usa_cw.318.tt:0 "The United States leaves NATO, forms a Pacific alignment with Taiwan, Japan, and Australia, and prepares for war with China. China receives a war goal on Taiwan."
rev_usa_cw.318.no_china_tt:0 "China or Taiwan is unavailable for this confrontation."
rev_usa_cw.319.t:0 "The Pacific Front Opens"
rev_usa_cw.319.d:0 "The crisis has been set. Washington now commits to war with China and frames the struggle as a defense of the Pacific balance rather than a domestic collapse."
rev_usa_cw.319.a:0 "Open the Pacific War"
rev_usa_cw.319.tt:0 "The United States has declared war on China."
rev_usa_cw.319.secret_taiwan_tt:0 "Because §YRamp Up Secret Arming of Taiwan§! was completed, §Y4 Special Forces Group§! units will appear in §YTaipei§! under §YUSA§! control."
rev_usa_cw.46.t:0 "End of Official Content"
rev_usa_cw.46.d:0 "December 6, 2031 has been reached. This is the end of the official scripted content for this United States path. You may keep playing the campaign, but there are no further official events, branches, or story beats beyond this point."
rev_usa_cw.46.a:0 "Continue in Sandbox"
rev_usa_cw.316.t:0 "American Resistance Forms"
rev_usa_cw.316.d:0 "With Washington now at war with Canada under Trump's leadership, a calculated resistance move was made by California and some western states to delcare neutral succession.  The USA will have to deal with them later, the offensive against Canada and now the traitorious New England states must be dealt with first. New York is also joining in open rebellion."
rev_usa_cw.316.a:0 "The Federation Fractures"
rev_usa_cw.47.t:0 "Nobody Left to Borrow From"
rev_usa_cw.47.d:0 "Debt has climbed past §R[?USA_debt_warning_threshold|0]§! while the war continues. Credit is drying up and even friendly lenders are stepping back. If debt reaches §R[?USA_debt_first_loss_threshold|0]§!, troops will not be paid and some formations will desert or collapse outright. If debt reaches §R[?USA_debt_second_loss_threshold|0]§!, additional formations will begin to disappear as well. We can save a great deal of money by mothballing older air wings and disbanding obsolete aircraft now."
rev_usa_cw.47.a:0 "This is getting dangerous"
rev_usa_cw.48.t:0 "Troops Go Unpaid"
rev_usa_cw.48.d:0 "Debt has now crossed §R[?USA_debt_first_loss_threshold|0]§!. Payroll has broken down, confidence is gone, and some of the least reliable formations are simply disappearing from the order of battle without waiting for permission."
rev_usa_cw.48.a:0 "We are running out of road"
rev_usa_cw.49.t:0 "More Formations Collapse"
rev_usa_cw.49.d:0 "Debt has pushed past §R[?USA_debt_second_loss_threshold|0]§! and the crisis is deepening. Additional second-line and improvised formations are breaking apart as pay, fuel, and basic confidence disappear."
rev_usa_cw.49.a:0 "The line is thinning"
rev_usa_cw.52.t:0 "Kelly Wins the Postwar Election"
rev_usa_cw.52.d:0 "After the defeat of Trump's nationalist regime and the restoration of constitutional politics, Mark Kelly has emerged as the new president of the United States. Washington now begins the difficult shift from emergency rule and internal war back toward normal government."
rev_usa_cw.52.a:0 "A new administration takes office"
