l_english:
 rev_usa_cw.1.t:0 "September 2028: Constitutional Rupture"
 rev_usa_cw.1.d:0 "The impeachment crisis has pushed the United States beyond a constitutional breaking point. The federal chain of command fractures, and rival authorities claim legitimacy."
 rev_usa_cw.1.a:0 "Define the Civil War Sides"
 rev_usa_cw.2.t:0 "September 2028: Northern Escalation"
 rev_usa_cw.2.d:0 "After a decision to escalate against Canada, alliance lines harden overnight. Domestic cohesion collapses and competing governments begin to mobilize."
 rev_usa_cw.2.a:0 "Define the Civil War Sides"
 rev_usa_cw.10.t:0 "Canada Plot Allegations"
 rev_usa_cw.10.d:0 "The White House claims Canadian channels are preparing covert weapon shipments to opposition-held blue states. Trump can escalate under emergency powers, or stand down and let the election proceed."
 rev_usa_cw.10.a:0 "Issue the Accusation"
 rev_usa_cw.10.b:0 "Stand Down and Allow the Election"
 rev_usa_cw.11.t:0 "Insurrection Act and Snap Impeachment"
 rev_usa_cw.11.d:0 "After the Supreme Court ruling and emergency impeachment push, the Senate votes to remove Trump. He rejects the result as illegitimate and rival chains of command form. Choose which side you will control before the shooting starts."
 rev_usa_cw.11.a:0 "Play the Trump Side (USB)"
 rev_usa_cw.11.b:0 "Play the Constitutional Side (USA)"
 rev_usa_cw.30.t:0 "Supreme Court Rejects Emergency Power Use"
 rev_usa_cw.30.d:0 "On August 29, 2028, the Supreme Court rules the Insurrection Act was used improperly and detained elected officials must be released. Congress immediately advances impeachment articles, with enough Republican defections now expected for removal."
 rev_usa_cw.30.a:0 "Impeachment Moves Forward"
 rev_usa_cw.31.t:0 "Final Mobilization Decision"
 rev_usa_cw.31.d:0 "Both sides have formed command structures and are preparing to split federal assets. This order executes the territorial split, but combat does not begin yet."
 rev_usa_cw.31.a:0 "Finalize the Split"
 rev_usa_cw.32.t:0 "USB and the November Election"
 rev_usa_cw.32.d:0 "The split is in place and no shots have been fired. Will the USB states participate in the November election process, or maintain a separate executive under Trump?"
 rev_usa_cw.32.a:0 "No, Trump Is Our President"
 rev_usa_cw.32.b:0 "Yes, We Will Rejoin After the Election"
 rev_usa_cw.20.a:0 "Congress Is Divided"
 rev_usa_cw.21.t:0 "Congress Removes Tariffs"
 rev_usa_cw.21.d:0 "On February 1, 2027, Congress rolls back major tariff measures. Domestic confidence rises, and relations with both Canada and Mexico improve as trade frictions ease."
 rev_usa_cw.21.a:0 "Reopen Trade Channels"
 rev_usa_cw.22.t:0 "2028 Election Field Set"
 rev_usa_cw.22.d:0 "On May 4, 2028, the presidential race is effectively set: JD Vance versus Senator Mark Kelly. Kelly opens with a clear lead in most swing states, and Republican confidence weakens."
 rev_usa_cw.22.a:0 "The Race Is Defined"
 rev_usa_cw.23.t:0 "Election Night: Kelly Wins"
 rev_usa_cw.23.d:0 "On November 10, 2028, major networks and state certifications converge: Senator Mark Kelly has won the presidency with a strong swing-state margin. The transition period begins."
 rev_usa_cw.23.a:0 "A Clear Outcome"
 rev_usa_cw.24.t:0 "January 20, 2029: Inauguration Day"
 rev_usa_cw.24.d:0 "Mark Kelly is sworn in as President on January 20, 2029. The administration takes control with a mandate to stabilize institutions and reset domestic politics."
 rev_usa_cw.24.a:0 "Transfer Executive Power"
 rev_usa_cw.33.t:0 "The Matter of the Southern Secession"
 rev_usa_cw.33.d:0 "Donald Trump still governs in the South, while a large portion of the former Union remains in political limbo. The administration must decide whether to force reunification or recognize a peaceful break."
 rev_usa_cw.33.a:0 "We Must Preserve the Union"
 rev_usa_cw.33.b:0 "This Was Inevitable, Let Them Go Peacefully"
 rev_usa_cw.34.t:0 "April 2029: Carving Up the Union"
 rev_usa_cw.34.d:0 "With separation accepted, borders are redrawn again. USA absorbs Hawaii and the Pacific fleet holdings, North Carolina returns to Washington, Florida and Georgia form a neutral Florida under DeSantis, and the interior corridor aligns with USB."
 rev_usa_cw.34.a:0 "Finalize the New Map"
 rev_usa_cw.35.t:0 "April 2029: Southern Realignment Confirmed"
 rev_usa_cw.35.d:0 "The territorial settlement has been finalized. Austin is now the USB capital, the central corridor has aligned with the South, and Florida-Georgia has declared armed neutrality outside both blocs."
 rev_usa_cw.35.a:0 "Acknowledge the Settlement"
 rev_usa_cw.40.t:0 "Federal Victory in the Civil War"
 rev_usa_cw.40.d:0 "USB resistance has collapsed. Washington reasserts federal authority, and Hawaii is reintegrated under the national command structure."
 rev_usa_cw.40.a:0 "Restore the Union"
 rev_usa_cw.41.t:0 "USB Victory in the Civil War"
 rev_usa_cw.41.d:0 "The federal government has collapsed. The Free States now control the former Union, and Hawaii is brought under the new national authority."
 rev_usa_cw.41.a:0 "A New American Order"
 rev_usa_cw.50.t:0 "Christmas 2030 Ceasefire"
 rev_usa_cw.50.d:0 "By December 25, 2030, neither side has secured decisive victory. Exhaustion forces a negotiated white peace and opens a postwar settlement phase."
 rev_usa_cw.50.a:0 "Freeze the Front and Negotiate"
