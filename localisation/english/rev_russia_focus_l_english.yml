l_english:
 rev_SOV_president_putin_entry:0 "Putin"
 rev_SOV_president_putin_entry_desc:0 "You start 2026 with Putin firmly in power, but everything is a total disaster.  Economic collapse is certain but if we can get all of Donbas from Ukraine Putin might be able to keep his job, with Trump's pressure and a couple more months of winter misery for the Ukrainians perhaps they will cave."
 rev_SOV_coup_putin:0 "Successful Coup"
 rev_SOV_coup_putin_desc:0 "Putin would always know if a plot existed so there wasn't a plot there was only the understanding that when one acted they all acted.  And they would only act when it was clear to all.  You'll get a new leader and a chance to end the war with a cease fire."
 rev_SOV_coup_end_war:0 "End the War and Stabilize"
 rev_SOV_coup_end_war_desc:0 "Prioritize de-escalation and fiscal control to prevent systemic collapse."
 rev_SOV_president_sokolov_entry:0 "Sokolov Consolidates Power"
 rev_SOV_president_sokolov_entry_desc:0 "Viktor Sokolov stabilizes the elite pact and moves to re-center executive control after the 2026 crisis."
 rev_SOV_president_volodin_entry:0 "Volodin Stabilization Agenda"
 rev_SOV_president_volodin_entry_desc:0 "Sergei Volodin prioritizes institutional calm and fiscal discipline to restore confidence in the state."
 rev_SOV_critical_supplies_from_china:0 "Supplies from China"
 rev_SOV_critical_supplies_from_china_desc:0 "China is our lifeline without them we wouldn't have parts for most of our weapons.  In turn we give them cheap oil and gas."
 rev_SOV_india_deals:0 "Cash from India"
 rev_SOV_india_deals_desc:0 "India buys our oil for cheap and only in their currency, this is more like borrowing money then making money, but we need cash."
 rev_SOV_sokolov_financial_stabilization:0 "Emergency Financial Stabilization"
 rev_SOV_sokolov_financial_stabilization_desc:0 "A short-term stabilization package to prevent a deeper fiscal and banking panic."
 rev_SOV_sokolov_bank_restart:0 "Reset Banks"
 rev_SOV_sokolov_bank_restart_desc:0 "Now that the war is over we can get enough foreign loans to form new banks."
 rev_SOV_sokolov_lift_sanctions:0 "Negotiate a Lift of Sanctions"
 rev_SOV_sokolov_lift_sanctions_desc:0 "Now that we appear to be in no position to fight again, the west will lift remaining sanctions.  If we own Kramatorsk we need to return it."
 rev_SOV_reclaim_far_east:0 "Reclaim the Far East"
 rev_SOV_reclaim_far_east_desc:0 "The eastern territories have broken away amid financial collapse. Reassert federal authority before external patrons entrench themselves."

 rev_SOV_volodin_fiscal_discipline:0 "Fiscal Discipline Program"
 rev_SOV_volodin_fiscal_discipline_desc:0 "The war is over and the army is much smaller, slash the budget and trim down what can be, we'll rebuild later."
 rev_SOV_volodin_admin_cleanup:0 "Administrative Cleanup"
 rev_SOV_volodin_admin_cleanup_desc:0 "There is corruption everywhere, even if we eliminate just the most obvious it will save a serious funds."
 rev_SOV_resume_western_trade:0 "Western Deals"
 rev_SOV_resume_western_trade_desc:0 "Trump already has his deals but the rest of the world are also now open to doing business with us again."

 rev_SOV_orlov_ruble_recovery:0 "Ruble Recovery Campaign"
 rev_SOV_orlov_ruble_recovery_desc:0 "Real Inflation is at 30 percent, we have to stop printing money.  We will have to start borrowing from China and others now that we can."
 rev_SOV_orlov_emergency_industry:0 "Emergency Industrial Directive"
 rev_SOV_orlov_emergency_industry_desc:0 "Shift policy to hard-priority industrial output and state-directed crisis management."
 rev_SOV_belarus_on_own:0 "Belarus to Carry Its Burden"
 rev_SOV_belarus_on_own_desc:0 "We won't be funding Belarus for a while."
 rev_SOV_orlov_national_cohesion:0 "Some Investment"
 rev_SOV_orlov_national_cohesion_desc:0 "Russian Oblasts haven't received anything from the Federation for years, it's time to start sending some tax revenue back to the oblasts."
 rev_SOV_stability_floor_program:0 "Emergency Stability Program"
 rev_SOV_stability_floor_program_desc:0 "With the war over and the worst economic distortions behind us, the state can focus on restoring basic confidence and pushing national stability back to a minimum viable level."
 rev_SOV_restore_services:0 "Restore Some Services"
 rev_SOV_restore_services_desc:0 "Besides military death benefits common Russians don't get much from the government, we can now at least increase welfare again."
 rev_SOV_restore_welfare:0 "Restore Welfare"
 rev_SOV_restore_welfare_desc:0 "We can finally stop treating every ruble not spent on the war as waste and rebuild a basic social floor."
 rev_SOV_drone_defense_brigades:0 "Cheap Drone Formations"
 rev_SOV_drone_defense_brigades_desc:0 "The old Soviet arsenal is gone. We need numerous, cheap formations built around drones, light infantry, and mobile fire support."
 rev_SOV_raise_drone_defense_brigades_i:0 "Raise Drone Defense Brigades"
 rev_SOV_raise_drone_defense_brigades_i_desc:0 "Use cheap airframes, simple fire support, and stripped-down infantry structures to raise the first wave of drone defense formations around Moscow."
 rev_SOV_raise_drone_defense_brigades_ii:0 "Raise More Drone Defense Brigades"
 rev_SOV_raise_drone_defense_brigades_ii_desc:0 "Double down on the program and push a second wave of drone defense brigades into service."
 rev_SOV_unlock_drone_defense_brigade_tt:0 "Unlocks the §YDrone Defense Brigade§! division template."
 rev_SOV_remove_broken_economy_tt:0 "If active, remove §YBroken Economy§!."

 rev_SOV_putin_bomb_ukr_energy:0 "Bomb Ukrainian Energy Infrastructure"
 rev_SOV_putin_bomb_ukr_energy_desc:0 "Escalate strategic strikes against Ukraine's power grid to force winter pressure and political fatigue."
 rev_SOV_putin_sell_gold:0 "Sell Gold Reserves"
 rev_SOV_putin_sell_gold_desc:0 "Liquidate part of Russia's gold reserves to plug immediate fiscal gaps and buy time."
 rev_SOV_putin_sell_gold2:0 "Sell Gold Reserves"
 rev_SOV_putin_sell_gold2_desc:0 "Liquidate part of Russia's gold reserves to plug immediate fiscal gaps and buy time."
 rev_SOV_putin_asks_oligarchs_for_donations:0 "Putin Asks the Oligarchs for Donations"
 rev_SOV_putin_asks_oligarchs_for_donations_desc:0 "The oligarchs do nothing for charity. They have cash, but their businesses are drowning in debt and many will soon default. Before everything starts going bankrupt, they will want cash ready to buy up the assets of their own failed corporations and start over again. For now, the Kremlin can still pressure them into handing some of it over."
 rev_SOV_delay_peace_negociations:0 "Delay Peace Negotiations"
 rev_SOV_delay_peace_negociations_desc:0 "Delay formal talks to preserve leverage while managing domestic expectations."
 rev_SOV_putin_suppress_social_media:0 "Suppress Social Media"
 rev_SOV_putin_suppress_social_media_desc:0 "Expand censorship and platform control to contain dissent and protect regime messaging."
 rev_SOV_putin_support_iran_ad:0 "Air Defense for Attack"
 rev_SOV_putin_support_iran_ad_desc:0 "Transfer additional short-range air defence support to Iran in exchange for Shaheed drones."
 rev_SOV_putin_support_iran_ad2:0 "Air Defence for Attack"
 rev_SOV_putin_support_iran_ad2_desc:0 "Transfer additional SAMs to Iran in exchange for Shaheed drones."
 rev_SOV_putin_loyalty_tests:0 "Loyalty Tests"
 rev_SOV_putin_loyalty_tests_desc:0 "Run internal loyalty checks across elites, commanders, and regional governors to prevent defections."
 rev_SOV_bankrupt_but_still_in_power:0 "Bankrupt but Still in Power"
 rev_SOV_bankrupt_but_still_in_power_desc:0 "Maintain regime control despite fiscal insolvency by tightening political discipline."
 rev_SOV_smo_recruitment_contracts:0 "Recruitment and Contracts"
 rev_SOV_smo_recruitment_contracts_desc:0 "Recruitment and contracts for the Special Millitary Operation."
 rev_SOV_bank_crisis:0 "Bank Crisis"
 rev_SOV_bank_crisis_desc:0 "For years Russia has been forcing banks to borrow money to defense contractors rather then being paid by the government, the idea that after the war they'd all go bankrupt. Now the banks are failing. All we can do right now is prevent people from taking the remaining money out."
 rev_SOV_sweet_trump_deals:0 "Sweet Deals"
 rev_SOV_sweet_trump_deals_desc:0 "Not that there's a peace we can receive the down payments on all the deals from Trump and his buddies."
 rev_SOV_treasury_plus_5_tt:0 "Treasury: §G+5§!"
 rev_SOV_treasury_plus_10_tt:0 "Treasury: §G+10§!"
 rev_SOV_treasury_plus_20_tt:0 "Treasury: §G+20§!"
 rev_SOV_debt_plus_20_tt:0 "Debt: §R+20§!"
 rev_SOV_treasury_plus_80_tt:0 "Treasury: §G+80§!"
 rev_SOV_treasury_minus_3_tt:0 "Treasury: §R-3§!"
 rev_SOV_treasury_minus_20_tt:0 "Treasury: §R-20§!"
 rev_UKR_treasury_minus_5_tt:0 "Ukraine treasury: §R-5§!"
 rev_SOV_treasury_minus_15_tt:0 "Spend §R-15§! treasury balance."
 rev_sov_baltic.1.t:0 "Challenge NATO?"
 rev_sov_baltic.1.d:0 "Without Kramatorsk secured, a direct challenge to NATO is reckless. The General Staff can still push for a Baltic war, but only a regime confident in its position in Ukraine should even consider it."
 rev_sov_baltic.1.a:0 "Press the attack anyway"
 rev_sov_baltic.1.b:0 "We are not ready"
 russia_economic_crisis_2026:0 "Bank Failure Crisis"
