 usa.119.t: "The Death of Ruth Bader Ginsberg"
 usa.119.d: "Supreme Court Justice Ruth Bader Ginsburg died on Friday at 87 years old. Her death was caused by complications of metastatic pancreas cancer and she passed at home, surrounded by her family.\n\nThe second woman ever appointed to the Supreme Court in 1993, Ginsberg fought tirelessly against sex discrimination and for women's rights. She made her stance on abortion rights clear from day one, encoring them during her confirmation hearing. \"It is essential to woman's equality with man that she be the decision maker, that her choice be controlling,\" Ginsburg said. \n\nShe was tenacious, strong, determined–and she was a mother. She is remembered by her two children Jane Carol Ginsburg and James Steven Ginsburg, as well as her four grandchildren, two step-grandchildren and one great-grandchild.\n\nHer family, her country and her colleagues on the Supreme Court will never forget her.\n\n\"Our nation has lost a justice of historic stature,\" Chief Justice John Roberts said Friday. \"We at the Supreme Court have lost a cherished colleague. Today we mourn but with confidence that future generations will remember Ruth Bader Ginsburg as we knew her, a tireless and resolute champion of justice.\"\n\nEven before her death the subject of whether her seat on the Supreme Court should be filed or remain vacant until after the upcoming election was hotly debated in Washington and across the nation."
 usa.119.a: "Regardless of her beliefs, I respect her."
 usa.119.b: "She Was Amazing... But Why'd She Die At The Worst Possible Time?!"
 usa.123.t: "Peace Deal with the Taliban Nears Finalization"
 usa.123.d: "For months, we have been closely following the negotiations between the Taliban and the Afghan government to reach a peace agreement. With our troop numbers decreasing and public support dwindling after nearly two decades of war, we are relieved to announce that the US-Taliban deal has just been signed in Doha, finally ending our 20-year-long involvement in the region."
 usa.123.a: "Peace, At Last!"
 usa.124.t: "California Wildfires"
 usa.124.d: "A Southern California couple whose gender reveal party allegedly sparked the deadly El Dorado wildfire in 2020 has been charged with 30 crimes, including involuntary manslaughter, authorities announced Tuesday.\nA smoke bomb set off by the couple in Yucaipa, California, on September 5 as part of a gender reveal sparked a fire that went on to burn more than 22,000 acres across two counties, San Bernardino County District Attorney Jason Anderson said during a news conference.\nOne firefighter was killed while battling the flames and two others were injured, according to Anderson. The fire destroyed several homes and burned more than 22,000 acres, his office said.\nCal Fire determined the cause of the fire was a \"smoke-generating pyrotechnic device.\""
 usa.124.a: "A Gender Reveal Party?!"
 usa.124.b: "This Is Why We Have Abortions..."
 usa.126.t: "The State of the Union"
 usa.126.d: "The State of the Union this year was an interesting one. As usual, President Trump positively taughted his achievements since the last State of the Union speech, and invited many people who he considered to have been affected positively by his policies, most notably Juan Guaido, the interim President of [VEN.GetNameDef]. The President also attempted to calms fears towards the rising Covid-19 virus in China, by announcing talks with [PRC.GetLeader] about containing the virus. Towards the end of the speech, House Speaker Nancy Pelosi tore up his speech right behind him, which saw the ire of the Republicans and recieved lukewarm reception from Democrats. However, the speech was mostly recieved well and shows our people that America is on the up."
 usa.126.a: "Pelosi Didn't Even Read It!"
 usa.126.b: "More Lies From Trump!"
 usa.127.t: "America's First Coronavirus Case"
 usa.127.d: "Today, the CDC has received reports from a suburban Seattle hospital with concerning news: America has its first confirmed case of the Novel Coronavirus, also known as the Wuhan Coronavirus or COVID-19. The patient, a 35-year-old American national who visited Wuhan last week, said he never recalled interacting with any visibly sick people while there or during the flight back, and his symptoms did not emerge until several days after returning to the United States.\n\nThe patient and his family have already been placed under quarantine, and efforts are being made to track down those he came in contact with since returning to the United States. Since the coronavirus seems to be contagious without displaying symptoms, medical experts are worried that dozens of people may have been exposed without knowing it."
 usa.127.a: "Seems this is our problem now, too."
 usa.127.b: "Seems this is our problem now, too."
 usa.128.t: "Trump Has Been Certified President"
 usa.128.d: "It's Official, the Electors of each state have voted and Congress has come together, and now it's official. Against all odds, President Donald Trump will remain in office and have a second term, to the chagrin of his political opponents. Even Trump's Vice President, Mike Pence, had little to no faith in Trump and went against his wishes and chose to count the votes sent in by the State Governors. However, in the end the Congress counted the vote and found that amongst the confusion many ballots were fraudulent or invalid, ending up in a slim victory for Trump.\n\nProtests are already being organized to protest the results with the one in support of the President ending up having hundreds of thousand of protesters turn up, and the country has seemingly lost it's faith in the election system, with leftists feeling betrayed by the courts, and others feeling unsafe when voting due to the amount of fraud found in the system and how it was corrupted by the media.\n\nIt seems to many that the results didn't really matter much if at all, regardless of who won, there is a storm brewing and it is only a matter of time before it falls upon our nation."
 usa.128.a: "Against All Odds... We shall keep America great!"
 usa.128.b: "Nothing but a liar and a cheat!"
