 USA_medium_immigration_idea: "Low Illegal Immigration"
 USA_medium_immigration_idea_desc: "Illegal Immigration remains one of the most controversial socioeconomic issues of Modern America. Although much lower now than it was during the early 2000s-2010s, tens of thousands of illegal immigrants still cross the border every year. Such flow of illegal immigrants coming from the south have angered many elements of the culturally conservative, wondering why their taxpayer dollars are going to people who don't even pay taxes. On the further right, white supremacist ideals such as 'great replacement theory' have started to gain traction."
 USA_high_immigration_idea: "Mass Illegal Immigration"
 USA_world_police_idea: "World Police"
 USA_world_police_idea_desc: "If you ask a number of different people for their view on American military involvement in the Middle East, you're likely to get a number of different, strong opinions. Many Americans believe that the U.S. government should focus on domestic affairs, and that what happens in the Middle East is ''none of our business.'' Others believe that in this modern era, America must have a global presence in order to protect its interests. Differences of opinion over American interventionism in foreign affairs are nothing new; they have been present since almost the founding of the United States itself."
 USA_oil_crisis_idea: "Oil Crisis"
 USA_oil_crisis_idea_desc: "Oil. It is what everything was run on for decades. The containers the world produced, the fuel for vehicles, the tarmac on the roads, everything leads back to crude oil. A single sign of a shortage was enough to send many economies spiralling out of control - but, at least until 2020, major catastrophes had been avoided. Now, however, in the face of the breakdown of the global system, the Saudi collapse and the domestic situation, oil has been much harder to get a hold of. The global market has been deprived of its black oxygen, and now, as a major utiliser of the fossil fuel, we feel the effect of this crisis most deeply. Until it is over, our economic capacity is locked away - and our people suffer for it."
 USA_oil_crisis_idea1: "Oil Crisis"
 USA_mingle_with_the_movement_idea: "Alliance With The Movement"
 USA_mingle_with_the_movement_idea1: "Embraced The Movement"
 USA_patriotic_defense_idea: "Patriotic Defense"
 USA_minimalized_militias_idea: "Minimalized Militias"
 USA_national_schizophrenia_idea: "National Schizophrenia"
 USA_national_schizophrenia_idea_desc: "Egyptian Islamist Sayyid Qutb once accused liberal democracy of having induced a \"hideous schizophrenia\" in the West. Now, that schizophrenia has been made manifest. There are now two capitals, each claiming to be the sole legitimate seat of power, giving their own increasingly contradictory commands to the rest of the nation. Some try to follow the orders of both, some only listen to one government, and some simply ignore both and hope this madness will end.\n\n§RThis may be America's darkest hour yet. Will the night grow darker still?§!"
 USA_low_morale_idea: "Low Morale"
 USA_low_morale_idea_desc: "The average American doesn't expect to wake up the next morning and be suddenly asked to kill his neighbor."
 NEG_mills_collins_coalition_idea: "Mills-Collins Coalition Government"
 NEG_mills_collins_coalition_idea_desc: "Maine has always been a land of tolerance and bipartisanship, and this civil war musn't tear apart what makes our state great. \n\nTo ensure our survival against radical forces, Governor Mills and Senator Collins have formed a Coalition Government between the Maine GOP and the Maine Democratic Party"
 NEG_northern_insurgency_idea: "Northern Insurgency"
 NEG_northern_insurgency_idea_desc: "Northern Maine is a desolate place, with communities scattered hundreds of miles apart. This isolation, paired with constant attacks on critical infrastructure needed to access the North, has effectively made the North ungovernable."
 NCY_unionist_aid_idea: "Unionist Aid"
 NCY_unionist_aid_idea_desc: "Despite our precarious situation, President Biden has pledged to unequivocally support Governor Cuomo in his fight to retake New York from the hands of the radicals."
 NCY_imperial_legacy_idea: "Heir to the Empire"
 NCY_imperial_legacy_idea_desc: "We are the continuation of the Empire State, a state that once held the tallest buildings in America, a state that survived a direct terrorist attack and said, ''you can't kill us!'' \nWe were the crown jewel in the American Crown, but now... we struggle to control all of upstate New York, and we have since lost the City to what was once considered to be our loyal police force, who can now barely able to control the streets... \n\n§RChief Shea will pay for his insolence...§!"
 JDL_the_american_homeland_idea: "The Second Promised Land"
 JDL_the_american_homeland_idea_desc: "Although Israel has been the promised of the Jewish people for two millenia, America is where Jewish people were able to build their lives without threat of genocide at every corner. \n\nOur people have thrived in New York, and we will not simply walk away from the lives we have built on this continent because a wanna-be Hitler occupies the two smallest states in the Union."
 JDL_soldiers_of_the_rebbe_idea: "Soldiers of the Rebbe"
 JDL_soldiers_of_the_rebbe_idea_desc: "Our goal is to protect Jews from antisemitism by whatever means necessary, which means aligning ourselves with some of our faith that we may not neccesarily agree with. \n\nThe followers of the Late Menachem Schneerson have had a presence in New York City since the 1970s and have acted as varitable shock troops since before the official fighting began. These ''Soldiers of the Rebbe'', are not expertly trained, however are still often found going out of their way to participate in high-risk raids to secure supplies for our people."
 ATP_Anarchism_on_the_Niagara_idea: "Anarchism on the Niagara"
 ATP_Anarchism_on_the_Niagara_idea_desc: "We have built a society of likeminded anarchists built on one of the most beautiful landscapes on the continent. Our society will be told to the youth of America as an Anarchist Utopia."
 ATP_Inescapable_Fate_idea: "Inescapable Fate"
 ATP_Inescapable_Fate_idea_desc: "What is our greatest pride is also our worst enemy... We are surrounded on all sides, our only means of escape is to... \n\nJump."
