 usa.130.t: "Major City Riots"
 usa.130.d: "As violence continues in cities across the nation and clashes between law enforcement and The Movement escalates, damage to major infrastructure has become inevitable. Train lines, roads, trams, buses, much has been damaged in different regions, and will continue to do so until the Movement is somehow dispersed.\n\nRhetoric from the Movement echoed through media outlets has downplayed the damage, thus preventing us from escalating our responses - even if we would like to."
 usa.130.a: "Rioting Doesn't Solve Anything!"
 usa.130.b: "Fight the System!"
 usa.132.b: "Trump Has Failed Once Again!"
 usa.134.t: "The Movement Organizes \"White House Siege\""
 usa.134.d: "Disturbing reports from the FBI and multiple informants have surfaced today. The \"Movement\" and its splinter groups are actively organizing for a potential siege of the White House.\n\nThis development coincides with the approaching election season, with the Movement aiming to prevent President Donald J. Trump's re-election as their top priority. They are now strategizing a siege of the White House scheduled in approximately fifty days, intending to diminish the President's approval ratings.\n\nIf we do not effectively counter the Movement's plans, their siege is likely to proceed as scheduled, straining the President's current political efforts."
 usa.134.a: "I want this dealt with immediately!"
 usa.134.b: "Fight the System!"
 usa.135.t: "The Siege Begins"
 usa.135.d: "As the Movement's protests have gripped the nation and social pressure has seemingly paralysed effective response against them, their actions have only grown bolder. Holding de-facto extrajudicial authority for the time being, thousands of the Movements' members within Washington D.C. have taken to the streets once more, this time towards the White House, where the current President resides.\n\nSecret Service and National Guard man the perimeter of the White House, but the mass movement that has carried forth to the doorstep of the President has threatened this thinly held perimeter multiple times. Warning shots have been fired, but as of yet, no out-of-control chaos has been brought forth. Many predict, however, that it is only a matter of time until more extreme elements within the ranks incite a violent breach of the perimeter. Speakers shout rhetoric across the fences and mass movements continue to cause infrastructure damage and looting around the region, while the streets have been emptied of all except those men and women of action.\n\nAccording to insider reports, the President may have fled via underground passageways during the siege, though this is not confirmed."
 usa.135.a: "Maybe It's A Bit Too Close..."
 usa.135.b: "Stop The Bigot In Chief!"
 usa.136.t: "The Siege Is Cancelled"
 usa.136.d: "After further investigation by the FBI, the planned White House siege has been canceled. This news comes as 'The Movement' was unable to gain enough traction. Subsequently ending in a lack of volunteers and participation before the beginning stages of the siege began. Many members of 'The Movement' who did show up have stated that the lack of participants was caused by 'political silencing' and 'media suppression'."
 usa.136.a: "A great relief"
 usa.136.b: "A total failure"
 usa.137.t: "America Has Healed"
 usa.137.d: "Through all the turmoil, we have done it, we have decimated Covid-19 and purged the foreign virus from our great nation, now we can go back to normal, or can we? Some Doctors are claiming that we should expect the Coronavirus to behave like the Flu and come with a new strand every year, but for now we can finally settle down and have some peace."
 usa.137.a: "The Old is the New again..."
 usa.141.t: "To The Moon"
 usa.141.d: "Financial Markets are in turmoil today as the value of Gamestop (GME) has shot up beyond anybody's expectations.\n\nThe Gamestop short squeeze egan in late 2020, when a group of investors on the subreddit r/WallStreetBets began buying up shares of GME stock, primarily as a response to the company's declining fortunes and the short positions taken by hedge funds like Melvin Capital. These institutional investors had bet that GME's stock price would fall, and were using complex financial instruments like options to try to make money from the decline.\n\nThe WallStreetBets group, however, had a different plan. By buying up shares of GME and refusing to sell, they drove up the stock price, causing short-sellers to incur massive losses as they were forced to buy back shares at much higher prices. This created a feedback loop, as the rising stock price attracted more individual investors to buy in, further driving up the price and causing even greater losses for the short-sellers.\n\nThe GameStop short squeeze ultimately resulted in billions of dollars in losses for the institutional investors who had bet against the company, while the individual investors who had organized the squeeze made substantial profits."
 usa.141.a: "I hate reddit."
 usa.142.t: "John Brennan alleges Russian meddling!"
 usa.142.d: "After a very tense voting season ending in a GOP victory, the Democratic party is scrambling for answers about what may have caused their loss. While many have conceded and congratulated the GOP on another victory, some have refused, citing "Russian interference" as a possible cause of Trumps victory. This response has drawn extreme criticism from pro-trump outlets, with FOX News panning John Brennan and other Democrats supporting the theory as "complete idiots". However, outlets such as CNN fully endorse the idea, saying that this and the previous election only resulted in a GOP victory due to interference with the Russian government. After two failed election seasons for the Democratic party, its not hard to see why many are beginning to believe the Democrats are falling from grace."
 usa.142.a: ""Russia-Russia-Russia!""
 usa.143.t: "Tense Thanksgiving"
 usa.143.d: "The Turkey is the centerpiece of every American thanksgiving, and was the staple food of the Hartfords this time of year. But 2020 was differnet. Today's food was a take away meal from a nearby McDonalds; that was all they could afford, in terms of time and money.\n\n\"Well. Happy Thanksigivng everyone.\" the mother whispered, desperately trying to crack a smile. The rest of the table mumbled their thanks, and began the \"feast\".\n\n"Stacey, pass me the salt\"  the brother demanded. However, the sister refused to respond.\"Stacey, if you are still mad about yesterday, then you rea-\n\n\"You called me a commie bitch, Jason. You refused to say sorry, and now you want me to do what you want?\" Stacey snapped.\"You are truly despicable\"\n\n\"Well am I wrong? Aren't you the one who filled the entirety of your room with pictures of HER?\"Jason replied.\" Aren't you the one who constantly bitches about the exploitation of the proletariat? They aren't even exploited, why are you stuck with this dead ideology?\"\n\n\"Oh? Should I start chanting about White Supremacy then?\" she hissed back. \"You spew out this nonsense day and night, and I am the one who is bitching? How about you go and burn another gay pride flag; maybe we can-\"\n\n\"Enough.\" The father demanded, banging his hand on the table.\n\nThe children tried to object, yet they both knew they didn't want to see their father's fury. They both unwillingly retreated to their rooms, leaving their parents alone."
 usa.143.a: "The American Family Will Never Be the Same"
 usa.144.t: "State legislatures move to change Election Systems"
 usa.144.d: "In an unprecedented act of ex-post facto electoral reform, factions within the legislatures of Pennsylvania and Georgia have announced within days of each other that, starting retroactively with the 2020 election, electoral votes shall be counted similarly to the systems of Maine and Nebraska. That is, each house district shall have a single electoral vote. Rather than a winner-take-all system, the voice of the people of districts shall be what counts in political contests.\n\nThough not as directly democratic as some wish, these proposed changes have been hailed by the States' Democrats and Moderate Republicans as a necessary safeguard against minority governments. However, pro-Trump forces see it as merely enabling voter fraud by stripping states of their powers to determine elections and giving undue power to district-level officials instead.\n"
 usa.144.a: "THEY ARE RIGGING THE SYSTEM!"
 usa.144.b: "Democracy Preserved!"
 usa.145.t: "Electoral Allocation Reforms Pass!"
 usa.145.d: "Late in the Night in a sudden session called by the Senate and House whips, Georgia and Pennsylvania have both voted for proposed changes to their respective allocation of electioral votes. The 2020 election results shall be allocated based on Congressional Seats and Senate seats. Similar to the systems already in place in Maine and Nebraska, the new system will undoubtedly pad the numbers of Democratic candidate Joe Biden, who will now enjoy the votes of Democratic voting districts in the two states.\n\nLauded by supporters as much-needed Democratic reforms, which ensure the will of the voters and ensure that the Trump campaign will not be able to pressure the state to allocate its votes contrary to the voters' will, the reforms have conversely been castigated by Trump loyalists as merely ensuring that Voter Fraud is harder to investigate and "correct".\n\nFurthermore, they argue that dark forces achieved the vote through bribes, intimidation, and other malfeasant means. From Twitter, Donald Trump has demanded the State legislatures "Reverse this awful, UN-DEMOCRATIC law, which ensures that millions and millions of Trump votes effectively DO NOT COUNT." Additionally, he declared "THEY ARE STEALING THIS ELECTION!""
 usa.145.a: "WHAT HAS THIS COUNTRY COME TO?!"
 usa.145.b: "By whatever means, get him out!"
 usa.146.t: "Pence Urged to Invoke 25th Amendment"
 usa.146.d: "Intrigue is the watchword in D.C. tonight, as New York Times journalists have broken the story that prominent Congressional Democrats and Republicans have privately urged Vice President Mike Pence and multiple Cabinet Officials to invoke the 25th Amendment against President Donald Trump. Section 4 of the Amendment states that the VP and cabinet can remove a President if they find him "incapable".Immediately after the story broke, numerous limousines bearing the Vice President and other Cabinet-level officials were seen rushing to the White House, before departing shortly thereafter.\n\nWhile the Trump Administration has remained deathly quiet over the allegation, it is clear they have taken it seriously, and that they believe Pence either took the advice seriously or did not notify the president of his receiving the urgings. The only information forthcoming has been a curt statement by Press Secretary Kaylee Mackennany stating that "the President is fully capable of dispensing his duties, and will not be bullied." Regardless, the very fact that this Amendment was even considered illustrates the dangerous waters through which the Administration now treads."
 usa.146.a: "Mike... Mike, what are you doing...?"
 usa.146.b: "Pence is honorable, and knows what he must do."
 usa.147.t: "Protest Outside the White House Turns Bloody"
 usa.147.d: "This year's elections have been quite turbulent as Donald Trump's victory is held under high scrutiny, with supporters celebrating, his opponents are doing everything they can to demand a recount as there have been cases of suspected election interference.\n\nWith a chance of the election being overturned and Donald Trump riling up his base, plenty of members of The Movement has taken it to the streets out of support of the recount or to cause disruptions in the streets.\n\nMost of these protests have gone mostly peaceful but one protest outside the White House turned into an absolute nightmare as a Trump supporter got stabbed in the neck by an unknown assailant, this led to more violent clashes between Anti and Pro-Trump protestors as the intensity of violence quickly increased.\nBlunt and sharp were the objects used, a broken nose here and a bleeding mouth there.\nEventually the police intervened but this was not without its fair share of pain, dozens of people were rushed to the hospitals, some are in critical condition.\nBoth candidates have not yet commented on the event but one thing is certain.\nThings will never be the same again."
 usa.147.a: "All it takes is one drop."
 usa.147.b: "So much for the party that called for "unity.""
 usa.148.t: "Tense Christmas"
 usa.148.d: "TODO"
 usa.148.a: ""
 usa.149.t: "Maine Legalizes Faithless Electors!"
 usa.149.d: "Openly thumbing its nose at the Supreme Court Decision from January 2020 to the contrary, the Maine Legislature has legalized faithless electors. This new law allows Maine's Second District Representative Jared Golden to cast his district's vote for Joe Biden in the upcoming electoral college count on January 6. The law was passed, much like many other recent electoral changes enacted after the election, in the dead of night, with many Republican members barred from the Capitol.\n\nAs such, local Trump loyalists have declared the law illegitimate and are assembling alternative electors as we speak. Protestors have descended on Augusta, the State's capital, to voice their grievances. Various Far-right groups, chiefly the Patriot Front and NSC-131, although no friends of Trump (most have publicly declared that they do not care if Trump or Biden wins) have joined hands with MAGA supporters in demanding the recension of the law.\n\n Donald Trump has voiced his opinion of the change on Twitter, declaring "What a shame, what a horrible, awful, CORRUPT country this nation is becoming! True Patriots; RESIST TYRANNY IN ALL OF ITS FORMS!""
 usa.149.a: "I WON, BY A LOT!"
 usa.149.b: "He's illegitimate, anything to get him out..."
 usa.150.t: "After new laws congress recounts..."
 usa.150.d: "...the Congress has declared that presidential nominee Joseph Robinette Biden Jr. has won the presidential race by 271 electoral votes, against President Trump's 267 electoral votes. Despite nearly becoming gridlocked, this intense election has finally come to an end. Now, with a brand new president, the people will definitely accept him, and America shall continue thriving as a functional democracy.\n\nAt least thats what we thought.\n\nAlmost immediately after the recount, President Donald Trump denounced the results, stating that the Democrats \"used votes from dead and juvenile people\" and \"manipulated these votes to win contested states\"\n\nDespite President Elect Biden dismissing these claims, 2 days later, a Pro-Trumpist mob surrounded the Congress, demanding a fair recount and an exclusion of fraudulent votes from the recount.Despite no major damage in the Congressional Building, an unknown source claimed that a bomb will be detonated inside the Congress, if they do not do another recount. Secret Services were forced to evacuate the entire building, and began tracking down the said person, later identified as Paul Hillfinger, a supporter of the National Socialist Movement. Paul later admitted that these threats were nothing more than blackmail, and that President Trump is the only one who can save the white race from the liberal 'N-Words'.\n\nThe media is already on fire, with many leftists claiming an \"attack on our democracy has been carried out\" by \"fascist bigots\". Many have already taken it to the streets, ferociously clashing with right-wing protestors, with an intensity similar to the 1992 LA riots. With the way things are going, it is doubtful whether the USA will survive the next year."
 usa.150.a: "This isn't over."
 usa.151.t: "Trump lashes out"
 usa.151.d: "It has been 10 days since the Congress has declared president elect Joe Biden as the 46th president of the United States, and the atmosphere is still as tense as ever. In a vast series of tweets, current President Donald Trump continues to claim that the election is a \"huge foul\" and that votes have been manipulated in favor of the Democrats. Trump has also repeatedly stated that the \"Democrats are undermining 244 years of Democracy for their own selfish cause\" and that \"they put their benefits over the will of the people\". Trump even claimed that Democrats not only used thousands of deceased people's IDs to get more votes, but that they also purged thousands of votes in favor of the Republicans, so they could win key battleground states. Despite the FEC, various election administrations and the US President Elect himself denouncing these claims, President Trump refuses to concede, and has boldly expressed his will to not step down. He himself has said in a recent interview that he will not step down unless a fair recount is made by the US Congress.\nTwitter users from both sides continue engaging into heated debates that frequently go out of control. In a recent study by an independent organisation, it appears that doxxing and death threats, in Twitter only, have risen up to 35%, and that Twitter moderators only respond to 7/20 doxxing reports. In terms of protests, both the left and the right continue clashing in the streets, with looting and arson creating over 1 billion dollars of damage. The United States is in flames, and it will need a lot of time to heal again..."
 usa.151.a: "Just concede, for the love of god!"
 usa.152.t: "Military Remains Divided"
 usa.152.d: "The military can't choose between Trump and Biden!"
 usa.152.a: "Choose a damn side!"
 usa.153.t: "DC National Guard Mobilized"
 usa.153.d: "In the early hours of January 20th, before the dawn had even broken, Washington DC was suddenly abuzz with activity. Humvees rolled down streets, barricades were set across major roads and highway entrances, and anti-air missiles were set up on top of office buildings.\n\nNormally, this would not have raised too many eyebrows. The President was about to be inaugurated, and in these tense times, extra security was a necessity. But the Trump administration had made no plans for a public inauguration ceremony, and they certainly did not let Biden's people plan one. Even more alarmingly, nobody in the White House had given the order to mobilize. All Secret Service agents were immediately ordered to report in and lock down the White House perimeter.\n\nThere were several potential reasons the Guard could have mobilized. The best case scenario is that General Walker has gone rogue and is attempting to subvert President Trump's authority. The other possibilities are even worse."
 usa.153.a: "Find out what the Hell's going on out there!"
 usa.154.t: "The Shots Heard 'Round the World"
 usa.154.d: "The Presidential motorcade slowly rolled out of the White House driveway, flanked by armored SUVs carrying machine gun-toting Secret Service agents. The streets were eerily empty despite it being broad daylight, with many people having realized what was going on and wisely opted to stay indoors.\n\nAt the intersection of 15th Street and Constitution Avenue was a barricade of concrete dividers and sandbags, manned by armed National Guardsmen. The lead car radioed the Presidential limo for orders as they neared the road. The response? "Drive right fucking through 'em."\n\nThe motorcade didn't decelerate, ignoring calls from the National Guard to stop and turn around. When they got within a hundred yards, the soldiers in the motorcade's path began opening fire, peppering the lead car with bullets. The motorcade hastily diverted, veering off the road and tearing up the lawn of the Presidential park as they made their getaway back to the White House, Secret Service agents providing suppressing fire from the windows of their cars. If the Guardsmen looked closely, they could've caught a brief glimpse of the President, staring at them from behind the bulletproof glass with unbridled hatred in his eyes."
 usa.154.a: "Uh oh."
 usa.155.t: "The White House Standoff"
 usa.155.d: "Following the Presidential motorcade's sudden return to the White House, National Guard forces closed in on the building and surrounded it from all sides. Dozens Secret Service sharpshooters filled every window and spot along the parapet, rifles aimed at the battalion's worth of guardsmen amassing on the streets below. Everybody waited tensely, wondering who would be the one to fire the first shot. Would the Guard storm the building? Would they let the President go? Would they eventually be recalled to their barracks?\n\nThe standoff was finally broken hours later by the distant sound of approaching helicopters. Five Sea King helicopters, each painted with the distinct green-and-white of Marine One. One touched down on the White House lawn, where President Trump, Melania, Barron, and a small contingent of staffers, generals, and Secret Service agents hurriedly boarded it. It took off shortly after, vanishing over the horizon with all the tension in Washington. But while the immediate crisis had resolved, another one orders of magnitude greater in severity was looming..."
 usa.155.a: "This isn't over!"
 usa.156.t: "The Inauguration of Donald Trump"
 usa.156.d: "Donald Trump stood in the command room of NORAD's Cheyenne Mountain Complex, surrounded by his wife and a gaggle of military officers. There was no family Bible, only a free Gideon copy someone had found laying around. Judge Tymkovich, being the highest ranking judicial official in the area, was brought in to officiate.\n\nPlacing his hand upon the Bible, Trump repeated the oath: "I, Donald John Trump, do solemnly swear  that I will faithfully execute the Office of President of the United States, and will to the best of my Ability, preserve, protect and defend the Constitution of the United States, so help me God."\n\nThere was a small burst of applause, and some photographers recorded it for posterity, but it was a far cry from a celebration. They all knew that halfway across the country, Joe Biden unlawfully sat in the White House, taking the same oath and claiming an office he had no right to hold. These next few months were about to get very, very messy."
 usa.156.a: "There's no going back now."
 usa.157.t: "The Inauguration of Joe Biden"
 usa.157.d: "Joe Biden stood in the White House's situation room, flanked by Jill, Kamala, loyal Congressmen, and those in the Joint Chiefs who stayed true to America. A somewhat shaken Chief Justice Roberts, still unnerved by the past few days' events, was officiating the ad hoc ceremony.\n\nPlacing his hand on the family Bible, Biden repeated the oath: "I, Joseph Robinette Biden Junior, do solemnly swear that I will faithfully execute the Office of President of the United States, and will to the best of my ability, preserve, protect and defend the Constitution of the United States, so help me God."\n\nThe room echoed with applause, as the lucky few journalists allowed in snapped photographs for this historic moment. But it was historic for all the wrong reasons. Halfway across the country, Donald Trump was holed up with traitorous elements of the military, taking the same oath and claiming an office he had fairly lost. They were on a collision course, and neither of them were willing to step out of the way."
 usa.157.a: "There's no going back now."
 usa.162.t: "Ohio, Pennsylvania, & Georgia Go into Recounts"
 usa.162.d: "The morning, the governors of Georgia, Ohio, and Pennsylvania all announced that they would begin a recount after a formal request to do so was made by Biden and the Democratic Party, alleging that Republicans had made an effort to invalidate votes.\n\nrepresentative of the Biden Campaign told reporters "There has been serious misconduct by Trump and the Republican party. Ballots have been thrown out, Mail-In votes were considered invalid in many states, and many people did not even receive their ballots. This is not only absurd but it is also sickening. President-Elect Biden will be in the White House come January, and we will make sure of it."\n\nThis morning, President Trump made a statement on this development saying:\n\"These guys, they're trying to say I didn't win when I did. And they know I did folks. I see them, I see them trying to point out all these irregularities, and voter fraud and Russian collusion, it's all nonsense folks. We're gonna expose these guys as liars, ok?"\n\nIt remains to be seen how the situation will develop, we can only hope that things de-escalate and that the Biden Campaign peacefully concedes the election."
 usa.162.a: "Cheaters Never Prosper."
 usa.164.t: "Biden Secures the Democratic Nomination!"
 usa.164.d: "After a hard fought primary, Joseph R. Biden has officially secured the 1,991 delegates needed and would fight to \"win the battle for the soul of the nation\". Mr Biden, who served as Barack Obama's vice-president, began the primary campaign in faltering style in Iowa and New Hampshire, but then came back with a convincing victory in South Carolina. Super Tuesday was more contentious, as many states swang in favor of Progressive candidate Bernie Sanders.\nMr Biden said: 'It was an honor to compete alongside one of the most talented groups of candidates the Democratic party has ever fielded and I am proud to say that we are going into this general election a united party.' \nRumors of voter suppression as well as backdoor corruption circle his victory, but the Biden campaign has denied these rumors, much to the displeasure of the Sanders campaign."
 usa.164.a: "Congrats Mr. Biden"
 usa.164.b: "Biden huh? Not who I would've chosen..."
 usa.165.t: "Wisconsin Papers Leaked"
 usa.165.d: "A bombshell report was released this morning from an anonymous DNC whistleblower that highlighted how the Biden Campaign knowingly persuaded the DNC to purge tens of thousands of voters, disproportionately people of color, from the rolls for offenses as trivial as a misplaced hyphen in a name in order to disadvantage Bernie Sanders. In addition, leaked recordings show how the Biden Campaign lobbied top DNC officials to close voter polls in areas with high support for Sanders in order to decrease turnout. Other files show how delegates were bribed by the Biden campaign to switch their votes at the last minute to give the edge to Biden. The democratic party stands reeling from this revelation, as progressives demand for Biden to be disqualified. The DNC leadership and Biden have denounced all accusations as baseless lies, and have challenged the whistleblower to come forward. They maintain that Biden will continue on as the nominee. "
 usa.165.a: "Lies! Slander!"
 usa.165.b: "This is getting ridiculous..."
 usa.166.t: "Protests Break Out Over the Wisconsin Papers"
 usa.166.d: "Across the nation, leftists and progressives take to the streets to protest, which oftentimes escalated to outright rioting in regard to the results of the 2020 Democratic Primary and the new findings about voter suppression and manipulation in favor of democratic canidate Joe Biden. In Manhattan, New York City, the local Democratic Party headquarters was besieged by protestors demanding awnsers. In Portland, Governor Kate Brown called the National Guard out to lock down the city as mass protests began to spiral out of control. Despite all the commotion, many were quick to point out the futility of protesting as both the primary and the general presidential election have concluded, with a winner declared. This has led to a rise of pessimism among America's left, and a dissatisfaction for American electoralism as it again and again sidelines left wing polticians. A notable and very allegorical quote from a Twitter.com user sums up the mood: 'If this is what electoralism is like, then I'm pretty f*cking tired of electoralism.'"
 usa.166.a: "What's the Alternative?"
 usa.166.b: "Death to the American Plutocracy!"
 usa.167.t: "The Dow Crashes 2000 Points"
 usa.167.d: "The Dow Jones industrial average suffered its worst single-day point drop ever - smashing through records set earlier this month - as an oil price war rattled investors who have already been panicked over the coronavirus epidemic.\nThe blue-chip index neared bear territory amid mounting fears about a global recession, plunging a record-breaking 2,013.76 points, or 7.8 percent, to close at 23,851.02. The Nasdaq dropped 7.3 percent to 7,950.68.The S&P 500 index lost 7.6 percent to close at 2,746.56 - its worst day since December 2008 - after diving 7 percent in the opening minutes of the trading session, triggering a New York Stock Exchange 'circuit breaker' that had halted trading for 15 minutes. Monday marked the first time the trading curb took effect since the current thresholds were implemented in 2013 to avoid a repeat of 1987's Black Monday crash. The price of West Texas Intermediate crude oil tumbled more than 25 percent to $30.92 a barrel on Monday after Russia over the weekend rejected a proposal from OPEC to cut back on global oil production by as much as 1.5 million barrels a day. Some industry experts also see the squeeze on the US energy sector as an intentional ploy by Putin."
 usa.167.a: "Oh god, why is the red line going down???"
 usa.168.t: "Wildfires Continue to Ravage West Coast as Death Toll Soars"
 usa.168.d: "SALEM, Ore.- Wildfire smoke that posed a health hazard to millions choked the West Coast on Saturday as firefighters battled deadly blazes that obliterated some towns and displaced tens of thousands of people, the latest in a series of calamities this year. For people already enduring the coronavirus pandemic, the resulting economic fallout and political tensions evident in the Resistance protests and far-right counter protests, the fires added a new layer of misery. What's next? You have the protests, coronavirus pandemic, now the wildfires. What else can go wrong?' lamented Danielle Oliver, 40, of Happy Valley, southeast of Portland.\nThe death toll from the fires in California, Oregon and Washington stood at 31 and was expected to rise sharply. Most of the fatalities were in California and Oregon. A half-million Oregonians were under evacuation warnings or orders to leave. With air contamination levels at historic highs, people stuffed towels under door jambs to keep smoke out. Some even wore N95 masks in their own homes. Some communities resembled the bombed-out cities of Europe after World War II, with buildings reduced to charred rubble piled atop blackened earth. Residents either managed to flee as the flames closed in, or perished."
 usa.168.a: "California? More like Hell"
 usa.169.t: "The Other Option"
 usa.169.d: "To most political observers, 2020 has been a year marked by extreme political violence and extremism. Started by the COVID Pandemic, the effects of the Saudi Oil Crash on the American Economy, and the Resistance movement, far left parties such as the Party for Socialism Liberation (PSL) have seen exponential growth. Across the political spectrum, a Fascist Group known for its striking propaganda and use of American themes in its advertising has also seen itself thrust into the limelight. Originally started by Thomas Rosseau after a falling out with white-supremacist party Vanguard America, the Patriot Front has seen its branches pop up across the country. While the culturally left values of the left turn away many rural conservatives, the Patriot Front blames the common struggles of many Americans on Immigration, Cultural Replacement and Liberal Values. Because of their classical fascist and ultra-nationalist values, the Patriot Front has faced intense scrutiny and infiltration from Federal Security agencies, commonly known in extremist circles as 'glowies', with many such agents attempting to use honeypot operations in order to hinder the operational capacities and growth of the party. Despite their best efforts, the Patriot Front continues to pose a significant threat to the fundamental value of American Representative Democracy"
 usa.169.a: "It can't happen here right? RIGHT?"
 usa.170.t: "From Riches to Rags"
 usa.170.d: "He stared, heart sunken and jaw dropped at the sight of the red number before him. The DOW Jones was down, it was down the worst it had ever been. In history. Down from 30,000 points on Friday to 15,000 today on Monday. It dropped by half. In the first four days of the great depression, it dropped by 25%. At this day in history, in took two days for it to drop by 50%. He was now potentially tens of millions in debt from a weekend. Badwater Trusts Company was now nothing. His life's work. Gone in a weekend. From poor boy from New Haven to the living incarnate of the wolf of Wallstreet, back to nothingness again. He walked from his 88 million dollar mansion overlooking the Hudson in his impeccably tailored suit, and drove his lambo down the Henry Hudson Parkway to his towering office building smack dab in the center of lower Manhattan. He didn't even bother to park properly, just walking in. Every employee he passed stared at amazement at actually seeing him, the boss. Each and every one would be out of a job within the week from the janitor to the Vice Chairman of the Board. He got into the elevator and used his special key card to allow himself to go to the roof level,where the ride up was the longest of his life. It wasn't long before he was on the roof now, overlooking the broad scheme of skyscrapers around him, the distant sea farther into the background. The weather today was fittingly overcast and dreary. He stepped to the edge of the rooftop, looked at the far flung ground. He said a prayer to God in the first time in several decades, hoping he'd get past the pearly gates for his mortal sin of seemingly infinite greed. He gathered his nerves, adjusted his tie."
 usa.170.a: "And he took the leap into the icy blast."
 usa.171.t: "The Berkley Massacre"
 usa.171.d: "Shots rang out across the U.C. Berkeley campus earlier today as National Guard units clashed with Student protesters. Stories of what truly happened range wildly, with the National Guard claiming that Stones were thrown at the soldiers first, while the student activists claim that the soldiers shot first. With photos shared all across social media invoking the same imagery as the Kent State Massacre more than 50 years earlier, the nation stands in horror as pictures of the lifeless bodies of students bleeding out onto the pavement. Candlelight vigils were held in the late evening as the families of the victims called forth for justice and accountability from both the Trump Administration and the National Guard. The tragedy has drawn widespread condemnation from both the right, left and center. \n\nThe Trump Administration has as of yet not released a press statement."
 usa.171.a: "Horrifying..."
 usa.172.t: "Barbara Lee Joins PSL!"
 usa.172.d: "Long time Democrat and African-American Representative, Barbara Lee, has left the Democratic Party following the release of the bombshell Wisconsin Papers. Citing a long running problem with upper leadership and the 'swampish political establishment', Representative Lee has stated that 'the Democratic Party's concentrated effort on the suppression of black voices is too much to handle'. Representative Lee has opted to join the ranks of the Party of Socialism and Labor, which she says will pave the way to break the 2 party duopoly and bring freedom to those oppressed by the tyranny of the American Regime."
 usa.172.a: "The Radical Left Shows Their True Colors!"
 usa.172.b: "Dead Weight Drifts Away"
 usa.173.t: "Patriot Front March in Philidelphia"
 usa.173.d: "Police say scores of members of a group described by the ADL as white supremacist marched in Philadelphia over the weekend, clashing with pedestrians and setting off what were believed to be smoke bombs at one point.\n\nThe group of Patriot Front members, estimated at 450 to 500 people, marched for several blocks in Center City on Saturday evening wearing tan pants and black shirts with face coverings and carrying shields and flags. Police said they were chanting slogans such as \"Reclaim America\" and \"Death to the Zionist State\". Police said pedestrians \"engaged members of the group verbally\" and there were several physical encounters. Finally, someone from the group used what police believe were smoke bombs \"to cover their retreat as they fled,\" police said. Several onlookers began yelling at the group and banged on trucks as they loaded into their vehicles and drove off. Police didn't announce any arrests and said there were no reports of any damage or injuries during the march."
 usa.173.a: "Troubling"
 usa.174.t: "Patriot Front Clashes with the Resistance"
 usa.174.d: "Protests by rival far-right and left-wing groups in Richmond descended into violence, as the opposing sides engaged in clashes and at least one man was arrested for firing a gun at demonstrators. Nobody was hurt in an exchange of gunfire - and by Sunday evening there was no word on any injuries in numerous other skirmishes that saw opposing sides brawling, dousing each other in what appeared to be bear spray and breaking car windows of rivals."
 usa.174.a: "The country descends further into anarchy..."
 usa.176.t: "NSM Recruits Among Prison Gangs"
 usa.176.d: "The infamous Neo-Nazi Group, the National Socialist Movement, has suprisingly seen an uptick in membership following the increasing unstable political enviroment. Known for their public rallies and protests dressed in Nazi-styled uniforms, their membership had previously fallen to around 1-2 dozen core members. Despite this, the National Socialist Movement has seen to be making moves to collaborate with White Nationalist prison gangs across the country, with leader Burt Colucci seen making visits to several high profile gang leaders. While the group remains relatively fringe, it is a sure sign that the American political climate is getting more extreme by the day."
 usa.176.a: "What a bunch of LARPers"
 usa.177.t: "Patriot Front March in Washington"
 usa.177.d: "Several Hundred members of the white nationalist group Patriot Front marched on the National Mall this evening. The group donned a uniform of khakis, blue jackets, and tan hats. Their faces were obscured by sunglasses and white masks that covered their noses and mouths. Some carried American flags, others a banner that read 'reclaim America'. Those on the outer flanks of the procession were equipped with shields.\n\nThe group marched from the Lincoln Memorial down the Mall toward the Capitol building. Later, they ended up around Arlington Memorial Bridge, according to The Daily Beast, and some apparently became temporarily stranded when they could not all fit into their rented U-Hauls."
 usa.177.a: "Worrying"
 usa.178.t: "The American People's Liberation Army Forms"
 usa.178.d: "Following the devastating release of the Wisconsin Papers, the Party of Socialism and Labor (PSL), has annouced that it will form \"Community Self Defense Forces\", organized into what is now called the American People's Liberation Army, or the APLA. WIth increasing lack in faith in both the American electoral system following the Wisconson Papers and later judge rulings, as well as the economic fallout and continued failures of Washington leadership to address even the most basic of issues, such as healthcare, thousands of people were seen training with the APLA along the West Coast. While the APLA has registered as an official militia with no goal of violence other than self defense, opponents have called it a blatant insurrectionary group."
 usa.178.a: "The Dawn Bursts Red" 
 usa.179.t: "Judge Rules DNC Has Right to Pick Candidates in Back Rooms"
 usa.179.d: "The transcript was released from the most recent hearing at a federal court in Fort Lauderdale, Fla., on the lawsuit filed on behalf of Bernie Sanders supporters against the Democratic National Committee and former DNC chair Debbie Wasserman Schultz for rigging the Democratic primaries for Joseph Biden. Shortly into the hearing, DNC attorneys claim Article V, Section 4 of the DNC Charter stipulating that the DNC chair and their staff must ensure neutrality in the Democratic presidential primaries–is \"a discretionary rule that it didn't need to adopt to begin with.\" Based on this assumption, DNC attorneys assert that the court cannot interpret, claim, or rule on anything associated with whether the DNC remains neutral in their presidential primaries. The attorneys representing the DNC have previously argued that Sanders supporters knew the primaries were rigged, therefore annulling any potential accountability the DNC may have. In the latest hearing, they doubled down on this argument: \"The Court would have to find that people who fervently supported Bernie Sanders and who purportedly didn't know that this favoritism was going on would have not given to Mr. Sanders, to Senator Sanders, if they had known that there was this purported favoritism.\" \n\nLater in the hearing, attorneys representing the DNC claim that the Democratic National Committee would be well within their rights to \"go into back rooms like they used to and smoke cigars and pick the candidate that way.\" By pushing the argument throughout the proceedings of this class action lawsuit, the Democratic National Committee is telling voters in a court of law that they see no enforceable obligation in having to run a fair and impartial primary election. The DNC attorneys even go so far as to argue that the words \"impartial\" and \"evenhanded\"–used in the DNC Charter–can't be interpreted by a court of law. The judge ended the hearing by stating to both parties he would issue an written order on the DNC's motion to dismiss the lawsuit."
 usa.179.a: "Democracy Dies in Darkness"
 usa.180.t: "Bill DeBlasio Assassinated"
 usa.180.d: "In the latest development of the political chaos and instability in the United States, NYC Mayor and former Democratic Primary Candidate Bill DeBlasio was shot dead by an unknown assailant dressed in all black, who yelled \"Death to the American State!\" before disappearing soon after the shooting. While the NYPD has launched a state-wide manhunt, there is very little hope that the assailant will be caught. Meanwhile, there is mass speculation on the shooter's motivation. Due to the general unpopular nature of DeBlasio, fingers have been pointed in all directions. The Left claims that the Patriot Front group committed the attack, citing recent PF operations in and around the New England Area. On the other hand, the Right has pointed their fingers at Antifa, claiming that slogan \"Death to the American State\" sounds extremely anarchistic. Yet, some far-left groups blame the Atomwaffen Division, claiming only a group as insane as them would go as far as to kill a major politician. In the end, we should pin the blame on..."
 usa.180.a: "Antifa"
 usa.180.b: "the Patriot Front"
 usa.180.c: "the Atomwaffen Division"
 usa.181.t: "Green Mountain Anarchists Reform Collective"
 usa.181.d: "The Green Mountain Anarchist Collective was founded by David Van Deusen, Xavier Massot, Johnny Midnight, and Natasha Voline, this first generation of the collective came together shortly after the 1999 Seattle WTO protests and was greatly influenced by the Situationist International, Vermont's militant anti-colonial history, and libertarian-socialism.Often working with the Vermont Workers' Center, organized labor, and mass organizations, GMAC prioritized projects that built up directly democratic expression though the creation of grassroots counter-institutions.\n\nAlthough disbanding in 2005, following the recent turmoil, former leader David Van Deusen announced that the collective would be reforming in northern Vermont, restarting their former newspaper Catamount Tavern News, as well as starting training camps for \"self defense against the fascist menance\"."
 usa.181.a: "Anarchists? Here? Absurd." 
 usa.182.t: "FCC pulls right-wing media off the air"
 usa.182.d: "In a predictable yet simultaneously unexpected move, the Federal Communications Commission has completely pulled numerous prominent right-wing news media stations from active broadcast, including Fox News, Newsmax, and the One America News Network. In numerous states within the country, these news outlets are almost entirely inaccessible from mainstream television services, which has already caused an uproar by right-wing viewers of these sources on social media. These actions have been cited as a countermeasure against what the FCC has referred to as "a malicious spread of misinformation regarding the outcome of the electoral results" by these outlets, whom have been avowedly pro-Trump in rhetoric in ways that many democrats consider to be antagonistic propaganda.\n\nDespite the clear instruction by the Commission to enact this removal nationwide, it appears that such a desire is currently going unfulfilled. It seems as if the ban is only truly being enforced in states that are more or less in favour of the Biden administration, with pro-Trump states either disputing it, ignoring the demand, or flat out refusing to enforce the restriction. Nonetheless, this turn of events is doing nothing to mend the clear and obvious divide between Cheyenne and Washington."
 usa.182.a: "They're blatantly trying to silence us!"
 usa.182.b: "They can't just spread false information and expect to get away with it!"
 usa.183.t: "Trump Banned from Social Media"
 usa.183.d: "Today, a massive removal of online accounts and users from social media countrywide has occurred on various sites, ranging from Instagram, Facebook, YouTube and, most notably for President Donald Trump, Twitter. The \"banwave\" as many people are calling it has rendered thousands upon thousand of accounts to be expunged as a result of the removal, with the most prominent deletion being Trump’s own account, leaving him without a proper outlet to address his supporters. Due to the consistent outrage and chaotically widespread discourse on most social media platforms throughout the past few months regarding the current political situation, these waves of deletions are not entirely unexpected, with official statements from the parent companies of these websites citing their guidelines regarding quote, \"false information and violent rhetoric.\"\n\nIt is abundantly clear, however, that such decisions were not made without external encouragement. The Biden campaign has no doubt engaged in the pressuring of various large tech companies with intent to damage Trump’s campaign for the U.S. presidency. Regardless as to whether or not some view this move as draconian, it will intimately make things considerably more difficult for opponents of the Biden campaign."
 usa.183.a: "These people cannot be allowed to add fuel to the fire!"
 usa.183.b: "The bastards are censoring us!"
 usa.184.t: "Assassination Attempt on Tucker Carlson"
 usa.184.d: "Panic and chaos erupted within the Fox News headquarters in New York City today, as well-known right-wing political commentator and talk show host Tucker Carlson became the target of an attempt on his life earlier this afternoon.\n\nEyewitness accounts and security footage have captured harrowing images of the would-be assassin, who has since been identified as 24-year old Louis Hall, producing a handgun and rapidly approaching Carlson as he enters the building. Fortunately, the gun appeared to initially jam as Hall pulled the trigger, causing a scuffle to break out as members of security rushed to apprehend the suspect. The gun was discharged twice during the struggle, miraculously causing no injuries as both shots became lodged within the ceiling of the lobby, and Hall was quickly brought into custody.\n\nCarlson addressed the incident in the following broadcast, thanking the security staff for their quick response, in addition to expressing how grateful he was to be alive and well. The talk show host followed up with a segment regarding how destabilized the country has become over the last several months, largely due to who he referred to as "emboldened radical elements seeking to subvert America's way of life by any means necessary"\n\nNeedless to say, such a shocking attempt on a well-known media figure's life has done nothing to ease the fears and polarizing tensions within the country. Already, heavy amounts of internet discourse regarding the incident have already made its mark through social media, with many people condemning the attack, and a number of others regretting Hall's poor aim and subpar gun maintenance techniques."
 usa.184.a: "Thank God he's alright; these radicals need to be stopped!"
 usa.185.t: "Bomb Recovered at CNN Headquarters"
 usa.185.d: "A frightful and tense scene in Atlanta today as police and bomb defusal operatives converged onto the CNN Center after reports of an improvised explosive device were received from the network's location.\n\nHaving been fortunately intercepted by staff members before the device could be triggered, law enforcement were immediately notified, with the building rapidly evacuated for obvious safety reasons. The device, a "mail bomb" according to authorities, reportedly had gone unnoticed up until its arrival at the network's headquarters - no doubt an attempt to target the network's producers. Thanks to the quick response and carefully executed defusal efforts, the device was rendered inactive by police, mopping up the incident with no casualties or damage.\n\nAs of now, a large investigative effort is underway by members of the Federal Bureau of Investigations, who do not currently believe that such an incident is merely a once-off. An increase in politically-motivated violence has been seen over the past several months, largely due to the current political crisis taking much of the country by storm. While this particular incident has thankfully been averted, few people are so naive to think that this will be the last of its kind."
 usa.185.a: "This is a despicable act of political terror."
 usa.186.t: "Assassination of Maine's Faithless Elector"
 usa.186.d: "The state of Maine has entered a period of mourning, as representative Shannon Woodings has reportedly succumbed to her wounds this morning after an incursion at her home in Camden.\n\nWoodings had received a considerable amount of media attention after her surprising tenure as Maine's most prominent faithless elector, having refused to adhere to her region's majority vote for Joe Biden's presidential candidacy, notably crossing the floor to the candidacy of Donald Trump, citing "validity concerns" regarding the electoral process. Such a move, while obviously extremely controversial (even more so due to Maine's recent legalization of faithless electors), had its share of effects - Republicans hailed Woodings as a reputable politician with the integrity to recognize a falsified election, while Democrats decried Woodings as an undemocratic turncoat who was actively subverting the will of her region's popular vote.\n\nUnfortunately for Woodings, it appeared that her admittedly unpopular decision to cross the proverbial floor had brought her no shortage of enemies. Such was made tragically clear last night, when a currently unidentified individual approached Woodings's home at around 9:30 PM, rang the doorbell, and fired four times into the door as she approached, striking the representative twice and mortally wounding her. While the suspect currently remains at large, authorities have stated that a lead is likely to come up soon due to the haphazard and inexperienced assassination."
 usa.186.a: "This is an utter tragedy."
 usa.187.t: "Polling Officer Stabbed in Arizona"
 usa.187.d: "A worrying scene has unfolded in Phoenix today as 41-year old polling officer Roland Cooke became the unexpected victim of a murderous attack, in which many are stating to have been politically motivated.\n\nMr. Cooke had worked for many weeks leading up to the recent election as a poll worker, having volunteered to help ensure the democratic process was carried out properly and efficiently. Due to the largely disputed nature of such an election, as well as the horrible polarization of the general populace, threats and harassment targeting those counting the vote has become increasingly common over the last several months, even after the election has long since supposedly concluded. In Cooke's case, however, the threats have never been made manifest - until today.\n\nDuring his daily commute to his local supermarket, Cooke was approached by 36-year old Roger Allenwood, who reportedly asked him if he was indeed the Roland Cooke he was looking for. When Cooke responded yes, Allenwood produced a combat-oriented blade from his jacket and proceeded to lunge towards the poll worker. Cooke was stabbed in the left hand and upper arm before Allenwood fled the scene, being apprehended no less than an hour later thanks to witnesses catching the license plate of the truck he had fled the scene in. Allenwood, a vocal supporter of Trump during the election, had repeatedly stated on social media that the poll workers were engaging in the manipulation of the vote, a claim which is still heavily disputed.\n\nThe rising tensions and discontent with the election has only magnified due to the crisis unfolding before our very eyes, and this is no exception. Such a sudden brazen attempt to murder someone who merely wished to see the democratic process carried out has given rise to deep concerns over future targeting."
 usa.187.a: "Utterly barbaric behavior."
 usa.188.t: "Cross City Massacre"
 usa.188.d: "This morning, the residents of Cross City, Florida, were greeted with the horrific sound of battle outside their homes at around 4:0 in the morning. Citizens of the town were shocked awake as gunfire surrounded them in a seemingly endless onslaught, leading to many people hiding in terror while others bravely stepped out onto their porch to see what was occurring, despite their impromptu investigations being cut short by the imminent danger. Screams of pain and terror from the nearby police station were heard as frantic calls for backup were made, in addition to the residents themselves dialing 911. The gunfight lasted some 34 minutes, eventually dying down as mortified onlookers observed heavily armed men exiting the Dixie County Sheriff's Office, with only sparse gunshots being heard afterward.\n\nAs the then-unidentified men - reportedly wearing skull masks - exited the station, bloody and supposedly victorious, the few bold enough to watch through their windows caught sight of the armed group hauling corpses from the station - getting to work in what would later terrify the population of the small Florida town. As dawn was broken, the group dispersed almost as quickly as they had came, leaving residents to slowly step out of their homes, cautiously approaching the morbid monuments the group had left them to behold. With it, they found bullet holes and shell casings littering everywhere they stepped. Their town was no longer their home - it looked like a testament for things to come.\n\nAbove it all, were the bodies of their local law enforcement - strung up, bloody and barren, from lampposts and anything else they could be hung upon. Signs and writing adorned their still-uniformed corpses, reading phrases like "I SOLD MY FELLOW MAN OUT FOR A PAYCHECK" and "I AM A TRAITOR IN UNIFORM". As heavily armed police reinforcements searched through the bloody station, they accounted for a missing police-issue armored vehicle, in addition to most of the station's armory.\n\nWitness accounts have led authorities to believe that this is none other than the supposedly disbanded "Atomwaffen Division". Governor Ron DeSantis is expected to make an emergency statement later today."
 usa.188.a: "Mother of God- someone FIND these lunatics!"
 usa.188.b: "This- this can't be happening!" 
 usa.189.t: "Bombing at The New York Stock Exchange"
 usa.189.d: "This morning, after months of terror and violence never seen in the Big Apple since 9/11, has now reached a new high. The New York Stock Exchanged was attacked around 10:30, an hour after the opening bell rang a bomb had gone off on the trading floor. Reports suggest that up to 27 had been killed including 3 of the 4 perpetrators. Among the dead included CEOs, Journalist, Traders, Police and Security. Approximately 2 minutes after the bombing 4 gunmen rushed onto the floor and began firing, shortly after Police and Security stationed at the exchanged began exchanging gunfire, resulting in 3 perpetrators being killed, including 2 Security Guards and 1 Police Officer.\n\nThe New York City Police Chief Dermot Shea announced a statewide manhunt with a curfew this afternoon that goes into effect at 7:0pm along with the announcement of the mobilization of the state national guard. Governors in both New Jersey and Connecticut announced similar measures. Authorities have not yet commented on the motives or purpose of the attack yet, however described the surviving suspect as a bald white muscular male in his mid 30s, witnesses describe the man commanding the other assailants with him, also bearing a metal mask with voice changer. Other than the usual Far Right and Far Left organizations that are blamed for these attacks, other theories claim that it was carried out by disgruntled traders who left in the dust in the recent GameStop "short squeeze" and trading halt. The SEC Chairman Jay Clayton announced that the exchange would be closed for an unspecified amount of time in respect to those who had lost their lives. Fed Chairman Jerome Powell had refused comments on the effects this may have on the economy. Among those dead included CNBC Host James "Jim" Cramer, CEO of ARK Invest Catherine Wood, and Famous Trader Peter Tuchman."
 usa.189.a: "Has a Fire Been Lit?"
 usa.202.t: "Poverty Rates Skyrocket"
 usa.202.d: "A few weeks have passed since the start of the oil crisis, yet the economic situation of the United States looks increasingly bleak. Massive oil shortages have caused massive queues at every gas station, and more businesses are going out of the market by the day due to decreased business confidence and lower incomes. With economists predicting that the United States might be heading into a depression similar to that of the Oil Crisis during the 70s, a mass sell-off of assets combined with the demand for gold skyrocketing to unprecedented highs reflect the fear that has struck at the heart of every American household. Reports show that due to unemployment, decreased household incomes and inflation, the poverty rate in the United States is set to increase to 22 percent, numbers unseen since 1959. \n\nThe political reaction has been quite extreme, as presidential canidate Joe Biden has denounced Trump once more for his unsustainable energy policies and over-reliance on oil, while President Trump has blamed the Democrats for their opposition to supply-side policies such as fracking destroying the domestic energy industry. On the extremes, the Patriot Front been thrust into the limelight once more as they drew massive crowds in a controversial march in Boston. Clad in Blue Jackets, Khakis, Sunglasses and Tan Hats, their provocative banners blaming globalism have caused many disgruntled Republicans to join their ranks. Meanwhile, far left organizations such as the Party for Socialism and Liberation have organized demonstrations echoing the populist sentiment expressed in the Occupy Wall Street protests, blaming the greed of the capitalist system for the economy. Despite decades of entrenched anti-communist sentiment in the United States, it seems that their membership numbers are skyrocketing as well. \n\nAs extremism and poverty gripping the United States, many fear that the worst is yet to come."
 usa.202.a: "It's only begun"
 usa.203.t: "Trump Fires Secretary of Defense"
 usa.203.d: "In a tweet that has many stunned, Donald Trump wrote in a tweet that Secretary of Defense Mark Esper had been \"terminated\", and will be replaced by Christopher C. Miller, the director of the National Counterterrorism Center. Sources say Esper already had a resignation letter ready to go - because Trump threatened to fire him in June over a disagreement about using active duty troops to quell street protests - and had recently updated it.\n\nAfter it was clear Trump was ready to fire him, Esper kept a low profile, rarely talking to reporters and going on trips to Africa and India and appearing in recent weeks before friendly think tanks, where few tough questions would be asked.\n\nEsper is the former Army secretary and Raytheon executive who took over the job in July of last year from retired Marine Gen. Jim Mattis, who abruptly resigned over efforts by Trump to quickly reduce troops in Syria. Esper had earned the derogatory nickname \"Yesper\" for seemingly acquiescing or remaining silent over the president's kneejerk moves. Those ranged from reducing U.S. troops in Afghanistan and Syria with little or no deliberation to stopping Pentagon efforts to rename military bases named after Confederate generals."
 usa.203.a: "Troubling Times Ahead"
 usa.204.t: "FBI Raids Far Right Stronghold"
 usa.204.d: "Amidst the political extremism following the oil crisis and the COVID-19 pandemic, reports of far right and white supremacist activity have exponentially increased. As part of the effort to combat domestic extremism, the FBI has conducted a raid on a stronghold of white supremacists in Raleigh, North Carolina.\n\nAt 2:00 AM EST Federal Agents burst into the compound of well known local militia leader and white supremacist Gary Burns, and discovered a mass of illegally modified weapons as well as improvised explosive devices. In a standoff that lasted 4 hours, federal forces and militia groups exchanged fire, leading to 14 dead militiamen as well as 3 dead federal agents. Burns was arrested on charges of possession of illegal firearms, manufacture and possession of explosive materials, and first degree murder. His trial is set to begin sometime in 2023. \n\nDespite the charges, an online trend of #RememberRaleigh has started to go viral, especially among members of the alt-right. The #RememberRaleigh movement accuses the federal government of tyranny, and infringement of Mr. Burns 2nd amendment rights. In a political climate that has become increasingly polarized, the Raleigh incident is just more fuel to the fire."
 usa.204.a: "This Country Is Crumbling!"
 usa.205.t: "Militia Standoff in Illinois"
 usa.205.d: "In developing news around the hotly contested 2020 election, militias loyal to Donald Trump have refused to recognize the Biden administration, and have engaged in a days long confrontation with the FBI. Claiming that Joe Biden was a tyrant and a socialist who wanted to destroy America, the independent Illinois militia patrolled the highway, attempting to disrupt the movement of Federal Forces across Illinois. \n\nWhen Illinois National Guard under the directive of Governer J. B. Pritzker arrived to remove the militia from the highway, the militia opened fire and engaged with the Illinois National Guard. Although they were quickly overwhelmed by the numerical advantage held by the Illinois National Guard, they were able to claim the lives of 16 guardsmen before eventually laying down their arms. \n\nWhile Joe Biden has condemned the attack as a violent insurrectionary attempt, Donald Trump has defended the militia, stating that they were merely  exercising their second amendment rights to form a militia. While the national debate on militia organization and the election continues, it is clear that the country remains more divided than ever before"
 usa.205.a: "The Country Burns"
 usa.206.t: "Trump Declares a State of Emergency"
 usa.206.d: "Following violent riots that broke out following the confirmation of Donald Trump as victor of the national 2020 election, President Trump has declared a state of emergency. While several cities burn, Trump stated that \"radical leftists who want to steal the election for Sleepy Joe\" will be put down with any force necessary.\n\nSimilar to the protests in Portland following the death of Quinton Evans, unmarked Black Vans were seen taking protestors off the street. When the DOJ was questioned on it, they stated that it was part of a counterterrorism effort in order to stem radical left terrorism that has gripped the nation as of late. While opponents of the declaration have decried it as dictatorial and authoritarian, supporters of President Trump have stated that such measures are necessary to stop domestic terrorism and restore order to the nation."
 usa.206.a: "When will things return to normal?"
 usa.207.t: "Biden Declares a State of Emergency"
 usa.207.d: "Following a string of militia attacks that have occurred following the confirmation of Joe Biden as the 46th President of the United Stares, the Biden administration has declared a state of emergency. Biden has stated that \"radical right wing extremists\" will be put down with any force necessary, and present an existential threat to the United States\n\nFollowing the decree, the number of Federal Raids against militia groups has greatly increased. Confrontations between federal forces and militia groups have exponentially increased as federal agencies have attempted to crack down on militancy on the part of the right. When the FBI was questioned on it, they defended the recent initiative as necessary to prevent radicals from overturning the election. While opponents of the declaration have decried it as dictatorial and authoritarian, supporters of President Biden have stated that such measures are necessary to stop domestic terrorism and restore order to the nation"
 usa.207.a: "When will things return to normal?"
 usa.208.t: "Militia Forces Sieze Springfield, Missouri"
 usa.208.d: "The nation draws closer and closer to civil war as a Missouri-based militia has announced the capture of Springfield. The militia had declared that despite the currently contested status of the 2020 election, that the Democratic Party was attempting a coup, and that Donald Trump was the rightful victor of the election. Not wanting to risk a bloodbath like what happened in other states, the Missouri governor instructed troops to not engage, and to withdraw from the city.\n\nUpon the capture of the city, the militia had declared that until Donald Trump was declared the uncontested President of the United States, the city would remain under martial law. Hoping to inspire other militias in other states to do the same, militia leader Jared Abrams called upon \"patriots to fight like their ancestors before the, to overthrow tyranny and restore the rule of law to this great land.\"\n\nWhile the Biden government is yet to comment on this matter, it is clear that there is no turning back now. As brother faces off against brother, a deadly civil war seems all but inevitable"
 usa.208.a: "What have we done?"
 usa.209.t: "Midwestern States Declare Biden Illegitimate"
 usa.209.d: "There are many pieces of fiction that tell the tale of an America bitterly divided: A place which once was a glorious beacon of democracy had the torch of Liberty extinguished. The semblance of Order and societal stability eroding; Cities left burning. Drowned by waves of violence and rage.\n\nAnd then came a contentious election. When Fiction turned into Reality.\n\nWithin the span of 3 hours, the republican-leaning Midwestern States, their governments and, their governors had announced on the news and twitter that they had declared the election results void and the presidency of Joe Biden fraudulent and illegitimate. Violence between Pro-Trump militias and anti-trump crowds spark up as the national guard and police fail to suppress the chaos. And as the nation inches closer to a societal breakdown, many fear what will happen next."
 usa.209.a: "And for what will come next, they are right to do so."
 usa.210.t: "FILE REPORT: #2875"
 usa.210.d: "FEDERAL BUREAU OF INVESTIGATION\n\nRe. INCREASED SURVEILLANCE ON RADICAL RIGHT GROUPS:\n\nThe crackdown of the Right Wing Militias has not gone in the way we expected. Originally, we intended to dissuade membership of the militias to stunt their growth in order to preserve civil order in our country via increased surveillance, but the development of recent events (I.E political riots) forced our hand to double down on them through crackdowns. The increased surveillance was unpopular at the beginning, so the mass arrests angered the wider right-leaning electorate. Not only has this pushed republicans to the right, but fringe, extremist groups like Patriot Front have utilized the chaos and appealed to the angry nationalistic voters with populist rhetoric.\n\nRepublicans in general are loosing faith in the government, along with the wider establishment.\n\nWe warn that these are the initial steps for insurrectionary behaviour among the militia groups, as the wider feeling across the militias are of worry and antipathy. Caution is advised when dealing with these groups, lest stability erode even further.\n\n-Director Christopher Wray"
 usa.210.a: "E Pluribus Unum"
 usa.211.t: "Vaccine Convoy Intercepted by Militia"
 usa.211.d: "At approximately 11:00 AM EST, a FEMA convoy delivering vaccines in a underdeveloped and rural area was intercepted by 5 trucks and 32 militiamen. The front vehicle of the convoy attempted to circumnavigate the first truck but couldn't as the trucks would drive rapidly and surround the short convoy. The militiamen would get out of their vehicles and yell political slogans such as \"Make America Great Again\" and \"Take the country back\" along with other profanities thrown in. A fight with one of the convoy drivers erupted 5 minutes later, as a 23 year old named Jacob Bakers came out of his convoy truck and attempted to aggressively confront one of the militiamen but got punched and kicked to the ground. Chaos would ensue as almost all convoy drivers came out of their respective vehicles to aid Mr. Bakers, which erupted into a brawl between the 2 sides. One of them (the suspect is unknown) fired 13 shots into the group of convoy drivers, injuring 8 and killing 1. It was reported that they ran by foot being chased until the militiamen gave up. The fate of the vaccines and convoy trucks left behind is currently unknown."
 usa.211.a: "Troubling."
 usa.212.t: "The Jewish Defense League"
 usa.212.d: "After a massive surge in antisemitic attacks, particularly in New York City and the greater New York metropolitan area, the Jewish Defense League has once again become active, forming 'Jewish Self Defense Militias' throughout Jewish communities in New York. The JDL militias seem to be especially concentrated in the area of Kiryas Joel, despite the town being run by the anti-zionist Satmar Hasidic group. The JDL however has also organized militias among atheist and liberal Jews in the region, showing that the Jewish community in southern New York is becoming more and more unified.\n\nMany in the southern New York region have taken to protesting against the JDL's actions, with many complaining that they are arming and training violent religious extremists, and asserting that the JDL is preparing to commit attacks against arabs as they did in the past. Only time can tell what the JDL's next actions will be."
 usa.212.a: "This is starting to become a common occurrence."
 usa.213.t: "Rise in Afrikan Identity"
 usa.213.d: "With the resistance in full swing and protests against police brutality rocking the nation, a new radical ideology has once again gripped the African-American population, especially in the deep south. Faced with violent suppression of protests, groups such as the NFAC, New Black Panther Party, the African People's Socialist Party, and the Nation of Islam have formed a unified paramilitary named the Black Liberation Army, named after the Black Power organization that existed in the 70s and 80s. Despite their ideological diversity, their shared value in Black Nationalism and unprecedented instability have allowed the organization to operate with surprising efficiency. In an unprecedented display of unity, newly formed BLA paramilitaries marched down the streets of Jackson Mississippi, chanting slogans of black nationalism and separatism. \n\nDrawing inspiration from figures such as Malcom X and Marcus Garvey, the BLA has seen an unprecedented growth in membership. With African Americans being increasingly disillusioned with the ability for the United States to guarantee their rights and safety, the BLA is immensely popular amongst the youth. Newly joined BLA members receive extensive paramilitary training in basic firearms practice and protest tactics, in which afterwards they are organized into a section of a local chapter. \n\nOver the past few months, reports of terrorism done by the BLA has reached unthought of highs. The BLA has carried out a series of bombings, shootouts, robberies and prison breaks, all of which have severely worsened tensions in an already fragile south. Clashing with members of the neoconfederate paramilitary group League of the South, it seems like the clouds of ethnic conflict are brewing within the South."
 usa.213.a: "The Left has gone off the deep end!"
 usa.213.b: "The revolution will not be televised!"
 usa.214.t: "Confederate Sympathies Skyrocket"
 usa.214.d: "With intense riots and instability shaking the Black Belt, an intense reaction has emerged from ever more radicalized conservatives within the South. If one drives through Dixie, the sight of Confederate flags is not a rare sight. Despite their loss in the civil war over 100 years ago, much of the southern spirit stays alive today. Over 38% of southerners view themselves as having a southern identity rather than an American one - and in a time in which the power and competence of the Federal Government is being increasingly questioned, the percentage is projected to almost double.\n\nThe emergence of Black Nationalist paramilitaries participating in the Resistance protests have led the League of the South to be thrust into the limelight as a counterbalance. For every Black Liberation rally, there is a League rally nearby. With their support base concentrated in Arkansas, several local politicians have even pledged their loyalty to the group. With a deep conviction to restore the southern identity and preserve \"traditional southern values\", many moderates have called them extremists, yet despite that label, their membership has only continued to rise.\n\nOver the past few months, the LOS has concentrated their forces in Arkansas, with the leader Michael Hill giving several fiery speeches denouncing the Federal Government and its \"Yankee Imperialist\" policies. Thousands of young southerners have joined it's ranks, with many suspecting that if the United States were to break down, the organization would have enough institutional support to control the entire state of Arkansas. Despite calls from Coastal Liberals for a federal crackdown on the \"hate group\", the polarized and paralyzed FBI and NSA can do little but watch as extremism engulfs another part of the nation."
 usa.214.a: "Well, at least they're still voting red."
 usa.214.b: "Stop these white supremacist hicks!"
 usa.215.t: "Growth in Cascadian Identity"
 usa.215.d: "There is unparalleled beauty in the United States other than the Pacific Northwest - from Portland to Seattle, the rolling hills and forests of Cascadia represent the last unexploited natural areas of the United States. Yet not is all well - companies pouring in from California have attempted to ruin the picturesque landscape that is Cascaida. The cities of the Northwest are fraught with poverty, ruin and conflict, with radical groups firing upon each other in the streets of Portland, and income inequality soaring in the city of Seattle. When the local populace suffer, the robber barons in Washington rake in more and more money off the sweat and blood of the Cascadian worker.\n\nAs a response, a rise in Cascadian identity has engulfed the regions. Rather than seeing themselves as Americans, Washingtonians or Oregonians, pro-independence Cascadian groups have been successful at promoting a unified Cascadian identity, with more and more seeing themselves as Cascadians. In Portland, several local politicians belonging to Socialist Alternative have formed the Cascadian Socialist Party, promoting an eco-socialist model focused on the preservation of nature. In the Idaho Panhandle, the right has been able recruit among farmers and the rural populace, promoting the idea of the \"Northwest Territorial Imperative\" and Ecofascism, the development of an ethnostate which will return Cascadia to its rural roots. While there is a deep hatred between the two radicals of Cascadia, a mutual, unspoken agreement has formed to promote the creation of the Cascadian state. While a violent revolution for freedom is seemingly far away, the rise of the Cascadian identity is undoubtedly a sign of a dying nation."
 usa.215.a: "What an odd bunch of extremists..."
 usa.216.t: "Increase in Southwestern Seperatism"
 usa.216.d: "With recent ethnic conflicts shaking the United States and multiple cities engaging in open rioting, there has been a reported drastic rise in separatist thought in the American Southwest, especially among Hispanics. Recent Pew Research polling shows that nearly 15 percent of Hispanics now support the creation of a separatist state in the Southwest, wishing to separate itself from the violence and madness that has consumed the rest of the nation. Supporters of separatism have stated that the federal government in Washington DC has ignored the economic and social situation of the south.\n\nThe most notable faction among separatists are the Brown Berets, a pro-Chicano paramilitary organization that emerged during the Chicano Movement in the late 1960s that has now been revived thanks to the turmoil in the states. The Brown Berets are notable for their stance on educational reform, farmworkers' rights, and against police brutality and opposition against foreign intervention. Especially notable for their visible paramilitary presence, many have joined their ranks for a sense of community among the large migrant population. The Brown Berets have been arming and training young radicals - something that has drawn immense controversy. While the Brown Berets have defended their actions in the name of community defense, many are worried that their activities constitute terrorism."
 usa.216.a: "Mexican Invasion!"
 usa.216.b: "serve - observe - protect"
 usa.217.t: "Unemployment Hits 20 Percent"
 usa.217.d: "In a shocking report by the The Bureau of Labor Statistics, the unemployment rate of the United States has hit 20 percent for the first time since the Great Depression, levels 6 percent higher than the peak of the great recession. This shocking report has left financial markets reeling, with projected unemployment landing around 18 million.\n\nWith the Coronavirus pandemic in full swing, and the service sector losing critical jobs in a time where consumer spending has been incredibly low, a contraction in the economy was all but expected. However, combined with the oil crash just a mere 2 weeks ago, the trucking and transportation sector have gone under massive layoffs - ones that have left millions of working americans suddenly out of a job, and stranded at the side of the street.\n\nThe Trump administration has attempted to shift the blame onto the Democrats, with blame being put on the COVID lockdowns and the entanglement with foreign trade, while democrats have blamed trump's imcompetency and overreliance on oil for the cascading effect of the oil crisis. Alongside the infighting among the American Establishment, both the far-right and far-left have seen surges in membership, with Americans feeling helpless with government policy frozen among congressional bickering, and wishing for radical change to solve radical problems."
 usa.217.a: "The Democrats are Destroying This Nation!"
 usa.217.b: "The Trump Administration's Greatest Failure"
 usa.218.t: "Snowstorm Hits Texas"
 usa.218.d: "As Texas faced record-low temperatures in February 2021 and snow and ice made roads impassable, the state's electric grid operator lost control of the power supply, leaving millions without access to electricity. As the blackouts extended from hours to days, top state lawmakers called for investigations into the Electric Reliability Council of Texas, and Texans demanded accountability for the disaster.\n\nDuring the power grid crisis, all sources of electricity struggled during the frigid temperatures.Transmission companies inadvertently cut power to parts of the natural gas supply chain when ERCOT ordered the utilities to reduce power demand or risk further damage to the grid. That decision aggravated the problem as natural gas producers were unable to deliver enough fuel to power plants. At the same time, some wells were unable to produce as much natural gas due to the freezing conditions. Overall, there are 20 confirmed casualties because of the snowstorm."
 usa.218.a: "Pray for Texas"
 usa.218.b: "Republican Incompetence Strikes Again!"
 usa.219.t: "Increase in Nationwide Strikes"
 usa.219.d: "Strikes have shook every sector of the United States economy this year, from nursing to teaching to industrial labor. Reports from the National Bureau of Labor Statistics have shown that strikes in 2020 have nearly tripled compared to 2019, a phenomenon that has been attributed to the harsh working conditions that many \"essential workers\" have  had to endure due to labor shortages. For example, nearly 7000 nurses have gone on strike nationwide to protest long hours with little pay. Strikes among teaching assistants have shook educational institutions such as the New School in New York, and University of California systems, demanding higher wages due to the high price of living. Nonetheless, the massive uptick in nationwide strikes has indicated an anger among the American people with the status quo and the falling standard of living."
 usa.219.a: "The Commies are Sinking the Economy!"
 usa.219.b: "Rough Times Ahead..."
 usa.220.t: "Freeport Complex Chemical Plant Strike"
 usa.220.d: "With the COVID-19 Pandemic in full swing, workers in the Freeport Complex Chemical Plant have gone on strike to protest wage stagnation amid high inflation and unsafe working conditions. Following a decision to include the chemical plants workers in the definition of \"necessary workers\", as many as 9 workers have already died from COVID-related health problems, prompting the strike.\n\nSecurity Personnel from Dow Chemical Co. attempted to remove the strikers from the premises - to little success following a 2 hour standoff with the armed strikers and private security forces. The strike has received nationwide attention due to the chemical plant being one of the largest production facilities in the Western Hemisphere, producing ethylene, propylene, polyethylene, propylene oxide.\n\nFollowing a failed negotiation 14 hours after the initial standoff, the local union representative heightened the tensions by publicly supporting and sharing rhetoric from the Center for Political Innovation, a far left radical organization associated with the American Jacobin movement. This escalation has allowed the Trump administration to label the group as communist radicals, and threaten the use of force to break the strike."
 usa.220.a: "Crush The Communist Threat!"
 usa.220.b: "Solidarity to the Workers!"
 usa.221.t: "Freeport Complex Strike Broken"
 usa.221.d: "Following 4 days of failed negotiations, the sit in strike at the Freeport Complex Chemical  Plant has been broken as security forces of Dow Chemical Co. have dispersed the strike by force. The Company, Dow Chemical, has announced that all workers who had participated in the strike were to be laid off for breaking company policy, as well as the hiring of over 300 new engineers and technicians to replace those who have been hired.\n\nWith the end of the strike, public opinion is painfully split. The left blames the democrats inaction to prevent the government sponsored crackdown, and anger directed at the company for the violation of workers rights. Meanwhile, the right has praised trump for the fight against communism, and denounced the strike as anti-worker due to its allegiances to the CPI. Regardless, many worry that the new workers are not up to par with the old ones, and will cause significant risks to production."
 usa.221.a: "Serves Those Commies Right!"
 usa.221.b: "Another Example of Trumpist Tyranny!"
 usa.222.t: "Explosion at the Freeport Chemical Plant"
 usa.222.d: "A chemical explosion has occurred in the Freeport Chemical Plant today as thousands of pounds of toxic chemicals were swept up into the air in what some have dubbed \"the American Chernobyl\". With NORAD projecting an affected area as wide as the state of Texas itself, many have concerns over health risks related to many of the chemicals being incredibly carcinogenic. It is unknown the amount of people that will be affected in the long term, but most estimates range in the tens of thousands.\n\nLocal residents have shared disturbing pictures of dead crows filling the streets and livestock lying dead in their fields. Despite these shocking pictures, authorities have assured locals that it was safe to return only a mere 76 hours after the incident.\n\nWith the smoke of the explosion being visible from even commercial airliners, radical environmentalists have used the situation to protest the lackluster environmental regulations applied to companies such as Dow Chemical - criticism that has received widespread support throughout the United Ststes, but particularly in the Northeast, with a handful of reports of pseudo-Guerilla Warfare with between Environmental extremists and local Police Forces.\n\nMeanwhile, the Trump administration has tried its best to distance itself from the accident, releasing statements condemning Dow Chemical and the Texas State Government for their mishandling of the situation, and promised to send in national guard troops to help with the cleanup efforts."
 usa.222.a: "Pray for Texas"
 usa.223.t: "Patriot Front Marches in DC"
 usa.223.d: "In a stunning display of force, the far-right Patriot Front has staged a march featuring over a thousand of their members in the heart of the nation's capital, chanting \"Reclaim America\"Videos show members of Patriot Front outside the Lincoln Memorial wearing matching outfits of khaki pants, dark blue jackets, and baseball caps.Some carried flags, shields, and photographs show one banner reading \"victory or death\". Their faces were obscured mainly by sunglasses and white coverings around their noses and mouths. The group's leader Thomas Rousseau gave a speech near the Capitol reflecting pool in front of thousands.\"Our demonstrations are an exhibition of our unified capability to organize, to show our strength\" Rousseau said. \"Not as brawlers or public nuisances, but as men capable of illustrating a message and seeking an America that more closely resembles the interests of its true people.\" Although the march was met with a large amount of counterprotesters, police were able to keep the two groups seperate and no violence occured."
 usa.223.a: "Extremism in the Heart of the Nation"
 usa.224.t: "Suburban Radicalism"
 usa.224.d: "Amid a wave of rioting during the Movement Protests in nearby cities such as New York and Boston, has led many in the Northwest to turn for the Patriot Front for protection. In particular, amid reports of looting and arson, small buisness owners have turned to the Patriot Front for assistance in protecting their shops, leading to clashes between Movement protestors and Patriot Front members in suburbia. Despite the long running liberal and democratic nature of the Northeast, it seems that these riots have radicalized many to the far right, a worrying trend as violence descends upon the entire country."
 usa.224.a: "Worrying"
 usa.225.t: "A Nation Reborn, A Debt Unpaid?"
 usa.225.desc: "The United States has emerged from a brutal civil war, but the legacy of the previous regime looms large. Left behind are colossal debts totaling between $30 and $40 trillion - a burden that threatens to crush the new government's hopes for a stable future. Other major powers are watching closely, and the decision to accept or reject these debts has profound implications.\n\nIf we refuse to take on this debt, our legitimacy in the eyes of the world will plummet. Trade may become impossible as other nations refuse to engage, and IMF loans needed to rebuild could vanish, leaving us isolated. However, accepting the debt means burdening our new government with an amount that could take generations to repay, forcing painful austerity measures that could hamper any real recovery. However, there is the possibility of accepting the debt with the intention of renegotiating with our creditors in the future, a risky move, but one that could buy us precious time.\n\nThe decision we make today will shape the fate of our nation for decades to come." #AI :_(
 usa.225.a: "We will honor the debts of the past regime."
 usa.225.b: "We will not pay for the sins of the past!"
 usa.226.t: "Alaska Reclaimed and the Fate of the Fleet"
 usa.226.desc: "After a hard-fought campaign, the new American government has successfully reclaimed Alaska. This victory restores a critical part of the country, rich in natural resources and strategically vital to controlling the Pacific. As our forces secured the naval bases in Anchorage, an unexpected development occurred-half of the U.S. naval command stationed in Alaska was unable to escape in time. Several warships, submarines, and their crews are now under our control.\n\nThe capture of these naval assets presents both an opportunity and a challenge. While these ships can bolster our strength at sea, the captured personnel remain loyal to the old regime, creating a risk of sabotage or mutiny. How we handle this situation will determine the future of our naval power and stability in the region." #AI :_(
 usa.226.a: "Purge disloyal officers and forcibly take control of the fleet."
 usa.227.t: "President Trump Holds a Rally"
 usa.227.desc_1: "There it was, full of red-white-blue banners, posters and TV screens, filled with battle-spirited slogans, but most importantly - filled with patriots, fired up, ready to preserve their country at your hand's notice.\n\nMadison Square Garden, the belly of the beast that is DNC, a real rat lair.\n\nWith all musical and other sorts of political introductions and praises, finally you can get up on the stage and address those who were yearning for your image down below.\n\n"You know, they say a blue tide is coming - I call it a vermin tide - so much obstruction and hate! They'd rather blow our country up than lose power for another four years, they're using political warfare, lawfare, the fake media - never backing down with their lies. We're going against all odds, people.\n\nAnd you know, they say NYC votes Democrat, but so far I haven't seen a single one? Where are they? I'm here, no need to hide in the basement like Joe!\n\nMaybe it's because... you can really see what a disaster these lunatics have brought upon my beautiful city. So dirty, so unsafe. Is this what they want for all of us?\n\nThey are the radical left, trying to shut our mouths with their agenda using total media dominance, using corruption and death threats. They want to socialize our medicine, bloating it to unthinkable levels. They want to defund the police and let drug dealers run our streets. Me and You - we need to SAVE AMERICA from them. No choice but MAGA.""
 usa.227.desc_2: "Security still needed to be heightened here, in Richmond, ever since the unfortunate accident with police and the riots that followed. But it wasn't a problem for you - you put your life at risk many times for the sake of this country, some petty protesters won't stop you or your voters.\n\n"We need to talk, of course, about the riots, these terrible and disgusting insurrectionists ripping up our country. Millions and millions of dollars of property - gone, destroyed by these horrible people. And not just the property - they want to destroy our culture and our monuments too - it's crazy! They probably want to blow up Abe Lincoln!\n\nIt's all incited by these Antifa jerks - but we all know where they get their funding, don't we, folks? This so-called "Movement" claims to bring justice and peace, but really all they can do is the opposite. And Joe, he loves them! He loves praising them and taking pictures. Really appreciating all the destruction, Arson Joe we call him.\n\nBut I am the president of Law and Order, always have been. Security is our top priority. We have done so much - for our law enforcement agents. We Back the Blue, by the way, yes we do, our beautiful police officers - tell them they can be less gentle by the way! And, of course, our military - we brought it back from the dead after Obama's disaster. You can ask all these generals - they love me!\n\nOur country has never been stronger than under Trump and we're going to do even better - just you see. We need to stick, I say again, with Law and Order, 'cause if we don't - we won't have a country anymore.""
 usa.227.desc_3: "Feels good to be back here, in Florida. Surrounded by your most staunch supporters, the base, true believers in the cause. Their energy gives you the strength you need to keep going. Who else will transform America into something truly great?\n\n"We've seen what the Democrats are up to, and frankly, nobody likes it. They're weak, their coalition, it's barely glued together, mingling with all these radicals, but nobody actually wants them! It's "AGAINST Trump" they say, not much FOR anything.\n\nThey're racist, they're trying to make it look like the opposite, but they are. Always talking about Blacks and Indians - and I love them! - but they forget about our wonderful Hispanic and Asian Americans, so unfairly.\n\nChristians too, they want to destroy our values, our religion. The Bible, it means a lot to me. And while Atheist Joe wants you to believe that I never read it, I know that you must "love your enemy". And I love Joe, I love him because he's handing me this election.\n\nWe're making an America for all Americans here, folks, rich and poor, all races, all religions, not just the Democrats.\n\nThey're feeble, very weak on everything. But we're strong because people believe in our policy, they believe in America First - because it works! And it's so good. They want to put America Last, they care about places like Venezuela more, and that's why they're never gonna win.""
 usa.227.desc_4: "Here in Pennsylvania, a crucial battleground state, you were making your big move, snatching the key to victory, really showing that you're a champion of the workers.\n\n"The people of Pennsylvania know like nobody else: during our administration we had the greatest economy in world history. The greatest tax cuts ever, so beneficial to our blue collars and business! Bringing back American manufacturing, creating so many jobs in the process. We've done more for our economy than the democrats have done in 30 years, I'm told, maybe more.\n\nWe're in a little Covid debacle, engineered by Democrat lockdowns and riots, but it's almost over, so it's fine. Just a little more time and the numbers will be growing again, the GDP and the stock market say "vote Trump"!\n\nLook at their policy, folks! They want to undo all our achievements, appeal to their crazy lobbyists. They want to ban fracking, ban nuclear - horrible for our workers! And the biggest of them all, the G R E E N  N E W  S C A M, a trillion-dollar robbery, manmade disaster that they want so badly.\n\nBut we? We've got so many plans for the next four years. We're gonna drill and we're gonna dig. Unleash our country's potential like never before. And make so many great deals with other countries: Mexico, Canada - won't steal from us anymore. President Xi and Vladimir Putin - had great relations with those guys, but only because they respected me. No respect for Animatronic Joe and his motley crew.\n\nWho needs lame duck O'Bidenomics when you have MAGAnomics? I like that word, MAGAnomics, it's tremendous.""
 usa.227.a: "Make America Great Again!"
 usa.227.b: "Nothing But Lies Again."
 usa.228.t: "The Day"
 usa.228.desc: "Hello, My People... Good to see so many fellow patriots assemble today to show their concern for the way our country is heading. I'm very grateful to all of you for showing up, it's so, so important.\n\nBecause what we need to say... About those disgusting people over there and their plot to take over the country very illegally. They are crooked, they are hateful and they're out to get You, it's You that they're really after.\n\nThe lying media, the corrupt politicians, the Democratic National Corruption Committee and the Never Trump traitors, that horrible cabal of people that hate our country...\n\nThey are so cruel to us, so unjust and so unfair. Saying we must concede. How can we concede when we have been winning so much? And after all that we've done?\n\nThey're saying that I'm a loser, and they're saying that you the people are losers - but you are not losers! You're the ones that really won, you're the reason they're so afraid right now. No, we can not concede.\n\nSo I say we need to go there and put them back in their place, show those DC bureaucrats who the real power in this country is. A real show of force. It will simply serve to remind them who they owe their positions to!\n\nWe promised at the very beginning of our movement that we would bring DC back to the people, so if they don't want to give it away, then it's very simple - we take it from them!"
 usa.228.a: "Peacefully and Patriotically..."
 usa.228.b: "What a sore loser."
