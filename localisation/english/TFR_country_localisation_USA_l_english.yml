 usa_news.3.t: "Trump Declared Victor in US Presidential Election!"
 usa_news.3.desc: "In a shocking turn of events in the US, Donald J. Trump is slated to be the winner of the US presidential election and become the nation's next chief executive. Many political science experts previously predicted that Trump would lose the election, especially on the heels of many pressing issues in US society. However, Trump has seemed to defy the odds and especially the countless predictions voiced by established pundits. Interestingly enough, the Biden campaign has voiced strong opposition and has contested the results of the election, citing voting irregularities and other related issues.\n\nThe Democratic Party and other politically liberal organizations have already in tandem with Biden announced their condemnation of Trump's political aims for the next administration. Even though doubts about the election seem everywhere, congressional staff have ruled that the claims of irregularities by the Biden campaign are not concurrent with their own findings during the vote count. Regardless, it seems that the political bickering that gripped America during election season will not be going anywhere anytime soon."
 usa_news.3.a: "He just keeps winning!"
 usa_news.4.t: "Biden Declared Victor in US Presidential Election!"
 usa_news.4.desc: "Surprising very few, Joseph R. Biden is slated to be the winner of the US presidential election and become the nation's next chief executive. Many established political pundits and scientists have voiced that Trump's loss was almost inevitable, citing the multitude of obstacles that he needed to overcome to win. Interestingly enough, the Trump campaign has voiced strong opposition and has contested the results of the election, citing voting irregularities and other related issues.\n\nAlongside the Trump campaign, many top members of the Republican Party have raised concerns about mass voter fraud. Even though doubts about the election are everywhere, congressional staff have already announced that the claims of irregularities by the Trump campaign are not concurrent with their own findings during the vote count. It seems that the political bickering that had gripped America during election season will not be going anywhere anytime soon."
 usa_news.4.a: "Has normalcy finally returned?"
