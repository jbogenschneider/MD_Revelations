 states.50.a: "Push those bastards back to Monterey!"
 states.51.t: "Las Vegas After Action Report"
 states.51.d: "Command is bewildered after the recent battle with APLA forces over the city of Las Vegas. The generals were confident their superior numbers and air power should have delayed any attack made by the militia. As it stands, 5321 casualties, 89 tanks, 90 IFV's, 120 APC's, 200 trucks, 40 planes were lost in the defense of this strategically important city..."
 states.51.a: "I'd Rather be in Vegas, In dirty fucking Vegas..."
 news.185.t: "United Nations Convene!"
 news.185.d: "The United Nations has reconvened for the first time since 1964 in London in light of the emerging American Civil War that has destroyed the new millennium's status quo. With the notable absence of diplomats from Washington due to the current conflict, the General Assembly was filled with a flurry of conflict in itself as diplomats from all over the world had different responses to the civil war, with outright chaos in the assembly being prevented through the mediation by Abdulla Shahid. A consensus was reached to first and foremost establish a humanitarian peacekeeping taskforce to be deployed immediately on the East Coast and America's surrounding nations to begin assisting the skyrocketing refugee population and dwindling supplies from the collapse of law and order. An outright UN military coalition like seen during the Korean War was vetoed by both China and Russia due to 'the lack of a recognized American authority' as quoted by Zhang Jun, the Chinese representative in the UN. The General Assembly braces in the brewing storm as the collapse of the second superpower in the span of a century has destined for new conflicts to emerge."
 news.185.a: "The Blue Helmets Are Useless, As Always"
