 #Decision Categories
 USA_congress_category: "Capitol Hill"
 USA_congress_category_desc: "According to the Constituion of the United States, it is paramount we get support in Congress through the two houses, being the §YHouse of Representatives§! and the §YSenate§!.\n\nTotal §YHouse§! Support: §Y[?USA_house_support_var]§!/§Y[?USA_house_seats_var]§!\nHouse §RRepublican§! Support: §Y[?USA_house_support_gop_var]§!/§Y[?USA_house_seats_gop_var]§!\nHouse §CDemocrat§! Support: §Y[?USA_house_support_dem_var]§!/§Y[?USA_house_seats_dem_var]§!\nHouse §LIndependent§! Support: §Y[?USA_house_support_ind_var]§!/§Y[?USA_house_seats_ind_var]§!\n\nTotal §YSenate§! Support: §Y[?USA_senate_support_var]§!/§Y[?USA_senate_seats_var]§!\nSenate §RRepublican§! Support: §Y[?USA_senate_support_gop_var]§!/§Y[?USA_senate_seats_gop_var]§!\nSenate §CDemocrat§! Support: §Y[?USA_senate_support_dem_var]§!/§Y[?USA_senate_seats_dem_var]§!\nSenate §LIndependent§! Support: §Y[?USA_senate_support_ind_var]§!/§Y[?USA_senate_seats_ind_var]§!"
 USA_fighting_coronavirus: "Fighting The Coronavirus"
 USA_fighting_coronavirus_desc: "Coronavirus, or COVID-19, is wreaking havoc on our nation! Swift and decisive action is needed to flatten the ever-growing curve, yet we must tread carefully. Overreaching measures could shatter both the economy and the people's faith in the administration.\n\nWeekly Mask Gain: [?ROOT.mask_weekly_gain_var|=+0]\n\nMask Supply: [?ROOT.mask_supply_var|=+0].\n\n§RCoronavirus§! Affected States: [?USA_covid_states_var|-0]."
 USA_second_american_civil_war_category: "Second American Civil War"
 USA_second_american_civil_war_category_desc: "They said it could never happen here, §Ryet it did§!. The §YUnited States§! as we had known it is no more, it has been divided into countless warring factions competing for control on a reigonal or even a national level. With the average citizen who \"Just wanted to grill\" on the front lines shooting at their former brothers and sisters turned enemies. The world will §Rnever§! be the same again, and whoever is still alive, may wish they just had to keep fighting. §RThe American Century is over, and a New Century has begun...§!\n\n\n£legitimacy Legitimacy Strength: [?ROOT.legit_var|+1%] (£stability_texticon [?ROOT.legit_dynamic_var|+1%], £attack_texticon [?ROOT.legit_dynamic_var|+1%], and £defence_texticon [?ROOT.legit_dynamic_var|+1%]).\nCurrent Months Since the Civil War Began: [?ZZZ.USA_american_civil_war_months_var|Y0]"
 USA_deal_with_the_movement: "Deal With The Movement"
 USA_deal_with_the_movement_desc: "\"§RThe Movement§!\" is a collection of political activist groups advocating for social change across the nation. While many protest peacefully for police reform and racial equality, others have turned to rioting and destruction to voice their frustrations. Opportunists within the chaos have also used the movement as a pretext for looting and disorder. Regardless of motive, The Movement is destabilizing the nation, and if not addressed, it could spiral out of control.\n\n§RThe Movement's§! Stronghold States: [?USA_the_movement_states_loc_var|-0].\n§RThe Movement's§! Effects: £stability_texticon [?USA_the_movement_states_var|=+0%]."
 USA_counting_heads_category: "Counting Heads"
 USA_counting_heads_category_desc: "\n\n\n\n\n£GFX_USA_counting_heads_banner\n\n\n\n\n\n\n\nThis is it, the time of Great Crisis has arrived in America, and there is §RNo Way To Turn Back§!.\nWe must secure loyalties from different factions within the union in order to save the nation, for if we fail, §RAmerica Will Cease To Exist§!.\n\n£legitimacy Legitimacy Points: [?ROOT.legit_var|+1%].\n"
 USA_2020_election_category: "The Next Election"
 USA_2020_election_category_desc: "\n\n\n\n\n£GFX_USA_american_elections_banner\n\n\n\n\n\n\n\nThe next elections are coming this November and it is our job to see that our candidate gets elected for a term in the White House. This elections is seen by many as a referendum on Trump and his Populistic policies, and only time will tell whether or not the businessman can hold onto the free world, or have it drift towards a new leader.[GetPoliticalEnable]"
 USA_recoring_category: "Reintegration"
 USA_recoring_category_desc: "In order to recore our states, we must first have claims on them. Then, we must get high enough compliance of those states. Once we do that, we will need enough political power to afford to core the state, and wait on the coring timer. Once finished, the state will have our claims removed on it, but we will gain a core.\n\nCoring Cost: £pol_power §Y[?ROOT.recore_pp_var]§!\nCoring Days: §Y[?ROOT.recore_time_var]§!"
