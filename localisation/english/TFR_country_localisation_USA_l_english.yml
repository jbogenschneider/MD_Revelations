 #Summary
 USA_country_summary: "§YCountry Summary§!:\nThe United States of America is described by many as a land of opportunities, wealth, and freedom. A nation that believes no challenge is too great, no mountain too tall, and no risk too discouraging.\n\nAnd after the end of the Cold War America believed that it would find itself as the single most powerful nation on earth. However, it would face many challenges, most of which it was unprepared for. Whether it be a resurgence of old and new enemies or unrest within its borders, America wasn't going to experience the peaceful century it had hoped for, instead, it was facing a new world that had begun to increasingly turn against her as time went on. Combined with an increasingly polarized population and murmurs of a new virus in Wuhan, America must truly stand united, for as Gerald Stanely Lee once said.\n\n\"America is a tune. It must be sung together.\""
 USA_country_paths: "\n\n\n§YCountry Paths§!:\n- §3The Union of America§!\n- §CAmerican Constitutional Government§!\n- §AAmerican People's Liberation Army§!\n- §PPatriot Front§!\n- §nNational Socialist Movement§!\n- §aAtomwaffen Division§!"
 USA_country_other: "\n\n§YTips and Tricks:§!\nIT'S INEVITABLE"
 #Events
 usa.1.t: "The American Century"
 usa.1.d: "America through the past 100 years has been considered the world's premier power, with the best economy the world has ever seen, a huge diverse landmass with a multitude of resources and people, and has become world's premier democratic nation. The last hundred years have provided the United States free range to spread it's ideas, with her enemies collapsing at her might. However, the demons of America's past have come to haunt her, ringing through her head ever louder as the days drawl on. The many voices cry for reparations for Black Americans who were once in chains throughout the Deep South, with liberation coming to them through the Emancipation Proclamation in 1863 during the American Civil War, and later in 1865 the 13th Amendment was ratified abolishing slavery. However, not all was right, for they were theoretically free, but the Southerners kept them as slaves in all but name. This was finally ended with the Civil Rights Act in 1964. However, the effects of slavery are still felt and racial relations have declined dramatically over the past few decades, leading to constant bouts over whether or not America is founding on the suffering of others or the liberty of the individual."
 usa.1.a: "E Pluribus Unum!"
 usa.2.t: "The Current Situation"
 usa.2.d: "Across the world, across Earth, across the cradle of humanity, a new decade has arisen. New Year's fireworks are still going off across the globe, and many are still creating their New Year's resolutions. In fact, the United States of America is not doing anything much different. With every decade it is tradition for our nation to overview the situations we face, whether it be economically, globally, or politically.\n\nEconomically, the nation has enjoyed relative stability over the past few years. Inflation and prices have been kept at a manageable level, and development has continued as expected across the country, however, much of this economic stability hinges on one crucial factor: oil. The growing dependence on what has become the 'new gold' of the world is vital to maintaining our nation's balance. Should our primary supplier cut off its supply, the United States could quickly find itself in a severe crisis. On the international front, the U.S. has faced a similar climate of tension in recent years. Disputes and incidents do arise, but they are generally handled through diplomatic channels or strategic interventions, ensuring that these issues remain contained and do not spiral out of control. Despite these challenges, the United States' sphere of influence remains largely stable, however, constant overwatch is needed in order to maintain our reach.\n\nOf the three main sets of problems the USA faces every decade, it is now the political system of grandeur that inhabits the machinations of our nation, that is our biggest issue. With the presidential race in full swing and election night rapidly approaching, political tension across the country has reached an unnerving level. Political anger is on the rise, and the polarization among citizens has become increasingly alarming. What were once simple differences in opinion have now led some individuals to adopt extreme stances, with many even arming themselves over political disagreements.\n\nWhile the challenges the United States faces in this new decade may appear straightforward at first glance, it is ultimately the outcome of the upcoming election that will decide the course of the nation. The stakes have never been higher, and the decisions made on election night will shape the future of the Land of the Free for years to come."
 usa.2.a: "Cheers to a new decade, and a new era for America! Whether it be bright or dim!"
 usa.3.t: "The GOP Collapses"
 usa.3.d: "With the media calling the election for Joe Biden, their seats secure, and the Texas lawsuit thrown out, many GOP members have distanced themselves from President Trump, revealing their true stance to the American people. In response, Trump supporters across the country are outraged and have begun leaving the GOP in large numbers, with some calling for Trump to create a new political party. Calls have also intensified for Georgia Trump supporters to abstain from voting in the Senate runoff elections, aiming to weaken the establishment GOP and force them to align with Trump in his efforts to challenge the election results on January 6th. Notable Trump-supporting activists have started organizing a protest for that same date to pressure Congress into supporting alternate electors, with the President himself giving them an endorsement telling his followers..."
 usa.3.a: "\"Be there, will be wild\""
 usa.4.t: "The Inauguration of Joe Biden"
 usa.4.d: "Joe Biden stood in the White House's situation room, flanked by Jill, Kamala, loyal Congressmen, and those in the Joint Chiefs who stayed true to America. A somewhat shaken Chief Justice Roberts, still unnerved by the past few days' events, was officiating the ad hoc ceremony.\n\nPlacing his hand on the family Bible, Biden repeated the oath: "I, Joseph Robinette Biden Junior, do solemnly swear that I will faithfully execute the Office of President of the United States, and will to the best of my ability, preserve, protect and defend the Constitution of the United States, so help me God."\n\nThe room echoed with applause, as the lucky few journalists allowed in snapped photographs for this historic moment. But it was historic for all the wrong reasons. Halfway across the country, Donald Trump was holed up with traitorous elements of the military, secretely taking the same oath and claiming an office that he had, according to the government, fairly lost. They were on a collision course, and neither of them were willing to step out of the way."
 usa.4.a: "America Weeps..."
 usa.4.b: "There's no going back now..."
 usa.5.t: "The Army Ceases Communications"
 usa.5.d: "Biden pressed a dossier into Austin's firm hand. His face was stern. The resolute desk was like a rift between them. "The national guard in VA needs to tighten up in Richmond. Northam said he's worried about the Capitol. This stinks, Lloyd."\n\nThe secretary of defense nodded as Biden breathed. "What about Barksdale? They better get their orders."\n\nSecretary Austin crossed his hands on the table, his gaze fixed on the president.  "We have no response from the commander."\n\nBiden turned, his jaw muscles tightening, a furious gaze filled with a conviction he had only felt since the massacres in Bosnia. "Don't bullshit me Lloyd."\n\nLloyd Austin fixed his glasses. Finally he managed to look away from the Commander in Chief, sweat building at his temples, hands cold as he predicted the calamity that would ensue once a  spark landed on the powder keg. There was no other way to go about this. Biden needed to know.\n\n"Fort Benning, Fort Knox and Fort Dix have all been silent since the state of emergency was declared. We received reports of them mobilising only at 0400. They intend to cross the Potomac."\n\nA pager went off in the hallway outside."
 usa.5.a: "\"God help us. This is it.\""
 usa.5.b: "\"God help us. This is it.\""
 usa.7.t: "Oil Crisis Hits America!"
 usa.7.d: "As if the economic situation in America could not get any worse, the collapse of Saudi Arabia has created an oil panic that has placed the last nail in the coffin of our anemic economy. While Saudi Arabian oil only constituted around 21% of our total imported oil in 2019, our other main sources have cut production due to the COVID-19 pandemic, and a few, namely Russia and Mexico, have reacted to the Saudi Civil War by raising prices exponentially. Domestic Oil production is not at the current level necessary to offset nearly 40% of domestic oil consumption provided by imports.\n\nWall Street has been nothing short of pandemonium; whatever tepid economic gains made after the initial lockdowns have been wiped out, as mass closures once again hit main street USA. The trucking industry, previously in full operation as an 'essential service', is now undergoing mass layoffs due to exploding gasoline prices.  Food is rotting in warehouses because no one can transport it. Grocery chains have announced that branches will be shuttered nationwide unless the situation changes rapidly.\n\nCoupled with the COVID pandemic, the new oil crisis has decimated what remained of the US economy. Investor optimism is at an all-time low, with some polls showing worse sentiment than at the height of the '29 Crash. Food and medicine shortages, the likes of which America has never seen, have hit much of the Mountain West and Appalachia; meanwhile rationing has been instituted across the country in all but name. Given the scarcity of many basic staples, people have been forced to break pandemic curfews to go out and search for supplies, aggravating the spread of the virus."
 usa.7.a: "What have we done to deserve this?!"
 usa.7.b: "What have we done to deserve this?!"
 usa.8.t: "The Movement Recedes"
 usa.8.d: "After months of unending ceaseless protests, the Movement has stopped all current and future protests which has caused great unhappiness among the Left and the Movement's supporters, while greatly excited those who opposed them."
 usa.8.a: "Cya!"
 usa.8.b: "Good Riddance!"
 usa.9.t: "GOP Rejects - High Expectations"
 usa.9.d: "In a surprising twist, the GOP has decisively rejected our compromise budget bill. This bill, which was formed after intense bipartisan negotiations and heralded as a potential fiscal breakthrough, contained contentious provisions aimed at tackling entrenched economic issues. It appears that these controversial measures were the stumbling block that led to the bill's downfall.\n\nWith tensions mounting and deadlines drawing near, our party is now in a frantic race to regain ground and salvage the situation."
 usa.9.a: "Hopes were high, but reality was not."
 usa.10.t: "GOP Accepts - High Expectations"
 usa.10.d: "In a relieving turn of events, the GOP has chosen to accept the drafted compromise budget bill. Initially unpopular within their ranks, there were concerns whether it would secure enough votes to pass. However, after a nail-bitingly close vote, the bill successfully cleared the legislative hurdle. This legislation, born out of heated negotiations and significant concessions from all sides, tackles critical economic challenges and aims to address long-standing issues.\n\nAs the joint session of Congress nears its conclusion, we can finally breathe a sigh of relief knowing that our calculated risk has paid off."
 usa.10.a: "An Interesting Move"
 usa.11.t: "GOP Accepts - Meet In The Middle"
 usa.11.d: "In a promising development, the GOP has agreed to accept the recently drafted budget bill. This meticulously planned legislation aims to address urgent economic concerns and was designed to secure bipartisan support, crucially averting a government shutdown. With Congress swiftly passing the bill with minimal obstacles, a sense of stability has returned to the political landscape.\n\nNow that the budget bill has been successfully passed, there is optimism that this momentum will carry forward."
 usa.11.a: "As we would expect."
 usa.12.t: "GOP Rejects - Meet In The Middle"
 usa.12.d: "After a tumultuous session of Congress, the GOP has unexpectedly rejected the compromise budget bill meticulously negotiated between our party and theirs. This bill, crucial for bipartisan support and averting a government shutdown, incorporated vital provisions tackling urgent economic challenges. The reasons behind the GOP's vote against the bill are open to interpretation, leaving many within the government stunned by this decision.\n\nAs tensions escalate and deadlines approach, our party is now urgently strategizing to salvage the situation."
 usa.12.a: "Start drawing up a new bill!"
 usa.13.t: "Flynn comes out of Retirement"
 usa.13.d: "Michael Flynn, former National Security Advisor for the Trump administration, has been recalled from retirement by the President following an abrupt pardon by the President on November 25th.\n\nThe National Security Advisor had been held up in court for over three years under the charge of assisting foreign agents - specifically, Turkish and Russian foreign agents. However, after having cooperated with investigations into these channels and what seemed to be an unfair holding of Flynn in court, President Trump issued a presidential pardon for him, freeing him of the judicial quagmire.\n\nMonths prior, Flynn had 'pledged an oath' to the QAnon theory, holding its' accusations against what it considers to be Democrat malefactors as true - his loyalty to the current president displayed as very much intact. With President Trump potentially losing his re-election, Flynn has reportedly advised the President to declare martial law, suspend the constitution and re-run the election. Though President Trump has denied this accusation, he has stirred up mass chaos with his resigning as National Security Advisor under the supposedly exiting administration.\n\nThe world watches with bated breath, as Trump's next move may decide the fate of the nation."
 usa.13.a: "Carpe diem."
 usa.14.t: "Biden Has Been Certified President"
 usa.14.d: "With one of the most tense political environments in US history driving the nation into this election, Donald Trump and Joe Biden have faced off against each other in this Presidential election. Despite the Michigan incident and multiple other accounts of votes simply 'appearing' in mid-air to be counted in favour of the Democratic party, Joe Biden has finally, after much conjecture, been certified as victor and US President-Elect by the Electoral College.\n\nAlready, celebrations have been broken up by violent clashes, with the nation remaining in chaos thanks to the tumultuous nature of this election. Should Biden become President as mandated, he will have to contend with a nation that wants nothing more than the extremes of that which he himself is purportedly against. His support is united around him by the sole factor of him not being Donald Trump, and should he not carry out the extreme policies that were necessary to gather The Movement on his side, his support may dissipate.\n\nMeanwhile, Donald Trump, still holding presidential power for another two weeks, has decried the electoral results as false, stating that he intends to carry a case to the Supreme Court against the Democratic Party for electoral fraud in the face of multiple shaky state victories for the Democratic Party.\n\nSome fear that the current President may resort to more drastic measures if the election is not re-run, with Michael Flynn and other figures connected to QAnon being reportedly called for a meeting in the White House as soon as possible."
 usa.14.a: "Pence, You Traitor!"
 usa.14.b: "We Did It!"
 usa.16.t: "The Death of Wall Street"
 usa.16.desc: "The United States stands on the brink of collapse, with the rumblings of a Second American Civil War growing louder each day. Months of fierce political conflict, surging violence, and a devastating wave of coronavirus infections have driven the country into crisis, decimating industries and leaving healthcare systems overwhelmed.\n\nLiving standards have plummeted, and the economy lies paralyzed. Trade has sharply declined, sending imports and exports into freefall and causing the prices of essential goods to skyrocket. U.S. banks, struggling to contain the damage, have imposed restrictions on withdrawals due to a \"critical liquidity shortage.\" This decision has sent the public into a frenzy, sparking a mass sell-off of assets and a scramble to convert savings into cash.\n\nWith Wall Street now in ruins, the U.S. financial collapse is rippling across the globe, dragging down international stock indexes and devaluing currencies as the world economy teeters on the edge. The deepening political instability has raised a specter that Americans and the world hoped was long buried: a Second Civil War. As factions within the United States grow increasingly militant, global markets hold their breath, watching as America seems ready to plunge into one of the most destructive periods in its history." #AI :_(
 usa.16.a: "The End of America is Near..."
 usa.77.t: "Qasem Soleimani has been Killed"
 usa.77.d: "Command in Kuwait has reported the successful operation in killing Iranian general Qasem Soleimani which functioned as a retaliation for the Iranian attacks on the K-1 Air Base in [IRQ.GetNameDef]. The Killing of the General has resulted in increased tensions between us and [PER.GetNameDef]. This has caused anger from the Left which are critizing the President for increasing tensions between our two nations, with a major news outlet defending the general by calling him \"Iran's Most Revered Military Leader\". Many also claim that the assasanation was an attempt to distract from the impeachment hearings. But no matter the perspective, it must be agreed this will have a major effect on Middle Eastern Politics."
 usa.77.a: "Another One Bites the Dust"
 usa.77.b: "Trump Is Gonna Start World War 3!"
 usa.78.t: "Atomwaffen Division Disbands"
 usa.78.d: "Starting as an online group of racist teenagers and commentators and spreading to a much darker, grimmer, and more militant group, the Atomwaffen Division has grown greatly within the past six years. Starting out as thirteen close friends shooting guns in their backyards, the group has exponentially expanded to hundreds of members and thousands of sympathizers due to recent racial tensions according to the FBI.\n\nMuch of the Atomwaffen Division's growth an be credited to James Mason, a Neo-Nazi accelerationist famous for his underground hit book, Siege. After taking control of the group in 2017, he initiated a massive purge of 'glowies'. Since then, Atomwaffen has been operating and recruiting out in the open and spreading its violent and hateful rhetoric across the country.\n\nYesterday, Atomwaffen announced on its website that they would be disbanding effective immediately, with little explanation given. Many anti-fascist figureheads celebrated saying that this is a major victory, while many are skeptical, claiming that Atomwaffen and its satellite groups are simply moving further underground and that they are still a present threat."
 usa.78.a: "Good, Now The Media Can't Call Me a Nazi... Right?"
 usa.78.b: "Trump Will Say This Means There's No More Nazis In America!"
 usa.79.t: "Covid-19 Cases Increase"
 usa.79.d: "The amount of Covid-19 Cases throughout the nation has drastically increased leading to an increase in quarentines and calls in sick, which is slowing our economy down."
 usa.79.a: "Well... That's Not Good"
 usa.79.b: "The \"Drumpf Virus\" Strikes Again!"
 usa.80.t: "2nd Amendment Rally in Richmond"
 usa.80.d: "As the Virginia State Senate votes on new firearm regulations, thousands of citizens from across Virginia, and from neighboring states, amassed at the Richmond townhall in support for the 2nd amendment."
 usa.80.a: "Good to See Fellow Patriots!"
 usa.80.b: "Hopefully Nobody Is Shot..."
 usa.81.t: "Richmond Police Kill Unarmed Black Protestor"
 usa.81.d: "Yesterday evening, a 24-year-old black man named Quinton Evans died in police custody in Richmond, Virginia. Evans was walking along the street when he was spotted by a police cruiser who believed he matched the profile of a wanted burglar. Although an identity check confirmed he was not the burglar, he had a warrant for failing to appear in court for a drug possession charge. He was detained by Sgt. James Harmon and put in the cruiser, where he suffered a brain hemorrhage and died en route to the police station.\n\nCell phone footage from bystanders, however, reveals a different tale. While performing the arrest, Harmon forcefully pushed Evans' head and body against a brick wall, enough to nearly knock Evans unconscious. He was shoved against the wall again for saying he was in pain, and his cry of \"You're killing me, man!\" was met with laughing dismissal by Harmon.\n\nThe footage was posted on social media the next morning, resulting in outrage from the black community and local activists. Spontaneous protests have formed at the site of Evans' arrest, as well as outside Richmond PD precincts and the city hall."
 usa.81.a: "Our thoughts and prayers to Mr. Evans' family."
 usa.81.b: "Let's Hope They Bring Change"
 usa.82.t: "Richmond Police Disband"
 usa.82.d: "In a close 53-47 vote, a City of Richmond referendum to disband their police department has narrowly passed. Following the murder of Quinton Evans and the subsequent Resistance riots across the country, a controversial call to disband the department has risen among the residents of the city. Citing overwhelming corruption within the department, voters have instead opted to replace the police with a new Department of Public Safety that would have likely included law enforcement, 911 responders and mental health professionals, taking a holistic approach to crime.\n\nWhile supporters have stated that the abolition of the department will shift vital resources away from violent policing and towards attacking the roots of crime, such as poverty and mental health, opponents have echoed concerns that violent crime will increase - especially given the dire state of the nation with the coronavirus pandemic.\n\nDespite the dissolution of the department, violent protests still rock the nation in the aftermath of the Quinton Evans Murder. While it is too early to see the full results of the Richmond Experiment, the United States has undoubtedly changed - for better or for worse. "
 usa.82.a: "Madness and Chaos"
 usa.82.b: "One Step in the Right Direction"
 usa.83.t: "Federal Police deployed to Richmond"
 usa.83.d: "Political clashes in Richmond have been increasing the past few days. Anti Second Amendment protestors took to looting and setting fire to many businesses in the city. While local police attempted to keep the mass crowd of Pro-Second Amendment away, multiple brawls and active shootings were reported. 4 casualties and 89 injuries have been confirmed by media outlets. Federal Police of various departments were mobilized and tasked with arresting identified individuals who attempted to set fire to the town hall. Media backlash was quick to follow. Hundreds of pictures of Federal Officers in tactical gear arresting protestors off the street and dragging them to an unmarked vehicle and promptly driving off."
 usa.83.a: "Order Is Being Restored..."
 usa.83.b: "Order Is Being Eroded!"
 usa.84.t: "Nation Wide Protests"
 usa.84.d: "Spurred on by the news of Quinton Evans' death in police custody, anti-police brutality protests have sprung up in Seattle, Portland, San Francisco, Los Angeles, Chicago, New York, Atlanta, Miami, and Washington D.C. Attracting tens of thousands of people more every day, their demands range from civilian oversight boards for police departments and greater restitution for victims of brutality to abolishing city police departments altogether in favor of community aid groups. Footage of Evans' death is spreading across social media like wildfire, along with hashtags like #BlackLivesMatter and #YoureKillingUs.\n\nThe Richmond Police Department has announced that they have put Sgt. Harmon in protective custody and are opening a criminal investigation into his actions, but it has done little to quell the outrage. It seems that these protests have morphed from reacting to one man's death into a general outpouring of grievances with police departments and the government, and only time will tell how long it takes for them to dissipate."
 usa.84.a: "This isn't going away any time soon, is it?"
 usa.84.b: "Do You Hear The People Sing?"
 usa.85.t: "Protests in Oregon"
 usa.85.d: "Portland, known as a hotbed of extremism on the West Coast has erupted into violent protests as the Movement sweeps across the country. Following the killing of Quinton Evans at the hands of the Richmond PD, demonstrators have called for an end to police brutality, systemic racism, and inequality. They also demanded justice for Black Americans who have been victims of police violence.\n\nThe protests in Portland drew national attention as tensions escalated between protesters and law enforcement. Federal agents were deployed to Portland to protect federal property, but their presence only fueled the protests. Protesters and federal agents engaged in violent clashes, with tear gas and rubber bullets being used by law enforcement.\n\nDespite efforts by law enforcement to disperse the protests, demonstrators in Portland remained steadfast in their cause. The protests continued throughout the summer and fall, with a number of high-profile incidents and arrests. The protests in Portland and other cities around the country brought attention to the urgent need for police reform and social justice in the United States."
 usa.85.a: "Go Home Hippies"
 usa.85.b: "Crush The System!"
 usa.86.t: "Nationwide Rioting"
 usa.86.d: "In wake of the death of an African-American civilian named Quinton Evans in police custody, hundreds of thousands of people have gone out onto the streets in protests in a show of force not seen since the L.A. Riots decades ago. The specific circumstances regarding the man's death are still somewhat vague as the trial regarding the incident has not yet come to pass, however footage of a yet unnamed officer holding his knee upon Quinton's neck while he states that he 'can't breathe' have stirred the emotions of millions, causing liberal and left protest groups alongside un-coordinated members of the African-American community to take part in these nationwide protests. Already, we have reports of escalation in Quinton's home city of Minneapolis, where looting of businesses big and small have occured in areas where the police department has lost control to the sheer weight of numbers involved in the protests.\n\nPolitical activists on the centre and left have decried what seems to be another 'run-of-the-mill police brutality incident' of what they deem to be a far larger crisis that requires drastic social action to be resolved. Hardline agitators have even equated the current situation to that of a drawn-curtain Jim Crow, with legal agents being able to 'escape prosecution' and 'exercise extrajudicial authority while handling minority suspects.' Conservative elements have called for a drastic de-escalation, stating that in regards to the incident involving Mr. Evans that 'Mr. Evans' detailed legal history displays a precedent for violence against officers' - this being what the suspect officer used to justify brute force prior to the death of Quinton Evans.\n\nConservative elements have already begun to arm themselves and enter cities protested in under a pretext of protecting small businesses, which they have stated as being targeted by the protestors. Clashes are inevitable."
 usa.86.a: "They'll Go Home Eventually..."
 usa.86.b: "No Justice, No Peace!"
 usa.87.t: "Establishment of the Capital Hill Autonomous Zone"
 usa.87.d: "Officers of Capitol Hill in Seattle Washington have abanonded the prencint and relocated to a nearby Safeway. Black Lives Matter, Antifa and other groups have set up roadblocks in the area and have proclaimed the 'Capitol Hill Autonomous Zone'"
 usa.87.a: "It's Only Going To Get Worse..."
 usa.87.b: "Autonomy For Those Oppressed!"
 usa.88.t: "Trouble in Capitol Hill"
 usa.88.d: "After several weeks of lawlessness and standoffish behavior within the ''autonomous zone'' of Capitol Hill in Seattle, it appears that this haphazard experiment in self-governance is nearing its expected end. Community leaders, radical organizers, and other Seattle locals attempting to maintain order and civility have mostly been met a lack of cooperation, both in terms of their political demands and from much of the population within the zone itself. Near-depleted food supplies, a lack of organization, and an increase in criminal activity within the area has led to the situation becoming untenable for the organizers, with authorities slowly moving in and diminishing the size of the area in recent days as violent incidents have begun to occur more and more frequently. \n\nThe most recent string of shootings - two of them fatal - has marked the beginning of the end for the zone's ''authority.'' Members of the Seattle Police Department, in tandem with the orders of the mayor and with the assistance of the Federal Bureau of Investigation, are now preparing to move into the area and put an end to their short-lived autonomy and restore order, whether those inside plan to go willingly or not."
 usa.88.a: "Law and order prevails, as usual!"
 usa.88.b: "Not much of an experiment."
 usa.89.t: "Elections Near"
 usa.89.d: "The year has been quite the test for President Trump, the outcome of this election will decide this nation's future, and will serve as a referendum on the President's populist platform."
 usa.89.a: "C'mon, Four More Years!"
 usa.89.b: "C'mon, Go With The Joe!"
 usa.90.t: "2020 Elections - Delays"
 usa.90.d: "Just as in the last Presidential Election, the election results have taken ages to count. Unlike the last election however, the counting has taken so long that most of the ballot counters have already gone to bed. So far though, Joe Biden and Donald Trump seem to be at an equalibrium, with most media outlets projecting a Biden victory."
 usa.90.a: "C'mon People, Say No to Joe!"
 usa.90.b: "Give me a break, Delays are normal!"
 usa.91.t: "2020 Elections - Ballot Meddling"
 usa.91.d: "Video from an anonymous source has surfaced showing trucks outside a Georgia voting poll unloading bags of ballots and wheeling them into the building after the polls had closed for counting at 4 am. Others on social media are claiming they have seen similar trucks and people unloading ballots into polls a few hours after the polls closed all across the country, with the media and the Democrats fervently denying any allegations, with Joe Biden seemingly in the electoral lead. Regardless of the truth, the public is starting to lose faith in the system..."
 usa.91.a: "Something is Fishy 'Round Here..."
 usa.91.b: "This Is the Most Secure Election Ever!"
 usa.92.t: "2020 Elections - Media Calls for Joe"
 usa.92.d: "It's official, several large media outlets have called the race for Joe Biden, as several states have seemingly completely flipped from an increasingly large edge over Biden on election night, to a close call race for Joe in many swing states. With the claims of Ballot meddling increasingly becoming center stage in the political debates on the election, many are beginning to abandon the media even some of which who have favored Trump in the past. However, the Trump campaign, the GOP, and Independents has already begun legal proceedings in several states to contest the results the states have announced."
 usa.92.a: "I WILL Win!"
 usa.92.b: "Good Call!"
 usa.93.t: "2020 Elections - Trump Holds Rally"
 usa.93.d: "These puny "experts" are saying we can't do it - "too bad for covid", while these antifa jerks - "Resistance" or whatever - they keep threatening me and my people. Security's scared shitless, saying "it's too dangerous". But what do they know? We can't bend right now, we've got to rally. Now is not the moment to surrender - leave that to the democrats, they want our country to surrender, but we can't do that - we've got to fight.\n\nI've got to show my people that I am with them, not like Basement Joe who keeps hiding. I'm out here holding the torch, because we're gonna win - but only if we do big things.\n\nOne small problem - there's so much to talk about I'm afraid it'll be all over the place, my dumb speech writers can't come up with a thing, but I know what My People need, I can feel it, no need for a teleprompter."
 usa.93.a: "Sleepy Joe and his radical left agenda will end our country!"
 usa.93.b: "I am the president of LAW AND ORDER - we must attack the so-called "Movement"!"
 usa.93.c: "So important - it's about unity, our christian values and AMERICA FIRST!"
 usa.93.e: "The polls say we're losing, but the economy says otherwise - hard as a rock!"
 usa.94.t: "2020 Elections - Texas Case Thrown Out"
 usa.94.d: "With the rapid developments in the justice system regarding the Trump campaign and a looming deadline to submit challenges, it became increasingly clear that the matter would reach the Supreme Court. The State of Texas filed a lawsuit with the Supreme Court against four swing states that appeared to have voted for Biden, arguing that these states unconstitutionally changed their election laws prior to the election and, therefore, their votes should not be counted. Texas claimed standing in the case, stating that the election results would affect the Senate, with the Vice President serving as the tie-breaker, and the Senate meant to represent the states. The lawsuit gained support from 17 other states and over 120 House Representatives.\n\nHowever, despite this justification, the Supreme Court ruled 7-2 not to hear the case, stating that Texas had \"no standing\" to sue. This decision has sparked outrage among many who feel their day in court has not yet come, viewing the ruling as a way for the Court to avoid making a significant decision. With the legal avenues now exhausted, President Trump has called on the GOP to object to the election results on January 6th and to count the alternate GOP electors from several disputed states."
 usa.94.a: "Even The Justice System Is Corrupt!"
 usa.94.b: "The Justice System Maintains Neutrality!"
 usa.95.t: "Democrats Walk Out Of Congress"
 usa.95.d: "The Democrats after their months of stalling congress from working in its traditional fashion, have recently just up and left. Many media outlets have attempted to find a reason for this by asking the Democratic leaders, but they have so far ignored any outreach. This is causing large amounts of unrest from the government fearing it may collaspe with parts going silent. Further adding to this unrest is rumors floating around that the Democrats are planning to rise against the government, using their time in Congress to prepare for the uprising, however the media has failed to look into these claims."
 usa.95.a: "The Straw That Broke The Camel's Back"
 usa.95.b: "Trump Broke The Camel's Back"
 usa.96.t: "Texan Family Killed in Standoff"
 usa.96.d: "Paramedics and firefighters searched the rubble of a rural home in western Texas. The home belonged to an airforce colonel living with his wife and two kids outside the city of Van Horn. US airbase 18 reported colonel Craig Brown had failed to report to the airbase for several weeks. Officers were sent to the home to find it had been boarded up with few holes in windows for sunlight to shine through. Friends reached Craig through phone and reported he sounded distressed and claimed he was protecting his wife and kids and would not be leaving his home. Fearing of a possible hostage situation, local SWAT and police arrived the following day and attempted negotations with Craig for the removal of his family. After several hours of failure, officers approached the home and were met with gunfire. SWAT teams moved in and prepared to breach through all sides of the home upon which Craig detonated a homemade bomb destroying much of the home. 6 Officers were wounded throughout the ordeal, and paramedics recovered the bodies of Craig and his family. Critics on social media were quick to denounce Craig's actions and call for the abolishment of the 2nd amendment."
 usa.96.a: "A terrible tragedy!"
 usa.97.t: "California's Crime Rate Increases"
 usa.97.d: "The recent gang war and nation wide rioting has put a large strain on California police in major cities. Response times are abysmal, nearly 15 minutes for an active shooting. Federal police has been deployed to some cities to assist the growing political violence that has also sweeped the nation."
 usa.97.a: "Help our boys in blue!"
 usa.98.t: "Texan Militias Deploy"
 usa.98.d: "Texan police departments have reported a worrying increase in activity from various left and right wing state-wide militias. These groups have begun to parade in various towns in an effort to \"Protect their community\"."
 usa.98.a: "Send In the National Guard!"
 usa.99.t: "Oregon Dissidents Organize"
 usa.99.d: "Various left wing militias in Oregon have activated and begun outright recruitment in larger cities. Police are unable to efficiently crack down on these recruitment drives due to major protests defending the organizers."
 usa.99.a: "Order!"
 usa.100.t: "Floridian Gangs Mobilize"
 usa.100.d: "Various gangs in major Floridian cities have began to openly display their members and define their occupied territory. Much like the rest of the nation, Floridian police are doing the best they can in stopping looters and portests."
 usa.100.a: "Send in the Federal Police!"
 usa.101.t: "Black Activists Organize"
 usa.101.d: "Leaders of African American Rights groups have organized in the deep south. Coordinating with other African American Militias, they have formed strong alliance."
 usa.101.a: "Send in the Federal Police!"
 usa.102.t: "Democrats Declare True Government"
 usa.102.d: "It seems the rumors were true, with help from loyal paramilitary groups and some elements of the military, the Democrats have taken control of the Senate, House of Representatives, and the White House and declared the Trump Administration and illegal regime. Members of the Republican Party present at these locations were arrested and tried for treason by a tribunal. What remained of the Republican party relocated to the midwest with the President fleeing the Denver with the rest of the government!"
 usa.102.a: "A House Divided, Cannot Stand..."
 usa.103.t: "President Trump Declares State of Emergency"
 usa.103.d: "President Donald J. Trump has declared a state of emergency, calling the current crisis the most unlawful and treacherous coup to be made in American history. He condemned the Democrats as crooks, hypocrites and traitors, accusing them of trying to steal the country and destory everything it stands for.\n\nWith Washington, D.C. under the control of the illegitimate Biden regime, Trump's government has been forced to relocate to Denver, making the city the heart of the ongoing political struggle. The United States Armed Forces reeling from mass defections, have left loyalist forces scrambling to reorganize. Meanwhile, divisions defecting to Biden's camp have seized key state capitols, drawing a clear border across the nation.\n\nAs the state of emergency deepens, America finally teeters on the brink of pure chaos. Denver stands as the last refuge for those loyal to Trump, as patriotic militias and military units rally under his command. The battle for the soul of the nation is about to erupt, with the future hanging by a thread. Victory or ruin-this is the path America has chosen."
 usa.103.a: "Death to traitors!"
 usa.104.t: "Democrats Refuse Diplomacy"
 usa.104.d: "Trump was in his new office in the temporary legislative hall in Denver. Pages were getting layered on his table. Hundreds of them. Each sentence was an ultimatum with extensive, yet empty explanations on why he, his family and all of his followers must be arrested and put to trial.\n\nHe couldn't believe it. All those things they talked about all the time - human rights, freedom, democracy - gone overnight. Just where are they taking this? Throughout his history of doing business, Trump was dealing with this kind of recklessness for the first time.\n\nIt was at that moment when the inevitable news came in from a gasping uniformed man that was let into office. The national guard units of Pennsylvania, Virginia and other rebel states have attacked those of Oklahoma, Missouri and Kansas.\n\nFor the first time in 160 years or so, one American faced another in combat. America was like a family to so many people, and now brother will kill brother in this biggest act of domestic violence.\n\n"What's next, sir?" - was the question that broke the momentary silence."
 usa.104.a: ""Next we fight.""
 usa.104.b: "Death to traitors!"
 usa.105.t: "The Line We Tow"
