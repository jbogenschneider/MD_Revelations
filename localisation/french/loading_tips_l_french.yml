l_french:
 LOADING_TIP_0: "Mais j'essaie de ne pas faire d'erreurs. Je veux dire, pourquoi dois-je, vous savez, me repentir ? Pourquoi dois-je demander pardon si je ne fais pas d'erreurs ? - Donald Trump"
 LOADING_TIP_1: "Car Dieu a tant aimé le monde qu'il a donné son Fils unique, afin que quiconque croit en lui ne périsse point, mais qu'il ait la vie éternelle. - Jésus, Évangile selon Jean"
 LOADING_TIP_2: "Chrétiens, sortez et votez, juste pour cette fois. Vous n'aurez plus à le faire. Encore quatre ans... ce sera réparé, ce sera parfait, vous n'aurez plus à voter - Donald Trump"
 LOADING_TIP_3: "Il s'éleva au milieu d'elles une autre petite corne, dans cette corne il y avait des yeux comme des yeux d'homme, et une bouche qui parlait avec arrogance. - Livre de Daniel"
 LOADING_TIP_4: "Et il lui fut donné une bouche qui proférait des paroles arrogantes et des blasphèmes... Et il lui fut donné de faire la guerre aux saints - Livre de l'Apocalypse"
 LOADING_TIP_5: "que l'homme de l'iniquité soit révélé, le fils de la perdition, l'adversaire qui s'élève au-dessus de tout ce qu'on appelle Dieu ou de ce qu'on adore - Paul, 2 Thessaloniciens"
 LOADING_TIP_6: "Il a été meurtrier dès le commencement, et il ne se tient pas dans la vérité, parce qu'il n'y a pas de vérité en lui. Lorsqu'il profère le mensonge, il parle de son propre fonds ; car il est menteur et le père du mensonge. - Jésus, Évangile selon Jean"
 LOADING_TIP_7: "Jésus leur parla de nouveau, et dit : Je suis la lumière du monde ; celui qui me suit ne marchera pas dans les ténèbres, mais il aura la lumière de la vie. - Jésus, Évangile selon Jean"
 LOADING_TIP_8: "Femme, où sont ceux qui t'accusaient ? Personne ne t'a-t-il condamnée ? Elle répondit : Personne, Seigneur. Et Jésus lui dit : Je ne te condamne pas non plus : va, et ne pèche plus. - Jésus, Évangile selon Jean"
 LOADING_TIP_9: "Ne jugez point, afin que vous ne soyez point jugés. Car on vous jugera du jugement dont vous jugez, et l'on vous mesurera avec la mesure dont vous mesurez. - Jésus, Évangile selon Jean"
 LOADING_TIP_10: "Ne vous amassez pas des trésors sur la terre, où la teigne et la rouille détruisent, et où les voleurs percent et dérobent ; mais amassez-vous des trésors dans le ciel. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_11: "Nul ne peut servir deux maîtres. Car, ou il haïra l'un, et aimera l'autre ; ou il s'attachera à l'un, et méprisera l'autre. Vous ne pouvez servir Dieu et Mamon. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_12: "Gardez-vous des faux prophètes. Ils viennent à vous en vêtements de brebis, mais au dedans ce sont des loups ravisseurs. Vous les reconnaîtrez à leurs fruits. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_13: "Entrez par la porte étroite. Car large est la porte, spacieux est le chemin qui mènent à la perdition, et il y en a beaucoup qui entrent par là. Mais étroite est la porte, resserré le chemin qui mènent à la vie, et il y en a peu qui les trouvent. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_14: "Heureux les débonnaires, car ils hériteront la terre... Heureux ceux qui procurent la paix, car ils seront appelés fils de Dieu. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_15: "Jésus lui dit : Je suis le chemin, la vérité, et la vie. Nul ne vient au Père que par moi. - Jésus, Évangile selon Jean"
 LOADING_TIP_16: "Et un autre ange... dit d'une voix forte : Si quelqu'un adore la bête et son image, et reçoit une marque sur son front ou sur sa main, il boira, lui aussi, du vin de la fureur de Dieu, versé sans mélange dans la coupe de sa colère, et il sera tourmenté dans le feu... - Apocalypse"
 LOADING_TIP_17: "Alors on verra le Fils de l'homme venant sur une nuée avec puissance et une grande gloire. - Évangile selon Luc"
 LOADING_TIP_18: "C'est pourquoi, quiconque entend ces paroles que je dis et les met en pratique, sera semblable à un homme prudent qui a bâti sa maison sur le roc. La pluie est tombée, les torrents sont venus, les vents ont soufflé et se sont jetés contre cette maison : elle n'est point tombée, parce qu'elle était fondée sur le roc. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_19: "Et il fut précipité, le grand dragon, le serpent ancien, appelé le diable et Satan, celui qui séduit toute la terre, il fut précipité sur la terre, et ses anges furent précipités avec lui. - Apocalypse"
 LOADING_TIP_20: "Et alors paraîtra l'impie, que le Seigneur Jésus détruira par le souffle de sa bouche, et qu'il anéantira par l'éclat de son avènement. - Paul, 2 Thessaloniciens"
 LOADING_TIP_21: "L'apparition de cet impie se fera, par la puissance de Satan, avec toutes sortes de miracles, de signes et de prodiges mensongers, et avec toutes les séductions de l'iniquité pour ceux qui périssent parce qu'ils n'ont pas reçu l'amour de la vérité. - Paul, 2 Thessaloniciens"
 LOADING_TIP_22: "Aussi Dieu leur envoie une puissance d'égarement, pour qu'ils croient au mensonge, afin que tous ceux qui n'ont pas cru à la vérité, mais qui ont pris plaisir à l'injustice, soient condamnés. - Paul, 2 Thessaloniciens"
 LOADING_TIP_23: "Et la bête que je vis... sa gueule était comme une gueule de lion. Le dragon lui donna sa puissance, et son trône, et une grande autorité. Et je vis l'une de ses têtes comme blessée à mort ; mais sa blessure mortelle fut guérie. Et toute la terre était dans l'admiration derrière la bête. - Apocalypse"
 LOADING_TIP_24: "Et celui qui était assis sur la nuée jeta sa faucille sur la terre. Et la terre fut moissonnée. - Apocalypse"
 LOADING_TIP_25: "Tu ne porteras point de faux témoignage contre ton prochain. - Le 9ème Commandement, Exode"
 LOADING_TIP_26: "Le faux témoin ne restera pas impuni, et celui qui dit des mensonges périra. - Proverbes"
 LOADING_TIP_27: "lesquelles reposent sur l'espérance de la vie éternelle, promise dès les plus anciens temps par le Dieu qui ne ment point. - Paul, Épître à Tite"
 LOADING_TIP_28: "Mais moi, je vous dis : Aimez vos ennemis, et priez pour ceux qui vous persécutent. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_29: "Tout ce que vous voulez que les hommes fassent pour vous, faites-le de même pour eux. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_30: "Je vous le dis en vérité, toutes les fois que vous avez fait ces choses à l'un de ces plus petits de mes frères ou de mes sœurs, c'est à moi que vous les avez faites. - Jésus, Évangile selon Matthieu"
 LOADING_TIP_31: "Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, de toute ta force, et de toute ta pensée ; et ton prochain comme toi-même. - Jésus, Évangile selon Luc"
 LOADING_TIP_32: "J'aimerais bien être pape. Ce serait mon premier choix. - Donald Trump"
 LOADING_TIP_33: "Oui, le bonheur et la grâce m'accompagneront tous les jours de ma vie, et j'habiterai dans la maison de l'Éternel jusqu'à la fin de mes jours. - Psaume 23"
 LOADING_TIP_34: "L'enfer est pavé de bonnes intentions."
 LOADING_TIP_35: "Je connais tes œuvres. Je sais que tu n'es ni froid ni bouillant. Puisses-tu être froid ou bouillant ! Ainsi, parce que tu es tiède, je te vomirai de ma bouche. - Apocalypse"
 LOADING_TIP_36: "Car un enfant nous est né, un fils nous est donné, et la domination reposera sur son épaule ; on l'appellera Admirable, Conseiller, Dieu puissant, Père éternel, Prince de la paix. - Ésaïe"
 LOADING_TIP_37: "J'hésite entre penser que Trump est un connard cynique comme Nixon, qui ne serait pas si mauvais (et pourrait même s'avérer utile), ou qu'il est l'Hitler de l'Amérique - JD Vance"
 LOADING_TIP_38: "'Jamais Trump', 'Répugnant', 'désastre moral', 'héroïne culturelle', 'M. Trump est inapte à la plus haute fonction de notre nation' - JD Vance"
 LOADING_TIP_39: "Je suis le bon berger. Le bon berger donne sa vie pour ses brebis. - Jésus, Évangile selon Jean"
 LOADING_TIP_40: "Je suis le bon berger. Je connais mes brebis, et elles me connaissent, comme le Père me connaît et comme je connais le Père ; et je donne ma vie pour mes brebis. - Jésus, Évangile selon Jean"
 LOADING_TIP_41: "Parce que tu dis : Je suis riche, je me suis enrichi, et je n'ai besoin de rien, et parce que tu ne sais pas que tu es malheureux, misérable, pauvre, aveugle et nu. - Apocalypse"
 LOADING_TIP_42: "Et parlons clairement du danger ici. Les faux messies ne font pas qu'échouer ; ils corrompent. Ils apprennent aux gens à confondre le pouvoir avec la droiture et la victoire avec la vertu. - Paul Mendlowitz à propos de Trump"
 LOADING_TIP_43: "Et il y eut guerre dans le ciel. Michel et ses anges combattirent contre le dragon. Et le dragon et ses anges combattirent, mais ils ne furent pas les plus forts, et leur place ne fut plus trouvée dans le ciel. Et il fut précipité, le grand dragon - Apocalypse"
 LOADING_TIP_44: "Je regardai, et voici, il y avait une nuée blanche, et sur la nuée était assis quelqu'un qui ressemblait à un fils d'homme, ayant sur sa tête une couronne d'or... Et un autre ange... lui cria d'une voix forte : Lance ta faucille, et moissonne ; car l'heure de moissonner est venue, car la moisson de la terre est mûre. - Jean de Patmos, Apocalypse"
 LOADING_TIP_45: "Bien-aimés, n'ajoutez pas foi à tout esprit ; mais éprouvez les esprits, pour savoir s'ils sont de Dieu, car plusieurs faux prophètes sont venus dans le monde. - Évangile selon Jean"
 LOADING_TIP_46: "deux hommes vêtus de blanc leur apparurent, et dirent : 'Hommes Galiléens, pourquoi vous arrêtez-vous à regarder au ciel ? Ce Jésus, qui a été enlevé au ciel du milieu de vous, viendra de la même manière que vous l'avez vu allant au ciel.' - Actes des Apôtres"
 LOADING_TIP_47: "Mais l'heure vient, et elle est déjà venue, où les vrais adorateurs adoreront le Père en esprit et en vérité ; car ce sont là les adorateurs que le Père demande. Jésus, Évangile selon Jean"
 LOADING_TIP_48: "Heureux les pauvres en esprit, car le royaume des cieux est à eux ! - Évangile selon Matthieu"
 LOADING_TIP_49: "Et Jésus dit : 'Père, pardonne-leur, car ils ne savent ce qu'ils font.' - Évangile selon Luc"
 LOADING_TIP_50: "Alors s'accomplit ce qui avait été annoncé par Jérémie, le prophète : 'Et ils ont pris les trente pièces d'argent, la valeur de celui qui a été estimé, qu'on a estimé de la part des enfants d'Israël.' - Évangile selon Matthieu"
 LOADING_TIP_51: "Je vous laisse la paix, je vous donne ma paix. Je ne vous donne pas comme le monde donne. Que votre cœur ne se trouble point, et ne s'alarme point.' - Évangile selon Jean"
 LOADING_TIP_52: "Le Fils de l'homme s'en va, selon ce qui est écrit de lui. Mais malheur à l'homme par qui le Fils de l'homme est livré ! Mieux vaudrait pour cet homme qu'il ne fût pas né.' - Évangile selon Matthieu"
 LOADING_TIP_53: "puisque vous avez été régénérés, non par une semence corruptible, mais par une semence incorruptible, par la parole vivante et permanente de Dieu.' - 1 Pierre"
 LOADING_TIP_54: "Et alors paraîtra l'impie, que le Seigneur Jésus détruira par le souffle de sa bouche, et qu'il anéantira par l'éclat de son avènement.' - Paul, 2 Thessaloniciens"
 LOADING_TIP_55: "L'apparition de cet impie se fera, par la puissance de Satan, avec toutes sortes de miracles, de signes et de prodiges mensongers,' - Paul, 2 Thessaloniciens"
 LOADING_TIP_56: "Sa queue entraînait le tiers des étoiles du ciel, et les jetait sur la terre. Le dragon se tint devant la femme qui allait enfanter, afin de dévorer son enfant, lorsqu'elle aurait enfanté;' - Apocalypse"
 LOADING_TIP_57: "Et il fut précipité, le grand dragon, le serpent ancien, appelé le diable et Satan, celui qui séduit toute la terre, il fut précipité sur la terre, et ses anges furent précipités avec lui.' - Apocalypse"
 LOADING_TIP_58: "Quand le dragon vit qu'il avait été précipité sur la terre, il poursuivit la femme qui avait enfanté l'enfant mâle. - Apocalypse"
 LOADING_TIP_59: "Et le dragon fut irrité contre la femme, et il s'en alla faire la guerre aux restes de sa postérité, à ceux qui gardent les commandements de Dieu et qui ont le témoignage de Jésus. - Apocalypse"
 LOADING_TIP_60: "La bête que je vis était semblable à un léopard ; ses pieds étaient comme ceux d'un ours, et sa gueule comme une gueule de lion. Le dragon lui donna sa puissance, et son trône, et une grande autorité. - Apocalypse"
 LOADING_TIP_61: "Et ils adorèrent le dragon, parce qu'il avait donné l'autorité à la bête ; ils adorèrent la bête, en disant : 'Qui est semblable à la bête, et qui peut combattre contre elle ?' - Apocalypse"
 LOADING_TIP_62: "Et le dragon [Satan] lui donna [à la bête] sa puissance, et son trône, et une grande autorité. L'une de ses têtes parut blessée à mort, mais sa blessure mortelle fut guérie. Remplie d'admiration, la terre entière suivit la bête. - Apocalypse"
 LOADING_TIP_63: "Et il lui fut donné [à la bête] de faire la guerre aux saints, et de les vaincre. - Apocalypse"
 LOADING_TIP_64: "Elle [les faux prophètes] exerçait toute l'autorité de la première bête en sa présence, et elle faisait que la terre et ses habitants adoraient la première bête, dont la blessure mortelle avait été guérie. - Apocalypse"
 LOADING_TIP_65: "Et elle [les faux prophètes] séduisait les habitants de la terre... disant aux habitants de la terre de faire une image à la bête qui avait la blessure de l'épée et qui vivait. - Apocalypse"
 LOADING_TIP_66: "Et elle [les faux prophètes] fit que tous, petits et grands, riches et pauvres, libres et esclaves, reçussent une marque sur leur main droite ou sur leur front, et que personne ne pût acheter ni vendre, sans avoir la marque, le nom de la bête ou le nombre de son nom... 666. - Apocalypse"
 LOADING_TIP_67: "Et j'entendis du ciel une voix qui disait : 'Écris : Heureux dès à présent les morts qui meurent dans le Seigneur !' 'Oui, dit l'Esprit, afin qu'ils se reposent de leurs travaux, car leurs œuvres les suivent !'. - Apocalypse"
 LOADING_TIP_68: "C'est ici la persévérance des saints, qui gardent les commandements de Dieu et la foi de Jésus.' - Apocalypse"
 LOADING_TIP_69: "L'ange jeta sa faucille sur la terre. Et il vendangea la vigne de la terre, et jeta la vendange dans la grande cuve de la colère de Dieu. Et la cuve fut foulée hors de la ville ; et du sang sortit de la cuve, jusqu'aux mors des chevaux, sur une étendue de §H200 milles§0.' - Apocalypse"
 LOADING_TIP_70: "Sur son front était écrit un nom, un mystère : 'Babylone la grande, la mère des impudiques et des abominations de la terre.' Et je vis cette femme ivre du sang des saints et du sang des témoins de Jésus.' - Apocalypse"
 LOADING_TIP_71: "Car Dieu a mis dans leurs cœurs [les 10 cornes] d'exécuter son dessein et d'exécuter un même dessein, et de donner leur royauté à la bête, jusqu'à ce que les paroles de Dieu soient accomplies.' - Apocalypse"
 LOADING_TIP_72: "Ce sont des esprits de démons... qui vont vers les rois de toute la terre, afin de les rassembler pour le combat du grand jour du Dieu tout-puissant. Ils les rassemblèrent dans le lieu appelé en hébreu Harmaguédon.' - Apocalypse"
 LOADING_TIP_73: "Le cinquième versa sa coupe sur le trône de la bête. Et son royaume fut couvert de ténèbres ; et les hommes se mordaient la langue de douleur, et ils blasphémèrent le Dieu du ciel, à cause de leurs douleurs et de leurs ulcères, et ils ne se repentirent pas de leurs œuvres.' - Apocalypse"
 LOADING_TIP_74: "les villes des nations tombèrent, et Dieu se souvint de Babylone la grande, pour lui donner la coupe du vin de son ardente colère.' - Apocalypse"