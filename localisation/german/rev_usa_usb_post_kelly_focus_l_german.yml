l_german:
 REV_USA_post_kelly_rebuild_command: "Föderale Institutionen wiederaufbauen"
 REV_USA_post_kelly_rebuild_command_desc: "Jeder möchte zur Normalität zurückkehren. Der Frieden ist zurückgekehrt, und jetzt müssen wir die föderalen Institutionen wiederaufbauen, das Vertrauen wiederherstellen und die Vergangenheit hinter uns lassen, während wir unsere Demokratie besser wieder aufbauen."
 REV_USA_post_kelly_war_footing: "Auf Kriegszustand umstellen"
 REV_USA_post_kelly_war_footing_desc: "Die nationale Haltung von der Notstandspolitik auf eine vollständige Kriegskoordination umstellen."
 REV_USA_post_kelly_military_budget_i: "Notfall-Militärbudget I"
 REV_USA_post_kelly_military_budget_i_desc: "Sofortige Mittel für die inländische Waffenproduktion und Logistik genehmigen."
 REV_USA_post_kelly_military_budget_ii: "Notfall-Militärbudget II"
 REV_USA_post_kelly_military_budget_ii_desc: "Die Industriekapazität erweitern, um längere Militäroperationen aufrechtzuerhalten."
 REV_USA_post_kelly_unity_campaign: "Einheitskampagne"
 REV_USA_post_kelly_unity_campaign_desc: "Trump war nie beliebt, er schaffte es, an der Macht zu bleiben, indem er Krieg führte, damit die gute Armee zu beschäftigt war, um seine Loyalisten herauszufordern. Jetzt, wo er weg ist, wollen alle Frieden und alle bis auf eine winzige Minderheit sind bereit, miteinander auszukommen und zu dem Amerika zurückzukehren, das wir kennen und lieben. Lasst uns unsere Demokratie gemeinsam besser wieder aufbauen."
 REV_USA_post_kelly_prosecute_war_criminals: "Die Verbrechen des Krieges verfolgen"
 REV_USA_post_kelly_prosecute_war_criminals_desc: "Es gibt viel aufzuräumen. Viele Einzelpersonen haben illegal vom Krieg und von der nationalen Spaltung profitiert, und einige haben regelrechte Verbrechen oder Gräueltaten begangen. Wir werden die Verantwortlichen für die dunkelsten Taten dieser Jahre strafrechtlich verfolgen und mit der Wiederherstellung der Rechtsstaatlichkeit beginnen."
 REV_USA_post_kelly_put_things_right: "Die Dinge in der Welt in Ordnung bringen"
 REV_USA_post_kelly_put_things_right_desc: "Die Vereinigten Staaten müssen wieder anfangen, die Dinge in Ordnung zu bringen. Wir werden die schlimmsten Exzesse der nationalistischen Periode rückgängig machen, die geflohenen Bürger zur Rückkehr einladen und zeigen, dass Amerika beabsichtigt, sich wieder wie ein verantwortungsbewusstes Land zu verhalten."
 REV_USB_post_kelly_war_cabinet: "Ein Kriegskabinett bilden"
 REV_USB_post_kelly_war_cabinet_desc: "Die politische Autorität konsolidieren und das Kommando um die südliche Regierung zentralisieren."
 REV_USB_post_kelly_total_commitment: "Doktrin des totalen Engagements"
 REV_USB_post_kelly_total_commitment_desc: "Staatliche Institutionen und Industrie auf eine lange Konflikthaltung verpflichten."
 REV_USB_post_kelly_emergency_arms_i: "Notfall-Waffenprogramm I"
 REV_USB_post_kelly_emergency_arms_i_desc: "Die inländische Waffenproduktion beschleunigen und industrielle Lieferketten mobilisieren."
 REV_USB_post_kelly_emergency_arms_ii: "Notfall-Waffenprogramm II"
 REV_USB_post_kelly_emergency_arms_ii_desc: "Die Militärproduktion weiter ausbauen, um die Durchhaltefähigkeit der Kampagne zu unterstützen."
 REV_USB_post_kelly_mobilize_the_base: "Die Basis mobilisieren"
 REV_USB_post_kelly_mobilize_the_base_desc: "Soziale Unterstützung, Personalfluss und Kriegsunterstützung für den südlichen Staat festigen."