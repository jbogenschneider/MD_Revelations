l_german:
 USA_state_of_the_union:0 "Trumps 2. Amtszeit"
 USA_state_of_the_union_desc:0 "Es kann doch nicht so schlimm werden wie die erste Amtszeit, oder? Spulen wir das erste Jahr schnell vor."
 USA_implement_tariffs:0 "Zölle einführen"
 USA_implement_tariffs_desc:0 "Zölle auf fast jedes Land erheben, außer auf Russland."
 USA_help_ukraine:0 "Der Ukraine helfen"
 USA_help_ukraine_desc:0 "Waffen an Europa verkaufen und der Ukraine einige Langstreckenraketen geben, um Russland unter Druck zu setzen, damit es früher aufhört."
 USA_pressure_ukraine:0 "Druck auf die Ukraine ausüben"
 USA_pressure_ukraine_desc:0 "Waffen an die Europäer verkaufen, aber der Ukraine nichts direkt geben."
 USA_close_the_border:0 "Die Grenze schließen"
 USA_close_the_border_desc:0 "Die Grenze schließen, die Einwanderung auf Arbeitsvisa beschränken und nur für eine ausgewählte Gruppe von Ländern."
 USA_crush_the_rioters:0 "Alle Nicht-Bürger verhaften"
 USA_crush_the_rioters_desc:0 "Blaue Städte verärgern, alle Nicht-Bürger zusammen treiben, bei Bedarf Gewalt anwenden."
 USA_keep_out_of_site:0 "Außer Sichtweite bleiben"
 USA_keep_out_of_site_desc:0 "Versuchen, nur Illegale zu verhaften und ein niedriges Profil zu wahren, um Unabhängige nicht zu verärgern."
 USA_end_the_chaos:0 "Vorbereitung des ICE-Einsatzes für die Zwischenwahlen"
 USA_end_the_chaos_desc:0 "Vorbereitung auf die Einschüchterung von Wählern bei den Zwischenwahlen."
 USA_reinvigorate_the_economy:0 "Wirtschaftsberichte manipulieren"
 USA_reinvigorate_the_economy_desc:0 "Das Beschäftigungswachstum ist nicht existent und trotz der Zölle wächst das Handelsdefizit. Die Inflation ist nicht schlimm, wenn man Dinge mit einrechnet, die sich niemand leisten kann. Lügen Sie einfach darüber."
 USA_restore_business_confidence:0 "Geschäftsvertrauen wiederherstellen"
 USA_restore_business_confidence_desc:0 "Möglicherweise müssen mehr Zölle zurückgenommen und die KI etwas reguliert werden, um den Unternehmen das Vertrauen zu geben, wieder einzustellen."
 USA_stimulate_the_economy:0 "Großer schöner Gesetzentwurf"
 USA_stimulate_the_economy_desc:0 "Superfinanzierung von ICE als potenzielle Privatarmee."
 USA_double_down_tariffs:0 "Zölle verdoppeln"
 USA_double_down_tariffs_desc:0 "Auch wenn die Zölle illegal sind, können Sie versuchen, die Gerichte zu ignorieren."
 USA_develop_gaza:0 "Gaza entwickeln"
 USA_develop_gaza_desc:0 "Trumps Friedensrat gibt zusammen mit Israel bekannt, dass ein neuer Tempel für alle Religionen des Gottes Abrahams mit Geld von Mitgliedern des Friedensrates gebaut wird. Die meisten Christen, Juden und Muslime sind entsetzt, Trump versteht es nicht."
 USA_blame_canada:0 "Kanada und den Demokraten die Schuld geben"
 USA_blame_canada_desc:0 "Kanada und den Demokraten die Schuld geben, sich verschworen zu haben, um die Wahl 2028 zu manipulieren."
 USA_unify_the_military:0 "Das Militär säubern"
 USA_unify_the_military_desc:0 "Eine vollständige Liste derer erhalten, die möglicherweise nicht loyal sind, und wenn sie bestochen werden können, tun Sie es, andernfalls zeigen Sie ihnen die Tür."
 USA_unify_the_military_tt:0 "Sie säubern/neuausrichten Teile des Militärs: Sie erhalten 2 zusätzliche Bürgerkriegsdivisionspositionen für die Freien Staaten von Amerika, wenn die Spaltung des Bürgerkriegs stattfindet, verlieren aber sofort §Y100.000§! Mannstärke."
 USA_raise_loyalist_formations:0 "Loyalistische Formationen aufstellen"
 USA_raise_loyalist_formations_desc:0 "Mit dem Geld, das vom Iran übrig geblieben ist, eine ausgewählte und persönlich loyale Panzerabteilung und eine Spezialeinheitsbrigade aufstellen und sie in der Nähe der Hauptstadt stationieren, wir könnten sie später brauchen."
 USA_border_patrol_agents_to_usb_tt:0 "Alle Divisionen der Grenzschutzbeamten werden sich den Freien Staaten von Amerika anschließen, wenn der Bürgerkrieg beginnt."
 USA_demand_greenland:0 "Grönland fordern"
 USA_demand_greenland_desc:0 "Grönland ist zu wichtig, um es in europäischen Händen zu lassen. Wir werden uns von der NATO lossagen, die Insel erobern und das Bündnis zwingen, die Konsequenzen zu tragen."
 USA_ignore_greenland:0 "Aufhören, über Grönland zu reden"
 USA_ignore_greenland_desc:0 "Ich schätze, es lohnt sich nicht, Europa wegen dieses eisigen Felsens zu verärgern, man sagt mir, er sei nicht wirklich so groß."
 NATO_Betrayed:0 "NATO verraten"
 NATO_Betrayed_desc:0 "Washington hat die Bündnisdisziplin für nackte territoriale Expansion aufgegeben. Die verbleibenden NATO-Mitglieder rüsten wütend auf und bereiten sich darauf vor, die Last ohne die Vereinigten Staaten zu tragen."
 USA_Idea_Bad_Debt2:0 "Schlechte Schulden"
 USA_Idea_Bad_Debt2_desc:0 "Jetzt, da die Vereinigten Staaten im Krieg sind, größtenteils mit Ländern, die früher ihre Anleihen kauften, hat Washington Schwierigkeiten, Geld aufzutreiben. Solange diese Idee aktiv ist, verlieren die USA jede Woche §R7 Schatzkammer§!."
 USA_by_force:0 "Grönland mit Gewalt einnehmen"
 USA_by_force_desc:0 "Wir brauchen die NATO nicht, nehmen Sie Grönland jetzt ein. Europa wird nichts dagegen tun."
 USA_invoke_the_insurrection_act:0 "Das Insurrektionsgesetz anwenden"
 USA_invoke_the_insurrection_act_desc:0 "Der Protest gegen die Verhaftung gewählter Gesetzgeber war enorm, was Trump die Gelegenheit gab, das Insurrektionsgesetz anzuwenden. Diesmal setzte er überwältigende Gewalt ein und begann proaktiv, bekannte Feinde ohne Gerichtsverfahren direkt ins Gefängnis zu stecken. Es gab nicht genug Leute, die bereit waren zu kämpfen, also war das das Ende der amerikanischen Demokratie."
 USA_sweep_midterms:0 "Die Zwischenwahlen gewinnen"
 USA_sweep_midterms_desc:0 "Die Demokraten haben die Zwischenwahlen mit einem beträchtlichen Vorsprung im Repräsentantenhaus und gerade genug im Senat für eine Mehrheit gewonnen. Nicht genug, um Trump abzusetzen, aber vielleicht geht er selbst für die Republikaner zu weit."
 USA_ridin_with_biden:0 "Amtsenthebungen"
 USA_ridin_with_biden_desc:0 "Die Demokraten im Repräsentantenhaus brachten eine Reihe von Anklagen vor, die jeden anderen Präsidenten abgesetzt hätten, aber die Republikaner im Senat hielten stand und verweigerten die Amtsenthebung."
 USA_project_2025:0 "Projekt 2025 ausführen"
 USA_project_2025_desc:0 "Befehl 66 ausführen, ich meine Projekt 2025. Die Republikaner haben auch die Kontrolle über den Kongress. Das Erste, was zu tun ist, ist jedoch, das Kabinett und das Justizministerium (DOJ) einzusetzen."
 USA_reactivate_mothballed_shipbuilding:0 "Eingemottete Werften reaktivieren"
 USA_reactivate_mothballed_shipbuilding_desc:0 "Eine erste Welle eingemotteter Marinekonstruktionen in Virginia, North Carolina, Florida, Boston, Kalifornien und Washington wieder in Betrieb nehmen."
 USA_expand_mothballed_shipbuilding:0 "Eingemottete Werften erweitern"
 USA_expand_mothballed_shipbuilding_desc:0 "Erneut ausgeben, um eine zweite Welle ungenutzter Werftkapazitäten in denselben zentralen Marinestaaten wieder zu eröffnen."
 USA_side_against_trump:0 "Trump auf jede mögliche Weise widerstehen"
 USA_side_against_trump_desc:0 "Die Republikaner haben die Kontrolle über den Kongress und die Exekutive. Hoffentlich können die Gerichte ihn in Schach halten."
 USA_engage_the_media:0 "Alternative Medien"
 USA_engage_the_media_desc:0 "Trump und die FCC werden versuchen, die Mainstream-Medien zu kontrollieren, aber der 1. Verfassungszusatz ist auf unserer Seite."
 USA_the_home_front:0 "Die Heimatfront"
 USA_the_home_front_desc:0 "Trump ist stark in die Epstein-Akten verwickelt, aber was soll's, sie werden ihn dafür nicht absetzen. Die Wirtschafts- und Arbeitsmarktberichte sind auch schlecht, wir brauchen eine weitere Ablenkung. Die Ölpreise sind gestiegen, aber in diesem Fall auch die Öleinnahmen."
 USA_expand_border_patrol_detachments:0 "Grenzschutzabteilungen erweitern"
 USA_expand_border_patrol_detachments_desc:0 "Fünf weitere Grenzschutzformationen finanzieren und sie aus dem DHS-Budget bezahlen, aber sie für Polizeieinsätze und Kampf ausbilden."
 USA_Invade_Cuba:0 "In Kuba einmarschieren"
 USA_Invade_Cuba_desc:0 "In Kuba einmarschieren, seinen Führer durch jemanden ersetzen, mit dem wir verhandeln können, und ihnen dann erlauben, Wahlen abzuhalten, wenn sie wollen."
 USA_instigate_a_conflict_with_china:0 "Einen Konflikt mit China anzetteln"
 USA_instigate_a_conflict_with_china_desc:0 "Wir müssen einen Konflikt vorbereiten, damit sich die Amerikaner, wenn die Zeit reif ist, auf eine externe Bedrohung konzentrieren können, anstatt zu einer internen zu werden."
 USA_instigate_a_conflict_with_china_tt:0 "Wenn Trumps Putschversuch von 2028 erfolgreich ist, wird ein späteres Ereignis ausgelöst, um den externen Krieg auf §YChina§! anstelle von Kanada umzulenken."
 USA_ramp_up_secret_arming_of_taiwan:0 "Geheime Bewaffnung Taiwans verstärken"
 USA_ramp_up_secret_arming_of_taiwan_desc:0 "Wir können Taiwan leise in einen Bunker verwandeln, bevor die Schießerei beginnt. Wenn wir eine Ablenkung brauchen, kann die Wahrheit ans Licht kommen und Peking wird empört sein, und wir müssen uns nicht mehr fragen, wann China Taiwan angreifen wird."
 USA_ramp_up_secret_arming_of_taiwan_tt:0 "Fügt §R50§! zu den §YSchulden§! hinzu und bereitet ein verdecktes Taiwan-Paket vor. Wenn der China-Krieg später ausbricht, werden §Y4 Spezialeinheitsgruppen§! in §YTaipeh§! unter §YUSA§!-Kontrolle erscheinen."
 USA_build_more_suicide_drones:0 "Mehr Selbstmorddrohnen bauen"
 USA_build_more_suicide_drones_desc:0 "Wir werden viele davon brauchen. Der Kampf im Pazifik wird billige, entbehrliche Angriffssysteme in einer Anzahl belohnen, die kein Beschaffungsamt in Friedenszeiten jemals genehmigen würde."
 USA_build_more_suicide_drones_tt:0 "Fügt dem nationalen Vorrat §Y1000§! Einheiten von §YSelbstmorddrohnen 2§! hinzu."
 USA_weve_got_that_out_of_our_system:0 "Das haben wir hinter uns"
 USA_weve_got_that_out_of_our_system_desc:0 "Wir haben beide einige Schiffe verloren und das hinter uns gebracht. China weiß jetzt, dass Taiwan eine unknackbare Nuss ist. Hoffentlich können wir jetzt wieder zum Geschäft übergehen."
 USA_turn_on_canada_after_china:0 "Nach China nach Norden wenden"
 USA_turn_on_canada_after_china_desc:0 "Wir sind wieder im Frieden mit China, aber der Feind im Inneren plant immer noch gegen mich. Zeit, sich nach Norden gegen die kanadischen Liberalen zu wenden."
 USA_prepare_to_invade_canada:0 "Vorbereitung auf die Invasion Kanadas"
 USA_prepare_to_invade_canada_desc:0 "Wir müssen einen Konflikt vorbereiten, damit sich die Amerikaner, wenn die Zeit reif ist, auf eine externe Bedrohung konzentrieren können, anstatt zu einer internen zu werden."
 USA_prepare_to_invade_canada_tt:0 "Wenn Trumps Putschversuch von 2028 erfolgreich ist, wird ein späteres Ereignis ausgelöst, um den normalen externen Krieg gegen §YKanada§! zu eröffnen."
 USA_encourage_democrat_elites_to_leave:0 "Demokratische Eliten zum Verlassen ermutigen"
 USA_encourage_democrat_elites_to_leave_desc:0 "Das Regime kann leise Vorkehrungen treffen, damit feindliche politische Eliten das Land verlassen, was den internen Druck verringert und gleichzeitig die Reichweite der Opposition einschränkt."
 USA_restore_bond_market_access:0 "Zugang zum Anleihemarkt wiederherstellen"
 USA_restore_bond_market_access_desc:0 "Nach Kriegsende kann Washington damit beginnen, das Vertrauen bei Gläubigern und Finanzinstituten wiederherzustellen, die amerikanische Schulden einst als unbestrittenes Papier behandelten."
 USA_restore_trade_with_china:0 "Handel mit China wiederherstellen"
 USA_restore_trade_with_china_desc:0 "Die Kämpfe sind beendet, aber der kommerzielle Schock bleibt. Wenn wir wollen, dass sich die Märkte normalisieren und sich die Staatskasse erholt, müssen wir den Bruch mit China aus Kriegszeiten lösen."
 USA_invade_mexico:0 "In Mexiko einmarschieren"
 USA_invade_mexico_desc:0 "Zeit, die Grenze für immer zu schließen und jemanden an die Macht zu bringen, den wir mögen."
 USA_secure_panama_forever:0 "Panama für immer sichern"
 USA_secure_panama_forever_desc:0 "Wir müssen den Kanal für alle Zeiten sichern. Wir haben ihn gebaut und hätten ihn niemals aufgeben dürfen."
 USA_crush_dissent_among_republicans:0 "Dissens unter Republikanern unterdrücken"
 USA_crush_dissent_among_republicans_desc:0 "Republikanische Eliten, die immer noch zögern, können diszipliniert, eingeschüchtert und ihres Handlungsspielraums beraubt werden, bis die öffentliche Einheit zur Pflicht wird."
 USA_raise_corporate_taxes:0 "Körperschaftssteuern erhöhen"
 USA_raise_corporate_taxes_desc:0 "Höhere Körperschaftssteuern sind jetzt populär. Die Geschäftswelt kann den Schlag verkraften, und die Öffentlichkeit wird es gutheißen, sie mehr zahlen zu lassen."
 USA_only_friendly_media:0 "Nur freundliche Medien"
 USA_only_friendly_media_desc:0 "Erlauben Sie keine schlechten Nachrichten für uns. Die Presse wird auf loyale Kanäle, genehmigte Narrative und Persönlichkeiten beschränkt, die wissen, auf welcher Seite sie stehen."
 USA_veteran_propaganda:0 "Veteranenpropaganda"
 USA_veteran_propaganda_desc:0 "Veteranen mit Botschaften über Verrat, nationale Ehre und die Pflicht, in Kriegszeiten zum Regime zu stehen, ansprechen."
 USA_elderly_propaganda:0 "Propaganda für Ältere"
 USA_elderly_propaganda_desc:0 "Ältere Wähler mit einer einfachen Botschaft überfluten: Nur diese Regierung kann Ordnung, Leistungen und Sicherheit in einer zusammenbrechenden Welt bewahren."
 USA_worker_propaganda:0 "Arbeiterpropaganda"
 USA_worker_propaganda_desc:0 "Eine Botschaft verbreiten, dass nur das Regime Arbeitsplätze, Löhne und Fabriken vor Sabotage, Migranten und ausländischem Niedergang schützt."
 USA_independents_propaganda:0 "Propaganda für Unabhängige"
 USA_independents_propaganda_desc:0 "Die Nachrichtendiät der Unabhängigen so gestalten, dass Neutralität passiver Akzeptanz und dann offener Unterstützung weicht."
 USA_find_another_place_to_silence_dissent:0 "Einen anderen Ort finden, um Dissens zum Schweigen zu bringen"
 USA_find_another_place_to_silence_dissent_desc:0 "Das Regime kann immer ein anderes Gefängnis, einen schwarzen Standort oder einen versiegelten Komplex für diejenigen finden, die sich nicht fügen wollen. Die Vollendung dieses Fokus schaltet auch eine wiederholbare Operation mit demselben Namen frei."
 USA_find_another_place_to_silence_dissent2:0 "Einen anderen Ort finden, um Dissens zum Schweigen zu bringen"
 USA_find_another_place_to_silence_dissent2_desc:0 "Das Regime kann immer ein anderes Gefängnis, einen schwarzen Standort oder einen versiegelten Komplex für diejenigen finden, die sich nicht fügen wollen. Die Vollendung dieses Fokus schaltet auch eine wiederholbare Operation mit demselben Namen frei."
 USA_blockade_cuba:0 "Kuba blockieren"
 USA_blockade_cuba_desc:0 "Kuba blockieren, bereit machen, seinen Führer durch jemanden zu ersetzen, mit dem wir verhandeln können."
 USA_golf_and_make_videos:0 "Golfen und Videos machen"
 USA_golf_and_make_videos_desc:0 "Nach diesem Krieg brauchen wir eine Pause. Zeit, Golf zu spielen und die Produktion von mehr KI-Videos zu überwachen, in denen Scheiße auf Demonstranten fällt."
 USA_visit_gaza_and_israel:0 "Gaza und Israel besuchen"
 USA_visit_gaza_and_israel_desc:0 "Der Präsident fliegt mit Geld aus dem Nahen Osten und viel Prahlerei ein und verspricht, Gaza durch den Friedensrat wieder aufzubauen."
 USA_rally_southerners:0 "Südstaatler mobilisieren"
 USA_rally_southerners_desc:0 "Südlichen Wählern sagen, dass ihre Lebensweise direkt vom Krieg bedroht ist und nur ein totaler Sieg sie bewahren kann."
 USA_rally_rural_and_west:0 "Ländliche und westliche Wähler mobilisieren"
 USA_rally_rural_and_west_desc:0 "Den Konflikt als Kampf gegen Sozialisten darstellen und diese Botschaft nutzen, um die Unterstützung in ländlichen Bezirken und im Gebirgswesten zu festigen."
 USA_rally_christians:0 "Christliche Nationalisten mobilisieren"
 USA_rally_christians_desc:0 "Den Krieg als Kampf gegen Liberale und Pluralisten darstellen und Kirchen und religiöse Netzwerke auffordern, hinter der Regierung zu stehen."
 USA_russian_volunteers:0 "Russische Freiwillige"
 USA_russian_volunteers_desc:0 "Russische Freiwillige sind bereit, an unserer Seite zu kämpfen, solange dieser Krieg auf Deutschland oder Kanada konzentriert bleibt und sich nicht zu einem direkten Showdown mit China oder Russland ausweitet."
 USA_treasury_plus_100_tt:0 "Erhalte §G+100§! Schatzkammerguthaben."
 USA_treasury_plus_50_tt:0 "Erhalte §G+50§! Schatzkammerguthaben."
 USA_treasury_plus_20_tt:0 "Erhalte §G+20§! Schatzkammerguthaben."
 USA_debt_plus_100_tt:0 "Schulden um §R+100§! erhöhen."
 USA_treasury_minus_20_tt:0 "Gib §R-20§! Schatzkammerguthaben aus."
 USA_treasury_minus_10_tt:0 "Gib §R-10§! Schatzkammerguthaben aus."
 USA_treasury_minus_7_weekly_tt:0 "Solange aktiv: verliere jede Woche §R-7§! Schatzkammerguthaben."
 USA_treasury_minus_8_weekly_tt:0 "Solange aktiv: verliere jede Woche §R-8§! Schatzkammerguthaben."
 USA_treasury_minus_100_tt:0 "Gib §R-100§! Schatzkammerguthaben aus."
 USA_treasury_minus_50_tt:0 "Gib §R-50§! Schatzkammerguthaben aus."
 USA_China_War_Idea:0 "China-Kriegs-Dislokation"
 USA_China_War_Idea_desc:0 "Der Krieg mit China hat Finanzen, Schifffahrt und Handelsbeziehungen im gesamten Pazifik gestört. Bis sich die Beziehungen normalisieren, wird die fiskalische Belastung anhalten.\n\n§RWöchentliche Schatzkammer: -8§!"
 USA_trade_embargo:0 "US-Handelsembargo"
 USA_trade_embargo_desc:0 "Der Krieg mit den Vereinigten Staaten hat die Handelskanäle und Finanzierungsbedingungen stark gestört.\n\n§RWöchentliche Schatzkammer: -8§!"
 USA_Nobody_to_Borrow_From:0 "Niemand, von dem man leihen kann"
 USA_Nobody_to_Borrow_From_desc:0 "Krieg und steigende Schulden haben Washington mit einem schwindenden Zugang zu willigen Kreditgebern zurückgelassen. Wenn die Schulden §R[?USA_debt_first_loss_threshold|0]§! erreichen, werden einige Truppen nicht bezahlt und Formationen könnten desertieren oder sich auflösen. Wenn die Schulden §R[?USA_debt_second_loss_threshold|0]§! erreichen, werden weitere Formationen zu verschwinden beginnen."
 CAL_emergency_formations_los_angeles:0 "Notfallformationen"
 CAL_emergency_formations_los_angeles_desc:0 "Los Angeles hat immer noch die Leute, die Fahrzeuge und die Wut. Wir können das sofort in Notfallmilizformationen umwandeln."
 CAL_emergency_formations_seattle:0 "Notfallformationen in Seattle"
 CAL_emergency_formations_seattle_desc:0 "Seattle kann immer noch bewaffnete lokale Formationen aufstellen, wenn wir schnell handeln und die föderalen Überreste aus dem Gleichgewicht bringen."
 CAL_volunteers_from_mexican_army:0 "Freiwillige aus der mexikanischen Armee"
 CAL_volunteers_from_mexican_army_desc:0 "Sympathische Offiziere und Veteranen aus Mexiko können nach Norden schleichen und unsere Linien mit erfahrenen Freiwilligen verstärken."
 CAL_volunteers_from_south_america:0 "Freiwillige aus Südamerika"
 CAL_volunteers_from_south_america_desc:0 "Netzwerke in ganz Südamerika können eine weitere Welle von Kämpfern liefern, die bereit sind, uns zu helfen, den pazifischen Widerstand zusammenzuhalten."
 CAL_volunteers_from_asia:0 "Freiwillige aus Asien"
 CAL_volunteers_from_asia_desc:0 "Über den Pazifik hinweg gibt es Veteranen und Aktivisten, die bereit sind, sich einem Kampf anzuschließen, den sie als größer als nur Kalifornien ansehen."
 CAL_volunteers_from_eastern_usa:0 "Freiwillige aus den östlichen USA"
 CAL_volunteers_from_eastern_usa_desc:0 "Die östlichen Staaten enthalten immer noch Menschen, die bereit sind, die Blockade zu durchbrechen und nach Westen zu kommen, um unter unserem Banner zu kämpfen."
 USA_meet_in_the_middle:0 "Nur auf Sonderwahlen konzentrieren"
 USA_meet_in_the_middle_desc:0 "Kalifornien ist angesichts seiner wirtschaftlichen Macht und seines Einflusses der logische Anführer, um Trump zu widerstehen."
 CAL_prepare_for_war:0 "Vorbereitung auf den Krieg"
 CAL_prepare_for_war_desc:0 "Kalifornien kann nicht ewig außerhalb des kommenden kontinentalen Konflikts bleiben. Wenn Deutschland die NATO wieder aufgebaut hat, kann Sacramento den Staat auf den Krieg vorbereiten und offiziell dem Bündnis beitreten."
 CAL_buy_weapons:0 "Waffen kaufen"
 CAL_buy_weapons_desc:0 "Kalifornien hat das Geld, um schnell Flugzeugzellen, Raketenbestände, Drohnen und Kommandosysteme von verbündeten Lieferanten zu kaufen. Infanteriewaffen sind bereits reichlich vorhanden; was jetzt zählt, ist der Aufbau eines modernen Angriffspakets."
 CAL_organize_military_leadership:0 "Militärische Führung organisieren"
 CAL_organize_military_leadership_desc:0 "Der Staat muss eine glaubwürdige Kommandostruktur aufbauen, bevor er einen großen Krieg führen kann. Ein neues kalifornisches Oberkommando wird um eine kleine Gruppe fähiger Generäle herum aufgebaut."
 USA_fuel_the_machine:0 "Den Mainstream zurückgewinnen"
 USA_fuel_the_machine_desc:0 "Die Versuche der FCC, Gegner zum Schweigen zu bringen, sind nach hinten losgegangen, und die Regierungspropaganda ist auf ihre üblichen Kanäle beschränkt."
 USA_national_lockdowns:0 "Bürgerkrieg"
 USA_national_lockdowns_desc:0 "Die Amtsenthebung hätte JD Vance zum Präsidenten gemacht, da dies der Grund war, warum einige Republikaner bereit waren, mitzumachen, aber als klar wurde, dass Trump und die gesamte Regierung Verrat wählten, wurde Hakeem Jeffries als 48. Präsident der Vereinigten Staaten vereidigt. Staaten und Menschen stellen sich für den nächsten Bürgerkrieg auf, oder wird es nur eine Scheidung sein?"
 USA_abandon_the_anarchists:0 "Kein Shutdown"
 USA_abandon_the_anarchists_desc:0 "Die Gesundheitssubventionen laufen aus und die Lebensmittelprogramme wurden gekürzt, aber wir können nicht gewinnen, also warum das amerikanische Volk verärgern."
 USA_mingle_with_the_movement:0 "Langer Shutdown"
 USA_mingle_with_the_movement_desc:0 "Die Gesundheitssubventionen laufen aus und die Lebensmittelprogramme wurden gekürzt. Wenn genügend Schuld auf die Republikaner fällt, könnten sie nachgeben und helfen, die HCA-Subventionen für Millionen von Amerikanern intakt zu halten."
 USA_flames_of_the_future:0 "Den wahren Feind entlarven"
 USA_flames_of_the_future_desc:0 "Die Taktiken von ICE wurden als tyrannisch entlarvt. Milizgruppen, die einst für Trump waren, beginnen zu erkennen, besonders aufgrund seiner Waffenkommentare, dass sie auf der falschen Seite stehen könnten."
 USA_american_only_oil:0 "Maduro in Venezuela entfernen"
 USA_american_only_oil_desc:0 "Sanktionen gegen Venezuela aufheben und neue Versorgungslinien sichern. Houston gewinnt §Y+16 Öl§!."
 USA_attack_iran:0 "Iran angreifen"
 USA_attack_iran_desc:0 "Eine große Eskalation gegen den Iran genehmigen. Dies verbrennt §R100B§! und verringert die Popularität der Republikaner, ohne direkte sofortige Gewinne."
 USA_civil_war_in_iran:0 "Bürgerkrieg im Iran"
 USA_civil_war_in_iran_desc:0 "Der Iran hat Unruhen, wenn wir §R100B§! ausgeben, um den Iran zu destabilisieren und einen Bürgerkrieg zwischen regimetreuen Kräften und rivalisierenden Militärelementen zu entfachen. Muss vor dem 15. März abgeschlossen sein, sonst wird es abgebrochen."
 USA_democracy_for_iran:0 "Demokratie für den Iran"
 USA_democracy_for_iran_desc:0 "Einen Regimewechselkrieg gegen den Iran starten, um eine günstigere Regierung zu erzwingen."
 USA_offer_per_white_peace_with_hormuz_concessions:0 "Weißen Frieden für Hormuz-Konzessionen anbieten"
 USA_offer_per_white_peace_with_hormuz_concessions_desc:0 "Der Iran kann sein derzeitiges Regime behalten, wenn er sich zurückzieht, Hormuzgan abtritt, wenn er es noch hält, und einem ausgehandelten Kriegsende zustimmt."
 USA_negotiated_peace_with_iran:0 "Verhandelter Frieden mit dem Iran"
 USA_negotiated_peace_with_iran_desc:0 "Den fiskalischen Schlag hinnehmen, sich aus dem direkten Krieg zurückziehen und sich mit einem verwalteten Nachfolgeergebnis in Teheran zufrieden geben."
 USA_rush_to_israels_aid:0 "Israel zu Hilfe eilen"
 USA_rush_to_israels_aid_desc:0 "Wenn der Iran im Krieg mit Israel ist, werden wir nicht tatenlos zusehen. Die Vereinigten Staaten müssen in den Krieg eintreten und Israel direkt unterstützen."
 USA_pressure_saudi_arabia_to_join_the_war_against_iran:0 "Saudi-Arabien unter Druck setzen, sich dem Krieg gegen den Iran anzuschließen"
 USA_pressure_saudi_arabia_to_join_the_war_against_iran_desc:0 "Da amerikanische Streitkräfte bereits engagiert sind, kann Riad dazu gedrängt werden, das Zögern aufzugeben und sich offen dem Krieg gegen den Iran anzuschließen."
 USA_lasting_peace:0 "Grönland vergessen"
 USA_lasting_peace_desc:0 "Grönland vorerst vergessen."
 USA_silence_the_tyrant:0 "Die Epstein-Akten veröffentlichen"
 USA_silence_the_tyrant_desc:0 "Trump wird 38.000 Mal genannt und nur die Hälfte der Akten wurde veröffentlicht. Es wird ihn nicht zu Fall bringen, aber es kratzt an seiner Zustimmungsrate."
 USA_green_economics:0 "Vorbereitung auf das Insurrektionsgesetz"
 USA_green_economics_desc:0 "Der einfachste Weg, das Insurrektionsgesetz zu bekämpfen, besteht darin, dass Gouverneure und Kommandeure der Nationalgarde einen kollektiven Plan haben, um dem Befehl zu widerstehen."
 USA_the_shadow_presidency:0 "Wahlergebnisse leugnen"
 USA_the_shadow_presidency_desc:0 "Die Republikaner haben das Repräsentantenhaus verloren, aber der Senat ist unentschieden, vielleicht können wir einen weiteren Sitz bekommen, um ihn zu halten."
 USA_underground_armaments:0 "Probelauf des Insurrektionsgesetzes"
 USA_underground_armaments_desc:0 "Es gab einen weiteren Mord durch ICE-Agenten, der zu Protesten im ganzen Land mit zahlreichen Verhaftungen führte. Trump beschloss, das Insurrektionsgesetz anzuwenden, es war zu früh, aber er war überrascht, dass es anscheinend einen koordinierten Widerstand gab. Er zog es diesmal zurück, aber sie wären beim nächsten Mal besser vorbereitet."
 USA_fan_the_flames:0 "Die Amtsenthebungen ignorieren"
 USA_fan_the_flames_desc:0 "Der Kongress kann seine ganze Zeit mit Epstein und Amtsenthebung verschwenden, das FBI und das DOJ werden mich nicht anrühren und ich habe genug republikanische Senatoren auf meiner Seite."
 USA_rally_the_people:0 "Die Basis bestechen"
 USA_rally_the_people_desc:0 "Eine Zolldividende und eine weitere landwirtschaftliche Rettungsaktion vorbereiten."
 USA_reconcile_republicans:0 "Bruchpunkt"
 USA_reconcile_republicans_desc:0 "Wir haben gelernt, dass das Einzige, wovor republikanische Senatoren Angst haben, ist, die Macht ihrer Position zu verlieren. Die Vorstellung, dass nur demokratische Senatoren abgesetzt werden könnten, beginnt sich wie eine Fantasie anzufühlen."
 USA_minimalize_militias:0 "Bruchpunkt"
 USA_minimalize_militias_desc:0 ""
 USA_empower_the_government:0 "Vorzeitige Insurrektion"
 USA_empower_the_government_desc:0 "Es gab einen weiteren Mord durch ICE-Agenten, der zu Protesten im ganzen Land mit zahlreichen Verhaftungen führte. Trump beschloss, das Insurrektionsgesetz anzuwenden, es war zu früh und wurde nur von einem winzigen Prozentsatz der Amerikaner unterstützt. Trump war gezwungen, sich zurückzuziehen und das Gesetz aufzuheben, nachdem klar wurde, dass die Nationalgarden nicht gehorchen würden."
 USA_executive_order_14066:0 "Sofortige Amtsenthebung"
 USA_executive_order_14066_desc:0 "Trump versuchte, demokratische Vertreter verhaften zu lassen, was nicht nur ein Grund für eine Amtsenthebung war, sondern auch ausreichte, um genügend Senatoren an Bord zu holen. Trump wurde mit Amtsenthebung angeklagt."
 rev_usa_cw_coup_successful:0 "Trump hat einen erfolgreichen Putsch"