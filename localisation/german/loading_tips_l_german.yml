l_german:
 LOADING_TIP_0: "Aber ich versuche, keine Fehler zu machen. Ich meine, warum muss ich, wissen Sie, bereuen? Warum muss ich um Vergebung bitten, wenn ich keine Fehler mache? - Donald Trump"
 LOADING_TIP_1: "Denn also hat Gott die Welt geliebt, dass er seinen eingeborenen Sohn gab, damit alle, die an ihn glauben, nicht verloren werden, sondern das ewige Leben haben. - Jesus, Johannesevangelium"
 LOADING_TIP_2: "Christen, geht raus und wählt, nur dieses eine Mal. Ihr müsst es danach nicht mehr tun. Noch vier Jahre... es wird repariert sein, es wird gut sein, ihr müsst nicht mehr wählen. - Donald Trump"
 LOADING_TIP_3: "Da stieg unter ihnen ein anderes kleines Horn auf, in diesem Horn waren Augen wie Menschenaugen und ein Maul, das große Dinge redete. - Buch Daniel"
 LOADING_TIP_4: "Und es wurde ihm ein Maul gegeben, große Dinge und Lästerungen zu reden... Und es wurde ihm gegeben, mit den Heiligen Krieg zu führen. - Offenbarung des Johannes"
 LOADING_TIP_5: "Der Mensch der Gesetzlosigkeit wird offenbart, der Sohn des Verderbens, der sich widersetzt und sich über alles erhebt, was Gott oder Heiligtum heißt. - Paulus, 2. Thessalonicher"
 LOADING_TIP_6: "Er war ein Mörder von Anfang an und steht nicht in der Wahrheit, denn die Wahrheit ist nicht in ihm. Wenn er lügt, spricht er aus dem Eigenen, denn er ist ein Lügner und der Vater der Lüge. - Jesus, Johannesevangelium"
 LOADING_TIP_7: "Da redete Jesus abermals zu ihnen und sprach: Ich bin das Licht der Welt; wer mir nachfolgt, wird nicht wandeln in der Finsternis, sondern wird das Licht des Lebens haben. - Jesus, Johannesevangelium"
 LOADING_TIP_8: "Frau, wo sind sie? Hat dich niemand verurteilt? Sie sprach: Niemand, Herr. Und Jesus sprach: So verurteile ich dich auch nicht; geh hin und sündige hinfort nicht mehr. - Jesus, Johannesevangelium"
 LOADING_TIP_9: "Richtet nicht, damit ihr nicht gerichtet werdet. Denn nach welchem Recht ihr richtet, werdet ihr gerichtet werden; und mit welchem Maß ihr messt, wird euch zugemessen werden. - Jesus, Johannesevangelium"
 LOADING_TIP_10: "Sammelt euch nicht Schätze auf Erden, wo Motten und Rost sie fressen und wo Diebe einbrechen und stehlen, sondern sammelt euch Schätze im Himmel. - Jesus, Matthäusevangelium"
 LOADING_TIP_11: "Niemand kann zwei Herren dienen; denn entweder wird er den einen hassen und den andern lieben, oder er wird dem einen anhangen und den andern verachten. Ihr könnt nicht Gott dienen und dem Mammon. - Jesus, Matthäusevangelium"
 LOADING_TIP_12: "Hütet euch aber vor den falschen Propheten, die in Schafskleidern zu euch kommen, inwendig aber sind sie reißende Wölfe. An ihren Früchten sollt ihr sie erkennen. - Jesus, Matthäusevangelium"
 LOADING_TIP_13: "Geht hinein durch die enge Pforte. Denn die Pforte ist weit und der Weg ist breit, der zur Verdammnis führt, und viele sind's, die auf ihm hineingehen. Denn die Pforte ist eng und der Weg ist schmal, der zum Leben führt, und wenige sind's, die ihn finden. - Jesus, Matthäusevangelium"
 LOADING_TIP_14: "Selig sind die Sanftmütigen, denn sie werden das Erdreich besitzen... Selig sind die Friedfertigen, denn sie werden Gottes Kinder heißen. - Jesus, Matthäusevangelium"
 LOADING_TIP_15: "Jesus spricht zu ihm: Ich bin der Weg und die Wahrheit und das Leben; niemand kommt zum Vater denn durch mich. - Jesus, Johannesevangelium"
 LOADING_TIP_16: "Und ein anderer Engel... sprach mit großer Stimme: Wenn jemand das Tier anbetet und sein Bild und nimmt das Zeichen an seine Stirn oder an seine Hand, der wird von dem Wein des Zornes Gottes trinken, der ungemischt eingeschenkt ist in den Kelch seines Zorns, und er wird gequält werden mit Feuer... - Offenbarung"
 LOADING_TIP_17: "Und alsdann werden sie sehen den Menschensohn kommen in einer Wolke mit großer Kraft und Herrlichkeit. - Lukasevangelium"
 LOADING_TIP_18: "Darum, wer diese meine Rede hört und tut sie, der gleicht einem klugen Mann, der sein Haus auf Fels baute; und da ein Platzregen fiel und die Wasserströme kamen und die Winde wehten und stießen an das Haus, fiel es doch nicht, denn es war auf Fels gegründet. - Jesus, Matthäusevangelium"
 LOADING_TIP_19: "Und es wurde hinausgeworfen der große Drache, die alte Schlange, die da heißt: Teufel und Satan, der die ganze Welt verführt, und er wurde auf die Erde geworfen, und seine Engel wurden mit ihm dorthin geworfen. - Offenbarung"
 LOADING_TIP_20: "Und dann wird der Gesetzlose offenbart werden, den der Herr Jesus umbringen wird mit dem Hauch seines Mundes und wird ihm ein Ende machen durch seine Erscheinung und seine Ankunft. - Paulus, 2. Thessalonicher"
 LOADING_TIP_21: "Die Ankunft des Gesetzlosen... geschieht durch die Kraft des Satans mit allerlei lügenhaften Kräften und Zeichen und Wundern und mit allerlei Verführung zur Ungerechtigkeit bei denen, die verloren werden, weil sie die Liebe zur Wahrheit nicht angenommen haben. - Paulus, 2. Thessalonicher"
 LOADING_TIP_22: "Darum sendet ihnen Gott die Macht der Verführung, dass sie der Lüge glauben, auf dass gerichtet werden alle, die der Wahrheit nicht geglaubt haben, sondern Lust hatten an der Ungerechtigkeit. - Paulus, 2. Thessalonicher"
 LOADING_TIP_23: "Und das Tier, das ich sah... und sein Maul wie ein Löwenmaul. Und der Drache gab ihm seine Kraft und seinen Thron und große Macht. Und ich sah einen seiner Köpfe wie tödlich verwundet, und seine tödliche Wunde wurde heil, und die ganze Erde wunderte sich über das Tier. - Offenbarung"
 LOADING_TIP_24: "Und der auf der Wolke saß, setzte seine Sichel an die Erde, und die Erde wurde geerntet. - Offenbarung"
 LOADING_TIP_25: "Du sollst kein falsches Zeugnis reden wider deinen Nächsten. - Das 9. Gebot, 2. Mose"
 LOADING_TIP_26: "Ein falscher Zeuge bleibt nicht ungestraft, und wer Lügen ausschnaubt, wird umkommen. - Sprüche"
 LOADING_TIP_27: "in der Hoffnung auf das ewige Leben, das Gott, der nicht lügt, verheißen hat vor den Zeiten der Welt. - Paulus, Titusbrief"
 LOADING_TIP_28: "Ich aber sage euch: Liebt eure Feinde und bittet für die, die euch verfolgen. - Jesus, Matthäusevangelium"
 LOADING_TIP_29: "Alles nun, was ihr wollt, dass euch die Leute tun sollen, das tut ihr ihnen auch. - Jesus, Matthäusevangelium"
 LOADING_TIP_30: "Wahrlich, ich sage euch: Was ihr getan habt einem von diesen meinen geringsten Brüdern oder Schwestern, das habt ihr mir getan. - Jesus, Matthäusevangelium"
 LOADING_TIP_31: "Du sollst den Herrn, deinen Gott, lieben von ganzem Herzen, von ganzer Seele, von allen Kräften und von ganzem Gemüt, und deinen Nächsten wie dich selbst. - Jesus, Lukasevangelium"
 LOADING_TIP_32: "Ich wäre gerne Papst. Das wäre meine erste Wahl. - Donald Trump"
 LOADING_TIP_33: "Gutes und Barmherzigkeit werden mir folgen mein Leben lang, und ich werde bleiben im Hause des Herrn immerdar. - Psalm 23"
 LOADING_TIP_34: "Der Weg zur Hölle ist mit guten Vorsätzen gepflastert."
 LOADING_TIP_35: "Ich kenne deine Werke, dass du weder kalt noch warm bist. Ach, dass du kalt oder warm wärest! Weil du aber lau bist, werde ich dich ausspeien aus meinem Munde. - Offenbarung"
 LOADING_TIP_36: "Denn uns ist ein Kind geboren, ein Sohn ist uns gegeben, und die Herrschaft ruht auf seiner Schulter; und er heißt Wunder-Rat, Gott-Held, Ewig-Vater, Friede-Fürst. - Jesaja"
 LOADING_TIP_37: "Ich schwanke hin und her zwischen der Annahme, dass Trump ein zynisches Arschloch wie Nixon ist, der gar nicht so schlimm wäre (und sich sogar als nützlich erweisen könnte), oder dass er Amerikas Hitler ist - JD Vance"
 LOADING_TIP_38: "'Niemals Trump', 'Verwerflich', 'moralisches Desaster', 'kulturelles Heroin', 'Mr. Trump ist ungeeignet für das höchste Amt unserer Nation' - JD Vance"
 LOADING_TIP_39: "Ich bin der gute Hirte; der gute Hirte lässt sein Leben für die Schafe. - Jesus, Johannesevangelium"
 LOADING_TIP_40: "Ich bin der gute Hirte und kenne die Meinen, und die Meinen kennen mich, wie mich der Vater kennt und ich kenne den Vater; und ich lasse mein Leben für die Schafe. - Jesus, Johannesevangelium"
 LOADING_TIP_41: "Denn du sprichst: 'Ich bin reich und habe Überfluss und brauche nichts', und weißt nicht, dass du elend und jämmerlich bist, arm, blind und bloß. - Offenbarung"
 LOADING_TIP_42: "Und lassen Sie uns klar über die Gefahr sprechen. Falsche Messiasse scheitern nicht nur; sie verderben. Sie lehren Menschen, Macht mit Rechtschaffenheit und Sieg mit Tugend zu verwechseln. - Paul Mendlowitz über Trump"
 LOADING_TIP_43: "Und es entbrannte ein Kampf im Himmel: Michael und seine Engel stritten gegen den Drachen; und der Drache stritt und seine Engel, aber sie siegten nicht, und ihre Stätte wurde nicht mehr gefunden im Himmel. Und der große Drache wurde gestürzt - Offenbarung"
 LOADING_TIP_44: "Und ich sah, und siehe, eine weiße Wolke. Und auf der Wolke saß einer, der gleich war einem Menschensohn; der hatte eine goldene Krone auf seinem Haupt... Und ein andrer Engel... rief mit großer Stimme dem zu: Setze deine Sichel an und ernte; denn die Zeit zu ernten ist gekommen, denn die Ernte der Erde ist überreif. - Johannes von Patmos, Offenbarung"
 LOADING_TIP_45: "Ihr Lieben, glaubt nicht jedem Geist, sondern prüft die Geister, ob sie von Gott sind; denn es sind viele falsche Propheten ausgegangen in die Welt. - Johannesbrief"
 LOADING_TIP_46: "zwei Männer standen bei ihnen in weißen Gewändern, die sagten: 'Ihr Männer von Galiläa, was steht ihr da und seht zum Himmel? Dieser Jesus, der von euch weg gen Himmel aufgenommen wurde, wird so wiederkommen, wie ihr ihn habt gen Himmel fahren sehen.' - Apostelgeschichte"
 LOADING_TIP_47: "Aber es kommt die Stunde und ist schon jetzt, dass die wahren Anbeter den Vater anbeten werden im Geist und in der Wahrheit; denn auch der Vater will solche Anbeter haben. - Jesus, Johannesevangelium"
 LOADING_TIP_48: "Selig sind, die geistlich arm sind; denn ihrer ist das Himmelreich. - Matthäusevangelium"
 LOADING_TIP_49: "Und Jesus sprach: 'Vater, vergib ihnen; denn sie wissen nicht, was sie tun.' - Lukasevangelium"
 LOADING_TIP_50: "Da wurde erfüllt, was gesagt ist durch den Propheten Jeremia, der da spricht: 'Und sie nahmen die dreißig Silberlinge, den Preis des Geschätzten, den die Kinder Israel geschätzt hatten.' - Matthäusevangelium"
 LOADING_TIP_51: "Den Frieden lasse ich euch, meinen Frieden gebe ich euch. Nicht gebe ich euch, wie die Welt gibt. Euer Herz erschrecke nicht und fürchte sich nicht. - Johannesevangelium"
 LOADING_TIP_52: "Der Menschensohn geht zwar hin, wie von ihm geschrieben steht; doch wehe dem Menschen, durch den der Menschensohn verraten wird! Es wäre für diesen Menschen besser, wenn er nie geboren wäre.' - Matthäusevangelium"
 LOADING_TIP_53: "Ihr seid wiedergeboren nicht aus vergänglichem, sondern aus unvergänglichem Samen, nämlich aus dem lebendigen und bleibenden Wort Gottes. - 1. Petrus"
 LOADING_TIP_54: "Und dann wird der Gesetzlose offenbart werden, den der Herr Jesus umbringen wird mit dem Hauch seines Mundes und wird ihm ein Ende machen durch seine Erscheinung und seine Ankunft. - Paulus, 2. Thessalonicher"
 LOADING_TIP_55: "Die Ankunft des Gesetzlosen durch das Wirken des Satans wird mit allerlei Macht und mit lügenhaften Zeichen und Wundern geschehen, - Paulus, 2. Thessalonicher"
 LOADING_TIP_56: "Sein Schwanz fegte ein Drittel der Sterne des Himmels hinweg und warf sie auf die Erde. Und der Drache trat vor die Frau, die gebären sollte, auf dass er, wenn sie geboren hätte, ihr Kind fräße. - Offenbarung"
 LOADING_TIP_57: "Und der große Drache wurde hinabgeworfen, die alte Schlange, die da heißt Teufel und Satan, der die ganze Welt verführt – er wurde auf die Erde geworfen, und seine Engel wurden mit ihm hinabgeworfen. - Offenbarung"
 LOADING_TIP_58: "Und als der Drache sah, dass er auf die Erde geworfen war, verfolgte er die Frau, die den Knaben geboren hatte. - Offenbarung"
 LOADING_TIP_59: "Da wurde der Drache zornig über die Frau und ging hin, zu kämpfen gegen die Übrigen von ihrem Geschlecht, die Gottes Gebote halten und das Zeugnis Jesu haben. - Offenbarung"
 LOADING_TIP_60: "Und das Tier, das ich sah, war gleich einem Panther und seine Füße wie Bärenfüße und sein Rachen wie ein Löwenrachen. Und der Drache gab ihm seine Kraft und seinen Thron und große Macht. - Offenbarung"
 LOADING_TIP_61: "Die Menschen beteten den Drachen an, weil er dem Tier die Macht gab, und beteten das Tier an und sprachen: 'Wer ist dem Tier gleich und wer kann mit ihm kämpfen?' - Offenbarung"
 LOADING_TIP_62: "Und ihm [dem Tier] gab der Drache [Satan] seine Kraft und seinen Thron und große Macht. Einer seiner Köpfe schien wie tödlich verwundet, aber seine tödliche Wunde wurde geheilt, und die ganze Erde folgte dem Tier voller Verwunderung. - Offenbarung"
 LOADING_TIP_63: "Und es [das Tier] wurde ihm gegeben, zu kämpfen mit den Heiligen und sie zu überwinden. - Offenbarung"
 LOADING_TIP_64: "Und es [der falsche Prophet] übt alle Macht des ersten Tieres aus vor seinen Augen und es macht, dass die Erde und die darauf wohnen, das erste Tier anbeten, dessen tödliche Wunde heil geworden war. - Offenbarung"
 LOADING_TIP_65: "und es [der falsche Prophet] verführt die auf Erden wohnen... und sagt denen, die auf Erden wohnen, dass sie ein Bild machen sollen dem Tier, das die Wunde vom Schwert hatte und lebendig geworden war; - Offenbarung"
 LOADING_TIP_66: "Und es [der falsche Prophet] macht, dass sie allesamt, die Kleinen und Großen, die Reichen und Armen, die Freien und Sklaven, sich ein Zeichen machen an ihre rechte Hand oder an ihre Stirn und dass niemand kaufen oder verkaufen kann, wenn er nicht das Zeichen hat, nämlich den Namen des Tieres oder die Zahl seines Namens... 666. - Offenbarung"
 LOADING_TIP_67: "Und ich hörte eine Stimme vom Himmel sagen: 'Schreibe: Selig sind die Toten, die in dem Herrn sterben' 'Ja,' spricht der Geist, 'sie sollen ruhen von ihrer Mühsal, denn ihre Werke folgen ihnen nach!'. - Offenbarung"
 LOADING_TIP_68: "Hier ist die Standhaftigkeit der Heiligen gefragt, derer, die die Gebote Gottes bewahren und den Glauben an Jesus.' - Offenbarung"
 LOADING_TIP_69: "So warf der Engel seine Sichel auf die Erde und erntete den Weinstock der Erde und warf die Trauben in die große Kelter des Zornes Gottes; und die Kelter wurde draußen vor der Stadt getreten, und Blut floss aus der Kelter bis an die Zäume der Pferde, §H200 Meilen§0 weit.' - Offenbarung"
 LOADING_TIP_70: "und auf ihrer Stirn war ein Name geschrieben, ein Geheimnis: 'Babylon, die Große, die Mutter der Huren und aller Gräuel auf Erden.' Und ich sah die Frau trunken von dem Blut der Heiligen und von dem Blut der Zeugen Jesu.' - Offenbarung"
 LOADING_TIP_71: "denn Gott hat's ihnen [den 10 Hörnern] ins Herz gegeben, nach seinem Sinn zu tun und eines Sinnes zu sein und ihr Reich dem Tier zu geben, bis vollendet werden die Worte Gottes.' - Offenbarung"
 LOADING_TIP_72: "zu den Königen der ganzen Welt, sie zu versammeln zu dem Kampf am großen Tag Gottes, des Allmächtigen. Und er versammelte sie an den Ort, der auf Hebräisch heißt: Harmagedon.' - Offenbarung"
 LOADING_TIP_73: "Der fünfte Engel goss seine Schale aus auf den Thron des Tieres; da wurde sein Reich verfinstert, und die Menschen zerbissen ihre Zungen vor Schmerzen und lästerten Gott im Himmel wegen ihrer Schmerzen und wegen ihrer Geschwüre und taten nicht Buße für ihre Werke.' - Offenbarung"
 LOADING_TIP_74: "die Städte der Heiden stürzten ein, und Babylon, der Großen, wurde gedacht vor Gott, dass ihr gegeben werde der Kelch mit dem Wein seines grimmigen Zorns.' - Offenbarung"