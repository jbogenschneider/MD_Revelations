l_german:
 LOADING_TIP_0:0 "Aber ich versuche, keine Fehler zu machen. Ich meine, warum muss ich, wissen Sie, Buße tun? Warum muss ich um Vergebung bitten, wenn man keine Fehler macht? - Donald Trump"
 LOADING_TIP_1:0 "Ich wurde von Gott gerettet, um Amerika wieder groß zu machen - Donald Trump"
 LOADING_TIP_2:0 "Christen, geht raus und wählt, nur dieses eine Mal. Ihr werdet es nicht mehr tun müssen. Noch vier Jahre... es wird repariert sein, es wird in Ordnung sein, ihr werdet nicht mehr wählen müssen - Donald Trump"
 LOADING_TIP_3:0 "Da stieg ein anderes, kleines Horn zwischen ihnen auf... in diesem Horn waren Augen wie Menschenaugen und ein Mund, der große Dinge redete. - Buch Daniel"
 LOADING_TIP_4:0 "Und es wurde ihm ein Mund gegeben, der große Dinge und Lästerungen redete... Und es wurde ihm gegeben, mit den Heiligen Krieg zu führen - Offenbarung des Johannes"
 LOADING_TIP_5:0 "der Mensch der Gesetzlosigkeit wird offenbart, der Sohn des Verderbens, der sich widersetzt und sich über alles erhebt, was Gott oder Heiligtum heißt - Paulus, 2. Thessalonicher"
 LOADING_TIP_6:0 "Er war ein Mörder von Anfang an und steht nicht in der Wahrheit, denn die Wahrheit ist nicht in ihm. Wenn er lügt, spricht er aus dem Eigenen, denn er ist ein Lügner und der Vater der Lüge. - Johannesevangelium"
 LOADING_TIP_7:0 "Da redete Jesus abermals zu ihnen und sprach: Ich bin das Licht der Welt; wer mir nachfolgt, wird nicht in der Finsternis wandeln, sondern das Licht des Lebens haben. - Jesus, Johannesevangelium"
 LOADING_TIP_8:0 "Frau, wo sind sie? Hat dich niemand verurteilt? Sie sprach: Niemand, Herr. Und Jesus sprach: So verurteile ich dich auch nicht; geh hin und sündige hinfort nicht mehr. - Jesus, Johannesevangelium"
 LOADING_TIP_9:0 "Richtet nicht, damit ihr nicht gerichtet werdet. Denn nach welchem Recht ihr richtet, werdet ihr gerichtet werden; und mit welchem Maß ihr messt, wird euch zugemessen werden. - Jesus, Matthäusevangelium"
 LOADING_TIP_10:0 "Sammelt euch nicht Schätze auf Erden, wo Motten und Rost sie fressen und wo Diebe einbrechen und stehlen. Sammelt euch vielmehr Schätze im Himmel. - Jesus, Matthäusevangelium"
 LOADING_TIP_11:0 "Niemand kann zwei Herren dienen: Entweder er wird den einen hassen und den andern lieben, oder er wird an dem einen hängen und den andern verachten. Ihr könnt nicht Gott dienen und dem Mammon. - Jesus, Matthäusevangelium"
 LOADING_TIP_12:0 "Hütet euch vor den falschen Propheten, die in Schafskleidern zu euch kommen, inwendig aber sind sie reißende Wölfe. An ihren Früchten werdet ihr sie erkennen. - Jesus, Matthäusevangelium"
 LOADING_TIP_13:0 "Geht hinein durch die enge Pforte. Denn die Pforte ist weit und der Weg ist breit, der ins Verderben führt, und viele sind es, die da hineingehen. Denn die Pforte ist eng und der Weg ist schmal, der zum Leben führt, und wenige sind es, die ihn finden. - Jesus, Matthäusevangelium"
 LOADING_TIP_14:0 "Selig sind die Sanftmütigen, denn sie werden das Erdreich besitzen... Selig sind die Friedfertigen, denn sie werden Gottes Kinder heißen. - Jesus, Matthäusevangelium"
 LOADING_TIP_15:0 "Jesus spricht zu ihm: Ich bin der Weg und die Wahrheit und das Leben; niemand kommt zum Vater denn durch mich. - Jesus, Johannesevangelium"
 LOADING_TIP_16:0 "Und ein dritter Engel... sprach mit großer Stimme: Wenn jemand das Tier und sein Bild anbetet und nimmt das Zeichen an seine Stirn oder an seine Hand, der wird von dem Wein des Zornes Gottes trinken, der ungemischt eingeschenkt ist in den Kelch seines Zorns, und er wird gequält werden mit Feuer... - Offenbarung des Johannes"
 LOADING_TIP_17:0 "Und dann werden sie sehen den Menschensohn kommen in einer Wolke mit großer Kraft und Herrlichkeit. - Lukasevangelium"
 LOADING_TIP_18:0 "Darum, wer diese meine Rede hört und tut sie, der gleicht einem klugen Mann, der sein Haus auf Fels baute. Als nun ein Platzregen fiel und die Wasser kamen und die Winde wehten und stießen an das Haus, fiel es doch nicht ein; denn es war auf Fels gegründet. - Jesus, Matthäusevangelium"
 LOADING_TIP_19:0 "Und es wurde hinausgeworfen der große Drache, die alte Schlange, die da heißt: Teufel und Satan, der die ganze Welt verführt, und er wurde auf die Erde geworfen, und seine Engel wurden mit ihm dahin geworfen. - Offenbarung des Johannes"
 LOADING_TIP_20:0 "Und dann wird der Gesetzlose geoffenbart werden, den der Herr Jesus umbringen wird mit dem Hauch seines Mundes und wird ihm ein Ende machen durch seine Erscheinung, wenn er kommt. - Paulus, 2. Thessalonicher"
 LOADING_TIP_21:0 "Das Kommen des Gesetzlosen... wird von Zeichen und Wundern begleitet sein, und mit all böser Täuschung für die, die zugrunde gehen, weil sie sich weigerten, die Wahrheit zu lieben. - Paulus, 2. Thessalonicher"
 LOADING_TIP_22:0 "Darum lässt Gott sie getäuscht werden, damit sie der Lüge glauben, auf dass alle gerichtet werden, die der Wahrheit nicht geglaubt haben, sondern Wohlgefallen hatten an der Ungerechtigkeit. - Paulus, 2. Thessalonicher"
 LOADING_TIP_23:0 "Und das Tier, das ich sah... und sein Rachen war wie ein Löwenrachen. Und der Drache gab ihm seine Kraft und seinen Thron und große Macht. Und ich sah einen seiner Köpfe, als wäre er tödlich verwundet, und seine tödliche Wunde wurde heil. Und die ganze Erde wunderte sich über das Tier. - Offenbarung des Johannes"
 LOADING_TIP_24:0 "Und der auf der Wolke saß, setzte seine Sichel an die Erde, und die Erde wurde abgeerntet. - Offenbarung des Johannes"
 LOADING_TIP_25:0 "Du sollst kein falsches Zeugnis ablegen wider deinen Nächsten. - Das 9. Gebot, Exodus"
 LOADING_TIP_26:0 "Ein falscher Zeuge bleibt nicht ungestraft, und wer Lügen ausspricht, wird zugrunde gehen. - Sprüche Salomos"
 LOADING_TIP_27:0 "In der Hoffnung auf das ewige Leben, das Gott, der nicht lügt, verheißen hat vor den Zeiten der Welt. - Paulus, Brief an Titus"
 LOADING_TIP_28:0 "Ich aber sage euch: Liebt eure Feinde und betet für die, die euch verfolgen. - Jesus, Matthäusevangelium"
 LOADING_TIP_29:0 "Alles nun, was ihr wollt, dass euch die Leute tun sollen, das tut ihnen auch. - Jesus, Matthäusevangelium"
 LOADING_TIP_30:0 "Wahrlich, ich sage euch: Was ihr getan habt einem von diesen meinen geringsten Brüdern oder Schwestern, das habt ihr mir getan. - Jesus, Matthäusevangelium"
 LOADING_TIP_31:0 "Du sollst den Herrn, deinen Gott, lieben von ganzem Herzen, von ganzer Seele, von allen Kräften und von ganzem Gemüt, und deinen Nächsten wie dich selbst. - Jesus, Lukasevangelium"
 LOADING_TIP_32:0 "Ich wäre gerne Papst. Das wäre meine erste Wahl. - Donald Trump"
 LOADING_TIP_33:0 "Ja, da ist eine Sache. Meine eigene Moral. Mein eigener Verstand. Es ist das Einzige, was mich aufhalten kann. - Donald Trump"
 LOADING_TIP_34:0 "Der Weg zur Hölle ist mit guten Vorsätzen gepflastert."
 LOADING_TIP_35:0 "Ich kenne deine Werke; ich weiß, dass du weder kalt noch warm bist. Ach, dass du kalt oder warm wärest! Weil du aber lau bist, werde ich dich ausspeien aus meinem Munde. - Offenbarung des Johannes"
 LOADING_TIP_36:0 "Ich bin eure Stimme. Heute füge ich hinzu: Ich bin euer Krieger. Ich bin eure Gerechtigkeit. Und für jene, denen Unrecht getan und die betrogen wurden, bin ich eure Vergeltung. - Donald Trump"
 LOADING_TIP_37:0 "Ich schwanke hin und her zwischen dem Gedanken, dass Trump ein zynisches 'A-Loch' wie Nixon ist, der gar nicht so schlimm wäre (und sich vielleicht sogar als nützlich erweisen könnte), oder dass er Amerikas Hitler ist - JD Vance"
 LOADING_TIP_38:0 "'Niemals Trump', 'Verwerflich', 'moralisches Desaster', 'kulturelles Heroin', 'Mr. Trump ist ungeeignet für das höchste Amt unserer Nation' - JD Vance"
 LOADING_TIP_39:0 "Ich bin der gute Hirte. Der gute Hirte lässt sein Leben für die Schafe. - Jesus, Johannesevangelium"
 LOADING_TIP_40:0 "Ich bin der gute Hirte und kenne die Meinen und die Meinen kennen mich, wie mich mein Vater kennt und ich kenne den Vater. Und ich lasse mein Leben für die Schafe. - Jesus, Johannesevangelium"
 LOADING_TIP_41:0 "Denn du sprichst: Ich bin reich und habe Überfluss und brauche nichts, und weißt nicht, dass du elend und jämmerlich bist, arm, blind und bloß. - Offenbarung des Johannes"
 LOADING_TIP_42:0 "Und lassen Sie uns offen über die Gefahr hier sprechen. Falsche Messiasse scheitern nicht nur; sie korrumpieren. Sie lehren die Menschen, Macht mit Gerechtigkeit und Sieg mit Tugend zu verwechseln. - Paul Mendlowitz über Trump"
 LOADING_TIP_43:0 "Da entbrannte ein Kampf im Himmel: Michael und seine Engel kämpften gegen den Drachen. Und der Drache kämpfte und seine Engel, und sie siegten nicht und ihre Stätte wurde nicht mehr gefunden im Himmel. Und es wurde gestürzt der große Drache - Offenbarung des Johannes"
 LOADING_TIP_44:0 "Und ich sah eine weiße Wolke. Und auf der Wolke saß einer, der gleich war einem Menschensohn; der hatte eine goldene Krone auf seinem Haupt... Und ein anderer Engel... rief mit großer Stimme zu dem, der auf der Wolke saß: Setze deine Sichel an und ernte; denn die Zeit zu ernten ist gekommen, denn die Ernte der Erde ist überreif geworden. - Johannes von Patmos, Offenbarung des Johannes"
 LOADING_TIP_45:0 "Zustimmungsrate für Trump, Februar 2026: Amerikaner: 39 Prozent, Evangelikale: 69 Prozent, jüdische Israelis: 83 Prozent, Europäer: 3 Prozent"
 LOADING_TIP_46:0 "Präsident Trump wurde von Jesus gesalbt, um das Signalfeuer im Iran zu entzünden, Harmagedon auszulösen und Seine Rückkehr auf die Erde zu markieren - ein echter USAF-Unteroffizier, März 2026."
 LOADING_TIP_47:0 "Aber die Stunde kommt und ist schon da, in der die wahren Anbeter den Vater im Geist und in der Wahrheit anbeten werden; denn solche Anbeter sucht der Vater. - Jesus, Johannesevangelium"