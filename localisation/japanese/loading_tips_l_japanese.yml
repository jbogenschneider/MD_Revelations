l_japanese:
 LOADING_TIP_0:0 "でも、私は間違いを犯さないようにしています。つまり、なぜ私が、ご存知の通り、悔い改めなければならないのでしょうか？間違いを犯していないのなら、なぜ許しを請う必要があるのでしょうか？ - ドナルド・トランプ"
 LOADING_TIP_1:0 "私はアメリカを再び偉大にするために神に救われました - ドナルド・トランプ"
 LOADING_TIP_2:0 "キリスト教徒の皆さん、外に出て投票してください。今回だけです。あと4年... それは修正され、うまくいくでしょう。もう投票する必要はありません - ドナルド・トランプ"
 LOADING_TIP_3:0 "彼らの間に別の小さな角が生えてきました。この角には人間の目のような目があり、大言壮語する口がありました。 - ダニエル書"
 LOADING_TIP_4:0 "そして、大言壮語し、冒涜の言葉を吐く口が与えられました...そして、聖徒たちと戦うことが許されました - ヨハネの黙示録"
 LOADING_TIP_5:0 "不法の者、滅びの子が現れます。彼は、すべて神と呼ばれるもの、あるいは礼拝の対象とされるものに反抗し、自分を高く上げる者です。 - パウロ、テサロニケの信徒への手紙二"
 LOADING_TIP_6:0 "彼は初めから人殺しであり、真理に立っていません。彼の中には真理がないからです。彼が偽りを言うとき、それは彼の本性から出たことです。彼は偽り者であり、偽りの父だからです。 - ヨハネによる福音書"
 LOADING_TIP_7:0 "イエスは再び彼らに語られました。「私は世の光です。私に従う者は暗闇の中を歩くことなく、命の光を持ちます。」 - イエス、ヨハネによる福音書"
 LOADING_TIP_8:0 "「婦人よ、彼らはどこにいますか？誰もあなたを罪に定めなかったのですか？」彼女は「主よ、誰も」と言いました。イエスは言われました。「私もあなたを罪に定めません。行きなさい。そして、これからはもう罪を犯してはいけません。」 - イエス、ヨハネによる福音書"
 LOADING_TIP_9:0 "人を裁いてはいけません。自分が裁かれないためです。あなたがたが裁くその裁きで、あなたがたも裁かれ、あなたがたが量るそのはかりで、あなたがたにも量り与えられるからです。 - イエス、マタイによる福音書"
 LOADING_TIP_10:0 "自分のために地上に宝を積んではいけません。そこでは、虫やさびが傷つけ、盗人が忍び込んで盗み出します。むしろ、自分のために天に宝を積みなさい。 - イエス、マタイによる福音書"
 LOADING_TIP_11:0 "誰も二人の主人に仕えることはできません。一方を憎んで他方を愛するか、一方に親しんで他方を軽んじるかになります。神と富とに仕えることはできません。 - イエス、マタイによる福音書"
 LOADING_TIP_12:0 "偽預言者を警戒しなさい。彼らは羊の皮を被ってあなたがたのところに来ますが、内側は貪欲な狼です。あなたがたは、その実によって彼らを見分けるでしょう。 - イエス、マタイによる福音書"
 LOADING_TIP_13:0 "狭い門から入りなさい。滅びに至る門は大きく、その道は広く、そこから入っていく者が多いからです。命に至る門はなんと狭く、その道もなんと細いことでしょう。そして、それを見出す者は少ないのです。 - イエス、マタイによる福音書"
 LOADING_TIP_14:0 "柔和な人々は幸いです。彼らは地を受け継ぐからです...平和を実現する人々は幸いです。彼らは神の子と呼ばれるからです。 - イエス、マタイによる福音書"
 LOADING_TIP_15:0 "イエスは彼に言われました。「私が道であり、真理であり、命です。私を通らなければ、誰も父のもとに行くことはできません。」 - イエス、ヨハネによる福音書"
 LOADING_TIP_16:0 "そして、別の天使が...大声で言いました。「もし誰かが獣とその像を拝み、額や手に刻印を受けるなら、その者も神の怒りの杯に混ぜ物なしに注がれた、神の怒りのぶどう酒を飲み、火と硫黄で苦しめられるでしょう...」 - ヨハネの黙示録"
 LOADING_TIP_17:0 "そしてそのとき、人々は、人の子が力と大いなる栄光を帯びて雲に乗って来るのを見るでしょう。 - ルカによる福音書"
 LOADING_TIP_18:0 "だから、私のこれらの言葉を聞いて行なう者は皆、岩の上に自分の家を建てた賢い人に似ています。雨が降り、洪水が押し寄せ、風が吹いてその家に打ちつけても、倒れませんでした。岩の上に土台が据えられていたからです。 - イエス、マタイによる福音書"
 LOADING_TIP_19:0 "この巨大な竜、すなわち、悪魔とかサタンとか呼ばれ、全世界を惑わすあの古い蛇は、地上に投げ落とされ、その使いたちも彼と共に投げ落とされました。 - ヨハネの黙示録"
 LOADING_TIP_20:0 "そしてそのとき、不法の者が現れますが、主イエスは彼を御口の息で打ち殺し、御降臨の輝きで滅ぼされます。 - パウロ、テサロニケの信徒への手紙二"
 LOADING_TIP_21:0 "不法の者の到来は...しるしと不思議な業と、あらゆる悪の欺きを伴って、滅びる者たちに対してなされます。彼らが救われるために真理への愛を受け入れなかったからです。 - パウロ、テサロニケの信徒への手紙二"
 LOADING_TIP_22:0 "それゆえ、神は彼らが偽りを信じるように、惑わす力を送られます。それは、真理を信じず、不義を喜んだすべての者が、裁かれるためです。 - パウロ、テサロニケの信徒への手紙二"
 LOADING_TIP_23:0 "そして、私が見たその獣は...その口はライオンの口のようでした。竜は自分の力と王座と大いなる権威をその獣に与えました。その頭の一つは致命傷を受けたかのように見えましたが、その致命傷は治り、全地は驚いてその獣に従いました。 - ヨハネの黙示録"
 LOADING_TIP_24:0 "そこで、雲の上に座っておられる方が、地上に鎌を投げ入れると、地上の産物は刈り取られました。 - ヨハネの黙示録"
 LOADING_TIP_25:0 "隣人に対して偽りの証言をしてはならない。 - 第九戒、出エジプト記"
 LOADING_TIP_26:0 "偽りの証人は罰を免れない。偽りを吐く者は滅びる。 - 箴言"
 LOADING_TIP_27:0 "永遠の命の希望に基づくものです。この命は、偽ることのない神が、永遠の昔に約束してくださったものです。 - パウロ、テトスへの手紙"
 LOADING_TIP_28:0 "しかし、私はあなたがたに言います。敵を愛し、あなたがたを迫害する者のために祈りなさい。 - イエス、マタイによる福音書"
 LOADING_TIP_29:0 "だから、人にしてもらいたいと思うことは何でも、あなたがたも人にしなさい。 - イエス、マタイによる福音書"
 LOADING_TIP_30:0 "はっきり言っておく。私の兄弟であるこの最も小さい者の一人に直してくれたのは、私にしてくれたことである。 - イエス、マタイによる福音書"
 LOADING_TIP_31:0 "心を尽くし、精神を尽くし、力を尽くし、思いを尽くして、あなたの神である主を愛しなさい。また、隣人を自分のように愛しなさい。 - イエス、ルカによる福音書"
 LOADING_TIP_32:0 "ローマ教皇になりたいですね。それが私の第一の選択肢です。 - ドナルド・トランプ"
 LOADING_TIP_33:0 "ええ、一つあります。私自身の道徳心です。私自身の心です。私を止められるのはそれだけです。 - ドナルド・トランプ"
 LOADING_TIP_34:0 "地獄への道は善意で敷き詰められている。"
 LOADING_TIP_35:0 "私はあなたの行いを知っています。あなたが冷たくもなく、熱くもないことを。むしろ、冷たいか熱いかであってほしい。このように、あなたは熱くも冷たくもなく、生ぬるいので、私はあなたを口から吐き出そうとしています。 - ヨハネの黙示録"
 LOADING_TIP_36:0 "私はあなたの声です。今日、私は付け加えます。私はあなたの戦士です。私はあなたの正義です。そして、不当な扱いを受け、裏切られた人々にとって、私はあなたの報復です - ドナルド・トランプ"
 LOADING_TIP_37:0 "トランプはニクソンのようなシニカルな「クソ野郎」で、それほど悪くない（そして役に立つかもしれない）と思うことと、彼はアメリカのヒトラーだと思うことの間を行ったり来たりしています - JD・ヴァンス"
 LOADING_TIP_38:0 "「トランプは絶対にダメだ」「非難されるべき」「道徳的な大災害」「文化的なヘロイン」「トランプ氏は我が国の最高職には不適格だ」 - JD・ヴァンス"
 LOADING_TIP_39:0 "私は良い羊飼いです。良い羊飼いは羊のために命を捨てます。 - イエス、ヨハネによる福音書"
 LOADING_TIP_40:0 "私は良い羊飼いです。私は自分の羊を知っており、私の羊も私を知っています。それは、父が私を知っておられ、私が父を知っているのと同じです。そして私は羊のために命を捨てます。 - イエス、ヨハネによる福音書"
 LOADING_TIP_41:0 "あなたは『私は金持ちだ。豊かになった。何不自由ない』と言っていますが、自分が惨めな者、哀れな者、貧しい者、目の見えない者、裸の者であることが分かっていません。 - ヨハネの黙示録"
 LOADING_TIP_42:0 "ここでの危険について率直に話しましょう。偽のメシアは失敗するだけではありません。彼らは堕落させます。彼らは人々に、権力と正義、勝利と美徳を混同するように教えます。 - トランプについてのポール・メンドロウィッツ"
 LOADING_TIP_43:0 "さて、天で戦いが起こりました。ミカエルとその使いたちが、竜に戦いを挑んだのです。竜とその使いたちも応戦しましたが、勝てず、天にはもはや彼らの居場所がなくなりました。そして、その大きな竜は投げ落とされました。 - ヨハネの黙示録"
 LOADING_TIP_44:0 "また見ていると、白い雲が現れ、その雲の上に人の子のような方が座っておられました。頭には金の冠を被り...すると、もう一人の天使が...大声で呼びかけました。「あなたの鎌を入れて刈り取ってください。刈り入れの時が来ました。地上の収穫はすっかり熟しています。」 - パトモスのヨハネ、ヨハネの黙示録"
 LOADING_TIP_45:0 "トランプの支持率（2026年2月）：アメリカ人：39%、福音派：69%、ユダヤ系イスラエル人：83%、ヨーロッパ人：3%"
 LOADING_TIP_46:0 "トランプ大統領は、ハルマゲドンを引き起こし、彼の地球への帰還を告げるための狼煙をイランに上げるためにイエスから油を注がれました。- 実際のUSAF下士官、2026年3月。"
 LOADING_TIP_47:0 "しかし、真の礼拝者たちが霊と真理とをもって父を礼拝する時が来ます。今がその時です。なぜなら、父はそのような礼拝者を求めておられるからです。 - イエス、ヨハネによる福音書"