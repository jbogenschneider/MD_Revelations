l_japanese:
 LOADING_TIP_0: "しかし、私は間違いを犯さないようにしています。つまり、なぜ私は、その、悔い改める必要があるのでしょうか？ もし間違いを犯していないなら、なぜ許しを請う必要があるのでしょうか？ - ドナルド・トランプ"
 LOADING_TIP_1: "神は、実にそのひとり子をお与えになったほどに、世を愛された。それは御子を信じる者が、ひとりとして滅びることなく、永遠のいのちを持つためである。 - イエス（ヨハネによる福音書）"
 LOADING_TIP_2: "キリスト教徒の皆さん、今回だけでいいから外に出て投票してください。もう二度と投票する必要はありません。あと4年… 問題は解決し、すべてはうまくいきます。もう投票する必要はなくなるのです。 - ドナルド・トランプ"
 LOADING_TIP_3: "彼らの間に別の小さな角が生えてきた。この角には人間の目のような目があり、大きな事を語る口があった。 - ダニエル書"
 LOADING_TIP_4: "この獣には、傲慢な言葉と冒涜を吐く口が与えられ…また、聖徒たちに戦いを挑むことが許された。 - ヨハネの黙示録"
 LOADING_TIP_5: "不法の者、すなわち滅びの子が現れます。彼は、すべて神と呼ばれるもの、また礼拝されるものに反抗し、その上に自分を高く上げます。 - パウロ（テサロニケの信徒への手紙二）"
 LOADING_TIP_6: "彼は初めから人殺しであり、真理に立っていません。彼の内に真理がないからです。彼が偽りを言うとき、その本性から言っているのです。彼は偽り者であり、偽りの父だからです。 - ヨハネによる福音書"
 LOADING_TIP_7: "イエスは再び人々に語られた。「わたしは世の光である。わたしに従う者は暗闇の中を歩まず、命の光を持つであろう。」 - イエス（ヨハネによる福音書）"
 LOADING_TIP_8: "婦人よ、あの人たちはどこにいるのか。だれもあなたを罪に定めなかったのか。彼女は言った。「主よ、だれも。」イエスは言われた。「わたしもあなたを罪に定めない。行きなさい。これからは、もう罪を犯してはならない。」 - イエス（ヨハネによる福音書）"
 LOADING_TIP_9: "人を裁くな。自分が裁かれないためである。あなたがたは、自分の裁く裁きで裁かれ、自分の量る秤で量り与えられる。 - イエス（マタイによる福音書）"
 LOADING_TIP_10: "自分のために地上に宝を積んではならない。そこでは虫が食い、さびが付き、また、盗人が忍び込んで盗み出す。富は、天に積みなさい。 - イエス（マタイによる福音書）"
 LOADING_TIP_11: "だれも、二人の主人に仕えることはできない。一方を憎んで他方を愛するか、一方に親しんで他方を軽んじるか、どちらかである。あなたがたは、神と富とに仕えることはできない。 - イエス（マタイによる福音書）"
 LOADING_TIP_12: "偽預言者を警戒しなさい。彼らは羊の皮を着てあなたがたのところに来るが、その内側は貪欲な狼である。あなたがたは、その実で彼らを見分ける。 - イエス（マタイによる福音書）"
 LOADING_TIP_13: "狭い門から入りなさい。滅びに通じる門は広く、その道も広々として、そこから入る者が多い。しかし、命に通じる門はなんと狭く、その道も細いことか。それを見いだす者は少ない。 - イエス（マタイによる福音書）"
 LOADING_TIP_14: "柔和な人々は、幸いである。その人たちは地を受け継ぐ。…平和を実現する人々は、幸いである。その人たちは神の子と呼ばれる。 - イエス（マタイによる福音書）"
 LOADING_TIP_15: "イエスは彼に言われた。「わたしは道であり、真理であり、命である。わたしを通らなければ、だれも父のもとに行くことができない。」 - イエス（ヨハネによる福音書）"
 LOADING_TIP_16: "また、別の天使が…大声で言った。「獣やその像を拝み、額や手に刻印を受ける者は、神の怒りの杯に混ぜものなしに注がれた、神の激しい怒りのぶどう酒を飲み、火と硫黄とで苦しめられる…」 - ヨハネの黙示録"
 LOADING_TIP_17: "そのとき、人の子が、大いなる力と栄光を帯びて雲に乗って来るのを、人々は見るであろう。 - ルカによる福音書"
 LOADING_TIP_18: "だから、わたしのこれらの言葉を聞いて行う者は皆、岩の上に自分の家を建てた賢い人に似ている。雨が降り、川があふれ、風が吹いてその家を襲っても、倒れなかった。岩を土台としていたからである。 - イエス（マタイによる福音書）"
 LOADING_TIP_19: "悪魔とかサタンとか呼ばれるもの、全人類を惑わす古い蛇は、地上に投げ落とされ、その使いたちももろともに投げ落とされた。 - ヨハネの黙示録"
 LOADING_TIP_20: "そして、その不法の者が現れますが、主イエスは彼を御口の息で打ち殺し、御降臨の現れで滅ぼしてしまわれます。 - パウロ（テサロニケの信徒への手紙二）"
 LOADING_TIP_21: "不法の者が来るのは…あらゆる偽りの力と、しるしと、不思議な業とにより、また、滅びる者たちに対するあらゆる不義の欺きによるのです。彼らが真理を愛しようとしなかったからです。 - パウロ（テサロニケの信徒への手紙二）"
 LOADING_TIP_22: "それゆえ、神は彼らに人を迷わす力を送られます。彼らが偽りを信じるようになり、真理を信じないで不義を喜んでいたすべての者が、裁かれるためです。 - パウロ（テサロニケの信徒への手紙二）"
 LOADING_TIP_23: "わたしが見たこの獣は…その口は獅子の口のようであった。竜はこの獣に、自分の力と王座と大きな権威とを与えた。その頭の一つが致命的な傷を受けたが、その致命的な傷は治ってしまった。そこで、全地は驚いてこの獣に従った。 - ヨハネの黙示録"
 LOADING_TIP_24: "そこで、雲の上に座っている方が、地に鎌を投げ入れると、地は刈り入れられた。 - ヨハネの黙示録"
 LOADING_TIP_25: "隣人に関して偽証してはならない。 - 第9の掟（出エジプト記）"
 LOADING_TIP_26: "偽りの証人は罰を免れない。偽りを吐く者は滅びる。 - 箴言"
 LOADING_TIP_27: "偽ることのない神が、永遠の昔に約束された永遠の命の希望に基づくものです。 - パウロ（テトスへの手紙）"
 LOADING_TIP_28: "しかし、わたしは言っておく。敵を愛し、迫害する者のために祈りなさい。 - イエス（マタイによる福音書）"
 LOADING_TIP_29: "だから、人にしてもらいたいと思うことは何でも、あなたがたも人にしなさい。 - イエス（マタイによる福音書）"
 LOADING_TIP_30: "はっきり言っておく。わたしの兄弟であるこの最も小さい者の一人にしたのは、わたしにしてくれたことなのである。 - イエス（マタイによる福音書）"
 LOADING_TIP_31: "心を尽くし、精神を尽くし、力を尽くし、思いを尽くして、あなたの神である主を愛しなさい、また、隣人を自分のように愛しなさい。 - イエス（ルカによる福音書）"
 LOADING_TIP_32: "私は教皇になりたいですね。それが第一の選択肢です。 - ドナルド・トランプ"
 LOADING_TIP_33: "命のある限り、恵みと慈しみはいつもわたしを追う。主の家にわたしは帰り、生涯、そこにとどまるであろう。 - 詩編23篇"
 LOADING_TIP_34: "地獄への道は善意で敷き詰められている。"
 LOADING_TIP_35: "わたしはあなたの行いを知っている。あなたは、冷たくもなく熱くもない。むしろ、冷たいか熱いかであってほしい。このように、熱くもなく冷たくもなく、なまぬるいので、わたしはあなたを口から吐き出そうとしている。 - ヨハネの黙示録"
 LOADING_TIP_36: "ひとりのみどりごがわたしたちのために生まれた。ひとりの男の子がわたしたちに与えられた。権威が彼の肩にある。その名は、「驚くべき指導者、力ある神、永遠の父、平和の君」と唱えられる。 - イザヤ書"
 LOADING_TIP_37: "トランプはニクソンのように皮肉屋の嫌な奴で、そこまで悪くはない（むしろ役立つかもしれない）と考えるか、彼がアメリカのヒトラーだと考えるかの間で、私の考えは揺れ動いている。 - J・D・ヴァンス"
 LOADING_TIP_38: "「反トランプ」、「非難されるべき」、「道徳的災害」、「文化的なヘロイン」、「トランプ氏は我が国の最高職には不適格である」 - J・D・ヴァンス"
 LOADING_TIP_39: "わたしは良い羊飼いである。良い羊飼いは羊のために命を捨てる。 - イエス（ヨハネによる福音書）"
 LOADING_TIP_40: "わたしは良い羊飼いである。わたしは自分の羊を知っており、羊もわたしを知っている。それは、父がわたしを知っておられ、わたしが父を知っているのと同じである。わたしは羊のために命を捨てる。 - イエス（ヨハネによる福音書）"
 LOADING_TIP_41: "あなたは、「わたしは富んでいる。豊かになった。乏しいものは何もない」と言っているが、自分が惨めな者、哀れな者、貧しい者、目の見えない者、裸の者であることが分かっていない。 - ヨハネの黙示録"
 LOADING_TIP_42: "ここにある危険について率直に語ろう。偽の救世主はただ失敗するだけではない。彼らは腐敗させるのだ。彼らは人々に、力と正義を、勝利と美徳を混同するように教え込むのである。 - ポール・メンドロウィッツ（トランプについて）"
 LOADING_TIP_43: "さて、天で戦いが起こった。ミカエルとその使いたちが、竜に戦いを挑んだのである。竜とその使いたちも応戦したが、勝てなかった。そして、もはや天には彼らの居場所がなくなった。この巨大な竜は投げ落とされた。 - ヨハネの黙示録"
 LOADING_TIP_44: "わたしがまた見ていると、見よ、白い雲が現れ、その雲の上に人の子のような方が座っておられた。頭には金の冠をかぶり…また、別の天使が…大声で呼びかけた。「鎌を入れて、刈り入れよ。地の産物はすっかり実り、刈り入れる時が来たからである。」 - パトモスのヨハネ（ヨハネの黙示録）"
 LOADING_TIP_45: "愛する者たち、どの霊も信じるのではなく、神から出たものかどうか、霊を試しなさい。偽預言者が大勢世に出て来ているからです。 - ヨハネの手紙一"
 LOADING_TIP_46: "白い服を着た二人の人がそばに立って、言った。「ガリラヤの人たち、なぜ天を見上げて立っているのか。あなたがたから離れて天に上げられたイエスは、天に行かれるのをあなたがたが見たのと同じ有様で、またおいでになる。」 - 使徒言行録"
 LOADING_TIP_47: "しかし、まことの礼拝をする者たちが、霊と真理をもって父を礼拝する時が来る。今がその時である。なぜなら、父はこのように礼拝する者を求めておられるからだ。 - イエス（ヨハネによる福音書）"
 LOADING_TIP_48: "心の貧しい人々は、幸いである。天の国はその人たちのものである。 - マタイによる福音書"
 LOADING_TIP_49: "そのとき、イエスは言われた。「父よ、彼らをお赦しください。自分が何をしているのか知らないのです。」 - ルカによる福音書"
 LOADING_TIP_50: "そのとき、預言者エレミヤを通して言われていたことが実現した。「彼らは銀貨三十枚を取った。それは、値踏みされた者の値打ちである。」 - マタイによる福音書"
 LOADING_TIP_51: "わたしは、平和をあなたがたに残し、わたしの平和を与える。わたしはこれを、世が与えるように与えるのではない。心を騒がせるな。おびえるな。 - ヨハネによる福音書"
 LOADING_TIP_52: "人の子は、聖書に書いてあるとおりに去って行く。だが、人の子を裏切るその者は不幸だ。生まれなかった方が、その者のためによかった。 - マタイによる福音書"
 LOADING_TIP_53: "あなたがたは、朽ちる種からではなく、朽ちない種から、すなわち、神の変わることのない生きた言葉によって新たに生まれたのです。 - ペトロの手紙一"
 LOADING_TIP_54: "そして、その不法の者が現れますが、主イエスは彼を御口の息で打ち殺し、御降臨の現れで滅ぼしてしまわれます。 - パウロ（テサロニケの信徒への手紙二）"
 LOADING_TIP_55: "不法の者が来るのは、サタンの働きによるのであって、あらゆる偽りの力と、しるしと、不思議な業とにより、 - パウロ（テサロニケの信徒への手紙二）"
 LOADING_TIP_56: "その尾は天の星の三分の一を掃き寄せて、地上に投げつけた。そして、竜は子を産もうとしている女の前に立ち、産まれたら、その子を食べてしまおうと待ち構えていた。 - ヨハネの黙示録"
 LOADING_TIP_57: "この巨大な竜、悪魔とかサタンとか呼ばれるもの、全人類を惑わす古い蛇は、地上に投げ落とされ、その使いたちももろともに投げ落とされた。 - ヨハネの黙示録"
 LOADING_TIP_58: "竜は、自分が地上へ投げ落とされたと分かると、男の子を産んだ女を追った。 - ヨハネの黙示録"
 LOADING_TIP_59: "竜は女に対して怒りを発し、女の残りの子ら、すなわち、神の掟を守り、イエスの証しを守り抜いている者たちと戦おうとして出て行った。 - ヨハネの黙示録"
 LOADING_TIP_60: "わたしが見たこの獣は、豹に似ており、足は熊の足のようで、口は獅子の口のようであった。竜はこの獣に、自分の力と王座と大きな権威とを与えた。 - ヨハネの黙示録"
 LOADING_TIP_61: "人々は竜を拝んだ。竜が自分の権威を獣に与えたからである。また、獣をも拝んで言った。「だれが、この獣に似あうであろうか。だれが、これと戦うことができるであろうか。」 - ヨハネの黙示録"
 LOADING_TIP_62: "竜［サタン］はこれ［獣］に、自分の力と王座と大きな権威とを与えた。その頭の一つが致命的な傷を受けたが、その致命的な傷は治ってしまった。そこで、全地は驚いてこの獣に従った。 - ヨハネの黙示録"
 LOADING_TIP_63: "また、これ［獣］には、聖徒たちと戦って勝つことが許された。 - ヨハネの黙示録"
 LOADING_TIP_64: "これ［偽預言者］は、最初の獣の権威をすべてその前で振るい、地とそこに住む人々に、致命的な傷の治った最初の獣を拝ませた。 - ヨハネの黙示録"
 LOADING_TIP_65: "これ［偽預言者］は、地に住む人々を惑わし…剣で傷つけられながらもなお生きている獣の像を造るように、地に住む人々に命じた。 - ヨハネの黙示録"
 LOADING_TIP_66: "また、これ［偽預言者］は、小さな者にも大きな者にも、富める者にも貧しい者にも、自由な身分の者にも奴隷にも、すべての者にその右手か額に刻印を押させた。そこで、この刻印のある者でなければ、物を買うことも、売ることもできないようになった。この刻印とはあの獣の名、あるいはその名の数字である…666。 - ヨハネの黙示録"
 LOADING_TIP_67: "また、わたしは天からこう告げる声を聞いた。「書き記せ。『今から後、主に結ばれて死ぬ人は幸いである』と。」“霊”も言う。「然り。彼らは労苦を解かれて、安らぐことができる。その行いが報われるからである。」 - ヨハネの黙示録"
 LOADING_TIP_68: "ここに、神の掟を守り、イエスに対する信仰を守り続ける聖徒たちの忍耐が必要である。 - ヨハネの黙示録"
 LOADING_TIP_69: "そこで、天使は地に鎌を投げ入れて、地のぶどうを刈り集め、神の怒りの大きな搾り桶に投げ入れた。搾り桶は、都の外で踏まれた。すると、血が搾り桶から流れ出て、馬のくつわに届くほどになり、§H1600スタディオン（約200マイル）§0にわたって広がった。 - ヨハネの黙示録"
 LOADING_TIP_70: "彼女の額には、秘められた意味の名が記されていた。すなわち、「大バビロン、みだらな女たちや、地上の忌まわしい者たちの母」という名である。わたしは、この女が聖徒たちの血とイエスの証人たちの血に酔いしれているのを見た。 - ヨハネの黙示録"
 LOADING_TIP_71: "神は、御言葉が完全に実現するまで、御心を行う思いを彼ら［十の角］の心に起こさせ、彼らが心を一つにして、その支配権を獣に与えるようにされたからである。 - ヨハネの黙示録"
 LOADING_TIP_72: "全世界の王たちのところへ出て行った。それは、全能者である神の大いなる日の戦いに備えて、彼らを集めるためである。こうして、汚れた霊どもは、ヘブライ語で「ハルマゲドン」と呼ばれる所に、王たちを集めた。 - ヨハネの黙示録"
 LOADING_TIP_73: "第五の天使が、その鉢の中身を獣の王座に注ぐと、獣の国は暗くなり、人々は苦しさのあまり舌をかみ、その苦痛と腫れ物のゆえに天の神を冒涜し、自分の行いを悔い改めようとはしなかった。 - ヨハネの黙示録"
 LOADING_TIP_74: "諸国の民の町々は倒れた。神は大バビロンを思い出して、御自分の激しい怒りのぶどう酒の注がれた杯を飲ませられた。 - ヨハネの黙示録"