l_korean:
 LOADING_TIP_0:0 "하지만 저는 실수를 하지 않으려고 노력합니다. 제 말은, 아시다시피 제가 왜 회개해야 하죠? 실수를 하지 않는데 왜 용서를 구해야 합니까? - 도널드 트럼프"
 LOADING_TIP_1:0 "나는 미국을 다시 위대하게 만들기 위해 신에게 구원받았습니다 - 도널드 트럼프"
 LOADING_TIP_2:0 "기독교인 여러분, 이번 한 번만 나가서 투표하십시오. 앞으로는 투표할 필요가 없을 것입니다. 앞으로 4년... 모든 것이 고쳐질 것이고 잘 될 것입니다. 더 이상 투표하지 않아도 됩니다 - 도널드 트럼프"
 LOADING_TIP_3:0 "그들 가운데서 다른 작은 뿔이 돋아났는데, 이 뿔에는 사람의 눈 같은 눈들이 있고 크게 떠벌리는 입이 있었습니다. - 다니엘서"
 LOADING_TIP_4:0 "짐승은 큰 호언장담과 신성모독의 말을 하는 입을 받고... 성도들과 싸워 이길 권세를 받았습니다 - 요한계시록"
 LOADING_TIP_5:0 "불법의 사람, 곧 멸망의 아들이 나타나게 될 것입니다. 그는 신이라고 불리거나 숭배받는 모든 것에 대항하여 자신을 높이는 자입니다 - 바울, 데살로니가후서"
 LOADING_TIP_6:0 "그는 처음부터 살인자였으며 진리 안에 서지 못했습니다. 그 안에 진리가 없기 때문입니다. 그가 거짓말을 할 때마다 자기 본성에서 우러나와 말하는 것이니, 이는 그가 거짓말쟁이요 거짓의 아비이기 때문입니다. - 요한복음"
 LOADING_TIP_7:0 "예수께서 다시 그들에게 말씀하셨습니다. '나는 세상의 빛이다. 나를 따르는 자는 어둠 속을 걷지 않고 생명의 빛을 얻을 것이다.' - 예수, 요한복음"
 LOADING_TIP_8:0 "'여인이여, 그들이 어디 있느냐? 너를 정죄한 자가 없느냐?' 그녀가 대답했습니다. '주님, 아무도 없습니다.' 예수께서 말씀하셨습니다. '나도 너를 정죄하지 않는다. 가거라, 그리고 다시는 죄를 짓지 마라.' - 예수, 요한복음"
 LOADING_TIP_9:0 "비판을 받지 아니하려거든 비판하지 말라. 너희가 비판하는 그 비판으로 너희가 비판을 받을 것이요, 너희가 헤아리는 그 헤아림으로 너희가 헤아림을 받을 것이니라. - 예수, 마태복음"
 LOADING_TIP_10:0 "너희를 위하여 보물을 땅에 쌓아 두지 말라. 거기는 좀과 동록이 해하며 도둑이 구멍을 뚫고 도둑질하느니라. 오직 너희를 위하여 보물을 하늘에 쌓아 두라. - 예수, 마태복음"
 LOADING_TIP_11:0 "아무도 두 주인을 섬길 수 없다. 한쪽을 미워하고 다른 쪽을 사랑하거나, 한쪽을 중히 여기고 다른 쪽을 업신여길 것이다. 너희는 하나님과 재물을 겸하여 섬길 수 없다. - 예수, 마태복음"
 LOADING_TIP_12:0 "거짓 선지자들을 조심하라. 양의 옷을 입고 너희에게 나아오나 속에는 노략질하는 이리라. 그들의 열매로 그들을 알지니. - 예수, 마태복음"
 LOADING_TIP_13:0 "좁은 문으로 들어가라. 멸망으로 인도하는 문은 크고 그 길이 넓어 그리로 들어가는 자가 많고, 생명으로 인도하는 문은 좁고 길이 협착하여 찾는 자가 적음이라. - 예수, 마태복음"
 LOADING_TIP_14:0 "온유한 자는 복이 있나니 그들이 땅을 기업으로 받을 것임이요... 화평하게 하는 자는 복이 있나니 그들이 하나님의 아들이라 일컬음을 받을 것임이요. - 예수, 마태복음"
 LOADING_TIP_15:0 "예수께서 그에게 말씀하셨습니다. 내가 곧 길이요 진리요 생명이니 나로 말미암지 않고는 아버지께로 올 자가 없느니라. - 예수, 요한복음"
 LOADING_TIP_16:0 "또 다른 천사가... 큰 음성으로 말했습니다. 만일 누구든지 짐승과 그의 우상에게 경배하고 이마에나 손에 표를 받으면, 그도 하나님의 진노의 포도주를 마시리니 그 진노의 잔에 섞인 것이 없이 부은 포도주라... 불과 유황으로 고난을 받으리니... - 요한계시록"
 LOADING_TIP_17:0 "그때에 사람들은 인자가 구름을 타고 능력과 큰 영광으로 오는 것을 볼 것이다. - 누가복음"
 LOADING_TIP_18:0 "그러므로 누구든지 나의 이 말을 듣고 행하는 자는 그 집을 반석 위에 지은 지혜로운 사람 같으리니, 비가 내리고 홍수가 나고 바람이 불어 그 집에 부딪히되 무너지지 아니하나니 이는 주추를 반석 위에 놓은 까닭이요. - 예수, 마태복음"
 LOADING_TIP_19:0 "큰 용이 내쫓기니 옛 뱀 곧 마귀라고도 하고 사탄이라고도 하며 온 천하를 꾀는 자라. 그가 땅으로 내쫓기니 그의 사자들도 그와 함께 내쫓기니라. - 요한계시록"
 LOADING_TIP_20:0 "그때에 불법한 자가 나타나리니 주 예수께서 그 입의 기운으로 그를 죽이시고 강림하여 나타나심으로 폐하시리라. - 바울, 데살로니가후서"
 LOADING_TIP_21:0 "불법한 자의 나타남은... 모든 능력과 표적과 거짓 기적과, 멸망하는 자들에게 임하는 모든 불의의 속임수로 말미암으리니 이는 그들이 진리의 사랑을 받지 아니하여 구원함을 받지 못함이라. - 바울, 데살로니가후서"
 LOADING_TIP_22:0 "이러므로 하나님이 미혹의 역사를 그들에게 보내사 거짓 것을 믿게 하심은, 진리를 믿지 않고 불의를 좋아하는 모든 자들로 하여금 심판을 받게 하려 하심이라. - 바울, 데살로니가후서"
 LOADING_TIP_23:0 "내가 본 짐승은... 그 입은 사자의 입 같았는데 용이 자기의 능력과 보좌와 큰 권세를 그에게 주었더라. 그의 머리 하나가 상하여 죽게 된 것 같더니 그 죽게 되었던 상처가 나으매 온 땅이 놀랍게 여겨 짐승을 따르고. - 요한계시록"
 LOADING_TIP_24:0 "구름 위에 앉으신 이가 낫을 땅에 휘두르매 땅의 곡식이 거두어지니라. - 요한계시록"
 LOADING_TIP_25:0 "네 이웃에 대하여 거짓 증거하지 말라. - 제9계명, 출애굽기"
 LOADING_TIP_26:0 "거짓 증인은 벌을 면하지 못할 것이요 거짓말을 뱉는 자는 망할 것이니라. - 잠언"
 LOADING_TIP_27:0 "영생의 소망을 위함이라 이 영생은 거짓이 없으신 하나님이 영원 전부터 약속하신 것인데. - 바울, 디도서"
 LOADING_TIP_28:0 "나는 너희에게 이르노니 너희 원수를 사랑하며 너희를 박해하는 자를 위하여 기도하라. - 예수, 마태복음"
 LOADING_TIP_29:0 "그러므로 무엇이든지 남에게 대접을 받고자 하는 대로 너희도 남을 대접하라. - 예수, 마태복음"
 LOADING_TIP_30:0 "내가 진실로 너희에게 이르노니 너희가 여기 내 형제 중에 지극히 작은 자 하나에게 한 것이 곧 내게 한 것이니라. - 예수, 마태복음"
 LOADING_TIP_31:0 "네 마음을 다하고 목숨을 다하고 힘을 다하고 뜻을 다하여 주 너의 하나님을 사랑하고 또한 네 이웃을 네 자신 같이 사랑하라. - 예수, 누가복음"
 LOADING_TIP_32:0 "저는 교황이 되고 싶습니다. 그것이 제 첫 번째 선택입니다. - 도널드 트럼프"
 LOADING_TIP_33:0 "네, 한 가지 있습니다. 제 자신의 도덕성입니다. 제 자신의 마음입니다. 저를 멈출 수 있는 것은 그것뿐입니다. - 도널드 트럼프"
 LOADING_TIP_34:0 "지옥으로 가는 길은 선의로 포장되어 있다."
 LOADING_TIP_35:0 "내가 네 행위를 아노니 네가 차지도 아니하고 뜨겁지도 아니하도다. 네가 차든지 뜨겁든지 하기를 원하노라. 네가 이같이 미지근하여 뜨겁지도 아니하고 차지도 아니하니 내 입에서 너를 토하여 버리리라. - 요한계시록"
 LOADING_TIP_36:0 "나는 여러분의 목소리입니다. 오늘, 나는 덧붙입니다. 나는 여러분의 전사입니다. 나는 여러분의 정의입니다. 그리고 부당한 취급을 받고 배신당한 사람들에게, 나는 여러분의 복수입니다 - 도널드 트럼프"
 LOADING_TIP_37:0 "저는 트럼프가 그렇게 나쁘지 않은 (어쩌면 유용할지도 모르는) 닉슨 같은 냉소적인 '나쁜 자식'이라고 생각하는 것과 그가 미국의 히틀러라고 생각하는 것 사이를 오락가락합니다 - J.D. 밴스"
 LOADING_TIP_38:0 "'절대 트럼프는 안 됨', '비난받아 마땅함', '도덕적 재앙', '문화적 헤로인', '트럼프 씨는 우리 나라의 최고 직책에 부적합합니다' - J.D. 밴스"
 LOADING_TIP_39:0 "나는 선한 목자라 선한 목자는 양들을 위하여 목숨을 버리거니와. - 예수, 요한복음"
 LOADING_TIP_40:0 "나는 선한 목자라 나는 내 양을 알고 양도 나를 아는 것이 아버지께서 나를 아시고 내가 아버지를 아는 것 같으니 나는 양을 위하여 목숨을 버리노라. - 예수, 요한복음"
 LOADING_TIP_41:0 "네가 말하기를 나는 부자라 부요하여 부족한 것이 없다 하나 네 곤고한 것과 가련한 것과 가난한 것과 눈먼 것과 벌거벗은 것을 알지 못하는도다. - 요한계시록"
 LOADING_TIP_42:0 "이곳의 위험에 대해 분명히 이야기합시다. 가짜 메시아는 실패할 뿐만 아니라 타락시킵니다. 그들은 사람들에게 권력과 정의, 승리와 미덕을 혼동하도록 가르칩니다. - 트럼프에 대한 폴 멘들로위츠"
 LOADING_TIP_43:0 "하늘에 전쟁이 있으니 미가엘과 그의 사자들이 용과 더불어 싸울새 용과 그의 사자들도 싸우나 이기지 못하여 다시 하늘에서 그들이 있을 곳을 얻지 못한지라. 큰 용이 내쫓기니 - 요한계시록"
 LOADING_TIP_44:0 "또 내가 보니 흰 구름이 있고 구름 위에 인자와 같은 이가 앉으셨는데 그 머리에는 금 면류관을 쓰고... 또 다른 천사가... 그를 향하여 큰 음성으로 외쳐 이르되 네 낫을 휘둘러 거두라 땅의 곡식이 다 익어 거둘 때가 이르렀음이라 하니. - 밧모섬의 요한, 요한계시록"
 LOADING_TIP_45:0 "2026년 2월 트럼프 지지율: 미국인: 39%, 복음주의자: 69%, 유대계 이스라엘인: 83%, 유럽인: 3%"
 LOADING_TIP_46:0 "트럼프 대통령은 이란에 신호탄을 밝혀 아마겟돈을 일으키고 그분의 지구 귀환을 알리기 위해 예수님으로부터 기름 부음을 받았습니다 - 현역 미 공군 부사관, 2026년 3월."
 LOADING_TIP_47:0 "아버지께 참되게 예배하는 자들은 영과 진리로 예배할 때가 오나니 곧 이 때라 아버지께서는 자기에게 이렇게 예배하는 자들을 찾으시느니라. - 예수, 요한복음"