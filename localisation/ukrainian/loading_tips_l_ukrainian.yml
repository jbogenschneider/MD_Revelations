l_ukrainian:
 LOADING_TIP_0:0 "Але я намагаюся не робити помилок. Я маю на увазі, навіщо мені, знаєте, каятися? Навіщо мені просити вибачення, якщо ти не робиш помилок? - Дональд Трамп"
 LOADING_TIP_1:0 "Мене врятував Бог, щоб я знову зробив Америку великою - Дональд Трамп"
 LOADING_TIP_2:0 "Християни, вийдіть і проголосуйте, тільки цього разу. Вам більше не доведеться цього робити. Ще чотири роки... все буде виправлено, все буде добре, вам більше не доведеться голосувати - Дональд Трамп"
 LOADING_TIP_3:0 "Ось іще один малий ріг вийшов між ними... і в цьому розі були очі, як очі людські, і уста, що говорили зухвале. - Книга пророка Даниїла"
 LOADING_TIP_4:0 "І дано йому уста, що говорили велике та богохульне... І дано йому вести війну зі святими - Об'явлення Івана Богослова"
 LOADING_TIP_5:0 "відкриється людина беззаконня, син погибелі, який противиться і несеться над усе, що зветься Богом або святинею - Павло, 2 послання до Солунян"
 LOADING_TIP_6:0 "Він був душогубом від початку і не встояв в істині, бо істини немає в ньому. Коли говорить він неправду, від свого говорить, бо він неправдомовець і батько неправді. - Євангеліє від Івана"
 LOADING_TIP_7:0 "Знову Ісус промовив до них, кажучи: Я світло для світу; хто йде за Мною, не блукатиме в темряві, а матиме світло життя. - Ісус, Євангеліє від Івана"
 LOADING_TIP_8:0 "Жінко, де вони? Ніхто не засудив тебе? Вона сказала: Ніхто, Господи. І Ісус сказав: І Я тебе не засуджую; іди, і віднині більше не гріши. - Ісус, Євангеліє від Івана"
 LOADING_TIP_9:0 "Не судіть, щоб і вас не судили. Бо яким судом судите, таким і вас судитимуть, і якою мірою міряєте, такою відміряється й вам. - Ісус, Євангеліє від Матвія"
 LOADING_TIP_10:0 "Не збирайте собі скарбів на землі, де міль та іржа нищать, і де злодії підкопують і крадуть, а збирайте собі скарби на небі. - Ісус, Євангеліє від Матвія"
 LOADING_TIP_11:0 "Ніхто не може служити двом панам; бо або одного зненавидить, а другого буде любити, або буде триматися одного, а другим знехтує. Не можете служити Богові й мамоні. - Ісус, Євангеліє від Матвія"
 LOADING_TIP_12:0 "Стережіться лжепророків, що приходять до вас в овечій одежі, а всередині – хижі вовки. По їхніх плодах пізнаєте їх. - Ісус, Євангеліє від Матвія"
 LOADING_TIP_13:0 "Увійдіть вузькими воротами; бо просторі ті ворота й широка та дорога, що веде до погибелі, і багато хто йде нею. Бо вузькі ті ворота й тісна та дорога, що веде до життя, і мало хто знаходить її. - Ісус, Євангеліє від Матвія"
 LOADING_TIP_14:0 "Блаженні лагідні, бо вони успадкують землю... Блаженні миротворці, бо вони синами Божими назвуться. - Ісус, Євангеліє від Матвія"
 LOADING_TIP_15:0 "Ісус сказав йому: Я дорога, і істина, і життя; ніхто не приходить до Отця, як тільки через Мене. - Ісус, Євангеліє від Івана"
 LOADING_TIP_16:0 "І третій ангел... гучним голосом говорив: Коли хто поклоняється звірині та її образу і приймає клеймо на своє чоло чи на свою руку, той питиме вино Божого гніву, налите незмішаним у чашу гніву Його, і буде мучений в огні... - Об'явлення Івана Богослова"
 LOADING_TIP_17:0 "І тоді побачать Сина Людського, що йтиме на хмарі з силою та великою славою. - Євангеліє від Луки"
 LOADING_TIP_18:0 "Отже, кожен, хто слухає ці Мої слова і виконує їх, буде подібний до чоловіка мудрого, що свій дім збудував на камені; і пішов дощ, і річки розлилися, і знялися вітри, і вдарили на той дім, але він не впав, бо був заснований на камені. - Ісус, Євангеліє від Матвія"
 LOADING_TIP_19:0 "Той давній змій, що зветься диявол і сатана, що зводить увесь світ, був скинутий на землю, і його ангели були скинуті разом з ним. - Об'явлення Івана Богослова"
 LOADING_TIP_20:0 "І тоді відкриється беззаконник, якого Господь Ісус уб'є духом Своїх уст і знищить явленням Свого приходу. - Павло, 2 послання до Солунян"
 LOADING_TIP_21:0 "Прихід беззаконника... супроводжуватиметься знаменами та чудесами, і з усякою неправедною оманою для тих, хто гине, бо вони відмовилися полюбити істину. - Павло, 2 послання до Солунян"
 LOADING_TIP_22:0 "Тому Бог дозволяє їм бути обдуреними, щоб вони повірили неправді, щоб були засуджені всі, хто не повірив істині, але мав задоволення в неправедності. - Павло, 2 послання до Солунян"
 LOADING_TIP_23:0 "І звірина, яку я бачив... паща її була, як паща лева. І дав їй дракон свою силу, і свій престол, і велику владу. Одна з її голів здавалася смертельно пораненою, але її смертельна рана зцілилася, і вся земля з подивом пішла за звіриною. - Об'явлення Івана Богослова"
 LOADING_TIP_24:0 "Тож Ісус, який сидів на хмарі, кинув свій серп на землю, і земля була пожата. - Об'явлення Івана Богослова"
 LOADING_TIP_25:0 "Не свідчи неправдиво на ближнього твого. - 9-та заповідь, Вихід"
 LOADING_TIP_26:0 "Фальшивий свідок не залишиться непокараним, і той, хто дихає брехнею, загине. - Притчі"
 LOADING_TIP_27:0 "В надії на вічне життя, яке Бог, що ніколи не обманює, обіцяв перед початком віків. - Павло, Послання до Тита"
 LOADING_TIP_28:0 "А Я кажу вам: Любіть ворогів ваших і моліться за тих, хто вас переслідує. - Ісус, Євангеліє від Матвія"
 LOADING_TIP_29:0 "У всьому, отже, робіть людям так, як хочете, щоб вони робили вам. - Ісус, Євангеліє від Матвія"
 LOADING_TIP_30:0 "Щиро кажу вам: те, що ви зробили одному з найменших Моїх братів чи сестер, ви зробили Мені. - Ісус, Євангеліє від Матвія"
 LOADING_TIP_31:0 "Люби Господа Бога твого всім серцем твоїм, і всією душею твоєю, і всією силою твоєю, і всім розумом твоїм; і ближнього твого, як самого себе. - Ісус, Євангеліє від Луки"
 LOADING_TIP_32:0 "Я хотів би бути папою. Це був би мій вибір номер один. - Дональд Трамп"
 LOADING_TIP_33:0 "Так, є одна річ. Моя власна мораль. Мій власний розум. Це єдине, що може мене зупинити. - Дональд Трамп"
 LOADING_TIP_34:0 "Дорога до пекла вимощена добрими намірами."
 LOADING_TIP_35:0 "Я знаю твої діла; я знаю, що ти ні холодний, ні гарячий. Якби ж то ти був холодний або гарячий! А так, як ти теплий, то виплюну тебе з Моїх уст. - Об'явлення Івана Богослова"
 LOADING_TIP_36:0 "Я ваш голос. Сьогодні я додаю: я ваш воїн. Я ваша справедливість. І для тих, хто був скривджений і зраджений, я ваша відплата. - Дональд Трамп"
 LOADING_TIP_37:0 "Я постійно вагаюся: то думаю, що Трамп — цинічний «засранець» на кшталт Ніксона, який не такий вже й поганий (і навіть може виявитися корисним), то думаю, що він — американський Гітлер. - Джей Ді Венс"
 LOADING_TIP_38:0 "'Ніколи Трамп', 'Ганебно', 'моральна катастрофа', 'культурний героїн', 'Пан Трамп непридатний для найвищої посади нашої нації' - Джей Ді Венс"
 LOADING_TIP_39:0 "Я пастир добрий; пастир добрий кладе своє життя за овець. - Ісус, Євангеліє від Івана"
 LOADING_TIP_40:0 "Я пастир добрий, і Я знаю Своїх, і Мої знають Мене, як Отець знає Мене, і Я знаю Отця; і Я кладу Своє життя за овець. - Ісус, Євангеліє від Івана"
 LOADING_TIP_41:0 "Бо ти кажеш: 'Я багатий, розбагатів, і ні в чому не маю потреби', а не знаєш, що ти нещасний, жалюгідний, бідний, сліпий і голий. - Об'явлення Івана Богослова"
 LOADING_TIP_42:0 "І давайте прямо поговоримо про небезпеку тут. Фальшиві месії не лише зазнають невдачі; вони розбещують. Вони вчать людей плутати владу з праведністю, а перемогу – з чеснотою. - Пол Мендловіц про Трампа"
 LOADING_TIP_43:0 "І сталася на небі війна: Михаїл та його ангели воювали проти дракона; і дракон та його ангели воювали, але не перемогли, і для них більше не знайшлося місця на небі. І був скинутий великий дракон - Об'явлення Івана Богослова"
 LOADING_TIP_44:0 "Потім я побачив білу хмару, і на хмарі сидів хтось подібний до Сина Людського, з золотим вінцем на голові... І інший ангел... гучним голосом гукав до нього: кинь твій серп і жни, бо настав час жати, бо жнива на землі вже повністю дозріли. - Іван з Патмоса, Об'явлення Івана Богослова"
 LOADING_TIP_45:0 "Рейтинг схвалення Трампа в лютому 2026 року: Американці: 39 відсотків, євангелісти: 69 відсотків, євреї-ізраїльтяни: 83 відсотки, європейці: 3 відсотки"
 LOADING_TIP_46:0 "Президент Трамп був помазаний Ісусом, щоб запалити сигнальний вогонь в Ірані, щоб викликати Армагеддон і відзначити Його повернення на Землю - реальний сержант ВПС США, березень 2026 року."
 LOADING_TIP_47:0 "Але надходить година, і вже тут, коли правдиві поклонники будуть поклонятися Отцеві в Дусі та істині; бо дійсно Отець шукає таких людей, щоб поклонялися Йому. - Ісус, Євангеліє від Івана"