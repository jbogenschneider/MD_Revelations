l_russian:
 LOADING_TIP_0: "Но я стараюсь не делать ошибок. Я имею в виду, зачем мне, знаете ли, каяться? Зачем мне просить прощения, если я не совершаю ошибок? - Дональд Трамп"
 LOADING_TIP_1: "Ибо так возлюбил Бог мир, что отдал Сына Своего Единородного, дабы всякий верующий в Него, не погиб, но имел жизнь вечную. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_2: "Христиане, идите и голосуйте, только в этот раз. Вам больше не придется этого делать. Еще четыре года... все будет исправлено, все будет хорошо, вам больше не придется голосовать. - Дональд Трамп"
 LOADING_TIP_3: "И вышло между ними еще одно небольшое рог, и в этом роге были глаза, как глаза человеческие, и уста, говорящие высокомерно. - Книга пророка Даниила"
 LOADING_TIP_4: "И даны были ему уста, говорящие гордо и богохульно... И дано было ему вести войну со святыми - Откровение Иоанна Богослова"
 LOADING_TIP_5: "откроется человек греха, сын погибели, противящийся и превозносящийся выше всего, называемого Богом или святынею - Павел, 2-е послание Фессалоникийцам"
 LOADING_TIP_6: "Он был человекоубийца от начала и не устоял в истине, ибо нет в нем истины. Когда говорит он ложь, говорит свое, ибо он лжец и отец лжи. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_7: "Опять говорил Иисус к народу и сказал им: Я свет миру; кто последует за Мною, тот не будет ходить во тьме, но будет иметь свет жизни. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_8: "Женщина! где твои обвинители? никто не осудил тебя? Она отвечала: никто, Господи. Иисус сказал ей: и Я не осуждаю тебя; иди и впредь не греши. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_9: "Не судите, да не судимы будете, ибо каким судом судите, таким будете судимы; и какою мерою мерите, такою и вам будут мерить. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_10: "Не собирайте себе сокровищ на земле, где моль и ржа истребляют и где воры подкапывают и крадут, но собирайте себе сокровища на небе. - Иисус, Евангелие от Матфея"
 LOADING_TIP_11: "Никто не может служить двум господам: ибо или одного будет ненавидеть, а другого любить; или одному станет усердствовать, а о другом нерадеть. Не можете служить Богу и мамоне. - Иисус, Евангелие от Матфея"
 LOADING_TIP_12: "Берегитесь лжепророков, которые приходят к вам в овечьей одежде, а внутри суть волки хищные. По плодам их узнаете их. - Иисус, Евангелие от Матфея"
 LOADING_TIP_13: "Входите тесными вратами, потому что широки врата и пространен путь, ведущие в погибель, и многие идут ими; потому что тесны врата и узок путь, ведущие в жизнь, и немногие находят их. - Иисус, Евангелие от Матфея"
 LOADING_TIP_14: "Блаженны кроткие, ибо они наследуют землю... Блаженны миротворцы, ибо они будут наречены сынами Божиими. - Иисус, Евангелие от Матфея"
 LOADING_TIP_15: "Иисус сказал ему: Я есмь путь и истина и жизнь; никто не приходит к Отцу, как только через Меня. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_16: "И еще ангел... говорил громким голосом: кто поклоняется зверю и образу его и принимает начертание на чело свое, или на руку свою, тот будет пить вино ярости Божией, вино цельное, приготовленное в чаше гнева Его, и будет мучим в огне... - Откровение"
 LOADING_TIP_17: "И тогда увидят Сына Человеческого, грядущего на облаке с силою и славою великою. - Евангелие от Луки"
 LOADING_TIP_18: "Итак всякого, кто слушает слова Мои сии и исполняет их, уподоблю мужу благоразумному, который построил дом свой на камне; и пошел дождь, и разлились реки, и подули ветры, и устремились на дом тот, и он не упал, потому что основан был на камне. - Иисус, Евангелие от Матфея"
 LOADING_TIP_19: "Древний змий, называемый диаволом и сатаною, обольщающий всю вселенную, низвержен на землю, и ангелы его низвержены с ним. - Откровение"
 LOADING_TIP_20: "И тогда откроется беззаконник, которого Господь Иисус убьет духом уст Своих и истребит явлением пришествия Своего. - Павел, 2-е Фессалоникийцам"
 LOADING_TIP_21: "Пришествие беззаконника... будет со всякою силою и знамениями и чудесами ложными, и со всяким неправедным обольщением погибающих за то, что они не приняли любви истины для своего спасения. - Павел, 2-е Фессалоникийцам"
 LOADING_TIP_22: "И за сие пошлет им Бог действие заблуждения, так что они будут верить лжи, да будут осуждены все, не веровавшие истине, но возлюбившие неправду. - Павел, 2-е Фессалоникийцам"
 LOADING_TIP_23: "Зверь, которого я видел... пасть его - как пасть львиная. И дал ему дракон силу свою и престол свой и великую власть. И видел я, что одна из голов его как бы смертельно была ранена, но эта смертельная рана исцелела. И дивилась вся земля, следя за зверем. - Откровение"
 LOADING_TIP_24: "И поверг сидящий на облаке серп свой на землю, и земля была пожата. - Откровение"
 LOADING_TIP_25: "Не произноси ложного свидетельства на ближнего твоего. - 9-я заповедь, Исход"
 LOADING_TIP_26: "Лжесвидетель не останется ненаказанным, и кто говорит ложь, погибнет. - Притчи"
 LOADING_TIP_27: "В надежде вечной жизни, которую обещал неизменный в слове Бог прежде вековых времен. - Павел, Послание к Титу"
 LOADING_TIP_28: "А Я говорю вам: любите врагов ваших, благословляйте проклинающих вас, благотворите ненавидящим вас и молитесь за обижающих вас и гонящих вас. - Иисус, Евангелие от Матфея"
 LOADING_TIP_29: "Итак во всем, как хотите, чтобы с вами поступали люди, так поступайте и вы с ними. - Иисус, Евангелие от Матфея"
 LOADING_TIP_30: "Истинно говорю вам: так как вы сделали это одному из сих братьев Моих меньших, то сделали Мне. - Иисус, Евангелие от Матфея"
 LOADING_TIP_31: "Возлюби Господа Бога твоего всем сердцем твоим, и всею душею твоею, и всею крепостию твоею, и всем разумением твоим, и ближнего твоего, как самого себя. - Иисус, Евангелие от Луки"
 LOADING_TIP_32: "Я бы хотел стать Папой Римским. Это был бы мой выбор номер один. - Дональд Трамп"
 LOADING_TIP_33: "Так, благость и милость да сопровождают меня во все дни жизни моей, и я пребуду в доме Господнем многие дни. - Псалом 23"
 LOADING_TIP_34: "Дорога в ад вымощена благими намерениями."
 LOADING_TIP_35: "Знаю твои дела; ты ни холоден, ни горяч; о, если бы ты был холоден, или горяч! Но, как ты тепл, а не горяч и не холоден, то извергну тебя из уст Моих. - Откровение"
 LOADING_TIP_36: "Ибо младенец родился нам - Сын дан нам; владычество на раменах Его, и нарекут имя Ему: Чудный, Советник, Бог крепкий, Отец вечности, Князь мира. - Исаия"
 LOADING_TIP_37: "Я колеблюсь между мыслью, что Трамп — циничный 'засранец' вроде Никсона, который не так уж плох (и даже может оказаться полезным), или что он — американский Гитлер. - Джей Ди Вэнс"
 LOADING_TIP_38: "'Только не Трамп', 'Предосудительно', 'моральная катастрофа', 'культурный героин', 'Г-н Трамп непригоден для высшего поста в нашей стране' - Джей Ди Вэнс"
 LOADING_TIP_39: "Я есмь пастырь добрый: пастырь добрый полагает жизнь свою за овец. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_40: "Я есмь пастырь добрый; и знаю Моих, и Мои знают Меня. Как Отец знает Меня, так и Я знаю Отца; и жизнь Мою полагаю за овец. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_41: "Ибо ты говоришь: 'я богат, разбогател и ни в чем не имею нужды'; а не знаешь, что ты несчастен, и жалок, и нищ, и слеп, и наг. - Откровение"
 LOADING_TIP_42: "Давайте прямо поговорим об опасности. Ложные мессии не только терпят крах; они развращают. Они учат людей путать власть с праведностью, а победу — с добродетелью. - Пол Мендловиц о Трампе"
 LOADING_TIP_43: "И произошла на небе война: Михаил и Ангелы его воевали против дракона, и дракон и ангелы его воевали против них, но не устояли, и не нашлось уже для них места на небе. И низвержен был великий дракон - Откровение"
 LOADING_TIP_44: "И взглянул я, и вот светлое облако, и на облаке сидит подобный Сыну Человеческому; на голове его золотой венец... И вышел другой Ангел... взывая громким голосом к сидящему: пусти серп твой и пожни, потому что пришло время жатвы, ибо жатва на земле перезрела. - Иоанн Богослов, Откровение"
 LOADING_TIP_45: "Возлюбленные! не всякому духу верьте, но испытывайте духов, от Бога ли они, потому что много лжепророков появилось в мире. - 1-е послание Иоанна"
 LOADING_TIP_46: "предстали им два мужа в белой одежде и сказали: мужи Галилейские! что вы стоите и смотрите на небо? Сей Иисус, вознесшийся от вас на небо, придет таким же образом, как вы видели Его восходящим на небо. - Деяния святых апостолов"
 LOADING_TIP_47: "Но настанет время и настало уже, когда истинные поклонники будут поклоняться Отцу в духе и истине, ибо таких поклонников Отец ищет Себе. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_48: "Блаженны нищие духом, ибо их есть Царство Небесное. - Евангелие от Матфея"
 LOADING_TIP_49: "Иисус же говорил: Отче! прости им, ибо не знают, что делают. - Евангелие от Луки"
 LOADING_TIP_50: "Тогда сбылось реченное через пророка Иеремию, который говорит: и взяли тридцать сребренников, цену Оцененного, Которого оценили сыны Израиля. - Евангелие от Матфея"
 LOADING_TIP_51: "Мир оставляю вам, мир Мой даю вам; не так, как мир дает, Я даю вам. Да не смущается сердце ваше и да не устрашается. - Евангелие от Иоанна"
 LOADING_TIP_52: "Впрочем Сын Человеческий идет, как писано о Нем, но горе тому человеку, которым Сын Человеческий предается: лучше было бы этому человеку не родиться. - Евангелие от Матфея"
 LOADING_TIP_53: "Как возрожденные не от тленного семени, но от нетленного, от слова Божия, живаго и пребывающего вовек. - 1-е послание Петра"
 LOADING_TIP_54: "И тогда откроется беззаконник, которого Господь Иисус убьет духом уст Своих и истребит явлением пришествия Своего. - Павел, 2-е Фессалоникийцам"
 LOADING_TIP_55: "Того, которого пришествие, по действию сатаны, будет со всякою силою и знамениями и чудесами ложными. - Павел, 2-е Фессалоникийцам"
 LOADING_TIP_56: "Хвост его увлек с неба третью часть звезд и поверг их на землю. Дракон сей стал перед женою, которой надлежало родить, дабы, когда она родит, пожрать ее младенца. - Откровение"
 LOADING_TIP_57: "И низвержен был великий дракон, древний змий, называемый диаволом и сатаною, обольщающий всю вселенную, низвержен на землю, и ангелы его низвержены с ним. - Откровение"
 LOADING_TIP_58: "Когда же дракон увидел, что низвержен на землю, начал преследовать жену, которая родила младенца мужеского пола. - Откровение"
 LOADING_TIP_59: "И рассвирепел дракон на жену, и пошел, чтобы вступить в брань с прочими от семени ее, сохраняющими заповеди Божии и имеющими свидетельство Иисуса Христа. - Откровение"
 LOADING_TIP_60: "Зверь, которого я видел, был подобен барсу; ноги у него - как у медведя, а пасть у него - как пасть у льва; и дал ему дракон силу свою и престол свой и великую власть. - Откровение"
 LOADING_TIP_61: "И поклонились дракону, который дал власть зверю, и поклонились зверю, говоря: кто подобен зверю сему? и кто может сразиться с ним? - Откровение"
 LOADING_TIP_62: "И дал ему [зверю] дракон [сатана] силу свою и престол свой и великую власть. И видел я, что одна из голов его как бы смертельно была ранена, но эта смертельная рана исцелела. И дивилась вся земля, следя за зверем. - Откровение"
 LOADING_TIP_63: "И дано было ему [зверю] вести войну со святыми и победить их. - Откровение"
 LOADING_TIP_64: "Он [лжепророк] действует перед ним со всею властью первого зверя и заставляет всю землю и живущих на ней поклоняться первому зверю, у которого смертельная рана исцелела. - Откровение"
 LOADING_TIP_65: "И чудесами... он [лжепророк] обольщает живущих на земле, говоря живущим на земле, чтобы они сделали образ зверя, который имеет рану от меча и жив. - Откровение"
 LOADING_TIP_66: "И он [лжепророк] сделает то, что всем, малым и великим, богатым и нищим, свободным и рабам, положено будет начертание на правую руку их или на чело их, и что никому нельзя будет ни покупать, ни продавать, кроме того, кто имеет это начертание, или имя зверя, или число имени его... 666. - Откровение"
 LOADING_TIP_67: "И услышал я голос с неба, говорящий мне: напиши: отныне блаженны мертвые, умирающие в Господе; ей, говорит Дух, они успокоятся от трудов своих, и дела их идут вслед за ними. - Откровение"
 LOADING_TIP_68: "Здесь терпение святых, соблюдающих заповеди Божии и веру в Иисуса. - Откровение"
 LOADING_TIP_69: "И поверг Ангел серп свой на землю, и обрезал виноград на земле, и бросил в великое точило гнева Божия. И истоптаны ягоды в точиле за городом, и потекла кровь из точила даже до узд конских, на расстояние до §H200 миль§0. - Откровение"
 LOADING_TIP_70: "И на челе ее написано имя: тайна, Вавилон великий, мать блудницам и мерзостям земным. Я видел, что жена упоена была кровью святых и кровью свидетелей Иисусовых. - Откровение"
 LOADING_TIP_71: "Потому что Бог положил им на сердце [десяти рогам] исполнить волю Его, исполнить одну волю, и отдать царство их зверю, доколе не исполнятся слова Божии. - Откровение"
 LOADING_TIP_72: "К царям земли всей вселенной, чтобы собрать их на брань в оный великий день Бога Вседержителя. И он собрал их на место, называемое по-еврейски Армагеддон. - Откровение"
 LOADING_TIP_73: "Пятый Ангел вылил чашу свою на престол зверя: и сделалось царство его мрачно, и они кусали языки свои от страдания, и хулили Бога небесного от страданий своих и язв своих; и не раскаялись в делах своих. - Откровение"
 LOADING_TIP_74: "И города языческие пали, и Вавилон великий воспомянут пред Богом, чтобы дать ему чашу вина ярости гнева Его. - Откровение"