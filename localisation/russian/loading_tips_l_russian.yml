l_russian:
 LOADING_TIP_0:0 "Но я стараюсь не делать ошибок. Я имею в виду, зачем мне, знаете ли, каяться? Зачем мне просить прощения, если я не делаю ошибок? - Дональд Трамп"
 LOADING_TIP_1:0 "Бог спас меня, чтобы я снова сделал Америку великой - Дональд Трамп"
 LOADING_TIP_2:0 "Христиане, идите и голосуйте, только в этот раз. Вам больше не придется этого делать. Еще четыре года... все будет исправлено, все будет хорошо, вам больше не придется голосовать - Дональд Трамп"
 LOADING_TIP_3:0 "И вышел между ними еще небольшой рог... и вот, в этом роге были глаза, как глаза человеческие, и уста, говорящие высокомерно. - Книга пророка Даниила"
 LOADING_TIP_4:0 "И даны были ему уста, говорящие гордо и богохульно... И дано было ему вести войну со святыми - Книга Откровения"
 LOADING_TIP_5:0 "Откроется человек греха, сын погибели, противящийся и превозносящийся выше всего, называемого Богом или святынею - Павел, 2-е Фессалоникийцам"
 LOADING_TIP_6:0 "Он был человекоубийца от начала и не устоял в истине, ибо нет в нем истины. Когда говорит он ложь, говорит свое, ибо он лжец и отец лжи. - Евангелие от Иоанна"
 LOADING_TIP_7:0 "Опять говорил Иисус к народу и сказал им: Я свет миру; кто последует за Мною, тот не будет ходить во тьме, но будет иметь свет жизни. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_8:0 "Женщина! где твои обвинители? никто не осудил тебя? Она отвечала: никто, Господи. Иисус сказал ей: и Я не осуждаю тебя; иди и впредь не греши. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_9:0 "Не судите, да не судимы будете, ибо каким судом судите, таким будете судимы; и какою мерою мерите, такою и вам будут мерить. - Иисус, Евангелие от Матфея"
 LOADING_TIP_10:0 "Не собирайте себе сокровищ на земле, где моль и ржа истребляют и где воры подкапывают и крадут, но собирайте себе сокровища на небе. - Иисус, Евангелие от Матфея"
 LOADING_TIP_11:0 "Никто не может служить двум господам: ибо или одного будет ненавидеть, а другого любить; или одному станет усердствовать, а о другом нерадеть. Не можете служить Богу и маммоне. - Иисус, Евангелие от Матфея"
 LOADING_TIP_12:0 "Берегитесь лжепророков, которые приходят к вам в овечьей одежде, а внутри суть волки хищные. По плодам их узнаете их. - Иисус, Евангелие от Матфея"
 LOADING_TIP_13:0 "Входите тесными вратами, потому что широки врата и пространен путь, ведущие в погибель, и многие идут ими; потому что тесны врата и узок путь, ведущие в жизнь, и немногие находят их. - Иисус, Евангелие от Матфея"
 LOADING_TIP_14:0 "Блаженны кроткие, ибо они наследуют землю... Блаженны миротворцы, ибо они будут наречены сынами Божиими. - Иисус, Евангелие от Матфея"
 LOADING_TIP_15:0 "Иисус сказал ему: Я есмь путь и истина и жизнь; никто не приходит к Отцу, как только через Меня. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_16:0 "И третий Ангел последовал за ними, говоря громким голосом: кто поклоняется зверю и образу его и принимает начертание на чело свое, или на руку свою, тот будет пить вино ярости Божией, вино цельное, приготовленное в чаше гнева Его, и будет мучим в огне и сере... - Откровение"
 LOADING_TIP_17:0 "И тогда увидят Сына Человеческого, грядущего на облаке с силою и славою великою. - Евангелие от Луки"
 LOADING_TIP_18:0 "Итак всякого, кто слушает слова Мои сии и исполняет их, уподоблю мужу благоразумному, который построил дом свой на камне; и пошел дождь, и разлились реки, и подули ветры, и устремились на дом тот, и он не упал, потому что основан был на камне. - Иисус, Евангелие от Матфея"
 LOADING_TIP_19:0 "И низвержен был великий дракон, древний змий, называемый диаволом и сатаною, обольщающий всю вселенную, низвержен на землю, и ангелы его низвержены с ним. - Откровение"
 LOADING_TIP_20:0 "И тогда откроется беззаконник, которого Господь Иисус убьет духом уст Своих и истребит явлением пришествия Своего. - Павел, 2-е Фессалоникийцам"
 LOADING_TIP_21:0 "Того, чье пришествие, по действию сатаны, будет со всякою силою и знамениями и чудесами ложными, и со всяким неправедным обольщением погибающих за то, что они не приняли любви истины для своего спасения. - Павел, 2-е Фессалоникийцам"
 LOADING_TIP_22:0 "И за сие пошлет им Бог действие заблуждения, так что они будут верить лжи, да будут осуждены все, не веровавшие истине, но возлюбившие неправду. - Павел, 2-е Фессалоникийцам"
 LOADING_TIP_23:0 "Зверь, которого я видел... пасть его - как пасть у льва. И дал ему дракон силу свою и престол свой и великую власть. И видел я, что одна из голов его как бы смертельно была ранена, но эта смертельная рана исцелела. И дивилась вся земля, следя за зверем... - Откровение"
 LOADING_TIP_24:0 "И поверг Сидящий на облаке серп свой на землю, и земля была пожата. - Откровение"
 LOADING_TIP_25:0 "Не произноси ложного свидетельства на ближнего твоего. - 9-я заповедь, Исход"
 LOADING_TIP_26:0 "Лжесвидетель не останется ненаказанным, и кто говорит ложь, погибнет. - Притчи"
 LOADING_TIP_27:0 "В надежде вечной жизни, которую обещал неизменный в слове Бог прежде вековых времен. - Павел, Послание к Титу"
 LOADING_TIP_28:0 "А Я говорю вам: любите врагов ваших, благословляйте проклинающих вас, благотворите ненавидящим вас и молитесь за обижающих вас и гонящих вас. - Иисус, Евангелие от Матфея"
 LOADING_TIP_29:0 "Итак во всем, как хотите, чтобы с вами поступали люди, так поступайте и вы с ними. - Иисус, Евангелие от Матфея"
 LOADING_TIP_30:0 "Истинно говорю вам: так как вы сделали это одному из сих братьев Моих меньших, то сделали Мне. - Иисус, Евангелие от Матфея"
 LOADING_TIP_31:0 "Возлюби Господа Бога твоего всем сердцем твоим, и всею душою твоею, и всею крепостию твоею, и всем разумением твоим, и ближнего твоего, как самого себя. - Иисус, Евангелие от Луки"
 LOADING_TIP_32:0 "Я хотел бы быть Папой Римским. Это был бы мой выбор номер 1. - Дональд Трамп"
 LOADING_TIP_33:0 "Да, есть одна вещь. Моя собственная мораль. Мой собственный разум. Это единственное, что может меня остановить. - Дональд Трамп"
 LOADING_TIP_34:0 "Дорога в ад вымощена благими намерениями."
 LOADING_TIP_35:0 "Знаю твои дела; ты ни холоден, ни горяч; о, если бы ты был холоден, или горяч! Но, как ты тепл, а не горяч и не холоден, то извергну тебя из уст Моих. - Откровение"
 LOADING_TIP_36:0 "Я - ваш голос. Сегодня я добавляю: я - ваш воин. Я - ваше правосудие. И для тех, с кем поступили несправедливо и кого предали, я - ваше возмездие. - Дональд Трамп"
 LOADING_TIP_37:0 "Я мечусь между мыслью, что Трамп - циничный «засранец» вроде Никсона, который не так уж и плох (и может даже оказаться полезным), или что он - американский Гитлер - Джей Ди Вэнс"
 LOADING_TIP_38:0 "«Никогда Трамп», «Достоин осуждения», «моральная катастрофа», «культурный героин», «Господин Трамп непригоден для высшего поста нашей нации» - Джей Ди Вэнс"
 LOADING_TIP_39:0 "Я есмь пастырь добрый: пастырь добрый полагает жизнь свою за овец. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_40:0 "Я есмь пастырь добрый; и знаю Моих, и Мои знают Меня. Как Отец знает Меня, так и Я знаю Отца; и жизнь Мою полагаю за овец. - Иисус, Евангелие от Иоанна"
 LOADING_TIP_41:0 "Ибо ты говоришь: «я богат, разбогател и ни в чем не имею нужды»; а не знаешь, что ты несчастен, и жалок, и нищ, и слеп, и наг. - Откровение"
 LOADING_TIP_42:0 "И давайте прямо скажем об опасности. Лжемессии не просто терпят неудачу; они развращают. Они учат людей путать власть с праведностью, а победу с добродетелью. - Пол Мендловиц о Трампе"
 LOADING_TIP_43:0 "И произошла на небе война: Михаил и Ангелы его воевали против дракона, и дракон и ангелы его воевали против них, но не устояли, и не нашлось уже для них места на небе. И низвержен был великий дракон - Откровение"
 LOADING_TIP_44:0 "И взглянул я, и вот светлое облако, и на облаке сидит подобный Сыну Человеческому; на голове его золотой венец... И вышел другой Ангел... крича громким голосом к Сидящему на облаке: пусти серп твой и пожни, потому что пришло время жатвы, ибо жатва на земле созрела. - Иоанн Богослов, Откровение"
 LOADING_TIP_45:0 "Рейтинг одобрения Трампа, февраль 2026 года: Американцы: 39%, Евангелисты: 69%, Израильские евреи: 83%, Европейцы: 3%"
 LOADING_TIP_46:0 "Президент Трамп был помазан Иисусом, чтобы зажечь сигнальный огонь в Иране, дабы вызвать Армагеддон и ознаменовать Его возвращение на Землю - реальный унтер-офицер ВВС США, март 2026 года."
 LOADING_TIP_47:0 "Но настанет время и настало уже, когда истинные поклонники будут поклоняться Отцу в духе и истине, ибо таких поклонников Отец ищет Себе. Иисус, Евангелие от Иоанна"